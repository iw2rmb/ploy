---
# Ploy Development Environment Setup Playbook
#
# This playbook orchestrates the full workstation bootstrap by delegating to
# focused task files under playbooks/tasks/. Splitting the original monolithic
# file keeps each concern smaller and easier to maintain:
#   - bootstrap.yml: base assertions, user, shared directories
#   - packages.yml: system updates and common tooling
#   - docker.yml: Docker engine, registry, and plugins
#   - languages.yml: Go runtime and Python dependencies
#   - security.yml: monitoring/NVD configuration
#   - build_tools.yml: cosign, syft, grype, opa
#   - environment.yml: environment variables, credentials, repo clone
#   - configuration.yml: storage/DNS config and firewall
#   - ssl.yml: ACME tooling and helpers

- name: Setup Ploy Development Environment
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml

  tasks:
    - import_tasks: tasks/bootstrap.yml
    - import_tasks: tasks/packages.yml
    - import_tasks: tasks/docker.yml
    - import_tasks: tasks/languages.yml
    - import_tasks: tasks/security.yml
    - import_tasks: tasks/build_tools.yml
    - import_tasks: tasks/environment.yml
    - import_tasks: tasks/configuration.yml
    - import_tasks: tasks/ssl.yml

  handlers:
    - name: restart docker
      block:
        - name: Stop Docker service gracefully
          systemd:
            name: docker
            state: stopped
          ignore_errors: true

        - name: Clean up Docker temporary files
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /var/lib/docker/tmp
            - /var/run/docker
          ignore_errors: true

        - name: Start Docker service with daemon reload
          systemd:
            name: docker
            state: started
            daemon_reload: true
          register: docker_restart_result
          retries: 3
          delay: 5
          until: docker_restart_result is succeeded

        - name: Verify Docker restart was successful
          command: docker info
          retries: 5
          delay: 3
          until: docker_info_verify.rc == 0
          register: docker_info_verify
          changed_when: false
