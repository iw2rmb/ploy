# Failing Build Gate scenario — direct Codex healing mode.
# Proves that when amata.spec is absent, a prompt file is required and enforced
# end-to-end through the healing loop (healing → re-gate).
#
# Parity contract with scenario-orw-fail:
#   - Same repo/branch combination (pre-gate ORW failure).
#   - Same loop shape: Build Gate fail → heal → re-gate.
#   - Execution mode: direct codex exec (no amata.spec) for healing;
#     prompt delivered via Hydra in mount.
#
# Submit with:
#   dist/ploy run \
#     --repo https://gitlab.com/iw2rmb/ploy-orw-java11-maven.git \
#     --base-ref e2e/fail-missing-symbol \
#     --target-ref migs-upgrade-java17-heal \
#     --spec tests/e2e/migs/scenario-orw-fail-direct/mig.yaml \
#     --follow

apiVersion: ploy.mig/v1alpha1
kind: MigRunSpec

steps:
  - image: localhost:5000/ploy/orw-cli-maven:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17

build_gate:
  enabled: true

  heal:
    retries: 1
    # Healing: direct Codex mode — no amata.spec; prompt via Hydra in mount.
    image: localhost:5000/ploy/codex:latest
    in:
      - ./codex-prompt-healer.txt:/in/codex-prompt.txt
    home:
      - ~/.codex/auth.json:.codex/auth.json

mr_on_fail: false
mr_on_success: true
