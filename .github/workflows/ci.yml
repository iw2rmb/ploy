name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  GO_VERSION: "1.25.9"

jobs:
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run pre-commit (all files)
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

  lint:
    name: GolangCI-Lint
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.7.1
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run make lint
        run: make lint

  vet:
    name: Go Vet
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run go vet
        run: make vet

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run staticcheck
        run: |
          make staticcheck || echo "warning: staticcheck reported issues"

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests
        run: make test

  redundancy-check:
    name: LOC & Duplication Guardrails
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - name: Run redundancy check
        run: |
          make redundancy-check || echo "warning: redundancy check unavailable"

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [tests, lint, vet, staticcheck, redundancy-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build CLI and API binaries
        run: make build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ploy-build
          path: |
            dist

  supply:
    name: Supply Chain (SBOM, Scan, Sign)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Syft and Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Install Cosign
        run: |
          COSIGN_VERSION=v2.2.4
          sudo curl -sSfL -o /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64
          sudo chmod +x /usr/local/bin/cosign
      - name: Generate SBOM
        run: syft dir:. -o json > repo.sbom.json
      - name: Vulnerability Scan
        run: grype repo.sbom.json --fail-on critical
      - name: Sign SBOM
        env:
          COSIGN_PASSWORD: ""
          COSIGN_YES: "true"
        run: |
          cosign generate-key-pair
          cosign sign-blob --key cosign.key --output-signature repo.sbom.json.sig repo.sbom.json
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-signature
          path: |
            repo.sbom.json
            repo.sbom.json.sig
