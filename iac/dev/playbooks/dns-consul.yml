---
# Configure node-local DNS forwarding for Consul (scales across nodes)
# - Forwards ".consul" to local Consul agent at 127.0.0.1:8600 via dnsmasq
# - Points Docker to use 127.0.0.1 for DNS and adds service.consul search
# - Restarts dnsmasq and Docker

- name: Configure node-local DNS for Consul
  hosts: linux_hosts
  become: true
  tasks:
    - name: Install dnsmasq
      apt:
        name: dnsmasq
        state: present
        update_cache: yes

    - name: Configure dnsmasq to forward .consul to local Consul DNS
      copy:
        dest: /etc/dnsmasq.d/consul.conf
        content: |
          # Forward Consul domain to local Consul agent DNS (TCP/UDP 8600)
          server=/consul/127.0.0.1#8600
        owner: root
        group: root
        mode: '0644'

    - name: Ensure dnsmasq is enabled and restarted
      systemd:
        name: dnsmasq
        state: restarted
        enabled: true

    # Docker daemon DNS configuration is managed by main.yml via docker-daemon.json.j2
    # This playbook only ensures dnsmasq forwarding is active.

    - name: Verify Consul DNS forwarder (host)
      shell: |
        set -e
        getent hosts seaweedfs-filer.service.consul >/dev/null 2>&1 || dig +short seaweedfs-filer.service.consul @127.0.0.1 -p 8600
      register: consul_dns_check
      changed_when: false

    - name: Show Consul DNS check output
      debug:
        var: consul_dns_check.stdout
