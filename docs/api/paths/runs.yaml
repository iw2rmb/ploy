post:
  tags: [Control]
  summary: Submit single-repo run
  description: |
    Submit a single-repo run. Repo jobs are materialized by the scheduler after
    submission, not started directly by this request.

    Side-effects:
    - Creates a mig project (mig name == mig id).
    - Creates an anonymous spec row and sets migs.spec_id, unless `spec_id`
      references an existing named spec row.
    - Creates a mig repo row for the provided repo_url.
    - Creates a wave and a queued run row.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/controlplane.yaml#/RunSubmitRequest"
  responses:
    "201":
      description: Created — run accepted for scheduler materialization.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/controlplane.yaml#/CreateSingleRepoRunResponse"
    "400":
      description: Bad request — missing or invalid fields in the request body.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yaml#/Error"
    "500":
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yaml#/Error"

get:
  tags: [Control]
  summary: List runs
  description: |
    Return a paginated list of runs backed by the `runs` table. By default the
    list is scoped to the resolved caller username. `all=true` disables that
    ownership filter. Each entry exposes run metadata, repository identity,
    spec display metadata, refs, status, timestamps, and optional wave-level
    run counts.
  parameters:
    - in: query
      name: limit
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
      description: Maximum number of runs to return (default 50, max 100).
    - in: query
      name: offset
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
      description: Number of runs to skip from the start of the result set.
    - in: query
      name: repo_url
      required: false
      schema:
        type: string
      description: Optional repository URL filter. The server normalizes the URL before matching runs.
    - in: query
      name: created_by
      required: false
      schema:
        type: string
      description: Fallback creator filter used when the authenticated token has no username.
    - in: query
      name: all
      required: false
      schema:
        type: boolean
      description: When true, return runs for all creators.
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              runs:
                type: array
                items:
                  $ref: "../components/schemas/controlplane.yaml#/RunSummary"
            required: [runs]
    "400":
      description: Bad request (invalid pagination parameters)
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yaml#/Error"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yaml#/Error"
