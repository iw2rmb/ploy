# Repo-scoped artifact listing for a repo execution within a run.
#
# This endpoint lists artifact bundles produced by jobs belonging to a
# specific repository execution within a batch run. The response shape
# is unchanged from the global artifact listing endpoint (GET /v1/artifacts?cid=...);
# v1 only filters to bundles associated with jobs in the repo execution.
get:
  tags: [Artifacts]
  summary: List artifacts for a repo execution within a run
  description: |
    Returns all artifact bundles produced by jobs for a specific repository
    execution within a run.

    This is the v1 repo-scoped endpoint that provides artifact listing
    filtered to jobs belonging to the specified repo execution (matching
    run_id, repo_id, and current attempt).

    Behavior:
    - Response JSON shape is unchanged from global artifact listing (`GET /v1/artifacts?cid=...`)
    - Filters the returned bundles to jobs belonging to the repo execution

    Artifacts are ordered by execution chain position, then by created_at
    (ascending).
  parameters:
    - in: path
      name: run_id
      required: true
      schema:
        type: string
      # Run IDs are KSUID strings (27 characters, lexicographically sortable).
      description: Run ID (KSUID string)
    - in: path
      name: repo_id
      required: true
      schema:
        type: string
      # Repo IDs are NanoID strings (8 characters, URL-safe alphabet).
      description: Repo ID (NanoID 8-character string)
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              artifacts:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    cid: { type: string }
                    digest: { type: string }
                    name: { type: string, nullable: true }
                    size: { type: integer, format: int64 }
                  required: [id, cid, digest, size]
            required: [artifacts]
    '400':
      description: Bad request (missing or empty run_id or repo_id)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Run or repo not found, or repo does not belong to the run
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
