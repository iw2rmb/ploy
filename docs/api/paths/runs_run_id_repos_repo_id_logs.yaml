# GET /v1/runs/{run_id}/repos/{repo_id}/logs — SSE stream for repo-scoped lifecycle events
#
# Event payloads:
# - `event: run` → RunSummary (canonical schema, no wrapper; stages filtered to this repo's jobs)
# - `event: stage` → LogRecord (stage progress message)
# - `event: done` → Terminal sentinel
#
# Container log frames are served via GET /v1/jobs/{job_id}/logs.
#
parameters:
  - in: path
    name: run_id
    required: true
    schema:
      type: string
    description: Run ID (KSUID string, 27 characters).
  - in: path
    name: repo_id
    required: true
    schema:
      type: string
    description: Repo ID (NanoID 8-character string).
  - in: header
    name: Last-Event-ID
    required: false
    description: |
      Optional SSE resume token. Server replays events with `id` greater than
      this value. Use for reconnection after network failures.
    schema:
      type: string
      example: "42"
get:
  tags: [Control]
  summary: Stream repo-scoped run lifecycle events (SSE)
  parameters:
    - in: query
      name: auth_token
      required: false
      schema:
        type: string
      description: |
        Optional bearer token supplied as a query parameter for browser/OSC8
        artifact link flows when setting the `Authorization` header is not
        possible.
  description: |
    Server-Sent Events stream for real-time lifecycle updates, filtered to
    stages belonging to a specific repo execution within a run.

    Container log frames are **not** emitted on this stream. Use
    `GET /v1/jobs/{job_id}/logs` for job-scoped container logs.

    Behavior:
    - Only `run`, `stage`, and `done` event types are emitted
    - `event: run` payloads carry RunSummary with stages filtered to repo jobs
    - `event: stage` payloads carry stage progress messages

    See `docs/api/paths/runs_id_logs.yaml` for the canonical SSE contract.
  responses:
    '200':
      description: OK — SSE stream established.
      content:
        text/event-stream:
          schema:
            type: string
            description: |
              Server-Sent Events stream. Each frame consists of `event:` type and
              `data:` JSON payload. See the run logs endpoint contract for payload schemas.
    '400':
      description: Bad Request — missing or invalid run_id or repo_id.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Not Found — repo does not exist in the run.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
