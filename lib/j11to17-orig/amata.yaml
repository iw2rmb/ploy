version: amata/v1
name: implement-roadmap
entry: main

workspace:
  root: "/workspace"
  state_dir: "/out/amata"

params:
  roadmap_file: "/tmp/roadmap.json"

defaults:
  cwd: $.workspace.root
  expr_lang: starlark
  executors:
    codex:
      model: "openai/gpt-5"
      reasoning: "medium"
      stall:
        after: 30

flows:
  main:
    steps:
      - shell: ["cat", "{{ ctx.params.roadmap_file }}"]
        response:
          from: stdout
          schema:
            type: object
            additionalProperties: false
            required: ["steps"]
            properties:
              steps:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required: ["title", "filepath", "reasoning"]
                  properties:
                    title:
                      type: string
                    filepath:
                      type: string
                    reasoning:
                      type: string
                      enum: ["low", "medium", "high"]

      - type: for_each
        items: $.prev.value.steps
        as: step
        steps:
          - codex: |
              High-level context: bring repository code and version-controlled configs to Java 17-ready state after OpenRewrite recipe bumping Java from 11 to 17.

              Implement **only** task and **only as described** in this file: `{{ ctx.step.filepath }}`.

              Implementation rules (hard):
              - Stick to the scope of the task strictly.
              - Edit only source code, build descriptors, and version-controlled config/script files.
              - Do not run builds, tests, linters, or IDE-assisted refactors.
              - Do not edit CI images, Docker base images, OS packages, or local/remote JDK installations.
              - Use `TODO(java17): ...` for unresolved decisions that need human follow-up.

              Mandatory search rules:
              - No reasoning/self-talk between commands.
              - Max 6 tool calls per step. Max 2 search commands per step.
              - rg first. Use grep/find only if rg is unavailable or fails.
              - Probe tools once per run. Do not repeat command -v checks.
              - First search must be path-only: rg -l (or rg --files with tight -g filters), then open only matched files.
              - If the first actionable scan has no matches, stop and return a no-op summary.
              - Use one precise batched regex per intent. Do not run near-duplicate scans.
              - Do not broaden the same scan intent (for example, same query with larger head limit).
              - Avoid broad legacy markers without qualifiers (for example, @Before/@After alone). Pair with explicit JUnit 4 markers.
              - After rg -l, open at most 3 files unless an edit is required.
              - Never run repo-wide content dumps: forbid rg -n ".*", ls -R, unbounded find ., unfiltered rg --files.
              - Cap output aggressively: add | head -n 50 (100 max) on discovery commands; use sed -n '1,120p' for file reads.
              - Treat rg exit code 1 as “no matches”, not an error/retry.
              - Skip .git, build, target, out by default.
              - Do not wrap commands with echo/printf unless debugging.
              - Final notes must be at most 5 bullets and 600 chars total.
            reasoning: $.step.reasoning
            response: /tmp/implement_result.schema.json
