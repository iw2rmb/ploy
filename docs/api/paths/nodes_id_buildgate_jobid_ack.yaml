post:
  tags: [Control]
  summary: Node acknowledges start of a claimed build gate job (running)
  parameters:
    - in: path
      name: id
      required: true
      # Node IDs are NanoID strings (6 characters, URL-safe alphabet).
      schema: { type: string }
      description: Node ID (NanoID 6-character string)
    - in: path
      name: job_id
      required: true
      # Build gate job IDs remain UUID-backed.
      schema: { type: string, format: uuid }
      description: Build gate job ID (UUID)
  responses:
    '204': { description: Acknowledged }
    '400': { description: Missing or empty node id or job id }
    '500': { description: Server error }
