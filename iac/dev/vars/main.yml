---
# Global configuration for Ploy dev environment

# Go version for building Ploy
go_version: "1.22.0"
go_arch: "amd64"

# Docker configuration
docker_compose_version: "2.24.0"

# Nomad/Consul versions
nomad_version: "1.7.2"
consul_version: "1.17.1"
vault_version: "1.15.4"

# FreeBSD VM configuration
freebsd_vm:
  name: "freebsd-dev"
  cpus: 2
  memory: 4096
  disk_size: "20G"
  network_interface: "em0"
  ip: "192.168.100.10"
  netmask: "255.255.255.0"
  gateway: "192.168.100.1"

# Testing tools
testing_tools:
  - curl
  - jq
  - git
  - make
  - wget
  - unzip

# Ploy specific configuration
ploy:
  controller_port: 8081
  storage_backend: "minio"
  
# MinIO configuration
minio:
  port: 9000
  console_port: 9001
  access_key: "ploy-dev"
  secret_key: "ploy-dev-secret-key"

# Build tools for different lanes
build_tools:
  kraft: 
    version: "0.7.6"
  capstan:
    version: "0.54.0"
  cosign:
    version: "2.2.2"
  syft:
    version: "0.100.0"
  grype:
    version: "0.74.0"