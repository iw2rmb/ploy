---
# Ensure base variables and user prerequisites
- name: Assert required dev domain variables are set
  assert:
    that:
      - ploy is defined
      - ploy.apps_domain is defined
      - ploy.apps_domain | length > 0
      - ploy.platform_domain is defined
      - ploy.platform_domain | length > 0
      - ploy.apps_domain_provider is defined
      - ploy.apps_domain_provider | length > 0
      - ploy.platform_domain_provider is defined
      - ploy.platform_domain_provider | length > 0
    fail_msg: "Required variables missing: set PLOY_APPS_DOMAIN, PLOY_PLATFORM_DOMAIN, PLOY_APPS_DOMAIN_PROVIDER, PLOY_PLATFORM_DOMAIN_PROVIDER in environment or inventory."
    success_msg: "Required dev domain variables are set."

- name: Create ploy user first
  user:
    name: ploy
    shell: /bin/bash
    create_home: true
    home: /home/ploy
    groups: sudo
    append: true

# CRITICAL: Create all Ploy directories early to prevent service startup failures
- name: Create comprehensive Ploy directory structure
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "/opt/ploy", owner: "ploy", group: "ploy", mode: "0755" }
    - { path: "/opt/ploy/artifacts", owner: "ploy", group: "ploy", mode: "0755" }
    - { path: "/opt/ploy/metadata", owner: "ploy", group: "ploy", mode: "0755" }
    - { path: "/opt/ploy/debug", owner: "ploy", group: "ploy", mode: "0755" }
    - { path: "/opt/ploy/logs", owner: "ploy", group: "ploy", mode: "0755" }
    - { path: "/opt/ploy/cache", owner: "ploy", group: "ploy", mode: "0755" }
    - { path: "/opt/ploy/temp", owner: "ploy", group: "ploy", mode: "0755" }
    - { path: "/opt/ploy/traefik-data", owner: "ploy", group: "ploy", mode: "0755" }
    - { path: "/opt/ploy/traefik-data/certificates", owner: "ploy", group: "ploy", mode: "0755" }
