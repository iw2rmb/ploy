delete:
  tags: [Control]
  summary: Delete mig
  description: |
    Delete a mig project.

    Refuses deletion if any runs exist for the mig.
  responses:
    '204':
      description: No Content
    '400':
      description: Bad request (invalid mig id)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '409':
      description: Conflict — mig has existing runs.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
