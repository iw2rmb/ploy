get:
  tags: [Control]
  summary: List historical node maintenance actions
  parameters:
    - in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    '200':
      description: Recent node actions
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../OpenAPI.yaml#/components/schemas/NodeAction'
