name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Run pre-commit (all files)
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

  validate-lanes:
    name: Validate Lanes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Go env
        run: go env
      - name: Validate lane selection
        working-directory: tools/lane-pick
        run: go run . --path ../../apps

  mods-tests:
    name: Mods Unit + Staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run mods unit tests
        run: go test -vet=off -race -short -count=1 -v ./internal/mods
      - name: Staticcheck mods
        run: staticcheck ./internal/mods/...

  format-check:
    name: Go Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Install goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Check formatting (gofmt)
        run: |
          fmt_out=$(gofmt -s -l .)
          if [ -n "$fmt_out" ]; then
            echo "The following files need gofmt -s:" >&2
            echo "$fmt_out" >&2
            exit 1
          fi
      - name: Check imports (goimports)
        run: |
          imp_out=$(goimports -l .)
          if [ -n "$imp_out" ]; then
            echo "The following files need goimports:" >&2
            echo "$imp_out" >&2
            exit 1
          fi

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [mods-tests, format-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Build API binary
        run: |
          mkdir -p bin
          go build -v -o bin/api ./api
      - name: Build CLI binary
        run: |
          mkdir -p bin
          go build -v -o bin/ploy ./cmd/ploy
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ploy-build
          path: |
            bin/api
            bin/ploy

  lint-analysis:
    name: Lint api/analysis (errcheck, staticcheck, contextcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run focused lint on api/analysis
        run: make lint-analysis

  lint-recipes:
