---
# Traefik Ingress Controller Setup
# Handles load balancing, SSL termination, and routing for Ploy apps
- name: Deploy Traefik Ingress Controller
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
    - ../vars/dev-wildcard.yml
  
  tasks:
    - name: Create Traefik directories
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /etc/traefik
        - /etc/traefik/dynamic
        - /etc/traefik/acme
        - /var/log/traefik
        - /opt/ploy/traefik-data

    - name: Create Traefik static configuration
      copy:
        content: |
          # Traefik Static Configuration
          global:
            checkNewVersion: false
            sendAnonymousUsage: false

          api:
            dashboard: true
            insecure: true  # For development only

          entryPoints:
            traefik:
              address: ":8090"  # Dashboard on separate port to avoid SeaweedFS conflict
            web:
              address: ":80"
              http:
                redirections:
                  entrypoint:
                    to: websecure
                    scheme: https
                    permanent: true
            websecure:
              address: ":443"

          providers:
            consulCatalog:
              endpoint:
                address: "127.0.0.1:8500"
                scheme: http
              exposedByDefault: false
              prefix: traefik
              watch: true
              refreshInterval: 30s
              stale: true
              cache: true

            file:
              directory: /etc/traefik/dynamic
              watch: true

          certificatesResolvers:
            # Certificate resolver for user apps domain (*.dev.ployd.app)
            apps-wildcard:
              acme:
                email: {{ ploy_dev_apps_certificate.email | default('admin@ployd.app') }}
                storage: /opt/ploy/traefik-data/apps-acme.json
                caServer: https://acme-v02.api.letsencrypt.org/directory
                dnsChallenge:
                  provider: namecheap
                  delayBeforeCheck: 30s
                  resolvers:
                    - "1.1.1.1:53"
                    - "8.8.8.8:53"
            
            # HTTP challenge resolver as fallback
            letsencrypt:
              acme:
                email: {{ ploy_dev_apps_certificate.email | default('admin@ployd.app') }}
                storage: /etc/traefik/acme/acme.json
                httpChallenge:
                  entryPoint: web
            
            # Certificate resolver for platform domain (*.dev.ployman.app)
            platform-wildcard:
              acme:
                email: {{ ploy_dev_platform_certificate.email | default('admin@ployman.app') }}
                storage: /opt/ploy/traefik-data/platform-acme.json
                caServer: https://acme-v02.api.letsencrypt.org/directory
                dnsChallenge:
                  provider: namecheap
                  delayBeforeCheck: 30s
                  resolvers:
                    - "1.1.1.1:53"
                    - "8.8.8.8:53"
            
            # Alias for dev-wildcard (used by services)
            dev-wildcard:
              acme:
                email: {{ ploy_dev_platform_certificate.email | default('admin@ployman.app') }}
                storage: /opt/ploy/traefik-data/dev-wildcard-acme.json
                caServer: https://acme-v02.api.letsencrypt.org/directory
                dnsChallenge:
                  provider: namecheap
                  delayBeforeCheck: 30s
                  resolvers:
                    - "1.1.1.1:53"
                    - "8.8.8.8:53"

          log:
            level: INFO
            filePath: /var/log/traefik/traefik.log

          accessLog:
            filePath: /var/log/traefik/access.log

          metrics:
            prometheus:
              entryPoint: metrics
              addEntryPointsLabels: true
              addServicesLabels: true

          ping:
            entryPoint: ping

          serversTransport:
            insecureSkipVerify: true
        dest: /etc/traefik/traefik.yml
        mode: '0644'

    - name: Create Traefik dynamic configuration for wildcard certificates
      copy:
        content: |
          # Dynamic Configuration for wildcard certificates only
          # Services are discovered via Consul Catalog
          http:
            routers:
              # Default router for platform services without Consul tags
              platform-default:
                rule: "HostRegexp(`{service:[a-z0-9-]+}.dev.{{ ploy.platform_domain }}`)"
                service: noop@internal
                tls:
                  certResolver: platform-wildcard
                  domains:
                    - main: "dev.{{ ploy.platform_domain }}"
                      sans:
                        - "*.dev.{{ ploy.platform_domain }}"
                entryPoints:
                  - websecure
              
              # Default router for user apps without Consul tags
              apps-default:
                rule: "HostRegexp(`{app:[a-z0-9-]+}.dev.{{ ploy.apps_domain }}`)"
                service: noop@internal
                tls:
                  certResolver: apps-wildcard
                  domains:
                    - main: "dev.{{ ploy.apps_domain }}"
                      sans:
                        - "*.dev.{{ ploy.apps_domain }}"
                entryPoints:
                  - websecure
        dest: /etc/traefik/dynamic/wildcards.yml
        mode: '0644'

    # API routing is handled automatically via Consul service discovery
    # The ploy-api service registers with Consul and includes Traefik tags
    # No manual route configuration needed - this is more secure

    - name: Create ACME storage files with proper permissions
      file:
        path: "{{ item }}"
        state: touch
        owner: root
        group: root
        mode: '0600'
      loop:
        - /opt/ploy/traefik-data/apps-acme.json
        - /opt/ploy/traefik-data/platform-acme.json
        - /opt/ploy/traefik-data/dev-wildcard-acme.json
        - /etc/traefik/acme/acme.json

    - name: Create Traefik systemd service
      copy:
        content: |
          [Unit]
          Description=Traefik Ingress Controller
          After=network-online.target consul.service
          Wants=network-online.target
          
          [Service]
          Type=simple
          Restart=always
          RestartSec=5
          User=root
          
          # Environment variables for Namecheap DNS provider
          Environment="NAMECHEAP_API_USER={{ lookup('env', 'NAMECHEAP_API_USER') | default('iw2rmb') }}"
          Environment="NAMECHEAP_API_KEY={{ lookup('env', 'NAMECHEAP_API_KEY') }}"
          Environment="NAMECHEAP_USERNAME={{ lookup('env', 'NAMECHEAP_USERNAME') | default('iw2rmb') }}"
          Environment="NAMECHEAP_CLIENT_IP={{ ansible_default_ipv4.address }}"
          Environment="NAMECHEAP_SANDBOX=false"
          Environment="NAMECHEAP_PROPAGATION_TIMEOUT=900"
          Environment="NAMECHEAP_TTL=60"
          
          ExecStart=/usr/local/bin/traefik --configfile=/etc/traefik/traefik.yml
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=traefik
          KillMode=mixed
          KillSignal=SIGTERM
          
          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/traefik.service
        mode: '0644'

    - name: Download and install Traefik binary
      block:
        - name: Check if Traefik is already installed
          stat:
            path: /usr/local/bin/traefik
          register: traefik_binary

        - name: Download Traefik
          get_url:
            url: "https://github.com/traefik/traefik/releases/download/v{{ traefik_version | default('3.0.0') }}/traefik_v{{ traefik_version | default('3.0.0') }}_linux_amd64.tar.gz"
            dest: /tmp/traefik.tar.gz
          when: not traefik_binary.stat.exists

        - name: Extract Traefik
          unarchive:
            src: /tmp/traefik.tar.gz
            dest: /usr/local/bin
            remote_src: true
          when: not traefik_binary.stat.exists

        - name: Make Traefik executable
          file:
            path: /usr/local/bin/traefik
            mode: '0755'

    - name: Start and enable Traefik service
      systemd:
        name: traefik
        state: started
        enabled: true
        daemon_reload: true

    - name: Wait for Traefik to be ready
      wait_for:
        port: 80
        delay: 5
        timeout: 30

    - name: Verify Traefik dashboard is accessible
      uri:
        url: "http://localhost:8090/api/overview"
        method: GET
        status_code: 200
      register: traefik_health
      retries: 5
      delay: 10
      until: traefik_health.status == 200

    - name: Display Traefik status
      debug:
        msg: |
          Traefik is running successfully!
          Dashboard: http://{{ ansible_default_ipv4.address }}:8090
          API endpoints will be available at:
          - https://api.dev.{{ ploy.platform_domain | default('ployman.app', true) }}
          - https://api.dev.{{ ploy.apps_domain }}

  handlers:
    - name: reload traefik
      systemd:
        name: traefik
        state: restarted