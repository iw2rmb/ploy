# Traefik Dynamic Configuration for Ploy Controller Load Balancing
# Advanced load balancing configuration with health checks, failover, and rate limiting

http:
  # Middleware definitions for API protection
  middlewares:
    # Rate limiting middleware - protects API from abuse
    ploy-api-ratelimit:
      rateLimit:
        burst: 100
        period: "1m"
        average: 50
        sourceCriterion:
          requestHeaderName: "X-Forwarded-For"
          requestHost: true
    
    # Security headers middleware
    ploy-api-security:
      headers:
        sslRedirect: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 63072000
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          X-XSS-Protection: "1; mode=block"
          Referrer-Policy: "strict-origin-when-cross-origin"
          Permissions-Policy: "geolocation=(), microphone=(), camera=()"
        contentTypeNosniff: true
        browserXssFilter: true
        frameOptions: "DENY"
    
    # Authentication middleware for admin endpoints
    ploy-api-auth:
      basicAuth:
        users:
          # admin:$2y$10$... (bcrypt hash of password)
          # Generated with: htpasswd -nb admin password
          - "admin:$2y$10$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2.uheWG/igi"
    
    # Circuit breaker middleware for fault tolerance
    ploy-api-circuit-breaker:
      circuitBreaker:
        expression: "NetworkErrorRatio() > 0.30 || ResponseCodeRatio(500, 600, 0, 600) > 0.25"
        checkPeriod: "10s"
        fallbackDuration: "30s"
        recoveryDuration: "60s"
    
    # Retry middleware for resilience
    ploy-api-retry:
      retry:
        attempts: 3
        initialInterval: "100ms"
    
    # Compression middleware
    ploy-api-compress:
      compress:
        excludedContentTypes:
          - "text/event-stream"
        minResponseBodyBytes: 1024
    
    # Request/Response size limits
    ploy-api-limits:
      buffering:
        maxRequestBodyBytes: 10485760  # 10MB
        memRequestBodyBytes: 2097152   # 2MB
        maxResponseBodyBytes: 52428800 # 50MB
        memResponseBodyBytes: 4194304  # 4MB
    
    # CORS middleware for API access
    ploy-api-cors:
      headers:
        accessControlAllowOriginList:
          - "https://*.ployd.app"
          - "https://localhost:*"
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "X-Requested-With"
          - "X-API-Key"
        accessControlExposeHeaders:
          - "X-Total-Count"
          - "X-Request-ID"
        accessControlMaxAge: 86400
        addVaryHeader: true

  # Service definitions with load balancing and health checks
  services:
    ploy-api-api:
      loadBalancer:
        # Load balancing strategy
        strategy: "weighted_round_robin"
        
        # Health check configuration
        healthCheck:
          path: "/health"
          port: 8081
          interval: "10s"
          timeout: "5s"
          retries: 3
          scheme: "http"
          headers:
            X-Health-Check: "traefik"
        
        # Sticky sessions for stateful operations
        sticky:
          cookie:
            name: "ploy-session"
            secure: true
            httpOnly: true
            sameSite: "strict"
        
        # Server configuration (dynamically populated by Consul)
        servers:
          # These will be populated by Consul service discovery
          # Each controller instance will register itself
          - url: "http://127.0.0.1:8081"
            weight: 100
        
        # Pass host header
        passHostHeader: true
        
        # Response forwarding settings
        responseForwarding:
          flushInterval: "100ms"
        
        # Server transport configuration
        serversTransport: "ploy-api-transport"
    
    # Separate service for metrics endpoint
    ploy-api-metrics:
      loadBalancer:
        strategy: "round_robin"
        
        healthCheck:
          path: "/health/metrics"
          port: 8081
          interval: "30s"
          timeout: "10s"
          retries: 2
          scheme: "http"
        
        servers:
          - url: "http://127.0.0.1:8081"
            weight: 100
        
        passHostHeader: true
        serversTransport: "ploy-api-transport"

  # Router definitions for different endpoints
  routers:
    # Main API router with full security stack
    ploy-api-api:
      rule: "Host(`api.ployd.app`) && PathPrefix(`/v1`)"
      entryPoints:
        - "websecure"
      service: "ploy-api-api"
      middlewares:
        - "ploy-api-ratelimit"
        - "ploy-api-security" 
        - "ploy-api-circuit-breaker"
        - "ploy-api-retry"
        - "ploy-api-compress"
        - "ploy-api-limits"
        - "ploy-api-cors"
      tls:
        certResolver: "letsencrypt"
        options: "ploy-tls-options"
      priority: 100
    
    # Health check router (less restrictive for monitoring)
    ploy-api-health:
      rule: "Host(`api.ployd.app`) && (PathPrefix(`/health`) || PathPrefix(`/ready`) || PathPrefix(`/live`))"
      entryPoints:
        - "websecure"
      service: "ploy-api-api"
      middlewares:
        - "ploy-api-security"
        - "ploy-api-compress"
      tls:
        certResolver: "letsencrypt"
        options: "ploy-tls-options"
      priority: 200
    
    # Admin/Debug router with authentication
    ploy-api-admin:
      rule: "Host(`admin.ployd.app`)"
      entryPoints:
        - "websecure"
      service: "ploy-api-api"
      middlewares:
        - "ploy-api-auth"
        - "ploy-api-security"
        - "ploy-api-ratelimit"
        - "ploy-api-compress"
      tls:
        certResolver: "letsencrypt"
        options: "ploy-tls-options"
      priority: 150
    
    # Metrics router with authentication and specific rate limits
    ploy-api-metrics:
      rule: "Host(`metrics.ployd.app`) || (Host(`api.ployd.app`) && PathPrefix(`/health/metrics`))"
      entryPoints:
        - "websecure"
      service: "ploy-api-metrics"
      middlewares:
        - "ploy-api-auth"
        - "ploy-api-security"
        - "ploy-api-compress"
      tls:
        certResolver: "letsencrypt"
        options: "ploy-tls-options"
      priority: 180

  # Server transports configuration
  serversTransports:
    ploy-api-transport:
      serverName: "ploy-api"
      insecureSkipVerify: false
      maxIdleConnsPerHost: 10
      forwardingTimeouts:
        dialTimeout: "30s"
        responseHeaderTimeout: "60s"
        idleConnTimeout: "90s"
      peerCertURI: "spiffe://ploy.dev/controller"

# TLS Options for enhanced security
tls:
  options:
    ploy-tls-options:
      sslProtocols:
        - "TLSv1.2"
        - "TLSv1.3"
      cipherSuites:
        - "TLS_AES_256_GCM_SHA384"
        - "TLS_CHACHA20_POLY1305_SHA256"
        - "TLS_AES_128_GCM_SHA256"
        - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
        - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
      curvePreferences:
        - "CurveP521"
        - "CurveP384"
        - "X25519"
      minVersion: "VersionTLS12"
      alpnProtocols:
        - "h2"
        - "http/1.1"