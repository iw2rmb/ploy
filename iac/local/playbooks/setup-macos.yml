---
- name: Setup macOS Development Environment for Ploy TDD
  hosts: localhost
  gather_facts: yes
  vars:
    # Tool versions
    docker_desktop_version: "4.20.0"
    go_version: "1.21.0" 
    nodejs_version: "18"
    
    # Required tools
    homebrew_packages:
      - git
      - wget
      - curl
      - jq
      - yq
      - tree
      - watch
      - htop
      - redis
      - ansible
      - docker
      - docker-compose
      - go
      - node@18
      - python@3.11
      - terraform
      - vault
      - consul
      - nomad
      - direnv
      - gpg
      - pre-commit
      
    go_tools:
      - github.com/golang/mock/mockgen@latest
      - github.com/onsi/ginkgo/v2/ginkgo@latest
      - github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - golang.org/x/tools/cmd/goimports@latest
      - github.com/securecodewarrior/sast-scan@latest
      - github.com/gotestyourself/gotestsum@latest
      
    test_directories:
      - "{{ ploy_project_path }}/test-data"
      - "{{ ploy_project_path }}/coverage"
      - "{{ ploy_project_path }}/test-results"
      - "{{ ploy_project_path }}/logs"
      - "{{ ploy_project_path }}/configs"
      
  tasks:
    - name: Check if running on macOS
      fail:
        msg: "This playbook is designed for macOS only"
      when: ansible_os_family != "Darwin"
    
    - name: Detect Mac architecture
      set_fact:
        mac_architecture: "{{ 'arm64' if ansible_architecture == 'arm64' else 'x86_64' }}"
    
    - name: Display setup information
      debug:
        msg: |
          Setting up Ploy TDD environment on macOS
          Architecture: {{ mac_architecture }}
          User: {{ ploy_dev_user }}
          Home: {{ ploy_dev_home }}
          Project path: {{ ploy_project_path }}
    
    # Homebrew installation and package management
    - name: Check if Homebrew is installed
      stat:
        path: "{{ homebrew_bin_path }}/brew"
      register: homebrew_check
    
    - name: Install Homebrew (Apple Silicon)
      shell: |
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: 
        - not homebrew_check.stat.exists
        - mac_architecture == "arm64"
        
    - name: Install Homebrew (Intel)
      shell: |
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      when: 
        - not homebrew_check.stat.exists
        - mac_architecture == "x86_64"
    
    - name: Add Homebrew to PATH for Apple Silicon
      lineinfile:
        path: "{{ ansible_user_dir }}/.zshrc"
        line: 'export PATH="/opt/homebrew/bin:$PATH"'
        create: yes
      when: mac_architecture == "arm64"
    
    - name: Add Homebrew to PATH for Intel
      lineinfile:
        path: "{{ ansible_user_dir }}/.zshrc"
        line: 'export PATH="/usr/local/bin:$PATH"'
        create: yes
      when: mac_architecture == "x86_64"
    
    - name: Update Homebrew
      homebrew:
        update_homebrew: yes
        
    - name: Install Homebrew packages
      homebrew:
        name: "{{ item }}"
        state: present
      loop: "{{ homebrew_packages }}"
      register: homebrew_install
      retries: 3
      delay: 5
    
    # Docker Desktop setup
    - name: Check if Docker Desktop is installed
      stat:
        path: "/Applications/Docker.app"
      register: docker_desktop_check
    
    - name: Install Docker Desktop via Homebrew Cask
      homebrew_cask:
        name: docker
        state: present
      when: not docker_desktop_check.stat.exists
    
    - name: Start Docker Desktop
      shell: open /Applications/Docker.app
      when: not docker_desktop_check.stat.exists
    
    - name: Wait for Docker Desktop to start
      wait_for:
        path: /var/run/docker.sock
        timeout: 300
      when: not docker_desktop_check.stat.exists
    
    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false
      
    - name: Display Docker version
      debug:
        msg: "Docker version: {{ docker_version.stdout }}"
    
    # Go development environment
    - name: Set Go environment variables
      blockinfile:
        path: "{{ ansible_user_dir }}/.zshrc"
        marker: "# {mark} PLOY GO ENVIRONMENT"
        block: |
          export GOPATH="{{ go_path }}"
          export PATH="$PATH:{{ go_path }}/bin"
          export GO111MODULE=on
          export GOPROXY=https://proxy.golang.org,direct
          export GOSUMDB=sum.golang.org
        create: yes
    
    - name: Create GOPATH directory
      file:
        path: "{{ go_path }}"
        state: directory
        mode: '0755'
    
    - name: Install Go tools
      shell: |
        export GOPATH="{{ go_path }}"
        export PATH="$PATH:{{ go_path }}/bin"
        go install {{ item }}
      loop: "{{ go_tools }}"
      environment:
        GOPATH: "{{ go_path }}"
        PATH: "{{ ansible_env.PATH }}:{{ go_path }}/bin"
    
    # Development environment setup
    - name: Create development directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop: "{{ test_directories }}"
    
    - name: Setup Git configuration (if not exists)
      git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      loop:
        - { name: "init.defaultBranch", value: "main" }
        - { name: "pull.rebase", value: "true" }
        - { name: "push.default", value: "current" }
      ignore_errors: yes  # Allow if already configured
    
    - name: Create test configuration files
      template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: '0644'
      loop:
        - src: test-config.yaml.j2
          dest: "{{ ploy_project_path }}/configs/test-config.yaml"
        - src: env-vars.sh.j2
          dest: "{{ ploy_project_path }}/scripts/dev-env.sh"
      ignore_errors: yes  # Templates may not exist yet
    
    # Development tools and utilities
    - name: Install additional development tools via npm
      npm:
        name: "{{ item }}"
        global: yes
      loop:
        - newman  # Postman CLI for API testing
        - @commitlint/cli
        - @commitlint/config-conventional
      ignore_errors: yes
    
    - name: Create pre-commit hooks configuration
      copy:
        content: |
          repos:
            - repo: https://github.com/pre-commit/pre-commit-hooks
              rev: v4.4.0
              hooks:
                - id: trailing-whitespace
                - id: end-of-file-fixer
                - id: check-yaml
                - id: check-json
                - id: check-added-large-files
            
            - repo: https://github.com/golangci/golangci-lint
              rev: v1.53.3
              hooks:
                - id: golangci-lint
            
            - repo: local
              hooks:
                - id: go-test
                  name: go test
                  entry: go test ./...
                  language: system
                  pass_filenames: false
                  always_run: false
                  files: \.go$
        dest: "{{ ploy_project_path }}/.pre-commit-config.yaml"
        mode: '0644'
      ignore_errors: yes
    
    # macOS specific optimizations
    - name: Increase file descriptor limits
      blockinfile:
        path: "{{ ansible_user_dir }}/.zshrc"
        marker: "# {mark} PLOY SYSTEM LIMITS"
        block: |
          # Increase file descriptor limits for development
          ulimit -n 65536
          
          # Optimize Docker for Mac performance
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1
        create: yes
    
    - name: Create development aliases
      blockinfile:
        path: "{{ ansible_user_dir }}/.zshrc"
        marker: "# {mark} PLOY DEVELOPMENT ALIASES"
        block: |
          # Ploy development aliases
          alias ploy-dev="cd {{ ploy_project_path }}"
          alias ploy-test="make test-unit"
          alias ploy-test-all="make test-all"
          alias ploy-dev-start="make dev-start"
          alias ploy-dev-stop="make dev-stop"
          alias ploy-dev-reset="make dev-reset"
          alias ploy-logs="make dev-logs"
          alias ploy-status="make dev-status"
          
          # Docker shortcuts
          alias dps="docker ps"
          alias dlog="docker-compose logs -f"
          alias dup="docker-compose up -d"
          alias ddown="docker-compose down"
          alias dclean="docker system prune -f"
          
          # Go shortcuts
          alias gt="go test -v"
          alias gtr="go test -race"
          alias gtc="go test -cover"
          alias gb="go build"
          alias gr="go run"
          alias gm="go mod tidy"
        create: yes
    
    # Performance optimizations for development
    - name: Configure Git for better performance
      git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      loop:
        - { name: "core.preloadindex", value: "true" }
        - { name: "core.fscache", value: "true" }
        - { name: "gc.auto", value: "256" }
        - { name: "index.threads", value: "4" }
      ignore_errors: yes
    
    - name: Optimize macOS for development
      shell: |
        # Disable Spotlight indexing for common development directories
        sudo mdutil -i off {{ ploy_project_path }} 2>/dev/null || true
        sudo mdutil -i off {{ go_path }} 2>/dev/null || true
        
        # Increase file watcher limits
        echo 'kern.maxfiles=65536' | sudo tee -a /etc/sysctl.conf >/dev/null 2>&1 || true
        echo 'kern.maxfilesperproc=65536' | sudo tee -a /etc/sysctl.conf >/dev/null 2>&1 || true
        
        # Disable DS_Store creation on network volumes
        defaults write com.apple.desktopservices DSDontWriteNetworkStores true || true
      ignore_errors: yes
    
    # Final verification
    - name: Verify essential tools installation
      command: "{{ item.command }}"
      register: tool_check
      failed_when: tool_check.rc != 0
      loop:
        - { name: "Docker", command: "docker --version" }
        - { name: "Docker Compose", command: "docker-compose --version" }
        - { name: "Go", command: "go version" }
        - { name: "Git", command: "git --version" }
        - { name: "jq", command: "jq --version" }
        - { name: "curl", command: "curl --version" }
        - { name: "Redis", command: "redis-cli --version" }
      changed_when: false
    
    - name: Display verification results
      debug:
        msg: "{{ item.stdout }}"
      loop: "{{ tool_check.results }}"
      when: item.stdout is defined
    
    # Environment validation
    - name: Check Docker daemon status
      command: docker info
      register: docker_info
      changed_when: false
      ignore_errors: yes
    
    - name: Display Docker status
      debug:
        msg: |
          Docker Status: {{ 'Running' if docker_info.rc == 0 else 'Not Running' }}
          {% if docker_info.rc == 0 %}
          To complete setup:
          1. Ensure Docker Desktop has at least 8GB RAM allocated
          2. Run: source ~/.zshrc
          3. Navigate to project: cd {{ ploy_project_path }}
          4. Start services: make dev-start
          5. Run tests: make test-unit
          {% else %}
          Please start Docker Desktop and run this playbook again
          {% endif %}
    
    - name: Create setup completion marker
      copy:
        content: |
          # Ploy Development Environment Setup
          Setup completed at: {{ ansible_date_time.iso8601 }}
          Architecture: {{ mac_architecture }}
          User: {{ ploy_dev_user }}
          
          Next steps:
          1. Restart your shell or run: source ~/.zshrc
          2. Navigate to project directory: cd {{ ploy_project_path }}
          3. Start development services: make dev-start
          4. Run tests to verify setup: make test-unit
          
          Available commands:
          - ploy-dev: Navigate to project directory
          - ploy-test: Run unit tests
          - ploy-dev-start: Start development services
          - ploy-dev-stop: Stop development services
          - ploy-status: Check service status
        dest: "{{ ploy_project_path }}/SETUP_COMPLETE.md"
        mode: '0644'
      ignore_errors: yes
    
  handlers:
    - name: Reload shell configuration
      shell: source {{ ansible_user_dir }}/.zshrc
      args:
        executable: /bin/zsh
      ignore_errors: yes
