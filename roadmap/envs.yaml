      - docs/api/{paths/config_env.yaml,paths/config_env_key.yaml,components/schemas/config.yaml}
    implementation:
      - Replace scope terminology and examples with target-based --on/--from CLI workflows.
      - Replace CA_CERTS_PEM_BUNDLE examples/contracts with PLOY_CA_CERTS and describe universal container cert handling.
      - Document target-to-job mapping, jobs alias expansion, unset ambiguity behavior, and precedence rules.
      - Ensure API docs and operator docs stay consistent with implemented wire contracts and CLI help.
    verification:
      - "Manual doc consistency pass across env docs, API docs, and CLI README examples."
      - "Command snippets in docs use --on and --from and no longer mention --scope or CA_CERTS_PEM_BUNDLE."
    reasoning: medium
    cfp: 6
