# Gates target maps to pre_gate, re_gate, post_gate sections.
description: gates target section mapping
env:
  CRUSH_JSON:
    - value: "crush-data"
      target: gates
      secret: true
existing_ca: {}
existing_home: {}
expect:
  rewritten: 1
  rejected: 0
  skipped: 0
  entries:
    - env_key: CRUSH_JSON
      target: gates
      action: rewrite
      target_field: home
      destination: ".config/crush/crush.json"
      sections: [pre_gate, re_gate, post_gate]
