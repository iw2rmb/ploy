# golangci-lint configuration for Ploy
# See https://golangci-lint.run/usage/configuration/ for full options
version: 2

run:
  timeout: 5m
  tests: true
  # Include test files in linting
  skip-dirs:
    - dist
    - vendor
  modules-download-mode: readonly

linters:
  disable:
    - gosec         # Use govulncheck for release; tune Gosec per-package later
    - revive        # Style hints disabled for now; enforce via docs/PR template
    - noctx         # We use context-aware clients where it matters; tune later
  enable:
    - errcheck      # Check for unchecked errors
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Go static analysis
    - unused        # Check for unused constants, variables, functions and types
    - misspell      # Spell checker
    - revive        # Fast, configurable, extensible, flexible, and beautiful linter
    - unconvert     # Remove unnecessary type conversions
    - gocritic      # Go source code linter providing checks currently missing from other linters
    - bodyclose     # Check HTTP response body is closed
    - noctx         # Find sending http request without context.Context
    - sqlclosecheck # Check sql.Rows and sql.Stmt are closed
    - depguard      # Enforce import boundaries

linters-settings:
  depguard:
    rules:
      no-server-from-cli-node:
        # Apply to CLI and node code only; allow tests.
        files:
          - "internal/cli/**"
          - "internal/node/**"
          - "internal/nodeagent/**"
        deny:
          - pkg: "^github.com/iw2rmb/ploy/internal/server($|/)"
            desc: "CLI/Node must not import internal/server; depend on stable interfaces"
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      # Allow common patterns that don't need error checking
      - (*database/sql.Rows).Close
      - (*database/sql.Stmt).Close

  gosec:
    # Enable all security checks
    excludes: []
    severity: low
    confidence: low

  govet:
    enable-all: true
    disable:
      - shadow  # Too noisy for now

  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck

  gocritic:
    enabled-checks:
      - appendAssign
      - assignOp
      - boolExprSimplify
      - builtinShadow
      - captLocal
      - caseOrder
      - deprecatedComment
      - dupImport
      - elseif
      - emptyFallthrough
      - emptyStringTest
      - hexLiteral
      - ifElseChain
      - nilValReturn
      - regexpMust
      - singleCaseSwitch
      - sloppyLen
      - switchTrue
      - typeSwitchVar
      - underef
      - unlambda
      - unslice

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  # Exclude specific patterns
  exclude-rules:
    # Common accepted patterns: ignore errors from Close and stdio prints
    - linters:
        - errcheck
      text: 'Error return value of `?[^`]*Close`? is not checked'
    - linters:
        - errcheck
      text: 'Error return value of `?fmt\.Fprint`? is not checked'
    # Exclude test files from some checks
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - gocritic

    # Allow init functions
    - text: "should not use init functions"
      linters:
        - revive
    # Security lints tuned for CLI context (allow file paths from flags/env)
    - linters:
        - gosec
      text: 'G304: Potential file inclusion via variable'
    - linters:
        - gosec
      text: 'G306: Expect WriteFile permissions to be 0600 or less'
    - linters:
        - gosec
      text: 'G301: Expect directory permissions to be 0750 or less'
    - linters:
        - gosec
      text: 'G112: Potential Slowloris Attack'

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
