---
# SeaweedFS Installation and Configuration Playbook
# 
# This playbook installs SeaweedFS cluster components:
# - Master server for cluster coordination
# - Volume servers for data storage
# - Filer server for file system interface
# - Collection-based organization for different artifact types
#
- name: Install and Configure SeaweedFS
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml

  tasks:
    - name: Create SeaweedFS user
      user:
        name: seaweedfs
        system: true
        shell: /bin/false
        home: /var/lib/seaweedfs
        create_home: true

    - name: Create SeaweedFS directories
      file:
        path: "{{ item }}"
        state: directory
        owner: seaweedfs
        group: seaweedfs
        mode: '0755'
      loop:
        - /var/lib/seaweedfs
        - /var/lib/seaweedfs/master
        - /var/lib/seaweedfs/volume1
        - /var/lib/seaweedfs/volume2
        - /var/lib/seaweedfs/filer
        - /etc/seaweedfs
        - /var/log/seaweedfs

    - name: Check if SeaweedFS is already installed
      stat:
        path: /usr/local/bin/weed
      register: weed_binary

    - name: Get current SeaweedFS version (if installed)
      command: /usr/local/bin/weed version
      register: current_weed_version
      changed_when: false
      ignore_errors: true
      when: weed_binary.stat.exists

    - name: Download SeaweedFS
      get_url:
        url: "https://github.com/seaweedfs/seaweedfs/releases/download/{{ seaweedfs.version }}/linux_amd64.tar.gz"
        dest: /tmp/seaweedfs.tar.gz
        mode: '0644'
      when: not weed_binary.stat.exists or seaweedfs.version not in (current_weed_version.stdout | default(''))

    - name: Extract SeaweedFS
      unarchive:
        src: /tmp/seaweedfs.tar.gz
        dest: /usr/local/bin
        remote_src: true
        owner: root
        group: root
        mode: '0755'
      when: not weed_binary.stat.exists or seaweedfs.version not in (current_weed_version.stdout | default(''))

    - name: Verify SeaweedFS installation
      command: /usr/local/bin/weed version
      register: weed_version
      changed_when: false

    - name: Display SeaweedFS version
      debug:
        msg: "SeaweedFS installed successfully: {{ weed_version.stdout_lines[0] if weed_version.stdout_lines else 'Version info not available' }}"

    - name: Create SeaweedFS master service
      template:
        src: ../../common/templates/seaweedfs-master.service.j2
        dest: /etc/systemd/system/seaweedfs-master.service
        owner: root
        group: root
        mode: '0644'

    - name: Create SeaweedFS volume service
      template:
        src: ../../common/templates/seaweedfs-volume.service.j2
        dest: /etc/systemd/system/seaweedfs-volume.service
        owner: root
        group: root
        mode: '0644'

    # SeaweedFS filer will be deployed via Nomad (see seaweedfs-filer.yml playbook)

    # SeaweedFS will run with command-line arguments, no config files needed

    - name: Check SeaweedFS master service status
      command: systemctl is-active seaweedfs-master
      register: seaweedfs_master_status
      ignore_errors: true
      changed_when: false

    - name: Start and enable SeaweedFS master (if not running)
      systemd:
        name: seaweedfs-master
        state: started
        enabled: true
        daemon_reload: true
      when: seaweedfs_master_status.stdout != "active"

    - name: Wait for master to be ready
      wait_for:
        port: "{{ seaweedfs.master_port }}"
        delay: 2
        timeout: 30

    - name: Check SeaweedFS volume service status
      command: systemctl is-active seaweedfs-volume
      register: seaweedfs_volume_status
      ignore_errors: true
      changed_when: false

    - name: Start and enable SeaweedFS volume server (if not running)
      systemd:
        name: seaweedfs-volume
        state: started
        enabled: true
        daemon_reload: true
      when: seaweedfs_volume_status.stdout != "active"

    - name: Wait for volume server to be ready
      wait_for:
        port: "{{ seaweedfs.volume_port }}"
        delay: 2
        timeout: 30

    # SeaweedFS filer service is managed by Nomad - see seaweedfs-filer.yml playbook

    - name: Create artifact collections
      uri:
        url: "http://localhost:{{ seaweedfs.master_port }}/col/{{ item.name }}?replication={{ item.replication }}"
        method: PUT
        status_code: [200, 201, 409]  # 409 = already exists
      loop:
        - name: "{{ seaweedfs.collections.artifacts.name }}"
          replication: "{{ seaweedfs.collections.artifacts.replication }}"
        - name: "{{ seaweedfs.collections.metadata.name }}"
          replication: "{{ seaweedfs.collections.metadata.replication }}"
        - name: "{{ seaweedfs.collections.debug.name }}"
          replication: "{{ seaweedfs.collections.debug.replication }}"
      register: collection_creation
      failed_when: false

    - name: Display collection creation results
      debug:
        msg: "Collection {{ item.item.name }}: {{ 'Created' if item.status in [200, 201] else 'Already exists' if item.status == 409 else 'Failed' }}"
      loop: "{{ collection_creation.results }}"

    - name: Assign volumes to collections for single-node setup
      uri:
        url: "http://localhost:{{ seaweedfs.master_port }}/vol/grow?collection={{ item.collection }}&count={{ item.count }}&replication={{ seaweedfs_single_node.replication }}"
        method: POST
        status_code: [200, 400]  # 400 might indicate volumes already assigned
      loop:
        - collection: "{{ seaweedfs.collections.artifacts.name }}"
          count: "{{ seaweedfs_single_node.volumes_per_collection.artifacts }}"
        - collection: "{{ seaweedfs.collections.metadata.name }}"
          count: "{{ seaweedfs_single_node.volumes_per_collection.metadata }}"
        - collection: "{{ seaweedfs.collections.debug.name }}"
          count: "{{ seaweedfs_single_node.volumes_per_collection.debug }}"
      register: volume_assignment
      failed_when: false

    - name: Display volume assignment results
      debug:
        msg: "Volume assignment for {{ item.item.collection }}: {{ item.json.count if item.json is defined and 'count' in item.json else 'Failed or already assigned' }}"
      loop: "{{ volume_assignment.results }}"

    - name: Create ploy storage configuration for SeaweedFS
      template:
        src: ../../common/templates/ploy-seaweedfs-config.yaml.j2
        dest: /home/ploy/ploy/configs/seaweedfs-config.yaml
        owner: ploy
        group: ploy
        mode: '0644'
      # Always create config since ploy user exists by design

    - name: Set up firewall for SeaweedFS
      ufw:
        rule: allow
        port: "{{ item }}"
      loop:
        - "{{ seaweedfs.master_port }}"
        - "{{ seaweedfs.volume_port }}"
        - "{{ seaweedfs.filer_port }}"

    - name: Display SeaweedFS cluster status
      uri:
        url: "http://localhost:{{ seaweedfs.master_port }}/cluster/status"
        method: GET
      register: cluster_status
      failed_when: false

    - name: Show cluster status
      debug:
        msg: "SeaweedFS cluster status: {{ cluster_status.json if cluster_status.json is defined else 'Unable to fetch status' }}"

    - name: Register SeaweedFS services with Consul
      block:
        - name: Create Consul service definition for SeaweedFS master
          copy:
            content: |
              {
                "service": {
                  "name": "seaweedfs-master",
                  "port": {{ seaweedfs.master_port }},
                  "tags": ["seaweedfs", "master"],
                  "check": {
                    "http": "http://localhost:{{ seaweedfs.master_port }}/cluster/status",
                    "interval": "10s",
                    "timeout": "5s"
                  }
                }
              }
            dest: /etc/consul.d/seaweedfs-master.json
            owner: root
            group: root
            mode: '0644'

        - name: Create Consul service definition for SeaweedFS volume
          copy:
            content: |
              {
                "service": {
                  "name": "seaweedfs-volume",
                  "port": {{ seaweedfs.volume_port }},
                  "tags": ["seaweedfs", "volume"],
                  "check": {
                    "http": "http://localhost:{{ seaweedfs.volume_port }}/status",
                    "interval": "10s",
                    "timeout": "5s"
                  }
                }
              }
            dest: /etc/consul.d/seaweedfs-volume.json
            owner: root
            group: root
            mode: '0644'

        # SeaweedFS filer service registration handled by Nomad

        - name: Reload Consul to register SeaweedFS services
          systemd:
            name: consul
            state: reloaded
          ignore_errors: true

        - name: Wait for SeaweedFS services to be registered in Consul
          uri:
            url: "http://localhost:8500/v1/catalog/service/{{ item }}"
            method: GET
            status_code: 200
          register: consul_service_check
          retries: 6
          delay: 5
          until: consul_service_check.status == 200
          loop:
            - seaweedfs-master
            - seaweedfs-volume
            # seaweedfs-filer will be registered by Nomad

        - name: Display SeaweedFS Consul registration status
          debug:
            msg: "✅ SeaweedFS services successfully registered with Consul"

    - name: Cleanup installation files
      file:
        path: /tmp/seaweedfs.tar.gz
        state: absent