---
- name: Setup FreeBSD VM for Ploy Testing
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
  
  tasks:
    - name: Check for missing QEMU/KVM packages
      command: dpkg -l {{ item }}
      register: qemu_packages_check
      failed_when: false
      changed_when: false
      loop:
        - qemu-kvm
        - libvirt-daemon-system
        - libvirt-clients
        - bridge-utils
        - virtinst
        - virt-manager
        - cloud-image-utils

    - name: Install missing QEMU/KVM packages
      apt:
        name: "{{ item.item }}"
        state: present
      when: item.rc != 0
      loop: "{{ qemu_packages_check.results }}"

    - name: Check libvirt service status
      command: systemctl is-active libvirtd
      register: libvirtd_service_status
      ignore_errors: true
      changed_when: false

    - name: Start and enable libvirt (if not running)
      systemd:
        name: libvirtd
        state: started
        enabled: true
      when: libvirtd_service_status.stdout != "active"

    - name: Add users to libvirt group
      user:
        name: "{{ item }}"
        groups: libvirt
        append: true
      loop:
        - root
        - ploy

    - name: Create VM storage directory
      file:
        path: /var/lib/libvirt/images
        state: directory
        mode: '0755'

    - name: Download FreeBSD cloud image
      get_url:
        url: "https://download.freebsd.org/ftp/releases/VM-IMAGES/14.0-RELEASE/amd64/Latest/FreeBSD-14.0-RELEASE-amd64.qcow2.xz"
        dest: /tmp/freebsd-14.0.qcow2.xz
        timeout: 1800

    - name: Extract FreeBSD image
      command: xz -d /tmp/freebsd-14.0.qcow2.xz
      args:
        creates: /tmp/freebsd-14.0.qcow2

    - name: Copy FreeBSD image to VM storage
      copy:
        src: /tmp/freebsd-14.0.qcow2
        dest: /var/lib/libvirt/images/freebsd-dev.qcow2
        remote_src: true

    - name: Resize FreeBSD disk
      command: qemu-img resize /var/lib/libvirt/images/freebsd-dev.qcow2 {{ freebsd_vm.disk_size }}

    - name: Create cloud-init user-data
      template:
        src: ../templates/freebsd-user-data.yml.j2
        dest: /tmp/freebsd-user-data.yml

    - name: Create cloud-init meta-data
      template:
        src: ../templates/freebsd-meta-data.yml.j2
        dest: /tmp/freebsd-meta-data.yml

    - name: Create cloud-init ISO
      command: >
        cloud-localds /var/lib/libvirt/images/freebsd-dev-cloud-init.iso
        /tmp/freebsd-user-data.yml /tmp/freebsd-meta-data.yml
      args:
        creates: /var/lib/libvirt/images/freebsd-dev-cloud-init.iso

    - name: Check if FreeBSD VM already exists
      command: virsh dominfo freebsd-dev
      register: vm_exists
      failed_when: false
      changed_when: false

    - name: Remove existing FreeBSD VM if it exists (for clean setup)
      command: virsh destroy freebsd-dev
      when: vm_exists.rc == 0
      ignore_errors: true

    - name: Remove existing FreeBSD VM definition
      command: virsh undefine freebsd-dev --remove-all-storage
      when: vm_exists.rc == 0
      ignore_errors: true

    - name: Create FreeBSD VM
      command: >
        virt-install
        --name freebsd-dev
        --ram {{ freebsd_vm.memory }}
        --vcpus {{ freebsd_vm.cpus }}
        --disk path=/var/lib/libvirt/images/freebsd-dev.qcow2,format=qcow2
        --disk path=/var/lib/libvirt/images/freebsd-dev-cloud-init.iso,device=cdrom
        --network bridge=virbr0,model=virtio
        --os-variant freebsd13.0
        --import
        --noautoconsole
      register: vm_created

    - name: Start FreeBSD VM
      command: virsh start freebsd-dev
      when: vm_created.changed
      ignore_errors: true

    - name: Get FreeBSD VM IP address from DHCP
      shell: virsh domifaddr freebsd-dev | grep -o '[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}' | head -1
      register: vm_ip_result
      retries: 10
      delay: 30
      until: vm_ip_result.stdout != ""

    - name: Set FreeBSD VM IP fact
      set_fact:
        freebsd_vm_actual_ip: "{{ vm_ip_result.stdout }}"

    - name: Display FreeBSD VM IP
      debug:
        msg: "FreeBSD VM is accessible at IP: {{ freebsd_vm_actual_ip }}"

    - name: Wait for FreeBSD VM SSH to be accessible
      wait_for:
        host: "{{ freebsd_vm_actual_ip }}"
        port: 22
        delay: 30
        timeout: 300
      when: freebsd_vm_actual_ip is defined

    - name: Add FreeBSD VM to inventory for configuration
      add_host:
        name: freebsd-vm-dynamic
        ansible_host: "{{ freebsd_vm_actual_ip }}"
        ansible_user: root
        ansible_ssh_pass: ploydev
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
        ansible_python_interpreter: /usr/local/bin/python3
        groups: freebsd_vms_dynamic
      when: freebsd_vm_actual_ip is defined

- name: Configure FreeBSD VM
  hosts: freebsd_vms
  become: true
  vars_files:
    - ../vars/main.yml
  
  tasks:
    - name: Update FreeBSD package repository
      pkgng:
        name: pkg
        state: latest

    - name: Install essential packages
      pkgng:
        name:
          - python3
          - py39-pip
          - bash
          - curl
          - wget
          - git
          - go
          - node18
          - npm
          - openjdk17
          - docker
        state: present

    - name: Enable Docker service
      service:
        name: docker
        enabled: true
        state: started

    - name: Install bhyve tools
      pkgng:
        name:
          - bhyve-firmware
          - grub2-bhyve
        state: present

    - name: Enable bhyve kernel module
      lineinfile:
        path: /boot/loader.conf
        line: 'vmm_load="YES"'
        create: true

    - name: Load bhyve kernel module
      command: kldload vmm
      ignore_errors: true

    - name: Create jails configuration directory
      file:
        path: /usr/local/etc/jail.conf.d
        state: directory

    - name: Enable jail service
      service:
        name: jail
        enabled: true

    - name: Install Nomad
      block:
        - name: Download Nomad for FreeBSD
          get_url:
            url: "https://releases.hashicorp.com/nomad/{{ nomad_version }}/nomad_{{ nomad_version }}_freebsd_amd64.zip"
            dest: /tmp/nomad.zip

        - name: Extract Nomad
          unarchive:
            src: /tmp/nomad.zip
            dest: /usr/local/bin
            remote_src: true

        - name: Make Nomad executable
          file:
            path: /usr/local/bin/nomad
            mode: '0755'

    - name: Install Consul
      block:
        - name: Download Consul for FreeBSD
          get_url:
            url: "https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_freebsd_amd64.zip"
            dest: /tmp/consul.zip

        - name: Extract Consul
          unarchive:
            src: /tmp/consul.zip
            dest: /usr/local/bin
            remote_src: true

        - name: Make Consul executable
          file:
            path: /usr/local/bin/consul
            mode: '0755'

    - name: Create Nomad configuration
      template:
        src: ../templates/nomad-freebsd.hcl.j2
        dest: /usr/local/etc/nomad.hcl

    - name: Create Consul configuration
      template:
        src: ../templates/consul-freebsd.hcl.j2
        dest: /usr/local/etc/consul.hcl

    - name: Create rc.d scripts for Nomad and Consul
      template:
        src: "../templates/{{ item }}.j2"
        dest: "/usr/local/etc/rc.d/{{ item }}"
        mode: '0755'
      loop:
        - nomad
        - consul

    - name: Enable Nomad and Consul services
      service:
        name: "{{ item }}"
        enabled: true
      loop:
        - nomad
        - consul

    - name: Install Unikraft build dependencies
      pkgng:
        name:
          - gmake
          - gcc
          - flex
          - bison
          - gawk
          - unzip
          - wget
          - socat
        state: present

    - name: Clone Ploy repository on FreeBSD
      git:
        repo: https://github.com/iw2rmb/ploy.git
        dest: /home/freebsd/ploy
        force: true
      become_user: freebsd

- name: Configure FreeBSD VM (Dynamic IP)
  hosts: freebsd_vms_dynamic
  become: true
  gather_facts: false
  vars_files:
    - ../vars/main.yml
  
  tasks:
    - name: Update FreeBSD package repository
      pkgng:
        name: pkg
        state: latest

    - name: Install essential packages for ARF
      pkgng:
        name:
          - python3
          - py39-pip
          - bash
          - curl
          - wget
          - git
          - go
          - node18
          - npm
          - openjdk17
        state: present

    - name: Enable jail system
      service:
        name: jail
        enabled: true

    - name: Create jail base directory
      file:
        path: /jail
        state: directory
        mode: '0755'

    - name: Create jail template directory
      file:
        path: /jail/template
        state: directory
        mode: '0755'

    - name: Create basic jail template (minimal FreeBSD base)
      shell: |
        if [ ! -d /jail/template/bin ]; then
          mkdir -p /jail/template/{bin,sbin,usr/bin,usr/sbin,lib,libexec,etc,var/run,tmp}
          cp -R /bin /jail/template/
          cp -R /sbin /jail/template/
          cp -R /usr/bin /jail/template/usr/
          cp -R /usr/sbin /jail/template/usr/
          cp -R /lib /jail/template/
          cp -R /libexec /jail/template/
          cp -R /etc /jail/template/
          chmod 1777 /jail/template/tmp
        fi
      args:
        creates: /jail/template/bin

    - name: Create jail.conf.d directory
      file:
        path: /usr/local/etc/jail.conf.d
        state: directory

    - name: Clone Ploy repository on FreeBSD VM
      git:
        repo: https://github.com/iw2rmb/ploy.git
        dest: /root/ploy
        force: true

    - name: Build Ploy controller on FreeBSD for testing
      shell: |
        cd /root/ploy
        /usr/local/bin/go build -o controller-freebsd ./controller
      args:
        creates: /root/ploy/controller-freebsd

    - name: Store FreeBSD VM IP for controller configuration
      delegate_to: localhost
      copy:
        content: "{{ ansible_host }}"
        dest: /tmp/freebsd_vm_ip
        mode: '0644'

    - name: Display FreeBSD VM configuration status
      debug:
        msg: |
          FreeBSD VM configured successfully:
          - IP: {{ ansible_host }}
          - Jail system enabled
          - ARF dependencies installed
          - Ploy repository cloned
          - Ready for ARF sandbox operations
          - IP saved to /tmp/freebsd_vm_ip for controller deployment