post:
  tags: [Control]
  summary: Submit Mods ticket
  description: |
    Submit a new Mods ticket using a repository URL and Git refs. The
    server creates the repository entry if it does not exist, creates a
    mod with the provided `spec` (or `{}`), and enqueues a run. The
    response includes a `ticket_id` equal to the run UUID and initial
    status `queued`.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/TicketSubmitRequest'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/TicketSummary'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
