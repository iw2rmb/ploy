# Job-level runtime image persistence endpoint — persists the resolved container image name.
# Nodes call this endpoint to persist the resolved container image name so the
# control plane can surface the exact runtime image via jobs.job_image.
parameters:
  - in: path
    name: job_id
    required: true
    schema: { type: string }
    description: Job ID (KSUID string)
  - in: header
    name: PLOY_NODE_UUID
    required: true
    schema: { type: string }
    description: Worker node ID (NanoID 6-character string) saving job image name

post:
  tags: [Control]
  summary: Persist the runtime container image name for a job
  description: |
    Nodes call this endpoint (while the job is `Running`) to persist the resolved
    container image name used for the job.

    This is primarily used for stack-aware image resolution: the job row may be created
    with an empty or generic `job_image`, and the node persists the exact image it will run.

    For Stack Gate early failures (e.g., `stack_gate` mismatch/unknown), gate jobs may
    persist the resolved *expected* runtime image even when the validation container
    is not started.

    Ownership is enforced: only the node that claimed the job may update the image, and
    only while the job is in `Running` status. Only `mod`, `heal`, and gate jobs
    (`pre_gate`, `post_gate`, `re_gate`) are accepted.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [ image ]
          properties:
            image:
              type: string
              description: Container image reference that will be used to run the job
  responses:
    '204':
      description: Saved; job image name persisted
    '400':
      description: Bad request (missing job_id, missing node header, or empty image)
    '403':
      description: Forbidden — job is not assigned to the calling node
    '404':
      description: Job not found (invalid job ID)
    '409':
      description: |
        Conflict — job not in `Running` status or job is not a mod/heal job.
    '500':
      description: Internal server error
