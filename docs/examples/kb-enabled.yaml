# Knowledge Base Learning Configuration
# This example focuses on maximizing knowledge base learning
# for continuous improvement of healing capabilities.

version: v1alpha1
id: kb-learning-focused-workflow
target_repo: https://gitlab.com/your-org/learning-project.git
target_branch: refs/heads/kb-experiment
base_ref: refs/heads/main
build_timeout: 12m

steps:
  - type: recipe
    id: experimental-migration
    engine: openrewrite
    recipes:
      - org.openrewrite.java.migrate.Java11toJava17
      - org.openrewrite.java.testing.junit5.JUnit4to5Migration
      - org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_0

# KB-optimized self-healing configuration
self_heal:
  enabled: true
  kb_learning: true
  
  # Conservative retry policy for better learning data
  max_retries: 4
  cooldown: 90s           # Longer cooldown for thorough analysis
  
  # Enable all strategies for comprehensive learning
  strategies: ["llm-exec", "orw-gen", "human-step"]
  parallel_strategies: false  # Sequential execution for better learning data
  
  # Learning-focused timeouts
  strategy_timeout: 15m   # Allow time for thorough analysis
  total_timeout: 45m      # Extended total time for learning

# Comprehensive KB learning configuration
kb_config:
  # Learning parameters
  learning_enabled: true
  detailed_logging: true     # Capture detailed logs for analysis
  store_all_attempts: true   # Store failed attempts for learning
  
  # Pattern recognition
  pattern_analysis: true     # Enable advanced pattern analysis
  cross_project_learning: true  # Learn from other projects
  similarity_threshold: 0.85    # Strict similarity for pattern matching
  
  # Confidence and application
  confidence_threshold: 0.6     # Lower threshold for experimental learning
  max_suggestions: 5           # Try more KB suggestions
  suggestion_timeout: 5m       # Allow time to apply suggestions
  
  # Data retention
  case_retention_days: 365     # Keep learning data for a full year
  patch_deduplication: true    # Avoid storing duplicate patches
  
  # Analytics and reporting
  analytics_enabled: true      # Enable learning analytics
  success_tracking: true      # Track success patterns
  failure_analysis: true      # Analyze failure patterns
  
  # Storage optimization
  compression_enabled: true    # Compress stored learning data
  indexing_enabled: true      # Enable search indexing
  background_processing: true # Process learning data in background

# Model configuration optimized for learning
llm_model: gpt-4o-mini@2024-08-06
llm_config:
  temperature: 0.15       # Consistent responses for pattern recognition
  max_tokens: 8192       # Larger context for complex learning scenarios
  timeout: 120s         # Extended timeout for learning-focused requests
  
  # Learning-specific prompting
  learning_context: true  # Include learning context in prompts
  verbose_reasoning: true # Request detailed reasoning for learning
  
# Experimental features for advanced learning
experimental:
  # Cross-repository pattern matching
  cross_repo_patterns: true
  
  # Semantic code analysis for better pattern recognition  
  semantic_analysis: true
  
  # Collaborative filtering based on team patterns
  team_learning: true
  
  # A/B testing of different healing approaches
  ab_testing: true
  test_split: 0.2        # 20% of cases used for testing new approaches
  
  # Continuous model improvement
  model_feedback: true    # Provide feedback to improve model performance
  success_reinforcement: true  # Reinforce successful patterns

# Monitoring and reporting for learning insights
monitoring:
  learning_metrics: true       # Collect learning-specific metrics
  pattern_discovery: true     # Report newly discovered patterns
  success_rate_tracking: true # Track success rate improvements
  
  # Reporting intervals
  daily_reports: true         # Daily learning progress reports
  weekly_analysis: true      # Weekly pattern analysis reports
  monthly_insights: true     # Monthly learning insights summaries