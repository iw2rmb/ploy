version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/store/schema.sql"
    queries: "internal/store/queries"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          # Canonical workflow enums are owned by internal/domain/types.
          - db_type: "job_status"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobStatus"
          - db_type: "run_repo_status"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "RunRepoStatus"
          - db_type: "run_status"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "RunStatus"
          - column: "jobs.job_type"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobType"
          # Primary key ID columns → domain newtypes (end-to-end typed IDs)
          - column: "runs.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "jobs.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.JobID"
          - column: "nodes.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.NodeID"
          - column: "migs.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.MigID"
          - column: "specs.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.SpecID"
          - column: "mig_repos.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.MigRepoID"
          - column: "repos.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RepoID"
          # Foreign key references → matching domain newtypes
          - column: "runs.mig_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.MigID"
          - column: "runs.spec_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.SpecID"
          - column: "runs_timing.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "jobs.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "jobs.repo_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RepoID"
          - column: "jobs.node_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "NodeID"
              pointer: true
          - column: "migs.spec_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "SpecID"
              pointer: true
          - column: "mig_repos.mig_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.MigID"
          - column: "mig_repos.repo_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RepoID"
          - column: "events.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "events.job_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
          - column: "logs.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "logs.job_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
          - column: "diffs.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "diffs.job_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
          - column: "artifact_bundles.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "artifact_bundles.job_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
          - column: "sboms.job_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.JobID"
          - column: "sboms.repo_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RepoID"
          - column: "hooks_once.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "hooks_once.repo_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RepoID"
          - column: "hooks_once.first_success_job_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
          - column: "hooks_once.last_success_job_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
          - column: "hooks_once.last_skip_job_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
          - column: "run_repos.mig_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.MigID"
          - column: "run_repos.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "run_repos.repo_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RepoID"
          - column: "node_metrics.node_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.NodeID"
          - column: "job_metrics.node_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.NodeID"
          - column: "job_metrics.job_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.JobID"
          - column: "bootstrap_tokens.node_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "NodeID"
              pointer: true
          - column: "jobs.next_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
