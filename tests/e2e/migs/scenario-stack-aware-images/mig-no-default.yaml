# E2E spec demonstrating stack-aware image selection error case.
#
# This spec intentionally omits the "default" key and only specifies java-gradle.
# When run against a Maven repository, the image resolution should fail with a
# clear error message because:
#   1. Build Gate detects "java-maven" stack
#   2. No java-maven key exists in the image map
#   3. No "default" fallback key exists
#
# This validates the error path and actionable error message.
#
# Expected error: "no image specified for stack \"java-maven\" and no default provided"
#
# Submit with:
#   dist/ploy mig run \
#     --repo-url https://gitlab.com/iw2rmb/ploy-orw-java11-maven.git \
#     --repo-base-ref main \
#     --repo-target-ref e2e/stack-aware-error \
#     --spec tests/e2e/migs/scenario-stack-aware-images/mig-no-default.yaml \
#     --follow

apiVersion: ploy.mod/v1alpha1
kind: ModRunSpec

steps:
  - # Stack-aware image map WITHOUT default key.
    # This will fail for Maven workspaces because only java-gradle is specified.
    image:
      java-gradle: ghcr.io/iw2rmb/migs-orw-gradle:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17
      MAVEN_PLUGIN_VERSION: "6.18.0"

build_gate:
  enabled: true

mr_on_fail: false
mr_on_success: false
