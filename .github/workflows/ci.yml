name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Install tooling (goimports, golangci-lint)
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run pre-commit (all files)
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

  validate-lanes:
    name: Validate Lanes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Go env
        run: go env
      - name: Validate lane selection
        working-directory: tools/lane-pick
        run: go run . --path ../../apps

  transflow-tests:
    name: Transflow Unit + Staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run transflow unit tests
        run: go test -vet=off -race -short -count=1 -v ./internal/cli/transflow
      - name: Staticcheck transflow
        run: staticcheck ./internal/cli/transflow/...

  format-check:
    name: Go Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Install goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Check formatting (gofmt)
        run: |
          fmt_out=$(gofmt -s -l .)
          if [ -n "$fmt_out" ]; then
            echo "The following files need gofmt -s:" >&2
            echo "$fmt_out" >&2
            exit 1
          fi
      - name: Check imports (goimports)
        run: |
          imp_out=$(goimports -l .)
          if [ -n "$imp_out" ]; then
            echo "The following files need goimports:" >&2
            echo "$imp_out" >&2
            exit 1
          fi

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [transflow-tests, format-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Build API binary
        run: |
          mkdir -p bin
          go build -v -o bin/api ./api
      - name: Build CLI binary
        run: |
          mkdir -p bin
          go build -v -o bin/ploy ./cmd/ploy
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ploy-build
          path: |
            bin/api
            bin/ploy

  supply:
    name: Supply Chain (SBOM, Scan, Sign)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Install Syft and Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Install Cosign
        run: |
          COSIGN_VERSION=v2.2.4
          sudo curl -sSfL -o /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64
          sudo chmod +x /usr/local/bin/cosign
      - name: Generate SBOM
        run: syft dir:. -o json > repo.sbom.json
      - name: Vulnerability Scan
        run: grype repo.sbom.json --fail-on high
      - name: Sign SBOM
        run: |
          cosign generate-key-pair --yes
          cosign sign-blob --yes --key cosign.key --output-signature repo.sbom.json.sig repo.sbom.json
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-signature
          path: |
            repo.sbom.json
            repo.sbom.json.sig
