name: HTTPS Smoke (Manual)

on:
  workflow_dispatch:
    inputs:
      api_host:
        description: "api.<cluster-id>.ploy"
        required: true
        type: string

jobs:
  https-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write CA bundle
        run: |
          test -n "${{ secrets.PLOY_CA_PEM }}" || { echo 'Missing secret: PLOY_CA_PEM' >&2; exit 1; }
          printf '%s' "${{ secrets.PLOY_CA_PEM }}" > ca.pem
      - name: HTTPS artifact upload/download
        env:
          CA_PEM: ca.pem
          API_HOST: ${{ inputs.api_host }}
          AUTH: ${{ secrets.PLOY_TOKEN }}
        run: |
          chmod +x tests/artifacts/curl-artifacts-v2.sh
          tests/artifacts/curl-artifacts-v2.sh
