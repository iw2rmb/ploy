# OpenRewrite CHTTP Service Configuration
# Java code transformation service via HTTP using Ploy's CHTTP

server:
  host: "0.0.0.0"
  port: 8094

security:
  api_key: "${OPENREWRITE_CHTTP_API_KEY}"
  
commands:
  # Allow only required tools
  allowed:
    - "mvn"
    - "java"
    - "docker"
    - "tar"
    - "gzip"
    - "base64"
    - "find"
    - "ls"
    - "cat"
    - "git"
    - "jq"
  default_timeout: "1800s"  # 30 minutes for large transformations

logging:
  level: "info"
  format: "json"

health:
  enabled: true
  endpoint: "/health"

# OpenRewrite-specific configuration
openrewrite:
  executor_mode: "docker"  # Use Docker to avoid JVM in CHTTP process
  docker_image: "maven:3.9-eclipse-temurin-17"
  
  # Recipes to pre-cache
  recipes:
    - "org.openrewrite.java.migrate.java17.UpgradeToJava17"
    - "org.openrewrite.java.spring.boot3.UpgradeBoot_3_2"
    - "org.openrewrite.java.migrate.jakarta.JavaxMigrationToJakarta"
    
  # Security restrictions
  security:
    max_memory: "4GB"
    max_cpu: "2.0"
    timeout: "1800s"
    sandbox_user: "openrewrite"
    network_disabled: false  # Needs network for Maven deps
    
  # Input validation
  input:
    formats: ["tar.gz", "zip"]
    allowed_extensions: [".java", ".xml", ".gradle", ".properties", ".yaml", ".yml"]
    max_archive_size: "500MB"
    max_files: 10000
    
  # Output processing
  output:
    format: "json"
    include_diff: true
    include_metrics: true
    
# Service metadata
service:
  name: "openrewrite-chttp"
  version: "1.0.0"
  description: "Java code transformation via OpenRewrite over HTTP"
  analyzer_info:
    name: "openrewrite"
    version: "5.42.0"
    language: "java"
    capabilities:
      - "code-transformation"
      - "migration-automation"
      - "refactoring"
      - "security-fixes"
  
  # Service discovery
  discovery:
    enabled: true
    service_name: "openrewrite-transform"
    tags:
      - "code-transformation"
      - "java"
      - "openrewrite"
      - "chttp"
    health_check:
      interval: "30s"
      timeout: "5s"
      
# Integration with Ploy platform
ploy_integration:
  lane_compatibility: ["C", "E", "F"]  # Java/JVM, OCI, VM lanes
  arf_integration: true
  deployment_mode: "ephemeral"  # Spin up per job