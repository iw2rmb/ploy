coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 70%
        threshold: 1%
        if_no_uploads: error
    patch:
      default:
        target: 80%
        if_no_uploads: error

  ignore:
    - "**/*_test.go"
    - "**/testutil/**"
    - "**/mocks/**"
    - "**/testdata/**"
    - "**/cmd/**"
    - "**/*.pb.go"
    - "**/vendor/**"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false