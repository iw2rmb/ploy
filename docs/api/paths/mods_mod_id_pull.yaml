post:
  tags: [Control]
  summary: Resolve repo execution identifiers for pulling diffs (mod)
  description: |
    Selects the latest run for a specific repo in a mod and returns the repo-scoped
    execution identifiers needed to pull diffs.

    Behavior:
    - Request provides repo_url and optional mode (last-succeeded default, last-failed).
    - Response returns run_id, repo_id, and repo_target_ref (from run_repos snapshot).
  parameters:
    - in: path
      name: mod_id
      required: true
      schema:
        type: string
      description: Mod ID (NanoID string)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/ModPullRequest'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/PullResolutionResponse'
    '400':
      description: Bad request — missing or invalid fields in the request body.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Not found — mod/repo or matching run not found.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
