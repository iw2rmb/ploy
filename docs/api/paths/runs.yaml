get:
  tags: [Control]
  summary: List runs
  parameters:
    - in: query
      name: mod_id
      schema: { type: string, format: uuid }
      required: false
    - in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 200 }
      required: false
    - in: query
      name: offset
      schema: { type: integer, minimum: 0 }
      required: false
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              runs:
                type: array
                items:
                  $ref: '../components/schemas/controlplane.yaml#/Run'
post:
  tags: [Control]
  summary: Create run
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/CreateRunRequest'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/CreateRunResponse'

