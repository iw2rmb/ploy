service:
  name: "pylint-chttp"
  port: 8080
  listen_addr: "0.0.0.0:8080"

executable:
  path: "pylint"
  args: ["--output-format=json", "--reports=no", "--score=no", "--msg-template={path}:{line}:{column}: {msg_id}: {msg} ({symbol})"]
  timeout: "5m"
  working_dir: "/tmp/pylint-analysis"

security:
  auth_method: "public_key" 
  public_key_path: "/etc/chttp/public.pem"
  run_as_user: "pylint"
  max_memory: "512MB"
  max_cpu: "1.0"
  sandbox_enabled: true
  temp_dir: "/tmp"
  rate_limit_per_sec: 10        # Max 10 requests per second per client
  rate_limit_burst: 20          # Allow burst of 20 requests
  max_open_files: 100           # Max file descriptors per process

input:
  formats: ["tar.gz", "tar", "zip"]
  allowed_extensions: [".py", ".pyw", ".py3"]
  max_archive_size: "100MB"
  max_files: 1000
  excluded_paths: ["__pycache__", ".git", ".pytest_cache", "*.pyc"]
  # Streaming configuration
  streaming_enabled: true
  buffer_size: 32768        # 32KB buffers for streaming
  buffer_pool_size: 10       # Pool of 10 reusable buffers
  max_concurrent_streams: 5  # Max 5 concurrent streaming requests

output:
  format: "json" 
  parser: "pylint"  # Can be: pylint, bandit, eslint, auto, custom
  include_stats: false
  
  # Example custom parser configuration (when parser: "custom")
  # custom_parser:
  #   type: "regex"
  #   patterns:
  #     - name: "error"
  #       pattern: '(\S+):(\d+):(\d+): error: (.+)'
  #       severity: "error"
  #       groups: ["file", "line", "column", "message"]
  #     - name: "warning"
  #       pattern: 'WARNING \[(\S+):(\d+)\]: (.+)'
  #       severity: "warning"
  #       groups: ["file", "line", "message"]
  
  # Parser-specific options (for generic-json parser)
  # parser_options:
  #   issues_path: "violations"  # Path to issues array in JSON
  #   field_mappings:
  #     filename: "file"
  #     lineno: "line"

logging:
  level: "info"
  format: "json"
  output: "stdout"