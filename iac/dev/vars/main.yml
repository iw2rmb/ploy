---
# Global configuration for Ploy dev environment

# Go version for building Ploy
go_version: "1.22.0"
go_arch: "amd64"

# Docker configuration
docker_compose_version: "2.24.0"


# Nomad/Consul versions
nomad_version: "1.10.4"
consul_version: "1.21.4"
vault_version: "1.20.2"

# Traefik version
traefik_version: "3.5.0"

# Node Exporter version
node_exporter_version: "1.7.0"

# FreeBSD VM configuration
freebsd_vm:
  name: "freebsd-dev"
  cpus: 2
  memory: 4096
  disk_size: "20G"
  network_interface: "em0"
  ip: "192.168.100.10"
  netmask: "255.255.255.0"
  gateway: "192.168.100.1"

# Testing tools
testing_tools:
  - curl
  - jq
  - git
  - make
  - wget
  - unzip

# Ploy specific configuration
ploy:
  controller_port: 8081
  storage_backend: "seaweedfs"
  dns:
    provider: "cloudflare"  # Options: cloudflare, namecheap
    domain: "ployd.app" 
    target_ip: "{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}"
    ttl: 300
    enable_ipv6: false
  
  # Platform wildcard certificate configuration
  apps_domain: "{{ lookup('env', 'PLOY_APPS_DOMAIN') | default('ployd.app') }}"
  apps_domain_provider: "{{ lookup('env', 'PLOY_APPS_DOMAIN_PROVIDER') | default('namecheap') }}"
  api_subdomain: "api"  # Controller will be accessible at api.{apps_domain}

# Nomad controller deployment configuration
nomad_controller:
  replicas: 2
  resources:
    cpu: 500    # MHz
    memory: 512 # MB

# Build tools for different lanes
build_tools:
  kraft: 
    version: "0.7.6"
  capstan:
    version: "0.54.0"
  cosign:
    version: "2.2.2"
  syft:
    version: "0.100.0"
  grype:
    version: "0.74.0"

# SeaweedFS configuration
seaweedfs:
  version: "3.96"
  master_port: 9333
  volume_port: 8080
  filer_port: 8888
  
  # Collection configuration for different artifact types (dev environment)
  collections:
    artifacts:
      name: "ploy-artifacts"
      replication: "000"  # No replication for development environment
    metadata:
      name: "ploy-metadata"
      replication: "000"  # No replication for development environment
    debug:
      name: "ploy-debug"
      replication: "000"  # No replication for ephemeral debug artifacts

# External storage configuration for controller
storage_config:
  seaweedfs:
    master: "localhost:9333"
    filer: "localhost:8888"
    collection: "ploy-artifacts"
    replication: "000"
    timeout: 30
    datacenter: ""
    rack: ""
    collections:
      artifacts: "ploy-artifacts"
      metadata: "ploy-metadata"
      debug: "ploy-debug"
  
  client:
    retry_config:
      max_retries: 3
      initial_delay: "1s"
      max_delay: "30s"
      multiplier: 2.0
    health_check_config:
      interval: "30s"
      timeout: "10s"
      failure_threshold: 3
    enable_metrics: true
    enable_health_check: true
    max_operation_time: "5m"

# SeaweedFS collection configuration for single-node setup
seaweedfs_single_node:
  # Use replication 000 for single node setups
  replication: "000"
  # Number of volumes to create per collection
  volumes_per_collection:
    artifacts: 2
    metadata: 1
    debug: 1