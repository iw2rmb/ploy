---
- name: Populate OpenRewrite Recipes in Consul KV
  hosts: linux_hosts
  become: true
  
  vars:
    consul_url: "http://localhost:8500"
    recipe_base_path: "ploy/arf/recipes"
    
    openrewrite_recipes:
      # Java Migration recipes
      - id: "openrewrite-java11to17"
        name: "java11to17"
        description: "Migrate Java 11 to Java 17"
        categories: ["java-migration"]
        tags: ["java", "migration", "openrewrite", "java17"]
        recipe_class: "org.openrewrite.java.migrate.Java11toJava17"
        artifact_id: "rewrite-migrate-java"
        group_id: "org.openrewrite.recipe"
        version: "2.11.0"
      
      - id: "openrewrite-java8to11"
        name: "java8to11"
        description: "Migrate Java 8 to Java 11"
        categories: ["java-migration"]
        tags: ["java", "migration", "openrewrite", "java11"]
        recipe_class: "org.openrewrite.java.migrate.Java8toJava11"
        artifact_id: "rewrite-migrate-java"
        group_id: "org.openrewrite.recipe"
        version: "2.11.0"
        
      - id: "openrewrite-jakarta"
        name: "jakarta"
        description: "Migrate from javax to Jakarta EE"
        categories: ["java-migration"]
        tags: ["java", "migration", "openrewrite", "jakarta", "javax"]
        recipe_class: "org.openrewrite.java.migrate.jakarta.JavaxMigrationToJakarta"
        artifact_id: "rewrite-migrate-java"
        group_id: "org.openrewrite.recipe"
        version: "2.11.0"
      
      # Spring recipes
      - id: "openrewrite-spring-boot-3"
        name: "spring-boot-3"
        description: "Upgrade to Spring Boot 3.2"
        categories: ["spring"]
        tags: ["spring", "spring-boot", "openrewrite", "upgrade"]
        recipe_class: "org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_2"
        artifact_id: "rewrite-spring"
        group_id: "org.openrewrite.recipe"
        version: "5.7.0"
        
      - id: "openrewrite-spring-security-6"
        name: "spring-security-6"
        description: "Upgrade to Spring Security 6.0"
        categories: ["spring"]
        tags: ["spring", "security", "openrewrite", "upgrade"]
        recipe_class: "org.openrewrite.java.spring.security6.UpgradeSpringSecurity_6_0"
        artifact_id: "rewrite-spring"
        group_id: "org.openrewrite.recipe"
        version: "5.7.0"
      
      # Testing recipes
      - id: "openrewrite-junit5"
        name: "junit5"
        description: "Migrate from JUnit 4 to JUnit 5"
        categories: ["testing"]
        tags: ["testing", "junit", "openrewrite", "migration"]
        recipe_class: "org.openrewrite.java.testing.junit5.JUnit4to5Migration"
        artifact_id: "rewrite-testing-frameworks"
        group_id: "org.openrewrite.recipe"
        version: "2.6.0"
        
      - id: "openrewrite-mockito"
        name: "mockito"
        description: "Migrate Mockito 1 to Mockito 4"
        categories: ["testing"]
        tags: ["testing", "mockito", "openrewrite", "migration"]
        recipe_class: "org.openrewrite.java.testing.mockito.Mockito1to4Migration"
        artifact_id: "rewrite-testing-frameworks"
        group_id: "org.openrewrite.recipe"
        version: "2.6.0"
        
      - id: "openrewrite-assertj"
        name: "assertj"
        description: "Convert JUnit assertions to AssertJ"
        categories: ["testing"]
        tags: ["testing", "assertj", "openrewrite", "junit"]
        recipe_class: "org.openrewrite.java.testing.assertj.JUnitToAssertj"
        artifact_id: "rewrite-testing-frameworks"
        group_id: "org.openrewrite.recipe"
        version: "2.6.0"
      
      # Logging recipes
      - id: "openrewrite-slf4j"
        name: "slf4j"
        description: "Apply SLF4J best practices"
        categories: ["logging"]
        tags: ["logging", "slf4j", "openrewrite", "best-practices"]
        recipe_class: "org.openrewrite.java.logging.slf4j.Slf4jBestPractices"
        artifact_id: "rewrite-logging-frameworks"
        group_id: "org.openrewrite.recipe"
        version: "2.5.0"
        
      - id: "openrewrite-log4j2"
        name: "log4j2"
        description: "Migrate from Log4j 1.x to Log4j 2.x"
        categories: ["logging"]
        tags: ["logging", "log4j", "openrewrite", "migration"]
        recipe_class: "org.openrewrite.java.logging.log4j.Log4j1ToLog4j2"
        artifact_id: "rewrite-logging-frameworks"
        group_id: "org.openrewrite.recipe"
        version: "2.5.0"

  tasks:
    - name: Wait for Consul to be ready
      wait_for:
        port: 8500
        host: localhost
        delay: 5
        timeout: 60
      
    - name: Check Consul health
      uri:
        url: "{{ consul_url }}/v1/status/leader"
        method: GET
        status_code: 200
      register: consul_health
      retries: 5
      delay: 2
      until: consul_health.status == 200

    - name: Store OpenRewrite recipes in Consul KV
      uri:
        url: "{{ consul_url }}/v1/kv/{{ recipe_base_path }}/{{ item.id }}"
        method: PUT
        body: |
          {
            "id": "{{ item.id }}",
            "metadata": {
              "name": "{{ item.name }}",
              "description": "{{ item.description }}",
              "categories": {{ item.categories | to_json }},
              "tags": {{ item.tags | to_json }},
              "author": "Ploy Platform",
              "version": "1.0.0"
            },
            "steps": [{
              "name": "Apply OpenRewrite Recipe",
              "type": "openrewrite",
              "config": {
                "recipe": "{{ item.recipe_class }}",
                "artifactId": "{{ item.artifact_id }}",
                "groupId": "{{ item.group_id }}",
                "version": "{{ item.version }}"
              }
            }],
            "execution": {
              "strategy": "sequential",
              "retry_policy": {
                "max_attempts": 3,
                "backoff": "exponential"
              }
            },
            "created_at": "{{ ansible_date_time.iso8601 }}",
            "updated_at": "{{ ansible_date_time.iso8601 }}"
          }
        body_format: json
        status_code: [200, 201]
      loop: "{{ openrewrite_recipes }}"
      loop_control:
        label: "{{ item.name }}"
      
    - name: Verify recipes were stored
      uri:
        url: "{{ consul_url }}/v1/kv/{{ recipe_base_path }}?keys"
        method: GET
        status_code: 200
      register: stored_recipes
      
    - name: Display stored recipe keys
      debug:
        msg: "Successfully stored {{ stored_recipes.json | length }} OpenRewrite recipes in Consul"
        
    - name: Create recipe index for quick lookup
      uri:
        url: "{{ consul_url }}/v1/kv/{{ recipe_base_path }}/index/openrewrite"
        method: PUT
        body: |
          {
            "recipes": {{ openrewrite_recipes | map(attribute='name') | list | to_json }},
            "last_updated": "{{ ansible_date_time.iso8601 }}"
          }
        body_format: raw
        headers:
          Content-Type: "application/json"
        status_code: [200, 201]