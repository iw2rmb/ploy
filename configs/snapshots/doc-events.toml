name = "doc-events"
description = "Document store snapshot for the event aggregator"

[source]
engine = "document"
dsn = "document://grid/events"
fixture = "doc-events.json"

[[mask]]
table = "events"
column = "payload"
strategy = "redact"

[[synthetic]]
table = "events"
column = "ingested_at"
strategy = "static"
