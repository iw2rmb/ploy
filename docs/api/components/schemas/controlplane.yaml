# RunRepoStatus defines the per-repo execution state within a batch run.
# Tracks the lifecycle of individual repositories as they progress through
# the batch processing pipeline (pending → running → terminal).
RunRepoStatus:
  type: string
  description: |
    Per-repo execution status within a batch run.
    - pending: Repo is queued and waiting to start execution.
    - running: Repo execution is in progress (claimed by a node).
    - succeeded: Repo completed successfully with exit code 0.
    - failed: Repo execution failed (non-zero exit or error).
    - skipped: Repo was removed from batch before execution started.
    - cancelled: Repo was stopped while running (explicit user action).
  enum: [pending, running, succeeded, failed, skipped, cancelled]

# RunBatchDerivedStatus represents the batch-level aggregate status computed
# from the per-repo states in RunRepoCounts.DerivedStatus.
RunBatchDerivedStatus:
  type: string
  description: |
    Batch-level status derived from aggregated per-repo states.
    - pending: No repos have started (all pending or no repos).
    - running: At least one repo is currently running.
    - completed: All repos finished successfully (succeeded/skipped).
    - failed: At least one repo failed (and none running).
    - cancelled: Batch was stopped and repos were cancelled.
  enum: [pending, running, completed, failed, cancelled]

Repo:
  type: object
  properties:
    id: { type: string, format: uuid }
    url: { type: string }
    branch: { type: string, nullable: true }
    commit_sha: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
  required: [id, url, created_at]

CreateRepoRequest:
  type: object
  properties:
    url: { type: string }
    branch: { type: string, nullable: true }
    commit_sha: { type: string, nullable: true }
  required: [url]

Run:
  type: object
  # Note: The `reason` field was removed to prevent schema drift from the DB model.
  # Failure context is derived from `stats.exit_code` and `metadata`. The `stats`
  # field contains job/run metrics including exit codes; use it for failure analysis.
  # Note: run IDs are now KSUID-backed strings (27 characters); format: uuid removed.
  properties:
    id: { type: string, description: "Run ID (KSUID string)" }
    repo_url: { type: string }
    spec: {}
    created_by: { type: string, nullable: true }
    status: { type: string }
    created_at: { type: string, format: date-time }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
    node_id: { type: string, format: uuid, nullable: true }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    stats:
      description: |
        Job/run metrics JSON object. Contains exit_code for failure context,
        gate results, and other execution statistics. Replaces the deprecated
        `reason` field for failure analysis.
      type: object
      additionalProperties: true
      nullable: true
  required: [id, repo_url, status, created_at, base_ref, target_ref]

RunRepoCounts:
  type: object
  description: |
    Aggregated per-repo status counts for a batch run. Provides a summary of
    how many repos are in each lifecycle state (pending, running, terminal).
    The derived_status field computes a single batch-level status from these
    counts for easy display in CLI/UI surfaces.
  properties:
    total:
      type: integer
      format: int32
      description: Total number of repos in the batch.
    pending:
      type: integer
      format: int32
      description: Repos waiting to start execution.
    running:
      type: integer
      format: int32
      description: Repos currently executing.
    succeeded:
      type: integer
      format: int32
      description: Repos that completed successfully.
    failed:
      type: integer
      format: int32
      description: Repos that failed execution.
    skipped:
      type: integer
      format: int32
      description: Repos removed before execution started.
    cancelled:
      type: integer
      format: int32
      description: Repos stopped while running.
    derived_status:
      $ref: '#/RunBatchDerivedStatus'
      description: |
        Batch-level status computed from per-repo states. Precedence order:
        cancelled > running > failed > completed > pending.
  required: [total]

RunRepo:
  type: object
  description: |
    Repo entry within a batch run, backed by the `run_repos` table.
    Represents a single repository's execution state within the batch,
    tracking refs, status, attempt count, and timing information.
    Note: run_id is now a KSUID-backed string (27 characters).
  properties:
    id:
      type: string
      format: uuid
      description: Unique repo entry ID within the batch (still UUID).
    run_id:
      type: string
      description: Parent batch run ID (KSUID string).
    repo_url:
      type: string
      description: Git repository URL (https, ssh, or file scheme).
    base_ref:
      type: string
      description: Git ref used as the base for comparisons (e.g., main, master).
    target_ref:
      type: string
      description: Git ref representing the target branch for the run.
    status:
      $ref: '#/RunRepoStatus'
      description: Current execution status for this repo.
    attempt:
      type: integer
      format: int32
      description: |
        Retry attempt number for this repo within the batch.
        Starts at 1, incremented on each restart.
    last_error:
      type: string
      nullable: true
      description: |
        Human-readable error message from the most recent failed attempt.
        Cleared when the repo is restarted.
    created_at:
      type: string
      format: date-time
      description: Timestamp when the repo entry was created.
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution started (status transitioned to running).
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution completed (terminal status reached).
  required:
    - id
    - run_id
    - repo_url
    - base_ref
    - target_ref
    - status
    - attempt
    - created_at

RunBatchSummary:
  type: object
  description: |
    Batch run summary with optional aggregated repo status counts.
    Returned by list and inspect endpoints for batch runs. The repo_counts
    field provides aggregate status when multiple repos are attached to
    the batch (via POST /v1/runs/{id}/repos).
    Note: id is now a KSUID-backed string (27 characters).
  properties:
    id:
      type: string
      description: Unique batch run identifier (KSUID string).
    name:
      type: string
      nullable: true
      description: Optional human-readable name for the batch.
    repo_url:
      type: string
      description: |
        Primary Git repository URL for the batch. When repos are added
        individually, this serves as the default/template URL.
    status:
      type: string
      description: |
        Batch run status. Values: queued, running, succeeded, failed, canceled.
        For multi-repo batches, use repo_counts.derived_status for aggregate state.
    base_ref:
      type: string
      description: Default base Git ref for repos in the batch (e.g., main).
    target_ref:
      type: string
      description: Default target Git ref for repos in the batch.
    created_by:
      type: string
      nullable: true
      description: User or system that created the batch run.
    created_at:
      type: string
      format: date-time
      description: Timestamp when the batch was created.
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the first repo started execution.
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when all repos reached terminal state.
    repo_counts:
      allOf:
        - $ref: '#/RunRepoCounts'
      nullable: true
      description: |
        Aggregated per-repo status counts. Present when repos have been
        added to the batch. Use derived_status for a single batch-level
        status value.
  required:
    - id
    - repo_url
    - status
    - base_ref
    - target_ref
    - created_at

CreateRunRequest:
  type: object
  properties:
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    spec: {}
  required: [repo_url, base_ref, target_ref]

CreateRunResponse:
  type: object
  # Note: run_id is now a KSUID-backed string (27 characters).
  properties:
    run_id: { type: string, description: "Run ID (KSUID string)" }
  required: [run_id]

# Ticket submission (simplified Mods facade)
RunSubmitRequest:
  type: object
  properties:
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    spec: {}
    created_by: { type: string, nullable: true }
  required: [repo_url, base_ref, target_ref]

RunSummary:
  type: object
  # Note: run_id is now a KSUID-backed string (27 characters).
  properties:
    run_id: { type: string, description: "Run ID (KSUID string)" }
    status: { type: string }
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
  required: [run_id, status, repo_url, base_ref, target_ref]

# Detailed status returned by GET /v1/mods/{id}
# Note: The `reason` field was removed to prevent schema drift from the DB model.
# Failure context is derived from job `stats.exit_code` and `metadata`. Cancellation
# reasons are stored in `metadata.reason` by the cancel endpoint.
# Note: run_id is now a KSUID-backed string (27 characters).
RunStatus:
  type: object
  properties:
    run_id: { type: string, description: "Run ID (KSUID string)" }
    status: { type: string }
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
    metadata:
      description: |
        Additional ticket metadata. Contains derived failure/cancellation context:
        - `reason`: Human-readable cancellation reason (set by cancel endpoint)
        - `mr_url`: Merge request URL when available
        - `gate_summary`: Gate health summary from stats
        - `node_id`: Claiming node identifier
      type: object
      additionalProperties:
        type: string
  required: [run_id, status, repo_url, base_ref, target_ref, created_at]

# Build Gate — client requests and responses
BuildGateValidateRequest:
  type: object
  description: |
    Submit a build validation job. Requires repo_url and ref for Git-based
    validation using the repo+diff model.

    Optionally, callers may supply diff_patch (gzipped unified diff, base64-encoded)
    to apply on top of the cloned repo_url+ref baseline. This enables healing flows
    to replay changes without shipping full workspace archives.
  properties:
    repo_url: { type: string, description: Git repository URL to clone (required) }
    ref: { type: string, description: Git ref (branch, tag, or commit SHA) to validate (required) }
    diff_patch:
      type: string
      format: byte
      nullable: true
      description: |
        Gzipped unified diff (base64-encoded) to apply on top of the cloned
        repo_url+ref baseline. Used by healing mods to verify changes without
        transmitting full workspace archives. If non-empty, the executor clones
        repo_url at ref, then applies the decoded/decompressed patch via
        "git apply" before running the build.
    profile: { type: string, description: Gate profile (e.g., auto, java), nullable: true }
    timeout: { type: string, description: Duration string (e.g., 5m), nullable: true }
    limit_memory_bytes: { type: integer, format: int64, nullable: true }
    limit_cpu_millis: { type: integer, format: int64, nullable: true }
    limit_disk_space: { type: integer, format: int64, nullable: true }
  required: [repo_url, ref]

BuildGateValidateResponse:
  type: object
  description: Returns result when ready; otherwise JobID for polling.
  # Note: job_id is now a KSUID-backed string (27 characters).
  properties:
    job_id: { type: string, description: "Job ID (KSUID string)" }
    status: { type: string, enum: [pending, claimed, running, completed, failed] }
    result:
      description: Present only for completed jobs.
      type: object
      additionalProperties: true
      nullable: true
  required: [job_id, status]

BuildGateJobStatusResponse:
  type: object
  # Note: job_id is now a KSUID-backed string (27 characters).
  properties:
    job_id: { type: string, description: "Job ID (KSUID string)" }
    status: { type: string, enum: [pending, claimed, running, completed, failed] }
    result:
      type: object
      additionalProperties: true
      nullable: true
    error: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
  required: [job_id, status, created_at]

BuildGateJobCompleteRequest:
  type: object
  properties:
    status: { type: string, enum: [completed, failed] }
    result: { type: object, additionalProperties: true, nullable: true }
    error: { type: string, nullable: true }
  required: [status]

NodeBuildGateClaimResponse:
  type: object
  # Note: job_id is now a KSUID-backed string (27 characters).
  properties:
    job_id: { type: string, description: "Job ID (KSUID string)" }
    request:
      $ref: '#/BuildGateValidateRequest'
    status: { type: string, enum: [claimed] }
  required: [job_id, request, status]

# Response returned by POST /v1/nodes/{id}/claim
# Schema aligned with claimJobHandler response — exposes job-centric fields.
# Note: id (run_id) and job_id are now KSUID-backed strings (27 characters).
NodeClaimResponse:
  type: object
  properties:
    id:
      type: string
      description: Run ID (parent run of the claimed job, KSUID string)
    job_id:
      type: string
      description: Claimed job ID (KSUID string)
    job_name:
      type: string
      description: Logical job name (e.g., "pre-gate", "mod-0", "post-gate")
    job_meta:
      type: object
      additionalProperties: true
      description: Job metadata (mod_type, mod_image, etc.)
    repo_url: { type: string }
    status: { type: string }
    node_id: { type: string, format: uuid }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    step_index:
      type: number
      format: double
      description: Float index used for job ordering; always present for claimed jobs
    started_at: { type: string, format: date-time }
    created_at: { type: string, format: date-time }
    spec:
      description: |
        Opaque run specification JSON merged by the server at claim time.
        Includes `job_id` and any server defaults (e.g., `gitlab_pat`, `gitlab_domain`,
        `mr_on_success`, `mr_on_fail`).
      type: object
      additionalProperties: true
  required:
    - id
    - job_id
    - job_name
    - repo_url
    - status
    - node_id
    - base_ref
    - target_ref
    - step_index
    - started_at
    - created_at

Event:
  type: object
  # Note: run_id and job_id are now KSUID-backed strings (27 characters).
  properties:
    id: { type: integer, format: int64 }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    time: { type: string, format: date-time }
    level: { type: string }
    message: { type: string }
    meta: {}
  required: [id, run_id, time, level, message]

Stage:
  type: object
  # Note: id (job_id) and run_id are now KSUID-backed strings (27 characters).
  properties:
    id: { type: string, description: "Job ID (KSUID string)" }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    name: { type: string }
    status: { type: string }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
    duration_ms: { type: integer, format: int64 }
    meta: {}
  required: [id, run_id, name, status, duration_ms]

RunTiming:
  type: object
  # Note: id (run_id) is now a KSUID-backed string (27 characters).
  properties:
    id: { type: string, description: "Run ID (KSUID string)" }
    queue_ms: { type: integer, format: int64 }
    run_ms: { type: integer, format: int64 }
  required: [id, queue_ms, run_ms]

ListRunsTimingsResponse:
  type: object
  properties:
    timings:
      type: array
      items:
        $ref: '#/RunTiming'
  required: [timings]

Diff:
  type: object
  # Note: id (diffs.id is still UUID), but run_id and job_id are KSUID strings.
  properties:
    id: { type: string, format: uuid, description: "Diff ID (still UUID)" }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    patch:
      type: string
      description: Gzipped unified diff (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    summary: {}
    created_at: { type: string, format: date-time }
  required: [id, run_id, patch, created_at]

CreateDiffRequest:
  type: object
  # Note: job_id is now a KSUID-backed string (27 characters).
  properties:
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    patch:
      type: string
      description: Gzipped unified diff (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    summary: {}
  required: [patch]

Log:
  type: object
  # Note: run_id, job_id, and build_id are now KSUID-backed strings (27 characters).
  properties:
    id: { type: integer, format: int64 }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    build_id: { type: string, nullable: true, description: "Build ID (KSUID string)" }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped log chunk (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    created_at: { type: string, format: date-time }
  required: [id, run_id, chunk_no, data, created_at]

# Minimal acknowledgement returned by POST /v1/nodes/{id}/logs
