# Server and nodes targets are now migrated to all job sections.
description: server/nodes targets are migrated to all sections
env:
  PLOY_CA_CERTS:
    - value: "cert-data"
      target: server
      secret: true
  CODEX_AUTH_JSON:
    - value: '{"token":"t"}'
      target: nodes
      secret: true
existing_ca: {}
existing_home: {}
expect:
  rewritten: 2
  rejected: 0
  skipped: 0
  entries:
    - env_key: CODEX_AUTH_JSON
      target: nodes
      action: rewrite
      target_field: home
      destination: ".codex/auth.json"
      sections: [heal, mig, post_gate, pre_gate, re_gate]
    - env_key: PLOY_CA_CERTS
      target: server
      action: rewrite
      target_field: ca
      sections: [heal, mig, post_gate, pre_gate, re_gate]
