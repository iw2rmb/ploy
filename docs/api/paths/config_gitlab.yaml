get:
  tags: [Config]
  summary: Get GitLab configuration
  description: |
    Returns the current GitLab configuration, including domain and token.
    Requires `cli-admin` role.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              domain:
                type: string
                description: GitLab domain (e.g., https://gitlab.com)
              token:
                type: string
                description: GitLab personal access token
            required:
              - domain
              - token
    '401':
      description: Unauthorized
    '403':
      description: Forbidden (requires cli-admin role)
    '500':
      description: Server error

put:
  tags: [Config]
  summary: Update GitLab configuration
  description: |
    Updates the GitLab configuration with new domain and token values.
    The configuration is stored in memory only. Requires `cli-admin` role.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            domain:
              type: string
              description: GitLab domain (e.g., https://gitlab.com)
            token:
              type: string
              description: GitLab personal access token
          required:
            - domain
            - token
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              domain:
                type: string
                description: GitLab domain (e.g., https://gitlab.com)
              token:
                type: string
                description: GitLab personal access token
            required:
              - domain
              - token
    '400':
      description: Bad request (invalid JSON)
    '401':
      description: Unauthorized
    '403':
      description: Forbidden (requires cli-admin role)
    '500':
      description: Server error
