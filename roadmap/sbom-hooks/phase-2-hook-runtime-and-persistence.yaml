      - gaps: ["\"Repeated hook execution with same run repo and hook hash is skipped exactly once after first success.\" is not wired end-to-end: there is no runtime read path using `HasHookOnceLedger`/`GetHookOnceLedger` outside store/tests (`internal/store/hooks_once.sql.go`, `internal/store/hooks_once_queries_test.go`), and hook runtime completion metadata does not emit `hook_hash`/`hook_should_run`/`hook_once_skip_marked` (`internal/nodeagent/execution_orchestrator_jobs.go:246`), so `recordHookOnceLedger` often no-ops (`internal/server/handlers/jobs_complete_service_hook_once.go:42`).", "\"Successful MIG completion writes DB SBOM rows from the most recent successful sbom job and ignores stale failed snapshots.\" is not implemented as written: persistence source selection is `latestSuccessfulGateJob` filtered to `pre_gate`/`post_gate`/`re_gate` (`internal/server/handlers/jobs_complete_sbom.go:33`, `internal/server/handlers/jobs_complete_sbom.go:80`), not the most recent successful `sbom` job type."]
        commit: cb3ae98c
      - gaps: ["\"Implement hook matching and once semantics with persistent state and API visibility for new job types.\" is not fully implemented in runtime flow: `internal/server/handlers/nodes_claim_hook_once.go` hashes raw hook source (`hookSourceHash`) and gates execution only by ledger presence, while matcher-derived canonical hash and once-eligibility semantics in `internal/workflow/hook/matcher.go` are not used; this bypasses hook-spec once semantics and canonical hash keying.", "\"Remove legacy gate-success-only SBOM persistence mechanism to keep single authoritative ingestion path.\" is incomplete end-to-end: SBOM persistence now writes rows for `sbom` jobs (`internal/server/handlers/jobs_complete_sbom.go`, `internal/server/blobpersist/sbom.go`), but compatibility reads still require gate-linked rows (`internal/store/queries/sboms_compat.sql` joins `gates` and filters `j.job_type IN ('pre_gate','post_gate','re_gate')`), so newly persisted sbom-job snapshots are not visible through existing SBOM compatibility queries."]
        commit: cbdc0f0a
      - gaps: ["\"Repeated hook execution with same run repo and hook hash is skipped exactly once after first success.\" is not implemented in hook execution runtime: `HookRuntimeDecision.HookShouldRun` is computed/propagated but never used to short-circuit hook work; `executeHookJob` always stages `/in` and `/out` and reports success regardless of `hook_should_run` (`internal/nodeagent/execution_orchestrator_jobs.go:204-268`, only metadata emission at `:270-279`).", "\"Implement hook matching and once semantics with persistent state and API visibility for new job types.\" is brittle for relative hook sources at claim-time: runtime loading hardcodes spec root `\".\"` (`internal/server/handlers/nodes_claim_hook_once.go:116-120`), while mig spec parsing preserves relative `hooks` entries without rebasing (`internal/workflow/contracts/migs_spec_parse.go:52-57`), and relative hooks are a supported/used shape (`internal/server/handlers/migs_ticket_test.go:132`). This can fail `resolveHookRuntimeDecision` and prevent hook claims from progressing for normal relative hook manifests."]
        commit: a831d1db
      - gaps: ["\"Implement hook matching and once semantics with persistent state and API visibility for new job types.\" is not fully implemented for relative hook sources: claim-time fallback returns a run decision without `hook_hash` and bypasses hook-once ledger checks/writes (`internal/server/handlers/nodes_claim_hook_once.go:50`, `internal/server/handlers/jobs_complete_service_hook_once.go:46`), so \"Repeated hook execution with same run repo and hook hash is skipped exactly once after first success.\" is not guaranteed for standard relative hook manifests when they are not resolvable on the control-plane filesystem."]
        commit: f8d2c58e
      - gaps: ["\"Successful MIG completion writes DB SBOM rows from the most recent successful sbom job and ignores stale failed snapshots.\" is not guaranteed: `latestSuccessfulSBOMJob` selects the winner by lexicographic `job.ID` (`internal/server/handlers/jobs_complete_sbom.go:72`) rather than an actual recency signal, so with multiple successful `sbom` jobs created in the same KSUID second it can persist a non-most-recent snapshot."]
        commit: 9bedaabf
