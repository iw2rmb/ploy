---
# Complete Ploy development environment setup
# Proper service ordering: Basic tools -> SeaweedFS -> HashiCorp -> Traefik -> API -> CHTTP -> FreeBSD -> Testing
- import_playbook: playbooks/main.yml
- import_playbook: playbooks/seaweedfs.yml
- import_playbook: playbooks/hashicorp.yml
- import_playbook: playbooks/traefik.yml
- import_playbook: playbooks/api.yml
- import_playbook: playbooks/chttp.yml
  when: deploy_chttp is defined and deploy_chttp | bool
- import_playbook: playbooks/freebsd.yml
- import_playbook: playbooks/testing.yml