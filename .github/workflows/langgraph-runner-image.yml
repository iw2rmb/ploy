name: LangGraph Runner Image

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/langgraph-runner/**'
      - '.github/workflows/langgraph-runner-image.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/langgraph-runner/**'
      - '.github/workflows/langgraph-runner-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (push only)
        uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/langgraph-runner
          tags: |
            type=raw,value=py-0.1.0,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Build (PR) / Build+Push (push)
        uses: docker/build-push-action@v6
        with:
          context: services/langgraph-runner
          file: services/langgraph-runner/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

