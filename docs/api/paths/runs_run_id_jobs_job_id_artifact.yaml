parameters:
  - in: path
    name: run_id
    required: true
    schema: { type: string, format: uuid }
    description: Run UUID
  - in: path
    name: job_id
    required: true
    schema: { type: string, format: uuid }
    description: Job UUID
  - in: header
    name: PLOY_NODE_UUID
    required: true
    schema: { type: string, format: uuid }
    description: Worker node UUID uploading the artifact bundle
post:
  tags: [Artifacts]
  summary: Upload gzipped artifact bundle for a job (node → server)
  description: |
    Nodes upload a gzipped tar archive for a specific job of a run. The server stores
    the bundle in PostgreSQL under the `artifact_bundles` table. The decoded bundle
    bytes are limited to ≤ 1 MiB. The request body allows up to ~2 MiB to accommodate
    base64 overhead.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [bundle]
          properties:
            build_id:
              type: string
              format: uuid
              nullable: true
              description: Optional build ID if artifacts are produced per build
            name:
              type: string
              nullable: true
              description: Optional logical name for the artifact bundle
            bundle:
              type: string
              description: Gzipped tar archive (≤1 MiB gzipped), base64-encoded.
              contentEncoding: base64
        examples:
          minimal_artifact:
            summary: Minimal artifact bundle upload
            description: |
              Basic artifact upload with gzipped tar archive (base64-encoded).
              The bundle field contains the compressed tar limited to 1 MiB.
            value:
              bundle: "H4sIAAAAAAAA/+3OMQ0AAAjAMPybhWt/Qi8FU0sNAAAAAAAAAAAAAAAAALpbAAAA//8DAOkOgRgAKAAA"
          named_artifact:
            summary: Named artifact bundle with build ID
            description: |
              Example including optional name and build_id for artifact tracking.
              Name can be used to identify the artifact type (e.g., "dist", "coverage").
            value:
              build_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
              name: "dist"
              bundle: "H4sIAAAAAAAA/+3OMQ0AAAjAMPybhWt/Qi8FU0sNAAAAAAAAAAAAAAAAALpbAAAA//8DAOkOgRgAKAAA"
          size_limit:
            summary: Maximum size boundary
            description: |
              The decoded gzipped bundle is capped at 1 MiB (1048576 bytes).
              The JSON body limit is 2 MiB to accommodate base64 encoding overhead (~33%).
              Server returns 413 if decoded bundle exceeds 1 MiB or body exceeds 2 MiB.
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            type: object
            properties:
              artifact_bundle_id:
                type: string
                format: uuid
                description: Identifier of the stored artifact bundle
    '400':
      description: Bad Request (invalid IDs, missing fields, or job/run mismatch)
    '404':
      description: Run or Job not found
    '413':
      description: Payload Too Large (decoded bundle > 1 MiB or body over limit)
    '500':
      description: Internal server error
