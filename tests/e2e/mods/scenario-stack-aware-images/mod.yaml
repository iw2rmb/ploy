# E2E spec demonstrating stack-aware image selection.
#
# This spec uses the map form of `image` to select different container
# images based on the detected Build Gate stack. The node agent resolves the
# image using these rules:
#   1. Exact stack match (e.g., "java-maven" → java-maven image)
#   2. Fallback to "default" if no exact match
#   3. Error if neither stack key nor "default" exists
#
# For this Maven-based test repo (ploy-orw-java11-maven), Build Gate detects
# "java-maven" stack, so the java-maven image is selected.
#
# Submit with:
#   dist/ploy mig run \
#     --repo-url https://gitlab.com/iw2rmb/ploy-orw-java11-maven.git \
#     --repo-base-ref main \
#     --repo-target-ref e2e/stack-aware-test \
#     --spec tests/e2e/mods/scenario-stack-aware-images/mod.yaml \
#     --follow

apiVersion: ploy.mod/v1alpha1
kind: ModRunSpec

steps:
  - # Stack-aware image map: Build Gate detects workspace stack and selects
    # the appropriate image. For Maven projects, java-maven is selected.
    # For Gradle projects, java-gradle is selected. Other stacks use default.
    image:
      default: ghcr.io/iw2rmb/migs-orw-maven:latest
      java-maven: ghcr.io/iw2rmb/migs-orw-maven:latest
      java-gradle: ghcr.io/iw2rmb/migs-orw-gradle:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17
      MAVEN_PLUGIN_VERSION: "6.18.0"

build_gate:
  enabled: true

mr_on_fail: false
mr_on_success: true
