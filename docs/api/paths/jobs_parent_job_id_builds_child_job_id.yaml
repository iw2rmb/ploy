get:
  operationId: getJobBuildStatus
  tags: [ Jobs ]
  summary: Get child build status under a parent job
  description: |
    Returns canonical status for a child build job under `parent_job_id`.

    Ownership and parent-type validation are evaluated from `parent_job_id`
    server-side; node identity is not part of path shape.
  parameters:
    - in: path
      name: parent_job_id
      required: true
      schema:
        type: string
      description: Parent job ID (KSUID string)
    - in: path
      name: child_job_id
      required: true
      schema:
        type: string
      description: Child job ID (KSUID string)
    - in: header
      name: PLOY_NODE_UUID
      required: true
      schema:
        type: string
      description: Worker node ID (NanoID 6-character string)
  responses:
    '200':
      description: Child build status
      content:
        application/json:
          schema:
            type: object
            required: [ job_id, status, terminal, success ]
            properties:
              job_id:
                type: string
              status:
                type: string
                enum: [ Created, Queued, Running, Success, Fail, Error, Cancelled ]
              terminal:
                type: boolean
                description: True when status is one of Success, Fail, Error, or Cancelled.
              success:
                type: boolean
                description: True only when status is Success.
          examples:
            status:
              value:
                job_id: 35YfU3rq9CHMiiQ9g4qUg01fR6v
                status: Running
                terminal: false
                success: false
    '400':
      description: Bad request (invalid path IDs or node header)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '403':
      description: Parent job is not assigned to the calling worker node
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Parent or child job not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '409':
      description: Parent job type/state does not allow child build polling
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
