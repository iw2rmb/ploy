post:
  tags: [Control]
  summary: Start queued repos
  description: |
    Starts execution for queued repos in a batch run by creating (or advancing)
    repo-scoped job queues for `(run_id, repo_id, attempt)`. Returns counts of
    started/already_done/pending (where pending means queued/not started).
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: string }
      description: Run ID (KSUID string, 27 characters).
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              run_id: { type: string }
              started: { type: integer }
              already_done: { type: integer }
              pending: { type: integer }
            required: [run_id, started, already_done, pending]
    '400':
      description: Bad request
    '404':
      description: Run not found
    '409':
      description: Conflict — cannot start a terminal run
    '500':
      description: Server error
