post:
  tags: [Control]
  summary: Submit a build validation job
  description: |
    Accepts either a repository ref (repo_url+ref) or a content archive
    (base64-encoded tar/tar.gz). Returns the result if completed within a
    short timeout, or a JobID for polling.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../OpenAPI.yaml#/components/schemas/BuildGateValidateRequest'
  responses:
    '200':
      description: Validation completed; result in response
      content:
        application/json:
          schema:
            $ref: '../OpenAPI.yaml#/components/schemas/BuildGateValidateResponse'
    '202':
      description: Accepted; poll job status with the provided JobID
      content:
        application/json:
          schema:
            $ref: '../OpenAPI.yaml#/components/schemas/BuildGateValidateResponse'
    '400': { description: Invalid request }
    '500': { description: Server error }
