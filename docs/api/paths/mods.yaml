post:
  tags: [Control]
  summary: Submit Mods run
  description: |
    Submit a new Mods run using a repository URL and Git refs. The
    server creates the repository entry if it does not exist, creates a
    mod with the provided `spec` (or `{}`), and enqueues a run. The
    response includes a canonical `RunSummary` (KSUID `run_id`, `state`,
    repository, metadata, and stages map).
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/RunSubmitRequest'
  responses:
    '201':
      description: Created (run accepted and queued for execution)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/RunSummary'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
