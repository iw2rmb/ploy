<svg
    xmlns="http://www.w3.org/2000/svg"
    width="150"
    height="20"
    role="img"
    aria-label="migs: 100.0%"
>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1" />
    <stop offset="1" stop-opacity=".1" />
  </linearGradient>
  <mask id="m"><rect width="150" height="20" rx="3" fill="#fff" /></mask>
  <g mask="url(#m)"><rect width="90" height="20" fill="#555" /><rect
            x="90"
            width="60"
            height="20"
            fill="brightgreen"
        /><rect width="150" height="20" fill="url(#s)" /></g>
  <g
        fill="#fff"
        text-anchor="middle"
        font-family="DejaVu Sans,Verdana,Geneva,sans-serif"
        font-size="11"
    >
    <text x="45" y="15">migs</text>
    <text x="120" y="15">100.0%</text>
  </g>
</svg>
