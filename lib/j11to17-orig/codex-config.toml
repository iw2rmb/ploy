profile = "gpt-5"

model = "gpt-999"
model_reasoning_effort = "high"
personality = "pragmatic"

suppress_unstable_features_warning = true

[features]
apply_patch_freeform = true # for gpt-5
fast_mode = false
multi_agent = false

[projects."/workspace"]
trust_level = "trusted"

[model_providers.llm-proxy]
name = "llm-proxy"
env_key="CODEX_API_KEY"
