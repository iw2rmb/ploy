parameters:
  - in: path
    name: id
    required: true
    schema: { type: string }
    description: Node ID (NanoID 6-character string)
post:
  tags: [Control]
  summary: Claim a queued job from the unified jobs queue (node → server)
  description: |
    Nodes poll this endpoint to claim the next queued job for execution. The
    server performs an atomic assignment using `FOR UPDATE SKIP LOCKED` over the
    unified `jobs` queue and returns job + parent run
    details when work is available. When no jobs are available, the server
    returns `204 No Content`.
  responses:
    '200':
      description: Job successfully claimed and assigned to the node
      content:
        application/json:
          schema:
            $ref: '../OpenAPI.yaml#/components/schemas/NodeClaimResponse'
    '204':
      description: No queued jobs available to claim
    '400':
      description: Bad Request (invalid node ID)
    '404':
      description: Node not found
    '500':
      description: Internal server error
