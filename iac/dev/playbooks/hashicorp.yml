---
- name: Setup HashiCorp Stack (Nomad, Consul, Vault)
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
  
  tasks:
    - name: Create hashicorp user (alias to ploy for compatibility)
      user:
        name: ploy
        system: false
        shell: /bin/bash
        home: /home/ploy
        comment: "Ploy service user (also used for HashiCorp stack)"

    - name: Create HashiCorp directories
      file:
        path: "{{ item }}"
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'
      loop:
        - /opt/hashicorp
        - /opt/hashicorp/bin
        - /opt/hashicorp/nomad
        - /opt/hashicorp/consul
        - /opt/hashicorp/vault
        - /etc/nomad.d
        - /etc/consul.d
        - /etc/vault.d

    - name: Download and install Nomad
      block:
        - name: Check if Nomad is already installed
          stat:
            path: /usr/local/bin/nomad
          register: nomad_binary

        - name: Get current Nomad version (if installed)
          command: /usr/local/bin/nomad version
          register: current_nomad_version
          changed_when: false
          ignore_errors: true
          when: nomad_binary.stat.exists

        - name: Download Nomad
          get_url:
            url: "https://releases.hashicorp.com/nomad/{{ nomad_version }}/nomad_{{ nomad_version }}_linux_amd64.zip"
            dest: /tmp/nomad.zip
            timeout: 120
          when: not nomad_binary.stat.exists or nomad_version not in (current_nomad_version.stdout | default(''))

        - name: Extract Nomad
          unarchive:
            src: /tmp/nomad.zip
            dest: /opt/hashicorp/bin
            remote_src: true
            owner: ploy
            group: ploy
            mode: '0755'
          when: not nomad_binary.stat.exists or nomad_version not in (current_nomad_version.stdout | default(''))

        - name: Create Nomad symlink
          file:
            src: /opt/hashicorp/bin/nomad
            dest: /usr/local/bin/nomad
            state: link

        - name: Verify Nomad installation
          command: /usr/local/bin/nomad version
          register: nomad_install_version
          changed_when: false

        - name: Display Nomad version
          debug:
            msg: "Nomad installed successfully: {{ nomad_install_version.stdout_lines[0] if nomad_install_version.stdout_lines else 'Version info not available' }}"

    - name: Download and install Consul
      block:
        - name: Check if Consul is already installed
          stat:
            path: /usr/local/bin/consul
          register: consul_binary

        - name: Get current Consul version (if installed)
          command: /usr/local/bin/consul version
          register: current_consul_version
          changed_when: false
          ignore_errors: true
          when: consul_binary.stat.exists

        - name: Download Consul
          get_url:
            url: "https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_linux_amd64.zip"
            dest: /tmp/consul.zip
          when: not consul_binary.stat.exists or consul_version not in (current_consul_version.stdout | default(''))

        - name: Extract Consul
          unarchive:
            src: /tmp/consul.zip
            dest: /opt/hashicorp/bin
            remote_src: true
            owner: ploy
            group: ploy
          when: not consul_binary.stat.exists or consul_version not in (current_consul_version.stdout | default(''))

        - name: Create Consul symlink
          file:
            src: /opt/hashicorp/bin/consul
            dest: /usr/local/bin/consul
            state: link

    - name: Download and install Vault
      block:
        - name: Check if Vault is already installed
          stat:
            path: /usr/local/bin/vault
          register: vault_binary

        - name: Get current Vault version (if installed)
          command: /usr/local/bin/vault version
          register: current_vault_version
          changed_when: false
          ignore_errors: true
          when: vault_binary.stat.exists

        - name: Download Vault
          get_url:
            url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_amd64.zip"
            dest: /tmp/vault.zip
          when: not vault_binary.stat.exists or vault_version not in (current_vault_version.stdout | default(''))

        - name: Extract Vault
          unarchive:
            src: /tmp/vault.zip
            dest: /opt/hashicorp/bin
            remote_src: true
            owner: ploy
            group: ploy
          when: not vault_binary.stat.exists or vault_version not in (current_vault_version.stdout | default(''))

        - name: Create Vault symlink
          file:
            src: /opt/hashicorp/bin/vault
            dest: /usr/local/bin/vault
            state: link

    - name: Create Consul configuration
      template:
        src: ../../common/templates/consul-server.hcl.j2
        dest: /etc/consul.d/consul.hcl
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Create Nomad server configuration
      template:
        src: ../../common/templates/nomad-server.hcl.j2
        dest: /etc/nomad.d/nomad.hcl
        owner: ploy
        group: ploy
        mode: '0644'
      register: nomad_config

    - name: Create Vault configuration
      template:
        src: ../../common/templates/vault.hcl.j2
        dest: /etc/vault.d/vault.hcl
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Create systemd service files
      template:
        src: "../../common/templates/{{ item }}.service.j2"
        dest: "/etc/systemd/system/{{ item }}.service"
      loop:
        - consul
        - nomad
        - vault

    - name: Check Consul service status
      command: systemctl is-active consul
      register: consul_service_status
      ignore_errors: true
      changed_when: false

    - name: Start and enable Consul (if not running)
      systemd:
        name: consul
        state: started
        enabled: true
        daemon_reload: true
      when: consul_service_status.stdout != "active"

    - name: Wait for Consul to be ready
      wait_for:
        port: 8500
        delay: 10

    - name: Check Vault service status
      command: systemctl is-active vault
      register: vault_service_status
      ignore_errors: true
      changed_when: false

    - name: Start and enable Vault (if not running)
      systemd:
        name: vault
        state: started
        enabled: true
        daemon_reload: true
      when: vault_service_status.stdout != "active"

    - name: Wait for Vault to be ready
      wait_for:
        port: 8200
        delay: 10

    - name: Check Nomad service status
      command: systemctl is-active nomad
      register: nomad_service_status
      ignore_errors: true
      changed_when: false

    # Validate Nomad prerequisites before starting
    - name: Validate Nomad volume directories exist
      stat:
        path: "{{ item }}"
      register: nomad_volume_dirs
      loop:
        - "/opt/ploy/artifacts"
        - "/opt/ploy/logs"
        - "/opt/ploy/metadata"
        - "/opt/ploy/debug"
        - "/opt/ploy/cache"
        - "/opt/ploy/temp"
      failed_when: not nomad_volume_dirs.results[0].stat.exists

    - name: Restart Nomad if configuration changed
      systemd:
        name: nomad
        state: restarted
        daemon_reload: true
      when: nomad_config.changed
      register: nomad_restart_result
      retries: 3
      delay: 5
      until: nomad_restart_result is succeeded

    - name: Start and enable Nomad (if not running)
      systemd:
        name: nomad
        state: started
        enabled: true
        daemon_reload: true
      when: 
        - nomad_service_status.stdout != "active"
        - not (nomad_config.changed | default(false))
      register: nomad_start_result
      retries: 3
      delay: 5
      until: nomad_start_result is succeeded

    - name: Check Nomad service status after start
      systemd:
        name: nomad
      register: nomad_post_start_status
      when: nomad_service_status.stdout != "active"

    - name: Display Nomad startup logs on failure
      command: journalctl -u nomad.service --no-pager -n 20
      register: nomad_startup_logs
      when: 
        - nomad_service_status.stdout != "active"
        - nomad_post_start_status.status.ActiveState != "active"
      failed_when: false

    - name: Fail if Nomad didn't start successfully
      fail:
        msg: |
          Nomad failed to start. Recent logs:
          {{ nomad_startup_logs.stdout if nomad_startup_logs is defined else 'No logs available' }}
      when:
        - nomad_service_status.stdout != "active"
        - nomad_post_start_status is defined
        - nomad_post_start_status.status.ActiveState != "active"

    - name: Wait for Nomad to be ready
      wait_for:
        port: 4646
        delay: 10
        timeout: 60

    - name: Verify Nomad server status
      uri:
        url: "http://localhost:4646/v1/status/leader"
        method: GET
        status_code: 200
      register: nomad_leader_check
      retries: 6
      delay: 10
      until: nomad_leader_check.status == 200

    - name: Display Nomad leader status
      debug:
        msg: "Nomad cluster leader: {{ nomad_leader_check.json | default('Leader election in progress') }}"

    - name: Verify Nomad node status
      uri:
        url: "http://localhost:4646/v1/nodes"
        method: GET
        status_code: 200
      register: nomad_nodes_check
      retries: 3
      delay: 5

    - name: Display Nomad node count
      debug:
        msg: "Nomad nodes registered: {{ nomad_nodes_check.json | length if nomad_nodes_check.json is defined else 0 }}"

    - name: Add ploy user to hashicorp group for Nomad access
      user:
        name: ploy
        groups: hashicorp
        append: true

    - name: Create Ploy configuration directory
      file:
        path: /etc/ploy
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'

    - name: Initialize Vault (if not already initialized)
      uri:
        url: "http://localhost:8200/v1/sys/init"
        method: POST
        body_format: json
        body:
          secret_shares: 1
          secret_threshold: 1
        status_code: [200, 400]
      register: vault_init
      ignore_errors: true

    - name: Save Vault initialization data
      copy:
        content: "{{ vault_init.json | to_nice_json }}"
        dest: /opt/hashicorp/vault/init.json
        owner: ploy
        group: ploy
        mode: '0600'
      when: vault_init.status == 200

    - name: Read Vault initialization data (if exists)
      stat:
        path: /opt/hashicorp/vault/init.json
      register: vault_init_file

    - name: Load Vault initialization data
      slurp:
        src: /opt/hashicorp/vault/init.json
      register: vault_init_data
      when: vault_init_file.stat.exists

    - name: Unseal Vault with initialization key (dev environment)
      uri:
        url: "http://localhost:8200/v1/sys/unseal"
        method: POST
        body_format: json
        body:
          key: "{{ (vault_init_data.content | b64decode | from_json).keys[0] }}"
        status_code: [200, 400]
      register: vault_unseal
      ignore_errors: true
      when: vault_init_file.stat.exists

    - name: Display Vault unsealing status
      debug:
        msg: "Vault unsealing result: {{ vault_unseal.json.sealed | default('Already unsealed or error occurred') }}"
      when: vault_init_file.stat.exists

    - name: Check A-records for root domains
      block:
        - name: Verify platform domain A-record
          command: nslookup api.dev.{{ ploy.platform_domain | default('ployman.app') }} 8.8.8.8
          register: platform_dns_check
          ignore_errors: true
          changed_when: false

        - name: Display platform domain DNS resolution
          debug:
            msg: "Platform domain DNS check: {{ platform_dns_check.stdout_lines | select('match', '.*Address:.*') | list }}"

        - name: Verify apps domain A-record  
          command: nslookup dev.{{ ploy.apps_domain | default('ployd.app') }} 8.8.8.8
          register: apps_dns_check
          ignore_errors: true
          changed_when: false

        - name: Display apps domain DNS resolution
          debug:
            msg: "Apps domain DNS check: {{ apps_dns_check.stdout_lines | select('match', '.*Address:.*') | list }}"

        - name: Check if DNS points to current VPS
          debug:
            msg: "DNS Resolution Status - VPS IP: {{ ansible_default_ipv4.address }}, Platform DNS: {{ platform_dns_check.stdout | regex_search('Address: ([0-9.]+)', '\\1') | first | default('Not resolved') }}"

    - name: Validate required environment variables for SSL certificates
      block:
        - name: Check for Namecheap API credentials
          fail:
            msg: "Missing required environment variables for SSL certificate automation. Please set: NAMECHEAP_API_KEY, NAMECHEAP_API_USER, NAMECHEAP_USERNAME, NAMECHEAP_CLIENT_IP"
          when: >
            lookup('env', 'NAMECHEAP_API_KEY') == '' or
            lookup('env', 'NAMECHEAP_API_USER') == '' or
            lookup('env', 'NAMECHEAP_USERNAME') == '' or
            lookup('env', 'NAMECHEAP_CLIENT_IP') == ''

        - name: Display SSL automation status
          debug:
            msg: "SSL certificate automation: ENABLED (Namecheap API configured)"

    - name: Create Nomad job and data directories
      file:
        path: "{{ item }}"
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'
      loop:
        - /opt/hashicorp/nomad/jobs
        - /opt/hashicorp/nomad/logs
        - /opt/hashicorp/nomad/alloc
        - /opt/hashicorp/nomad/client
        - /opt/hashicorp/nomad/plugins

    # Ploy directories already created in main.yml comprehensive structure

    - name: Create Nomad log file with proper permissions
      file:
        path: /var/log/nomad.log
        state: touch
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Find Nomad job templates
      find:
        paths: "{{ playbook_dir }}/../../../platform/nomad"
        patterns: "*.hcl"
      register: nomad_templates
      delegate_to: localhost
      become: no

    - name: Copy Ploy Nomad job templates (if they exist)
      copy:
        src: ../../common/templates/"{{ item.path }}"
        dest: /opt/hashicorp/nomad/jobs/
        owner: ploy
        group: ploy
        mode: '0644'
      with_items: "{{ nomad_templates.files }}"
      when: nomad_templates.files | length > 0

    - name: Create Nomad environment file for systemd
      copy:
        content: |
          # Nomad environment variables
          NOMAD_ADDR=http://localhost:4646
          NOMAD_LOG_LEVEL=INFO
        dest: /etc/nomad.d/nomad.env
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Set up Nomad CLI access for ploy user
      lineinfile:
        path: /home/ploy/.bashrc
        line: "export NOMAD_ADDR=http://localhost:4646"
        create: true
        owner: ploy
        group: ploy

    - name: Deploy Traefik system job to Nomad
      block:
        - name: Check if Traefik is already installed
          stat:
            path: /usr/local/bin/traefik
          register: traefik_binary

        - name: Get current Traefik version (if installed)
          command: /usr/local/bin/traefik version
          register: current_traefik_version
          changed_when: false
          ignore_errors: true
          when: traefik_binary.stat.exists

        - name: Check if Traefik job is already running
          uri:
            url: "http://localhost:4646/v1/job/traefik-system"
            method: GET
            status_code: [200, 404]
          register: traefik_job_check
          ignore_errors: true

        - name: Download and install Traefik binary (if needed)
          block:
            - name: Download Traefik
              get_url:
                url: "https://github.com/traefik/traefik/releases/download/v{{ traefik_version }}/traefik_v{{ traefik_version }}_linux_amd64.tar.gz"
                dest: /tmp/traefik.tar.gz
                timeout: 120
              when: not traefik_binary.stat.exists or traefik_version not in (current_traefik_version.stdout | default(''))

            - name: Extract Traefik
              unarchive:
                src: /tmp/traefik.tar.gz
                dest: /usr/local/bin
                remote_src: true
                mode: '0755'
              when: not traefik_binary.stat.exists or traefik_version not in (current_traefik_version.stdout | default(''))

            - name: Verify Traefik installation
              command: /usr/local/bin/traefik version
              register: traefik_install_version
              changed_when: false

            - name: Display Traefik version
              debug:
                msg: "Traefik installed successfully: {{ traefik_install_version.stdout_lines[0] if traefik_install_version.stdout_lines else 'Version info not available' }}"

        - name: Deploy Traefik Nomad job with environment variables
          template:
            src: ../../common/templates/nomad-traefik-system.hcl.j2
            dest: "/opt/hashicorp/nomad/jobs/traefik-system.hcl"
            owner: ploy
            group: ploy
            mode: '0644'

        - name: Validate Traefik job syntax
          command: nomad job validate /opt/hashicorp/nomad/jobs/traefik-system.hcl
          register: traefik_validate
          changed_when: false
          environment:
            NOMAD_ADDR: "http://localhost:4646"

        - name: Submit Traefik system job to Nomad (if not running)
          command: nomad job run /opt/hashicorp/nomad/jobs/traefik-system.hcl
          register: traefik_job_submit
          environment:
            NOMAD_ADDR: "http://localhost:4646"
          when: traefik_job_check.status == 404

        - name: Wait for Traefik service to be healthy
          uri:
            url: "http://localhost:4646/v1/job/traefik-system/allocations"
            method: GET
            status_code: 200
          register: traefik_allocs
          until: >
            traefik_allocs.json | length > 0 and
            (traefik_allocs.json | map(attribute='ClientStatus') | list | unique) == ['running']
          retries: 12
          delay: 10

        - name: Verify Traefik is accessible
          uri:
            url: "http://localhost:8080/ping"
            method: GET
            status_code: 200
          register: traefik_health_check
          retries: 6
          delay: 10
          until: traefik_health_check.status == 200

        - name: Display Traefik deployment status
          debug:
            msg: "Traefik system job deployed successfully and is healthy"

        # Traefik directories already created in main.yml comprehensive structure

        - name: Deploy Traefik dynamic configuration for API routing with SSL
          template:
            src: ../../common/templates/traefik-dynamic-config.yml.j2
            dest: /opt/ploy/traefik-data/dynamic-config.yml
            owner: ploy
            group: ploy
            mode: '0644'

        - name: Ensure proper ownership of certificate data directory
          file:
            path: /opt/ploy/traefik-data
            state: directory
            owner: ploy
            group: ploy
            mode: '0755'
            recurse: true

        - name: Set up firewall rules for Traefik
          ufw:
            rule: allow
            port: "{{ item }}"
            comment: "Traefik routing"
          loop:
            - "80"   # HTTP
            - "443"  # HTTPS
            - "8080" # Traefik dashboard

      rescue:
        - name: Handle Traefik deployment failure
          debug:
            msg: "Warning: Traefik deployment failed. Manual intervention may be required."
        
        - name: Show Traefik job status on failure
          command: nomad job status traefik-system
          register: traefik_status
          environment:
            NOMAD_ADDR: "http://localhost:4646"
          ignore_errors: true
        
        - name: Display failure information
          debug:
            var: traefik_status.stdout_lines
          when: traefik_status.stdout_lines is defined

    - name: Final validation and health checks
      block:
        - name: Validate all HashiCorp services are healthy
          uri:
            url: "{{ item.url }}"
            method: GET
            status_code: 200
          register: service_health
          retries: 3
          delay: 10
          loop:
            - { name: "Traefik", url: "http://localhost:8095/ping" }
            - { name: "Nomad", url: "http://localhost:4646/v1/status/leader" }
            - { name: "Consul", url: "http://localhost:8500/v1/status/leader" }
          loop_control:
            label: "{{ item.name }}"

        - name: Validate API service accessibility
          uri:
            url: "http://localhost:8081/health"
            method: GET
            status_code: 200
          register: api_health
          retries: 3
          delay: 10

        - name: Display deployment success summary
          debug:
            msg: |
              ✅ HashiCorp Stack Deployment Complete!
              
              Services Status:
              - Traefik: ✅ {{ 'Healthy' if service_health.results[0].status == 200 else 'Failed' }} (Port 8095)
              - Nomad: ✅ {{ 'Healthy' if service_health.results[1].status == 200 else 'Failed' }} (Port 4646)  
              - Consul: ✅ {{ 'Healthy' if service_health.results[2].status == 200 else 'Failed' }} (Port 8500)
              - API: ✅ {{ 'Healthy' if api_health.status == 200 else 'Failed' }} (Port 8081)
              
              SSL Certificates:
              - Platform (*.dev.ployman.app): ✅ Configured
              - Apps (*.dev.ployd.app): ✅ Ready for auto-provisioning
              
              Access Points:
              - API: http://{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}:8081/health
              - Traefik Dashboard: http://{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}:8095
              - Nomad UI: http://{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}:4646
              - Consul UI: http://{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}:8500