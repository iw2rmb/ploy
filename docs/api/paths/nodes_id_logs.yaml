parameters:
  - in: path
    name: id
    required: true
    # Node IDs are NanoID strings (6 characters, URL-safe alphabet).
    schema: { type: string }
    description: Node ID (NanoID 6-character string)
post:
  tags: [Artifacts]
  summary: Ingest a gzipped log chunk for a run (node → server)
  description: |
    Node agents upload gzipped log chunks for a specific run. Inside the gzip
    payload, each line is a JSON log frame with `stream` (`stdout|stderr`) and
    `line` fields. The server enforces a hard cap of ≤ 10 MiB on decoded `data`
    bytes. The JSON request body is allowed up to 16 MiB to accommodate base64 overhead.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/NodeCreateLogRequest'
        examples:
          minimal_chunk:
            summary: First log chunk for a run
            description: |
              Minimal example with stream-aware framed gzipped log data (base64-encoded).
              The actual payload size is limited to 16 MiB JSON body, with decoded data ≤ 10 MiB.
            value:
              run_id: "2NQPoBfVkc8dFmGAQqJnUwMu9jR"
              chunk_no: 0
              data: "H4sIAAAAAAAA/8rJT0/VLy4pysxLBwQAAP//f0hXFQwAAAA="
          with_job:
            summary: Log chunk for a specific job
            description: |
              Example with job_id included. Demonstrates chunked upload pattern
              where chunk_no increments for each subsequent chunk.
            value:
              run_id: "2NQPoBfVkc8dFmGAQqJnUwMu9jR"
              job_id: "2NQPoBfVkc8dFmGAQqJnUwMu9jS"
              chunk_no: 5
              data: "H4sIAAAAAAAA/0vOz0lNzNFQKslIVSjPLMnQL1XQzUtMzlCyUgIEAAD//z3OX5QdAAAA="
          size_limit:
            summary: Maximum size boundary
            description: |
              The decoded gzipped data is capped at 10 MiB (10485760 bytes).
              The JSON body limit is 16 MiB to accommodate base64 encoding overhead (~33%).
              Server returns 413 if decoded data exceeds 10 MiB or body exceeds 16 MiB.
  responses:
    '201':
      description: Created — returns acknowledgement payload
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/NodeCreateLogResponse'
          examples:
            ack:
              value:
                id: 12345
                chunk_no: 5
    '400': { description: Bad Request }
    '404': { description: Node or run not found }
    '413': { description: Payload Too Large (body or decoded data) }
