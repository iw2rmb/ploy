get:
  tags: [Control]
  summary: List nodes
  description: |
    Returns all registered nodes with current resource snapshot and drained status.
  responses:
    '200':
      description: List of nodes
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../OpenAPI.yaml#/components/schemas/Node'
    '500':
      description: Internal server error
