# CLLM Production Configuration
# Optimized for production deployment with security and performance

server:
  host: "0.0.0.0"
  port: 8082
  read_timeout: "30s"
  write_timeout: "30s"
  shutdown_timeout: "15s"

sandbox:
  work_dir: "/var/lib/cllm/sandbox"
  max_memory: "1GB"
  max_cpu_time: "300s"
  max_processes: 20
  cleanup_timeout: "30s"

providers:
  default: "ollama"
  ollama:
    base_url: "http://ollama.cllm.svc.cluster.local:11434"
    model: "codellama:7b"
    timeout: "120s"
    max_context: 4096

logging:
  level: "info"
  format: "json"
  output: "stdout"

security:
  max_request_size: "50MB"
  rate_limit: "100/min"
  cors_origins: 
    - "https://ployman.app"
    - "https://*.ployman.app"
    - "https://dev.ployman.app"
    - "https://*.dev.ployman.app"