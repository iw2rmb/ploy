patch:
  tags: [Nodes]
  summary: Publish a node lifecycle status snapshot.
  parameters:
    - in: path
      name: node_id
      required: true
      schema:
        type: string
      description: Worker node identifier.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          description: Arbitrary lifecycle status snapshot produced by the worker (state, heartbeat, resources, components).
  responses:
    '204':
      description: Snapshot persisted.
    '400':
      description: Invalid request payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '502':
      description: Backend persistence failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '503':
      description: Required backing services (etcd) are unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
