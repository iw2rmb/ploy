get:
  tags: [Control]
  summary: Inspect a run
  description: |
    Return a detailed summary for one repository execution identified by its run ID.
    The response includes run metadata, repository identity, refs, execution status,
    timestamps, and optional wave-level run counts.
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
      # Run IDs are KSUID strings (27 characters, lexicographically sortable).
      description: Run ID (KSUID string)
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/controlplane.yaml#/RunSummary"
    "400":
      description: Bad request (missing or empty run id)
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yaml#/Error"
    "404":
      description: Run not found
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yaml#/Error"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yaml#/Error"
