post:
  tags: [Control]
  summary: Node marks a build gate job as completed or failed
  parameters:
    - in: path
      name: id
      required: true
      # Node IDs are NanoID strings (6 characters, URL-safe alphabet).
      schema: { type: string }
      description: Node ID (NanoID 6-character string)
    - in: path
      name: job_id
      required: true
      # Build gate job IDs remain UUID-backed.
      schema: { type: string, format: uuid }
      description: Build gate job ID (UUID)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../OpenAPI.yaml#/components/schemas/BuildGateJobCompleteRequest'
  responses:
    '204': { description: Updated }
    '400': { description: Invalid request }
    '500': { description: Server error }
