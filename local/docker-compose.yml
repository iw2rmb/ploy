services:
  db:
    build:
      context: ..
      dockerfile: docker/db/Dockerfile
    image: ploy-db:local
    platform: linux/amd64
    environment:
      - POSTGRES_DB=ploy
      - POSTGRES_USER=ploy
      - POSTGRES_PASSWORD=ploy
    ports:
      - "${PLOY_DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ploy -d ploy"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build:
      context: ..
      dockerfile: docker/server/Dockerfile
    image: ploy-server:local
    platform: linux/amd64
    depends_on:
      db:
        condition: service_healthy
      garage:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    restart: unless-stopped
    environment:
      - PLOY_POSTGRES_DSN=postgres://ploy:ploy@db:5432/ploy?sslmode=disable
      - PLOY_AUTH_SECRET=${PLOY_AUTH_SECRET:-changeme-insecure-local-secret}
      - PLOY_CLUSTER_ID=local
      - PLOY_OBJECTSTORE_ENDPOINT=http://garage:3900
      - PLOY_OBJECTSTORE_BUCKET=ploy
      - PLOY_OBJECTSTORE_ACCESS_KEY=ploylocal
      - PLOY_OBJECTSTORE_SECRET_KEY=ploy-unsafe-local
      - PLOY_OBJECTSTORE_SECURE=false
    volumes:
      - ./server/ployd.yaml:/etc/ploy/ployd.yaml:ro
    command: ["/usr/local/bin/ployd", "--config", "/etc/ploy/ployd.yaml"]
    ports:
      - "8080:8080"
      - "9100:9100"
    healthcheck:
      # Use /health endpoint (plain HTTP with bearer token auth)
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  node:
    build:
      context: ..
      dockerfile: docker/node/Dockerfile
    image: ploy-node:local
    platform: linux/amd64
    user: "0:0"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - PLOY_DOCKER_NETWORK=local_default
      - PLOYD_CACHE_HOME=/private/tmp
      - TMPDIR=/private/tmp
    volumes:
      - ./node/ployd-node.yaml:/etc/ploy/ployd-node.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /private/tmp:/private/tmp
    command:
      ["/usr/local/bin/ployd-node", "--config", "/etc/ploy/ployd-node.yaml"]

  gradle-build-cache:
    image: gradle/build-cache-node:21.2
    platform: linux/amd64
    volumes:
      - gradle-build-cache-data:/data
      - ./gradle-build-cache/config.yaml:/seed/config.yaml:ro
      - ./gradle-build-cache/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "5071:5071"

  garage:
    image: dxflrs/garage:v2.3.0
    entrypoint: ["/garage"]
    command: ["-c", "/etc/garage.toml", "server", "--single-node", "--default-bucket"]
    environment:
      - GARAGE_DEFAULT_ACCESS_KEY=ploylocal
      - GARAGE_DEFAULT_SECRET_KEY=ploy-unsafe-local
      - GARAGE_DEFAULT_BUCKET=ploy
    ports:
      - "3900:3900"
      - "3903:3903"
    volumes:
      - ./garage/config.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD-SHELL", "/garage -c /etc/garage.toml status >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  garage-init:
    image: dxflrs/garage:v2.3.0
    depends_on:
      garage:
        condition: service_healthy
    environment:
      - GARAGE_DEFAULT_ACCESS_KEY=ploylocal
      - GARAGE_DEFAULT_SECRET_KEY=ploy-unsafe-local
      - GARAGE_DEFAULT_BUCKET=ploy
    volumes:
      - ./garage/config.toml:/etc/garage.toml:ro
      - ./garage/setup.sh:/usr/local/bin/garage-setup.sh:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    entrypoint: ["/bin/sh", "/usr/local/bin/garage-setup.sh"]

volumes:
  gradle-build-cache-data:
  garage-meta:
  garage-data:
