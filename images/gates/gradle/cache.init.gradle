settingsEvaluated { settings ->
  def cacheUrl = System.getenv("PLOY_GRADLE_BUILD_CACHE_URL")
  if (cacheUrl == null || cacheUrl.trim().isEmpty()) return

  settings.buildCache {
    local { enabled = true }
    remote(HttpBuildCache) {
      // NOTE: In Groovy closures, `this` refers to the script object, not the delegate.
      // Assign to the delegate property directly.
      url = new URI(cacheUrl)
      push = (System.getenv("PLOY_GRADLE_BUILD_CACHE_PUSH") ?: "true").toBoolean()
      allowInsecureProtocol = true
    }
  }
}

// Provide a stable task used by SBOM Gradle jobs to materialize java classpath
// entries into /out without modifying repository files.
allprojects { p ->
  if (p != p.rootProject) {
    return
  }
  if (p.tasks.findByName("ployWriteJavaClasspath") != null) {
    return
  }
  p.tasks.create("ployWriteJavaClasspath") {
    doLast {
      def output = new File("/out/java.classpath")
      output.parentFile.mkdirs()
      def entries = new LinkedHashSet<String>()
      p.rootProject.allprojects.each { project ->
        ["compileClasspath", "runtimeClasspath"].each { cfgName ->
          def cfg = project.configurations.findByName(cfgName)
          if (cfg != null && cfg.canBeResolved) {
            cfg.resolve().each { file -> entries.add(file.absolutePath) }
          }
        }
      }
      output.text = entries.join(System.lineSeparator())
      if (!entries.isEmpty()) {
        output.append(System.lineSeparator())
      }
    }
  }
}

// Emit a stable marker when tasks are loaded from the build cache.
// This is used by E2E tests to verify that the remote build cache node is actually used.
def _ployCacheURL = System.getenv("PLOY_GRADLE_BUILD_CACHE_URL")
if (_ployCacheURL != null && !_ployCacheURL.trim().isEmpty()) {
  gradle.taskGraph.afterTask { task, state ->
    def msg = state.getSkipMessage()
    def outcomeStr = null
    try {
      outcomeStr = state.getOutcome()?.toString()
    } catch (Throwable ignored) {
      // Older Gradle versions may not expose getOutcome(); skip.
    }

    def hit = false
    if (msg != null && msg.toUpperCase().contains("FROM-CACHE")) hit = true
    if (outcomeStr != null && outcomeStr.toUpperCase().contains("FROM_CACHE")) hit = true

    if (hit) {
      // Best-effort: record cache hits into a tmp file so the gate executor can
      // surface them in structured metadata (even when Gradle runs with `-q`).
      try {
        def hitsFile = new File("/tmp/gradle-build-cache-hits")
        hitsFile << (task.path + "\n")
      } catch (Throwable ignored) {
        // Do not fail the build if workspace is not writable.
      }

      // Use stderr so markers are visible even under `gradle -q`.
      System.err.println("[ploy-gradle-cache] HIT " + task.path)
    }
  }
}

// Force Gradle test reports into the gate /out mount so nodeagent can upload
// them as gate artifacts without repository-level build script changes.
allprojects {
  tasks.withType(Test).configureEach {
    reports {
      junitXml.required = true
      junitXml.outputLocation = file("/out/gradle-test-results")
      html.required = true
      html.outputLocation = file("/out/gradle-test-report")
    }
  }
}
