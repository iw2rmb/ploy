patch:
  tags: [Control]
  summary: Unarchive mod
  description: |
    Unarchive a mod project.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/ModArchiveResponse'
    '400':
      description: Bad request (invalid mod id)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
