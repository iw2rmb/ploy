version: "2"
sql:
  - engine: "postgresql"
    schema: "SCHEMA.sql"
    queries: "internal/store/queries"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
