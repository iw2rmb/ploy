---
# OpenRewrite JVM Image Build and Deploy
#
# This playbook builds the OpenRewrite JVM-based image with Maven/Gradle and pushes it to the Docker Registry.
# The image runs OpenRewrite transformations with dynamic recipe loading and SeaweedFS caching.
#
# Prerequisites:
# - Docker Registry must be running (registry.dev.ployman.app)
# - Docker must be installed on the target host
# - SeaweedFS must be running for Maven repository caching
#
# Usage:
# ansible-playbook playbooks/openrewrite-jvm.yml -e target_host=$TARGET_HOST
#
- name: Build and Deploy OpenRewrite JVM Image
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
  
  vars:
    openrewrite_image_name: "openrewrite-jvm"
    openrewrite_image_tag: "latest"
    registry_endpoint: "registry.{{ ploy_domain | default('dev.ployman.app') }}"
    build_directory: "/tmp/openrewrite-build"
    
  tasks:
    - name: Ensure Docker is installed and running
      block:
        - name: Check if Docker is installed
          command: docker --version
          register: docker_check
          ignore_errors: true
          
        - name: Fail if Docker is not installed
          fail:
            msg: "Docker is not installed on the target host. Please install Docker first."
          when: docker_check.rc != 0
          
        - name: Ensure Docker service is running
          systemd:
            name: docker
            state: started
            enabled: true

    - name: Prepare build environment
      block:
        - name: Clean up any previous build directory
          file:
            path: "{{ build_directory }}"
            state: absent
            
        - name: Create build directory
          file:
            path: "{{ build_directory }}"
            state: directory
            mode: '0755'
            owner: root
            group: root

    - name: Copy OpenRewrite JVM Dockerfile and runner script
      block:
        - name: Copy Dockerfile from repository
          copy:
            src: "/home/ploy/ploy/services/openrewrite-jvm/Dockerfile"
            dest: "{{ build_directory }}/Dockerfile"
            mode: '0644'
            remote_src: true
            
        - name: Copy runner script from repository
          copy:
            src: "/home/ploy/ploy/services/openrewrite-jvm/runner.sh"
            dest: "{{ build_directory }}/runner.sh"
            mode: '0755'
            remote_src: true
            
        - name: Copy setup-workspace script from repository
          copy:
            src: "/home/ploy/ploy/services/openrewrite-jvm/setup-workspace.sh"
            dest: "{{ build_directory }}/setup-workspace.sh"
            mode: '0755'
            remote_src: true

        # generate-diff helper removed; runner now uses git diff directly
            
        - name: Display build files location
          debug:
            msg: |
              Using Dockerfile from: {{ build_directory }}/Dockerfile
              Using runner script from: {{ build_directory }}/runner.sh
              Using setup-workspace script from: {{ build_directory }}/setup-workspace.sh

    - name: Build OpenRewrite JVM image
      block:
        - name: Build Docker image with JVM and Maven/Gradle
          docker_image:
            name: "{{ registry_endpoint }}/{{ openrewrite_image_name }}"
            tag: "{{ openrewrite_image_tag }}"
            source: build
            build:
              path: "{{ build_directory }}"
              pull: true
              nocache: true
              args:
                ORW_BUILD_TS: "{{ ansible_date_time.iso8601 }}"
            state: present
          register: build_result
          
        - name: Display build result
          debug:
            msg: |
              Build completed:
              - Image: {{ registry_endpoint }}/{{ openrewrite_image_name }}:{{ openrewrite_image_tag }}
              - Build status: {{ 'SUCCESS' if build_result.changed else 'ALREADY EXISTS' }}

    - name: Test the built image locally
      block:
        - name: Create test script
          copy:
            content: |
              #!/bin/bash
              # Test if the OpenRewrite JVM image works
              
              # Create a simple test
              echo "Testing OpenRewrite JVM image..."
              
              # Try to run the image with no args (should show usage)
              docker run --rm {{ registry_endpoint }}/{{ openrewrite_image_name }}:{{ openrewrite_image_tag }} 2>&1 | head -10
              
              # Check exit code (should be 1 for missing args, not a crash)
              if [ $? -eq 0 ] || [ $? -eq 1 ]; then
                echo "✓ Image runs successfully"
                exit 0
              else
                echo "✗ Image failed to run"
                exit 1
              fi
            dest: "{{ build_directory }}/test.sh"
            mode: '0755'
            
        - name: Run image test
          command: "{{ build_directory }}/test.sh"
          register: test_result
          ignore_errors: true
          
        - name: Display test results
          debug:
            msg: "{{ test_result.stdout }}"
            
        - name: Fail if image test failed
          fail:
            msg: "OpenRewrite native image test failed. Please check the build."
          when: test_result.rc != 0

    - name: Push image to Docker Registry
      block:
        - name: Check if registry is accessible
          uri:
            url: "https://{{ registry_endpoint }}/v2/"
            method: GET
            status_code: [200, 401]
            validate_certs: false
          register: registry_check
          
        - name: Tag image for push (if not already tagged)
          command: >
            docker tag 
            {{ registry_endpoint }}/{{ openrewrite_image_name }}:{{ openrewrite_image_tag }}
            {{ registry_endpoint }}/{{ openrewrite_image_name }}:{{ openrewrite_image_tag }}
          ignore_errors: true
          
        - name: Push image to registry
          docker_image:
            name: "{{ registry_endpoint }}/{{ openrewrite_image_name }}"
            tag: "{{ openrewrite_image_tag }}"
            push: true
            source: local
          register: push_result
          
        - name: Display push result
          debug:
            msg: |
              Push completed:
              - Registry: {{ registry_endpoint }}
              - Image: {{ openrewrite_image_name }}:{{ openrewrite_image_tag }}
              - Status: {{ 'PUSHED' if push_result.changed else 'ALREADY UP TO DATE' }}

    - name: Verify image in registry
      block:
        - name: Check if image manifest exists in registry
          uri:
            url: "https://{{ registry_endpoint }}/v2/{{ openrewrite_image_name }}/manifests/{{ openrewrite_image_tag }}"
            method: GET
            headers:
              Accept: "application/vnd.docker.distribution.manifest.v2+json"
            status_code: 200
            validate_certs: false
          register: manifest_check
          
        - name: Display verification result
          debug:
            msg: |
              ✅ OpenRewrite Native Image Successfully Deployed:
              - Image: {{ registry_endpoint }}/{{ openrewrite_image_name }}:{{ openrewrite_image_tag }}
              - Manifest: Available in registry
              - Ready for use by ARF transformations

    - name: Prune old image tags in registry (keep latest + 2 previous)
      block:
        - name: Create prune script
          copy:
            dest: "/usr/local/bin/registry-prune.sh"
            mode: '0755'
            content: |
              {% raw %}
              #!/usr/bin/env bash
              set -euo pipefail
              REGISTRY="${1}"
              IMAGE="${2}"
              KEEP=3
              CURL="curl -kfsS"
              echo "Pruning tags for ${IMAGE} at ${REGISTRY} (keeping ${KEEP})"
              # List tags (ignore errors gracefully)
              tags_json=$($CURL https://${REGISTRY}/v2/${IMAGE}/tags/list || true)
              if [ -z "${tags_json}" ]; then
                echo "No tags list returned; skipping prune"
                exit 0
              fi
              # Extract tags safely
              mapfile -t tags < <(echo "${tags_json}" | jq -r '.tags[]?')
              if [ ${#tags[@]} -eq 0 ]; then
                echo "No tags found; nothing to prune"
                exit 0
              fi
              # Always keep 'latest' and two most recent others by version sort
              keep_tags=(latest)
              mapfile -t other_sorted < <(printf "%s\n" "${tags[@]}" | grep -v '^latest$' | sort -V || true)
              cnt=${#other_sorted[@]}
              if [ $cnt -ge 2 ]; then
                keep_tags+=("${other_sorted[$((cnt-2))]}" "${other_sorted[$((cnt-1))]}")
              elif [ $cnt -eq 1 ]; then
                keep_tags+=("${other_sorted[0]}")
              fi
              echo "Keeping: ${keep_tags[*]}"
              for tag in "${tags[@]}"; do
                # Skip kept tags
                for k in "${keep_tags[@]}"; do
                  if [ "$tag" = "$k" ]; then continue 2; fi
                done
                # Fetch manifest digest for tag
                digest=$($CURL -I -H 'Accept: application/vnd.docker.distribution.manifest.v2+json' https://${REGISTRY}/v2/${IMAGE}/manifests/${tag} | awk -F': ' '/Docker-Content-Digest/{print $2}' | tr -d '\r')
                if [ -n "$digest" ] && [[ "$digest" == sha256:* ]]; then
                  echo "Deleting ${IMAGE}:${tag} (digest ${digest})"
                  $CURL -X DELETE https://${REGISTRY}/v2/${IMAGE}/manifests/${digest} || true
                else
                  echo "Skip delete for ${IMAGE}:${tag}: missing digest"
                fi
              done
              echo "Prune complete"
              {% endraw %}
        - name: Run prune script for OpenRewrite image
          shell: "/usr/local/bin/registry-prune.sh {{ registry_endpoint }} {{ openrewrite_image_name }}"
          args:
            executable: /bin/bash

    - name: Clean up build directory
      file:
        path: "{{ build_directory }}"
        state: absent

    - name: Display final summary
      debug:
        msg: |
          ========================================
          OpenRewrite JVM Image Deployment Complete
          ========================================
          
          Image Details:
          - Name: {{ registry_endpoint }}/{{ openrewrite_image_name }}:{{ openrewrite_image_tag }}
          - Type: JVM-based with Maven/Gradle
          - Purpose: Java code transformation via OpenRewrite recipes with dynamic loading
          
          The image contains:
          - Eclipse Temurin JRE 17
          - Maven 3.9+ and Gradle 8.5
          - OpenRewrite runner script with SeaweedFS caching
          - Dynamic recipe loading from Maven Central
          
          Usage:
          The image will be automatically used by Ploy ARF when running
          OpenRewrite transformations through Nomad batch jobs.
          
          Next Steps:
          1. The image is now available for ARF transformations
          2. Run: ploy arf transform --recipe org.openrewrite.java.migrate.Java8toJava17
          3. Monitor jobs: nomad job status -namespace=default
