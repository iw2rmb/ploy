---
- name: Setup Testing Tools and Environment
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
  
  tasks:
    - name: Check for missing testing dependencies
      command: dpkg -l {{ item }}
      register: testing_deps_check
      failed_when: false
      changed_when: false
      loop:
        - httpie
        - jq
        - tmux
        - vim
        - htop
        - iotop
        - netstat-nat
        - tcpdump
        - strace
        - lsof
        - tree

    - name: Install missing testing dependencies
      apt:
        name: "{{ item.item }}"
        state: present
      when: item.rc != 0
      loop: "{{ testing_deps_check.results }}"

    - name: Setup Ploy testing environment
      block:
        - name: Check if Ploy binaries exist and are recent
          stat:
            path: "{{ item }}"
          register: ploy_binaries_check
          loop:
            - /home/ploy/ploy/bin/api
            - /home/ploy/ploy/ploy
            - /home/ploy/ploy/lane-pick

        - name: Build Ploy API
          shell: cd /home/ploy/ploy && /usr/local/go/bin/go build -o bin/api ./api
          become_user: ploy
          when: not ploy_binaries_check.results[0].stat.exists or (ansible_date_time.epoch|int - ploy_binaries_check.results[0].stat.mtime) > 3600

        - name: Build Ploy CLI
          shell: cd /home/ploy/ploy && /usr/local/go/bin/go build -o ploy ./cmd/ploy
          become_user: ploy
          when: not ploy_binaries_check.results[1].stat.exists or (ansible_date_time.epoch|int - ploy_binaries_check.results[1].stat.mtime) > 3600

        - name: Build lane picker
          shell: cd /home/ploy/ploy && /usr/local/go/bin/go build -o lane-pick ./tools/lane-pick
          become_user: ploy
          when: not ploy_binaries_check.results[2].stat.exists or (ansible_date_time.epoch|int - ploy_binaries_check.results[2].stat.mtime) > 3600

        - name: Create Ploy configuration
          template:
            src: ../../common/templates/ploy-storage-config.yaml.j2
            dest: /home/ploy/ploy/configs/storage-config.yaml
            owner: ploy
            group: ploy

        - name: Create test scripts directory
          file:
            path: /home/ploy/tests/scripts
            state: directory
            owner: ploy
            group: ploy

        - name: Create lane detection test script
          template:
            src: ../../common/templates/test-lane-detection.sh.j2
            dest: /home/ploy/tests/scripts/test-lane-detection.sh
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Create build pipeline test script
          template:
            src: ../../common/templates/test-build-pipeline.sh.j2
            dest: /home/ploy/tests/scripts/test-build-pipeline.sh
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Create API test script
          template:
            src: ../../common/templates/test-api.sh.j2
            dest: /home/ploy/tests/scripts/test-api.sh
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Create webhook test script
          template:
            src: ../../common/templates/test-webhooks.sh.j2
            dest: /home/ploy/tests/scripts/test-webhooks.sh
            owner: ploy
            group: ploy
            mode: '0755'

    - name: Setup test data
      block:
        - name: Create test apps directory
          file:
            path: /home/ploy/test-apps
            state: directory
            owner: ploy
            group: ploy

        - name: Check if test apps directory is populated
          find:
            paths: /home/ploy/test-apps
            file_type: any
          register: test_apps_content

        - name: Copy sample apps for testing
          copy:
            src: /home/ploy/ploy/apps/
            dest: /home/ploy/test-apps/
            remote_src: true
            owner: ploy
            group: ploy
          when: test_apps_content.matched == 0

    - name: Install HCL template validation tools
      block:
        - name: Check if hcl2json is already installed
          stat:
            path: /usr/local/bin/hcl2json
          register: hcl2json_binary

        - name: Download and install hcl2json
          block:
            - name: Check if hcl2json is already installed
              stat:
                path: /usr/local/bin/hcl2json
              register: hcl2json_binary

            - name: Download hcl2json
              get_url:
                url: "https://github.com/tmccombs/hcl2json/releases/latest/download/hcl2json_linux_amd64"
                dest: /usr/local/bin/hcl2json
                mode: '0755'
              when: not hcl2json_binary.stat.exists
          when: not hcl2json_binary.stat.exists

        - name: Create template validation script
          copy:
            content: |
              #!/bin/bash
              # HCL Template Validation Script
              # Usage: ./validate-template.sh <template-file>
              
              TEMPLATE_FILE="$1"
              
              if [ -z "$TEMPLATE_FILE" ]; then
                echo "Usage: $0 <template-file>"
                exit 1
              fi
              
              if [ ! -f "$TEMPLATE_FILE" ]; then
                echo "Error: Template file '$TEMPLATE_FILE' not found"
                exit 1
              fi
              
              echo "=== HCL Template Validation for: $TEMPLATE_FILE ==="
              
              # Test 1: Basic HCL syntax validation with hcl2json
              echo "1. Testing basic HCL syntax..."
              if hcl2json "$TEMPLATE_FILE" >/dev/null 2>&1; then
                echo "   ✓ HCL syntax validation passed"
              else
                echo "   ✗ HCL syntax validation failed:"
                hcl2json "$TEMPLATE_FILE" 2>&1 | sed 's/^/     /'
                exit 1
              fi
              
              # Test 2: Nomad job validation
              echo "2. Testing Nomad job validation..."
              if nomad job validate "$TEMPLATE_FILE" >/dev/null 2>&1; then
                echo "   ✓ Nomad job validation passed"
              else
                echo "   ✗ Nomad job validation failed:"
                nomad job validate "$TEMPLATE_FILE" 2>&1 | sed 's/^/     /'
                exit 1
              fi
              
              echo "=== All validations passed! ==="
            dest: /home/ploy/validate-template.sh
            owner: ploy
            group: ploy
            mode: '0755'

    - name: Install monitoring tools
      block:
        - name: Check if Node Exporter is already installed
          stat:
            path: /usr/local/bin/node_exporter
          register: node_exporter_binary

        - name: Get current Node Exporter version (if installed)
          command: /usr/local/bin/node_exporter --version
          register: current_node_exporter_version
          changed_when: false
          ignore_errors: true
          when: node_exporter_binary.stat.exists

        - name: Install Prometheus Node Exporter
          get_url:
            url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
            dest: /tmp/node_exporter.tar.gz
          when: not node_exporter_binary.stat.exists or node_exporter_version not in (current_node_exporter_version.stdout | default(''))

        - name: Extract Node Exporter
          unarchive:
            src: /tmp/node_exporter.tar.gz
            dest: /tmp
            remote_src: true
          when: not node_exporter_binary.stat.exists or node_exporter_version not in (current_node_exporter_version.stdout | default(''))

        - name: Install Node Exporter
          copy:
            src: /tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter
            dest: /usr/local/bin/node_exporter
            remote_src: true
            mode: '0755'
          when: not node_exporter_binary.stat.exists or node_exporter_version not in (current_node_exporter_version.stdout | default(''))

        - name: Create Node Exporter systemd service
          template:
            src: ../../common/templates/node-exporter.service.j2
            dest: /etc/systemd/system/node-exporter.service

        - name: Check Node Exporter service status
          command: systemctl is-active node-exporter
          register: node_exporter_service_status
          ignore_errors: true
          changed_when: false

        - name: Start and enable Node Exporter (if not running)
          systemd:
            name: node-exporter
            state: started
            enabled: true
            daemon_reload: true
          when: node_exporter_service_status.stdout != "active"

    - name: Create environment setup script
      template:
        src: ../../common/templates/setup-env.sh.j2
        dest: /home/ploy/setup-env.sh
        owner: ploy
        group: ploy
        mode: '0755'

  handlers:
    - name: restart docker
      block:
        - name: Stop Docker service gracefully
          systemd:
            name: docker
            state: stopped
          ignore_errors: true

        - name: Clean up Docker temporary files
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /var/lib/docker/tmp
            - /var/run/docker
          ignore_errors: true

        - name: Start Docker service with daemon reload
          systemd:
            name: docker
            state: started
            daemon_reload: true
          register: docker_restart_result
          retries: 3
          delay: 5
          until: docker_restart_result is succeeded

        - name: Verify Docker restart was successful
          command: docker info
          retries: 5
          delay: 3
          until: docker_info_verify.rc == 0
          register: docker_info_verify
          changed_when: false
