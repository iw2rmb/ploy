# Minimal spec for the failing Build Gate → router summary → Codex heal → re-gate → ORW apply scenario.
# Submit with:
#   dist/ploy mig run \
#     --repo-url https://gitlab.com/iw2rmb/ploy-orw-java11-maven.git \
#     --repo-base-ref e2e/fail-missing-symbol \
#     --repo-target-ref migs-upgrade-java17-heal \
#     --spec tests/e2e/migs/scenario-orw-fail/mig.yaml \
#     --follow

apiVersion: ploy.mig/v1alpha1
kind: MigRunSpec

steps:
  - image: localhost:5000/ploy/migs-orw-maven:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17
      MAVEN_PLUGIN_VERSION: "6.18.0"

build_gate:
  enabled: true

  # Router runs BEFORE healing. It reads /in/build-gate.log and outputs a single-line
  # JSON final message with {"bug_summary":"...","error_kind":"code"}.
  router:
    image: localhost:5000/ploy/migs-codex:latest
    env:
      CODEX_PROMPT: |-
        Rules:
        - Read /in/build-gate.log.
        - Do not edit /workspace.
        - Your final message MUST be EXACTLY one line of JSON (no markdown, no fences):
          {"bug_summary":"<<=200 chars, single line>","error_kind":"code"}
        - Do not output any other text in the final message.

        Task:
        Summarize the build failure in /in/build-gate.log.
    env_from_file:
      CODEX_AUTH_JSON: ~/.codex/auth.json

  healing:
    by_error_kind:
      code:
        retries: 1
        # Healing runs AFTER router. It edits /workspace, then outputs a single-line JSON
        # final message with {"action_summary":"..."} used to persist jobs.meta.action_summary.
        image: localhost:5000/ploy/migs-codex:latest
        env:
          CODEX_PROMPT: |-
            Rules:
            - Use /workspace and /in/build-gate.log to understand the compile error.
            - Edit files under /workspace as needed to fix the error.
            - When you believe the code is ready for a full build validation, stop editing and end the session.
            - Your final message MUST be EXACTLY one line of JSON (no markdown, no fences):
              {"action_summary":"<<=200 chars, single line>"}
            - Do not output any other text in the final message.

            Task:
            Fix the compilation error described in /in/build-gate.log.
        env_from_file:
          CODEX_AUTH_JSON: ~/.codex/auth.json

mr_on_fail: false
mr_on_success: true
