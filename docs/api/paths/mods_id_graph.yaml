get:
  tags: [Control]
  summary: Get Mods workflow graph
  description: |
    Return the job-level workflow graph for a Mods run identified by its `run_id`
    (KSUID string). The graph view is derived from `jobs` rows and uses `step_index`
    ordering to expose parent/child relationships between jobs.

    This endpoint is intended for debugging and visualization by control-plane operators.
    It is explicitly marked as non-stable and may change between releases; consumers
    must treat it as optional and avoid depending on it for core workflows.
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
      # Run IDs are KSUID strings (27 characters, lexicographically sortable).
      description: Run ID (KSUID string)
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/WorkflowGraph'
    '400':
      description: Bad request (missing or empty run id)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Run not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
