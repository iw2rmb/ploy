# apiVersion and kind are informational; the current control plane forwards this
# spec as an opaque JSON object. Keep keys stable and snake_case to align with
# existing CLI/agent options.
apiVersion: ploy.mig/v1alpha1
kind: MigRunSpec

################################################################################
# HOOK SOURCES (root-level)
################################################################################
# hooks declares external hook sources evaluated before gate stages.
# Authoring sources can be:
# - local file path (single hook manifest)
# - local directory path (recursive hook.yaml discovery)
# - remote http(s) URL
#
# CLI canonicalization:
# - local sources are compiled to short-hash entries and uploaded as spec bundles
# - bundle ids are written to bundle_map[shortHash]
# - remote http(s) URLs remain unchanged
#
# Example (authoring form):
# hooks:
#   - ./hooks/security-scan.yaml
#   - https://hooks.example.com/compliance/v1.yaml
#
# Rules:
# - Entries must be non-empty strings.
# - Duplicate entries are rejected.
# - Hooks execute in declaration order before each gate stage.
# - Server scheduling expects canonical wire entries (shortHash or http(s) URL).
hooks:
  - ./hooks/lint-check.yaml
  - https://hooks.example.com/sbom-policy/v1.yaml

################################################################################
# CANONICAL MODS SHAPE (steps[])
################################################################################
# Main container steps run against the hydrated repository at /workspace.
# Canonical shape is always `steps[]`:
# - single-step runs: one entry in `steps[]`
# - multi-step runs: multiple ordered entries in `steps[]`

# Required: image that performs the transformation (e.g., OpenRewrite).
#
# The `image` field accepts two forms:
#
# 1. **Universal image (string)** — A single image used for all stacks:
#    image: docker.io/your-dh-user/migs-openrewrite:latest
#
# 2. **Stack-specific images (map)** — Different images per Build Gate stack:
#    image:
#      default: docker.io/your-dh-user/migs-openrewrite:latest
#      java-maven: docker.io/your-dh-user/orw-cli-maven:latest
#      java-gradle: docker.io/your-dh-user/orw-cli-gradle:latest
#
# Stack Resolution Rules (for map form):
#   1. Exact match: If the detected stack matches a key (e.g., "java-maven"),
#      that image is selected.
#   2. Default fallback: If no exact match exists, the "default" key is used.
#   3. Error: If neither the stack key nor "default" is present, the run fails
#      with a clear error message.
#
# Recognized Stack Names (from Build Gate detection):
#   - "java-maven"  — Maven-based Java projects (pom.xml detected)
#   - "java-gradle" — Gradle-based Java projects (build.gradle detected)
#   - "java"        — Generic Java projects (no build tool detected)
#   - "unknown"     — No recognized stack markers found
#   - "default"     — Fallback key for unrecognized stacks
#
# The universal string form ignores stack detection and always uses the same image.
steps:
  - image: docker.io/your-dh-user/migs-openrewrite:latest
    # Optional: override command; when omitted, image CMD/ENTRYPOINT is used
    # command: ["/bin/sh", "-lc", "orw-cli --apply --dir /workspace --out /out"]
    # Environment variables passed into the mig container (key-value map).
    envs:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17
      # Optional ORW runtime controls:
      # ORW_REPOS: "https://repo1.maven.org/maven2,https://repo.internal/maven"
      # ORW_FAIL_ON_UNSUPPORTED: "true"
      # ORW_EXCLUDE_PATHS: "**/*.proto,build/generated/**"

################################################################################
# HYDRA FILE RECORDS — ca / in / out / home
################################################################################
# Hydra provides four typed file-record fields. Each field accepts local
# source paths in the spec; the CLI compiles them to canonical
# shortHash:dst form before submit.
#
# Field semantics:
#   ca   — CA certificate entries (local PEM paths or shortHash values).
#          Mounted read-only under /etc/ploy/ca/.
#   in   — Read-only input files: "src:/in/dst" → "shortHash:/in/dst".
#          Mounted at /in/<name> inside the container.
#   out  — Read-write output files: "src:/out/dst" → "shortHash:/out/dst".
#          Mounted at /out/<name>; uploaded after step completion.
#   home — Home-relative files: "src:dst{:ro}" → "shortHash:dst{:ro}".
#          Mounted relative to $HOME inside the container.
#
# Canonical stored-entry format after CLI compile:
#   in:   ["shortHash:/in/config.json"]
#   out:  ["shortHash:/out/result.txt"]
#   home: ["shortHash:.config/app.toml:ro"]
#   ca:   ["shortHash"]
#
# Example (before CLI compile — local paths):
#   ca:
#     - ./ca-bundle.pem
#   home:
#     - ./codex-auth.json:.codex/auth.json
#   out:
#     - ./seed.txt:/out/seed.txt
#   home:
#     - ./app.toml:.config/app.toml:ro

################################################################################
# MULTI-STEP MODS (optional, for sequential transformations)
################################################################################
# When you need multiple transformation steps executed sequentially, add
# multiple entries to steps[]. Each step runs with the same global
# build gate and healing policy. The diff from each step is captured before the
# next step begins, enabling per-step rehydration and multi-node execution.
#
# Rules:
# - Migs execute in array order (steps are sequential within one run).
# - All steps share the same repository, base_ref, target_ref, and global gate policy.
# - Each step produces a diff artifact before the next step starts.
# - If any step fails its gate check, the global healing policy applies.
# - Optional `always: true` on a step disables step-cache reuse for that step.
#
# Each entry in steps[] supports the same `image` field as the single-step spec:
# - String form: `image: ghcr.io/iw2rmb/ploy/mig:latest` (universal, any stack)
# - Map form: `image: {default: ..., java-maven: ..., java-gradle: ...}` (stack-aware)
#
# Example (disabled by default; remove comments to activate):
# steps:
#   - image: docker.io/your-dh-user/migs-migrate-java8:latest
#     envs:
#       MIGRATION_TARGET: java8
#     in:
#       - ./settings.xml:/in/settings.xml
#   - image: docker.io/your-dh-user/migs-migrate-java11:latest
#     envs:
#       MIGRATION_TARGET: java11
#   - image: docker.io/your-dh-user/migs-migrate-java17:latest
#     envs:
#       MIGRATION_TARGET: java17
#       RECIPE_VERSION: "3.20.0"
#     always: true
#
# Example with stack-specific images (for dedicated Maven/Gradle containers):
# steps:
#   - image:
#       default: docker.io/your-dh-user/migs-openrewrite:latest
#       java-maven: docker.io/your-dh-user/orw-cli-maven:latest
#       java-gradle: docker.io/your-dh-user/orw-cli-gradle:latest
#     envs:
#       RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17

################################################################################
# GLOBAL BUILD GATE AND HEALING POLICY
################################################################################
# Build Gate settings apply to all steps (both single-step and multi-step runs).
# The node agent reuses the same Java gate for Maven/Gradle (maven: -e; gradle:
# --stacktrace).
#
# Gate execution occurs after each mig transformation. For multi-step runs, the
# gate validates the accumulated changes from all prior steps.
build_gate:
  enabled: true
  images: [] # optional stack→image mapping overrides

# Healing configuration executed when the Build Gate fails (applies globally to
# all steps). For multi-step runs, the healing policy is shared across all
# steps. When a step's gate fails, healing runs once per the retry count, then
# the gate is re-evaluated before proceeding to the next step.
#
# Workspace Diff Handshake (recommended for Codex healing):
# - Codex edits the workspace and exits when done.
# - The node agent (not Codex) computes `git status --porcelain` on the workspace
#   and re-runs the Build Gate externally only when changes are present.
# - This separation keeps Codex focused on code fixes while the control plane
#   handles validation orchestration and build verification.
#
# Environment variables injected by the node agent for healing migs:
# - PLOY_REPO_URL: Git repository URL (same as the Migs run)
# - PLOY_BUILDGATE_REF: Git ref for Build Gate baseline (base_ref or commit_sha)
# - PLOY_HOST_WORKSPACE: Host path to workspace (for direct host verification)
# - PLOY_SERVER_URL: ploy server URL for Build Gate HTTP API

################################################################################
# HEALING CONFIGURATION (build_gate.heal)
################################################################################
# Healing runs directly when the Build Gate fails. A single `build_gate.heal`
# entry defines the healing action, retries, and mig-like execution settings.
# The system enters a direct
# heal → re-gate loop until the gate passes or retries are exhausted.
#
# Mig-like fields (image, command, envs, in, out, home, ca) are specified
# directly under `build_gate.heal` (no nested `mig` key).
#
# Two execution modes:
#
# 1. amata mode (recommended): set `amata.spec` — no prompt file required.
#
# build_gate:
#   heal:
#     <<: !include ./healing/spec.yaml
#     retries: 2
#     image: docker.io/your-dh-user/amata:latest
#     amata:
#       spec: |
#         version: amata/v1
#         name: code-healer
#         entry: main
#         workspace:
#           root: /workspace
#         flows:
#           main:
#             steps:
#               - codex: |
#                   Rules:
#                   - Use /workspace and /in/build-gate.log to understand the compile error.
#                   - Edit files under /workspace as needed to fix the error.
#                   - When ready, stop editing and end the session.
#                   - Your final message MUST be one line of JSON: {"action_summary":"..."}
#                   Task:
#                   Fix the compilation error described in /in/build-gate.log.
#       # set:    # optional; passed as ordered --set '<param>=<value>' flags to amata run
#       #   - param: model
#       #     value: gpt-4o
#     home:
#       - ~/.codex/auth.json:.codex/auth.json
#
# `!include` is optional preprocessing handled by CLI:
# - scalar replacement: `field: !include ./file.yaml#/pointer`
# - deep merge with overrides: `field: {<<: !include ./file.yaml#/pointer, ...}`
# - include references support `path[#/pointer]`, nested includes, and cycle detection
# - relative include paths resolve from each including file directory
# - relative local-source paths inside included fragments (`amata.spec`, `ca`, and
#   source side of `in`/`out`/`home`) resolve from that included file directory
# For expectations with `schema: gate_profile_v1`, the healing job should
# write `/out/gate-profile-candidate.json`. Promotion to repo `gate_profile` occurs
# only when the immediate follow-up `re_gate` succeeds.

# Optional GitLab integration (control plane/node redact PAT in logs).
gitlab_domain: gitlab.com # optional; defaults to gitlab.com when gitlab_pat is provided
# gitlab_pat: "<TOKEN>"           # optional; can be set via ploy config gitlab; avoid committing to VCS
mr_on_success: true
mr_on_fail: true
################################################################################
# NOTES
################################################################################
# - This YAML is submitted via: `ploy run --spec mig.yaml` along with
#   repository flags (e.g., --repo, --base-ref, --target-ref).
#
# - The agent honors: image, command, envs, ca, in, out, home,
#   steps[] (for single-step and multi-step runs), gitlab_domain, gitlab_pat, mr_on_success,
#   mr_on_fail, build_gate.* (enabled, images, heal).
#
# - Use envs for environment variables and ca/in/out/home for file injection.
#
# - Single-step vs multi-step:
#   * Single-step: Use `steps[]` with exactly one entry.
#   * Multi-step: Use `steps[]` with multiple entries for sequential transformations.
#   * Both formats share the same global build_gate policy.
#
# - Stack-aware image selection:
#   * The `image` field (in steps[] and in build_gate.heal)
#     accepts either a string (universal image) or a map (stack-specific images).
#   * When using the map form, the Build Gate detects the workspace stack
#     (java-maven, java-gradle, etc.) and resolves the image accordingly.
#   * Resolution order: exact stack match → "default" key → error.
#   * See the CANONICAL MODS SHAPE section above for full image resolution rules.
#
# - Multi-step semantics:
#   * Migs execute in array order (sequential steps within one run).
#   * All steps share the same repository and global gate/heal policy.
#   * Each step produces a diff artifact captured before the next step.
#   * Diffs enable rehydration: any step can be re-executed on any node by
#     applying the ordered chain of diffs from prior steps onto the base snapshot.
#
# - The node agent consumes build_gate.heal to run the heal → re-gate loop
#   after the first gate fail (applies to both single-step and multi-step runs).
# - Healing execution:
#   * When `amata` block is present (amata.spec non-empty): container runs
#     `amata run /in/amata.yaml` with optional ordered `--set '<param>=<value>'` flags.
#   * When `amata` block is absent: container uses its image default command/entrypoint.
# - Container cleanup model:
#   * Containers are retained after step/gate completion.
#   * Cleanup trigger: before claim; threshold: 1 GiB free on Docker data-root filesystem.
# - Healing produces action_summary, persisted in jobs.meta and written to
#   /in/healing-log.md per iteration.
