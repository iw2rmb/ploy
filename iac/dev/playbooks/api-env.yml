---
# Configure per-service environment file for Ploy API
# Safely writes /home/ploy/api.env and ensures it is sourced by ~/.bashrc

- name: Configure API environment file for Mods
  hosts: linux_hosts
  become: true
  vars:
    api_env_path: "/home/ploy/api.env"
    # Compute default Kaniko image; prefer internal mirror on Dev
    computed_kaniko_image: "{{ (lookup('env','PLOY_KANIKO_IMAGE') | default('', true)) | ternary(lookup('env','PLOY_KANIKO_IMAGE'), 'registry.dev.ployman.app/kaniko-executor:debug') }}"
  tasks:
    - name: Ensure Nomad job manager directory exists
      file:
        path: /opt/hashicorp/bin
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Install Nomad job manager wrapper
      copy:
        src: "{{ playbook_dir }}/../../common/scripts/nomad-job-manager.sh"
        dest: "/opt/hashicorp/bin/nomad-job-manager.sh"
        owner: root
        group: root
        mode: '0755'
    - name: Capture controller-side Git envs (workstation)
      no_log: true
      set_fact:
        controller_gitlab_url: "{{ lookup('env', 'GITLAB_URL') | default('', true) }}"
        controller_gitlab_token: "{{ lookup('env', 'GITLAB_TOKEN') | default('', true) }}"
        controller_git_author_name: "{{ lookup('env', 'GIT_AUTHOR_NAME') | default('', true) }}"
        controller_git_author_email: "{{ lookup('env', 'GIT_AUTHOR_EMAIL') | default('', true) }}"
        controller_git_committer_name: "{{ lookup('env', 'GIT_COMMITTER_NAME') | default('', true) }}"
        controller_git_committer_email: "{{ lookup('env', 'GIT_COMMITTER_EMAIL') | default('', true) }}"
        controller_mods_skip_deploy: "{{ lookup('env', 'MODS_SKIP_DEPLOY_LANES') | default('', true) }}"
    - name: Ensure ploy home exists
      file:
        path: "/home/ploy"
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'

    - name: Discover existing Git envs on VPS (do not log)
      no_log: true
      become_user: ploy
      shell: |
        set -a
        [ -r "$HOME/api.env" ] && . "$HOME/api.env" || true
        [ -r "$HOME/.bashrc" ] && . "$HOME/.bashrc" || true
        [ -r "$HOME/ploy/.bashrc" ] && . "$HOME/ploy/.bashrc" || true
        set +a
        if [ -z "${GITLAB_URL}" ] && [ -r /etc/environment ]; then
          eval $(grep -E '^GITLAB_URL=' /etc/environment | sed 's/^/export /') || true
        fi
        if [ -z "${GITLAB_TOKEN}" ] && [ -r /etc/environment ]; then
          eval $(grep -E '^GITLAB_TOKEN=' /etc/environment | sed 's/^/export /') || true
        fi
        if [ -z "${GITLAB_TOKEN}" ] && [ -r "$HOME/.gitlab_token" ]; then
          GITLAB_TOKEN=$(tr -d '\n' <"$HOME/.gitlab_token" 2>/dev/null)
        fi
        printf 'GITLAB_URL=%s\n' "${GITLAB_URL}"
        printf 'GITLAB_TOKEN=%s\n' "${GITLAB_TOKEN}"
        printf 'GIT_AUTHOR_NAME=%s\n' "${GIT_AUTHOR_NAME}"
        printf 'GIT_AUTHOR_EMAIL=%s\n' "${GIT_AUTHOR_EMAIL}"
        printf 'GIT_COMMITTER_NAME=%s\n' "${GIT_COMMITTER_NAME}"
        printf 'GIT_COMMITTER_EMAIL=%s\n' "${GIT_COMMITTER_EMAIL}"
      register: vps_env

    - name: Extract fallback envs (do not log)
      no_log: true
      set_fact:
        fallback_url: "{{ (vps_env.stdout | regex_search('^GITLAB_URL=(.*)$', '\\1', multiline=True)) | default(omit, true) }}"
        fallback_token: "{{ (vps_env.stdout | regex_search('^GITLAB_TOKEN=(.*)$', '\\1', multiline=True)) | default(omit, true) }}"
        fallback_mods_skip_deploy: "{{ (vps_env.stdout | regex_search('^MODS_SKIP_DEPLOY_LANES=(.*)$', '\\1', multiline=True)) | default('', true) }}"

    - name: Build api.env content from controller env (do not log)
      no_log: true
      set_fact:
        api_env_content: |
          # Managed by Ansible - API service environment
          # Prefer controller (workstation) env; fallback to discovered VPS env; finally default URL
          GITLAB_URL="{{ (controller_gitlab_url | length > 0) | ternary(controller_gitlab_url, (fallback_url | default('https://gitlab.com', true))) }}"
          # Always favor controller token if provided to ensure write access for pushes/MRs
          GITLAB_TOKEN="{{ (controller_gitlab_token | length > 0) | ternary(controller_gitlab_token, (fallback_token | default('', true))) }}"
          PLOY_CONTROLLER="{{ lookup('env', 'PLOY_CONTROLLER') }}"
          # Platform domain used by API and platform ingress
          PLOY_PLATFORM_DOMAIN="{{ lookup('env', 'PLOY_PLATFORM_DOMAIN') | default('dev.ployman.app', true) }}"
          # Nomad/Mods runtime defaults
          NOMAD_DC="{{ lookup('env', 'NOMAD_DC') }}"
          # SeaweedFS Filer URL base. If not provided from controller, default to node IP:8888 (resolvable by Docker tasks)
          PLOY_SEAWEEDFS_URL="{{ (lookup('env', 'PLOY_SEAWEEDFS_URL') | default('', true)) | ternary(lookup('env','PLOY_SEAWEEDFS_URL'), 'http://' + (hostvars[inventory_hostname]['ansible_host'] | default(inventory_hostname)) + ':8888') }}"
          # Lane G (WASM) distroless runner selection
          PLOY_WASM_DISTROLESS="{{ lookup('env', 'PLOY_WASM_DISTROLESS') | default('1', true) }}"
          PLOY_WASM_ENGINE="{{ lookup('env', 'PLOY_WASM_ENGINE') | default('wazero', true) }}"
          # OpenRewrite apply runner image (must exist in internal registry)
          # Preferred: set MODS_ORW_APPLY_IMAGE; runner substitutes ${ORW_IMAGE}
          MODS_ORW_APPLY_IMAGE="{{ lookup('env', 'MODS_ORW_APPLY_IMAGE') }}"
          # LangGraph runner images for planner/reducer/llm-exec
          MODS_PLANNER_IMAGE="{{ lookup('env', 'MODS_PLANNER_IMAGE') }}"
          MODS_REDUCER_IMAGE="{{ lookup('env', 'MODS_REDUCER_IMAGE') }}"
          MODS_LLM_EXEC_IMAGE="{{ lookup('env', 'MODS_LLM_EXEC_IMAGE') }}"
          # Optional defaults
          MODS_REGISTRY="{{ lookup('env', 'MODS_REGISTRY') }}"
          MODS_SKIP_DEPLOY_LANES="{{ controller_mods_skip_deploy if controller_mods_skip_deploy | length > 0 else fallback_mods_skip_deploy }}"
          # Lane E builder image (Kaniko). Mirrored into internal registry in Dev.
          PLOY_KANIKO_IMAGE="{{ computed_kaniko_image }}"
          # Optional OSv base image URL for Lane C builder (Dev only)
          # Example: https://example.com/osv/java8.qemu
          PLOY_OSV_BASE_URL="{{ lookup('env', 'PLOY_OSV_BASE_URL') }}"
          GIT_AUTHOR_NAME="{{ controller_git_author_name if controller_git_author_name | length > 0 else 'Ploy Bot' }}"
          GIT_AUTHOR_EMAIL="{{ controller_git_author_email if controller_git_author_email | length > 0 else 'ploy-bot@dev.ployman.app' }}"
          GIT_COMMITTER_NAME="{{ controller_git_committer_name if controller_git_committer_name | length > 0 else (controller_git_author_name if controller_git_author_name | length > 0 else 'Ploy Bot') }}"
          GIT_COMMITTER_EMAIL="{{ controller_git_committer_email if controller_git_committer_email | length > 0 else (controller_git_author_email if controller_git_author_email | length > 0 else 'ploy-bot@dev.ployman.app') }}"

    - name: Ensure PLOY_KANIKO_IMAGE present in /home/ploy/api.env (idempotent)
      lineinfile:
        path: "/home/ploy/api.env"
        create: true
        mode: '0600'
        regexp: '^PLOY_KANIKO_IMAGE='
        line: "PLOY_KANIKO_IMAGE={{ computed_kaniko_image }}"
        owner: ploy
        group: ploy

    - name: Fail fast if controller token was expected but missing
      when: controller_gitlab_token | length == 0
      debug:
        msg: "Controller-side GITLAB_TOKEN is empty; playbook will preserve any VPS fallback or leave token blank. To populate from workstation, export GITLAB_TOKEN before running."

    - name: Write /home/ploy/api.env with restricted permissions (do not log)
      no_log: true
      copy:
        content: "{{ api_env_content }}\n"
        dest: "{{ api_env_path }}"
        owner: ploy
        group: ploy
        mode: '0600'

    - name: Ensure ~/.bashrc sources api.env if present (idempotent)
      lineinfile:
        path: "/home/ploy/.bashrc"
        owner: ploy
        group: ploy
        mode: '0644'
        create: true
        line: "[ -r \"$HOME/api.env\" ] && set -a && . \"$HOME/api.env\" && set +a"
        insertafter: EOF

    - name: Verify token presence without printing value (best-effort)
      become_user: ploy
      shell: |
        set -a
        [ -r "$HOME/api.env" ] && . "$HOME/api.env"
        set +a
        if [ -n "$GITLAB_TOKEN" ]; then echo PRESENT; else echo MISSING; fi
      register: token_check
      changed_when: false

    - name: Report token presence
      debug:
        msg: "GITLAB_TOKEN in api.env: {{ token_check.stdout }}"
