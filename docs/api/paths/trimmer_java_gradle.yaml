post:
  tags: [Utility]
  summary: Trim Java Gradle logs
  description: |
    Stateless utility endpoint that accepts raw Gradle log text and returns a
    bounded compact message plus structured Java Gradle evidence when detected.
    The compact message is omitted when compiler evidence is complete. The server
    does not persist request or response bodies.
  security: []
  parameters:
    - in: query
      name: format
      required: false
      schema:
        type: string
        enum: [json, yaml]
      description: Response format override. When omitted, `Accept` is used and JSON is the default.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/trimmer.yaml#/GradleTrimmerRequest"
      text/plain:
        schema:
          type: string
  responses:
    "200":
      description: Trimmed Gradle log result.
      headers:
        Content-Disposition:
          schema:
            type: string
          description: "attachment; filename=gradle-trimmed.json or attachment; filename=gradle-trimmed.yaml."
      content:
        application/json:
          schema:
            $ref: "../components/schemas/trimmer.yaml#/GradleTrimmerResult"
        application/x-yaml:
          schema:
            $ref: "../components/schemas/trimmer.yaml#/GradleTrimmerResult"
    "400":
      description: Invalid JSON, unknown JSON field, empty log, unsupported content type, or unsupported format.
      content:
        text/plain:
          schema:
            type: string
    "413":
      description: Request body or decoded log exceeds the configured size cap.
      content:
        text/plain:
          schema:
            type: string
