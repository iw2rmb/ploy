# Minimal workflow schema (example instance)
version: v1alpha1
id: my-workflow
target_repo: org/project
target_branch: refs/heads/main
base_ref: refs/heads/main
lane: C                 # optional global override (else auto-detect)
build_timeout: 10m      # global build timeout
self_heal:
  max_retries: 2        # retries for ORW-based healing on build failure

budgets:
  run_max_tokens: 0      # 0 means unlimited
  run_max_cost: 0        # 0 means unlimited
  run_timeout: 0s        # 0s means unlimited

artifacts:
  type: mr               # full-archive | diff | mr
  target_repo: org/project
  storage:
    diffs: seaweedfs
    process_state: consul_kv

mr:
  forge: gitlab
  repo_url_env: GITLAB_URL
  token_env: GITLAB_TOKEN
  labels: ["ploy", "tfl"]

branch_naming:
  workflow_branch: "workflow/${id}/${timestamp}"
  exec_branch: "exec/${id}/${seq}"

job_defaults:
  retries: 3
  timeout: 30m

network:
  default_policy: deny
  allow_llm: true
  allow_mcp_endpoints: true
  additional_allowed_urls: []

gates:
  enabled: [static_analysis, vuln_scan, compile]
  disabled: [deploy, tests]

error_policy:
  on_failure:
    max_retries: 2
    fallback: human-step   # halt | human-step

merge:
  strategy: merge
  auto_format: true
  recheck_gates_post_merge: true

steps:
  - type: recipe
    id: openrewrite-updates
    engine: openrewrite
    recipes:
      - com.acme.FixNulls
      - com.acme.UpdateApi

  - type: llm-plan
    id: plan-remediations
    parallel: true
    max_parallel_execs: 10
    mcp_tools:
      - name: file-system
        endpoint: mcp://fs
      - name: search
        endpoint: mcp://rg
    context:
      - "src/**/*.java"
      - "https://docs.example.com/api/v2"
    budgets:
      max_tokens: 0
      max_cost: 0
      timeout: 0s

  # Example explicit exec; in practice llm-plan emits exec steps
  - type: llm-exec
    id: apply-fix-1
    model: my-model@v1        # Resolved via ployman model registry (CRUD)
    prompts:
      - "Refactor null checks to Optional"
    mcp_tools:
      - name: file-system
        endpoint: mcp://fs
    context:
      - "src/**/*.java"
    budgets:
      max_tokens: 0
      max_cost: 0
      timeout: 0s

  - type: human-step
    reason: "Resolve merge conflicts if any"
