## Default Build Gate image mapping (Stack Gate mode).
##
## Install this file on worker nodes at:
##   /etc/ploy/gates/build-gate-images.yaml
##
## Rules:
## - language and release are required.
## - tool is optional (empty matches any tool), but tool-specific rules
##   are preferred by the resolver.
BuildGateImages:
  # Java (Maven)
  - image: maven:3-eclipse-temurin-11
    language: java
    tool: maven
    release: "11"
  - image: maven:3-eclipse-temurin-17
    language: java
    tool: maven
    release: "17"

  # Java (Gradle)
  - image: ploy-gate-gradle:jdk11
    language: java
    tool: gradle
    release: "11"
  - image: ploy-gate-gradle:jdk17
    language: java
    tool: gradle
    release: "17"

  # Go (tool-agnostic)
  - image: golang:1.22
    language: go
    release: "1.22"

  # Rust (tool-agnostic)
  - image: rust:1.76
    language: rust
    release: "1.76"
