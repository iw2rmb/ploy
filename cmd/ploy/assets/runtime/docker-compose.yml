services:
  server:
    image: ${PLOY_RUNTIME_SERVER_IMAGE:?set PLOY_RUNTIME_SERVER_IMAGE or run ploy cluster deploy}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      - PLOY_DB_DSN=${PLOY_DB_DSN:?set PLOY_DB_DSN to a container-reachable postgres DSN}
      - PLOY_AUTH_SECRET=${PLOY_AUTH_SECRET:-changeme-insecure-local-secret}
      - PLOY_CLUSTER_ID=${CLUSTER_ID:-local}
      - PLOY_OBJECTSTORE_ENDPOINT=${PLOY_OBJECTSTORE_ENDPOINT:?set PLOY_OBJECTSTORE_ENDPOINT}
      - PLOY_OBJECTSTORE_BUCKET=${PLOY_OBJECTSTORE_BUCKET:-${CLUSTER_ID:-local}}
      - PLOY_OBJECTSTORE_ACCESS_KEY=${PLOY_OBJECTSTORE_ACCESS_KEY:?set PLOY_OBJECTSTORE_ACCESS_KEY}
      - PLOY_OBJECTSTORE_SECRET_KEY=${PLOY_OBJECTSTORE_SECRET_KEY:?set PLOY_OBJECTSTORE_SECRET_KEY}
      - PLOY_OBJECTSTORE_SECURE=${PLOY_OBJECTSTORE_SECURE:-false}
      - PLOY_OBJECTSTORE_REGION=${PLOY_OBJECTSTORE_REGION:-ploy}
      - PLOY_CONTAINER_REGISTRY=${PLOY_CONTAINER_REGISTRY:-ghcr.io/iw2rmb/ploy}
      - PLOYD_HTTP_LISTEN=${PLOYD_HTTP_LISTEN:-:8080}
      - PLOYD_METRICS_LISTEN=${PLOYD_METRICS_LISTEN:-:9100}
      - AWS_REQUEST_CHECKSUM_CALCULATION=when_required
      - AWS_RESPONSE_CHECKSUM_VALIDATION=when_required
    volumes:
      - ${PLOY_DEPLOY_CA_BUNDLE:-/dev/null}:/etc/ploy/certs/ca.crt:ro
    ports:
      - "${PLOY_SERVER_PORT:-8080}:8080"
      - "9100:9100"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8080/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  node:
    image: ${PLOY_RUNTIME_NODE_IMAGE:?set PLOY_RUNTIME_NODE_IMAGE or run ploy cluster deploy}
    user: "0:0"
    security_opt:
      - label=disable
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - PLOY_CONTAINER_REGISTRY=${PLOY_CONTAINER_REGISTRY:-ghcr.io/iw2rmb/ploy}
      - PLOY_DOCKER_NETWORK=ploy_default
      - PLOY_DOCKER_AUTH_CONFIG=${PLOY_DOCKER_AUTH_CONFIG:-}
      - DOCKER_AUTH_CONFIG=${DOCKER_AUTH_CONFIG:-}
      - PLOYD_CACHE_HOME=/private/tmp
      - PLOY_BUILDGATE_CACHE_ROOT=/private/tmp/ploy/gates
      - TMPDIR=/private/tmp
    volumes:
      - ./node/ployd-node.yaml:/etc/ploy/ployd-node.yaml:ro
      - ${WORKER_TOKEN_PATH:?set WORKER_TOKEN_PATH (ploy cluster deploy sets ~/.config/ploy/<cluster>/bearer-token)}:/etc/ploy/bearer-token:ro
      - ${PLOY_DEPLOY_CA_BUNDLE:-/dev/null}:/etc/ploy/certs/ca.crt:ro
      - ${PLOY_CONTAINER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - /var/lib/docker:/var/lib/docker:ro
      - /private/tmp:/private/tmp
    command: ["--config", "/etc/ploy/ployd-node.yaml"]

  gradle-build-cache:
    image: gradle/build-cache-node:21.2
    volumes:
      - gradle-build-cache-data:/data
      - ./gradle-build-cache/config.yaml:/seed/config.yaml:ro
      - ./gradle-build-cache/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "5071:5071"

volumes:
  gradle-build-cache-data:
