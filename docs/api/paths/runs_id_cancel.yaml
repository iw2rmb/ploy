post:
  tags: [Control]
  summary: Cancel a batch run
  description: |
    Cancel a batch run identified by its run ID. Transitions the run status to
    `Cancelled` and marks all `Queued`/`Running` `run_repos` as `Cancelled`, and
    cancels/removes `Created`/`Queued`/`Running` jobs from the queue. The operation
    is idempotent: if the run is already in a terminal state (`Finished` or `Cancelled`), the handler
    returns the current summary with `200 OK`.

  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
      # Run IDs are KSUID strings (27 characters, lexicographically sortable).
      description: Run ID (KSUID string)
  responses:
    '200':
      description: OK; run is now in a terminal state
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/RunSummary'
    '400':
      description: Bad request (missing or empty run id)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Run not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
