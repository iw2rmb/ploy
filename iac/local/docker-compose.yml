version: '3.8'

services:
  # Service Discovery
  consul:
    image: hashicorp/consul:1.16.1
    container_name: ploy-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    environment:
      - CONSUL_BIND_INTERFACE=eth0
      - CONSUL_CLIENT_INTERFACE=eth0
    command: >
      consul agent
      -dev
      -server
      -ui
      -client=0.0.0.0
      -bootstrap-expect=1
      -data-dir=/consul/data
      -config-dir=/consul/config
    volumes:
      - consul_data:/consul/data
      - ./config/consul.hcl:/consul/config/consul.hcl:ro
    networks:
      - ploy-network
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Container Orchestration
  nomad:
    image: hashicorp/nomad:1.6.2
    container_name: ploy-nomad
    ports:
      - "4646:4646"
    environment:
      - NOMAD_ADDR=http://0.0.0.0:4646
    command: >
      nomad agent
      -dev
      -bind=0.0.0.0
      -config=/nomad/config
    volumes:
      - nomad_data:/nomad/data
      - ./config/nomad.hcl:/nomad/config/nomad.hcl:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ploy-network
    depends_on:
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nomad", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Distributed Storage - Master
  seaweedfs-master:
    image: chrislusf/seaweedfs:3.55
    container_name: ploy-seaweedfs-master
    ports:
      - "9333:9333"
      - "19333:19333"
    command: >
      weed master
      -ip=seaweedfs-master
      -port=9333
      -mdir=/data
      -defaultReplication=000
    volumes:
      - seaweedfs_master_data:/data
    networks:
      - ploy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9333/dir/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Distributed Storage - Volume Server
  seaweedfs-volume:
    image: chrislusf/seaweedfs:3.55
    container_name: ploy-seaweedfs-volume
    ports:
      - "8080:8080"
      - "18080:18080"
    command: >
      weed volume
      -mserver=seaweedfs-master:9333
      -port=8080
      -ip=seaweedfs-volume
      -dir=/data
      -max=100
    volumes:
      - seaweedfs_volume_data:/data
    networks:
      - ploy-network
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Distributed Storage - Filer
  seaweedfs-filer:
    image: chrislusf/seaweedfs:3.55
    container_name: ploy-seaweedfs-filer
    ports:
      - "8888:8888"
      - "18888:18888"
    command: >
      weed filer
      -master=seaweedfs-master:9333
      -port=8888
      -ip=seaweedfs-filer
      -dir=/data
    volumes:
      - seaweedfs_filer_data:/data
    networks:
      - ploy-network
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8888/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Database
  postgres:
    image: postgres:15.4
    container_name: ploy-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ploy_test
      - POSTGRES_USER=ploy
      - POSTGRES_PASSWORD=ploy-test
      - POSTGRES_INITDB_ARGS=--auth-local=trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - ploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ploy -d ploy_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Caching
  redis:
    image: redis:7.2.1-alpine
    container_name: ploy-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - ploy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Load Balancer / Reverse Proxy
  traefik:
    image: traefik:v3.0.4
    container_name: ploy-traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.consul.endpoints=consul:8500
      - --providers.consul.rootkey=traefik
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=test@example.com
      - --certificatesresolvers.letsencrypt.acme.storage=/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    volumes:
      - traefik_data:/data
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - ploy-network
    depends_on:
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  consul_data:
    driver: local
  nomad_data:
    driver: local
  seaweedfs_master_data:
    driver: local
  seaweedfs_volume_data:
    driver: local
  seaweedfs_filer_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  traefik_data:
    driver: local

networks:
  ploy-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1