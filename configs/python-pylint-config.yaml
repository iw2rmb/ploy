# Python Static Analysis Configuration
# Primary analyzer: Pylint
# Additional tools: mypy, black, isort, flake8, bandit

python:
  # Pylint configuration for comprehensive Python code analysis
  pylint:
    enabled: true
    pylint_path: "pylint"
    output_format: "json"
    min_score: 7.0
    max_line_length: 120
    jobs: 4  # Parallel execution threads
    
    # Pylint RC file (if project-specific configuration exists)
    rcfile: ".pylintrc"
    
    # Rules to disable (common false positives or style preferences)
    disable_rules:
      - "C0111"  # missing-docstring (can be too strict)
      - "C0103"  # invalid-name (for short variable names like 'x', 'y')
      - "R0903"  # too-few-public-methods
      - "R0913"  # too-many-arguments (sometimes necessary)
      - "W0511"  # fixme (TODO comments)
      - "C0301"  # line-too-long (if using black formatter)
    
    # Rules to explicitly enable
    enable_rules:
      - "C0200"  # consider-using-enumerate
      - "C0201"  # consider-iterating-dictionary
      - "W0102"  # dangerous-default-value
      - "W0104"  # pointless-statement
      - "W0105"  # pointless-string-statement
      - "W0106"  # expression-not-assigned
    
    # Severity mapping for issue classification
    severity_mapping:
      fatal: "critical"
      error: "high"
      warning: "medium"
      convention: "low"
      refactor: "low"
      info: "info"
    
    # ARF recipe mappings for automatic remediation
    arf_recipes:
      unused-import:
        - "org.openrewrite.python.cleanup.RemoveUnusedImports"
        - "com.ploy.python.cleanup.OrganizeImports"
      unused-variable:
        - "org.openrewrite.python.cleanup.RemoveUnusedVariables"
      missing-docstring:
        - "com.ploy.python.style.AddMissingDocstrings"
      trailing-whitespace:
        - "org.openrewrite.python.format.RemoveTrailingWhitespace"
      wrong-import-order:
        - "org.openrewrite.python.cleanup.OrganizeImports"
      duplicate-code:
        - "com.ploy.python.refactor.ExtractDuplicateCode"
      line-too-long:
        - "org.openrewrite.python.format.BreakLongLines"
    
    # Project-specific settings
    project_detection:
      detect_virtualenv: true
      detect_conda: true
      detect_poetry: true
      detect_pipenv: true
    
    # Additional Pylint plugins
    plugins:
      - "pylint_django"  # For Django projects
      - "pylint_flask"   # For Flask projects
  
  # MyPy configuration for static type checking
  mypy:
    enabled: false  # Can be enabled separately
    config_file: "mypy.ini"
    strict_mode: false
    ignore_missing_imports: true
    check_untyped_defs: true
    warn_return_any: true
    warn_unused_configs: true
  
  # Black configuration for code formatting validation
  black:
    enabled: false  # Can be used for format checking
    line_length: 88
    target_versions:
      - "py38"
      - "py39"
      - "py310"
      - "py311"
    check_only: true  # Don't modify, just check
  
  # isort configuration for import organization
  isort:
    enabled: false  # Can be used for import checking
    profile: "black"
    multi_line_output: 3
    include_trailing_comma: true
    force_grid_wrap: 0
    use_parentheses: true
    line_length: 88
  
  # Bandit configuration for security scanning
  bandit:
    enabled: false  # Can be enabled for security focus
    severity: "medium"
    confidence: "medium"
    skip_tests:
      - "B101"  # assert_used
      - "B601"  # shell_injection (if using subprocess safely)
    exclude_dirs:
      - "/test/"
      - "/tests/"
      - "/*_test.py"
  
  # Flake8 configuration for additional style checking
  flake8:
    enabled: false  # Alternative/supplement to Pylint
    max_line_length: 120
    max_complexity: 10
    ignore_errors:
      - "E203"  # whitespace before ':'
      - "E501"  # line too long (if using black)
      - "W503"  # line break before binary operator
    exclude_patterns:
      - "*.pyc"
      - "__pycache__"
      - ".git"
      - ".venv"
      - "venv"
      - "build"
      - "dist"

# Quality gates and thresholds
quality_gates:
  python:
    min_score: 7.0  # Minimum Pylint score
    max_critical_issues: 0
    max_high_issues: 5
    max_medium_issues: 20
    max_cyclomatic_complexity: 10
    max_duplicate_lines: 50
    fail_on_security_issues: true

# Caching configuration for performance
cache:
  enabled: true
  ttl: "24h"
  max_size: "100MB"
  invalidation_strategy: "content_hash"

# Integration with ARF
arf_integration:
  enabled: true
  auto_fix_confidence_threshold: 0.8
  require_human_approval: true
  sandbox_testing: true
  max_fixes_per_run: 10

# Performance optimization
performance:
  parallel_execution: true
  max_workers: 4
  timeout_per_file: "30s"
  skip_large_files: true
  max_file_size: "1MB"