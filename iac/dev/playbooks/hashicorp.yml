---
- name: Setup HashiCorp Stack (Nomad, Consul, Vault)
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
  
  tasks:
    - name: Ensure hashicorp group exists (for compatibility)
      group:
        name: hashicorp
        state: present

    - name: Create hashicorp user (alias to ploy for compatibility)
      user:
        name: ploy
        system: false
        shell: /bin/bash
        home: /home/ploy
        comment: "Ploy service user (also used for HashiCorp stack)"

    - name: Create HashiCorp directories
      file:
        path: "{{ item }}"
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'
      loop:
        - /opt/hashicorp
        - /opt/hashicorp/bin
        - /opt/hashicorp/nomad
        - /opt/hashicorp/consul
        - /opt/hashicorp/vault
        - /etc/nomad.d
        - /etc/consul.d
        - /etc/vault.d

    - name: Create Mods host volume directories for Nomad
      file:
        path: "{{ item }}"
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'
      loop:
        - /opt/ploy/mods
        - /opt/ploy/mods/context
        - /opt/ploy/mods/out

    - name: Download and install Nomad
      block:
        - name: Check if Nomad is already installed
          stat:
            path: /usr/local/bin/nomad
          register: nomad_binary

        - name: Get current Nomad version (if installed)
          command: /usr/local/bin/nomad version
          register: current_nomad_version
          changed_when: false
          ignore_errors: true
          when: nomad_binary.stat.exists

        - name: Download Nomad
          get_url:
            url: "https://releases.hashicorp.com/nomad/{{ nomad_version }}/nomad_{{ nomad_version }}_linux_amd64.zip"
            dest: /tmp/nomad.zip
            timeout: 300
          when: not nomad_binary.stat.exists or nomad_version not in (current_nomad_version.stdout | default(''))

        - name: Extract Nomad
          unarchive:
            src: /tmp/nomad.zip
            dest: /opt/hashicorp/bin
            remote_src: true
            owner: ploy
            group: ploy
            mode: '0755'
          when: not nomad_binary.stat.exists or nomad_version not in (current_nomad_version.stdout | default(''))

        - name: Create Nomad symlink
          file:
            src: /opt/hashicorp/bin/nomad
            dest: /usr/local/bin/nomad
            state: link

        - name: Verify Nomad installation
          command: /usr/local/bin/nomad version
          register: nomad_install_version
          changed_when: false

        - name: Display Nomad version
          debug:
            msg: "Nomad installed successfully: {{ nomad_install_version.stdout_lines[0] if nomad_install_version.stdout_lines else 'Version info not available' }}"

    - name: Download and install Consul
      block:
        - name: Check if Consul is already installed
          stat:
            path: /usr/local/bin/consul
          register: consul_binary

        - name: Get current Consul version (if installed)
          command: /usr/local/bin/consul version
          register: current_consul_version
          changed_when: false
          ignore_errors: true
          when: consul_binary.stat.exists

        - name: Download Consul
          get_url:
            url: "https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_linux_amd64.zip"
            dest: /tmp/consul.zip
          when: not consul_binary.stat.exists or consul_version not in (current_consul_version.stdout | default(''))

        - name: Extract Consul
          unarchive:
            src: /tmp/consul.zip
            dest: /opt/hashicorp/bin
            remote_src: true
            owner: ploy
            group: ploy
          when: not consul_binary.stat.exists or consul_version not in (current_consul_version.stdout | default(''))

        - name: Create Consul symlink
          file:
            src: /opt/hashicorp/bin/consul
            dest: /usr/local/bin/consul
            state: link

    - name: Download and install Vault
      block:
        - name: Check if Vault is already installed
          stat:
            path: /usr/local/bin/vault
          register: vault_binary

        - name: Get current Vault version (if installed)
          command: /usr/local/bin/vault version
          register: current_vault_version
          changed_when: false
          ignore_errors: true
          when: vault_binary.stat.exists

        - name: Download Vault
          get_url:
            url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_amd64.zip"
            dest: /tmp/vault.zip
          when: not vault_binary.stat.exists or vault_version not in (current_vault_version.stdout | default(''))

        - name: Extract Vault
          unarchive:
            src: /tmp/vault.zip
            dest: /opt/hashicorp/bin
            remote_src: true
            owner: ploy
            group: ploy
          when: not vault_binary.stat.exists or vault_version not in (current_vault_version.stdout | default(''))

        - name: Create Vault symlink
          file:
            src: /opt/hashicorp/bin/vault
            dest: /usr/local/bin/vault
            state: link

    - name: Create Consul configuration
      template:
        src: ../../common/templates/consul-server.hcl.j2
        dest: /etc/consul.d/consul.hcl
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Create Nomad server configuration
      template:
        src: ../../common/templates/nomad-server.hcl.j2
        dest: /etc/nomad.d/nomad.hcl
        owner: ploy
        group: ploy
        mode: '0644'
      register: nomad_config

    - name: Create Nomad limits configuration (30-limits.hcl)
      copy:
        dest: /etc/nomad.d/30-limits.hcl
        owner: ploy
        group: ploy
        mode: '0644'
        content: |
          limits {
            http_max_conns            = 10000
            http_max_conns_per_client = 1000
            rpc_max_conns             = 10000
            rpc_max_conns_per_client  = 1000
            https_handshake_timeout   = "10s"
            rpc_handshake_timeout     = "10s"
          }
      register: nomad_limits_config

    - name: Ensure Nomad client meta for Traefik placement
      copy:
        dest: /etc/nomad.d/20-client-meta.hcl
        owner: ploy
        group: ploy
        mode: '0644'
        content: |
          client {
            meta {
              {{ ploy_gateway_node_meta_key | default('role') }} = "{{ ploy_gateway_node_class | default('gateway') }}"
            }
          }
      register: nomad_meta_config

    - name: Create Vault configuration
      template:
        src: ../../common/templates/vault.hcl.j2
        dest: /etc/vault.d/vault.hcl
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Create systemd service files
      template:
        src: "../../common/templates/{{ item }}.service.j2"
        dest: "/etc/systemd/system/{{ item }}.service"
      loop:
        - consul
        - nomad
        - vault

    - name: Restart Nomad service to apply limits
      systemd:
        name: nomad
        state: restarted
        enabled: true
        daemon_reload: true
      when: nomad_config.changed or nomad_limits_config.changed

    - name: Wait for Nomad API after restart
      wait_for:
        host: 127.0.0.1
        port: 4646
        delay: 2
        timeout: 60

    - name: Confirm Nomad leader
      uri:
        url: http://localhost:4646/v1/status/leader
        method: GET
        status_code: 200
      register: nomad_leader
      retries: 5
      delay: 3
      until: nomad_leader.status == 200

    - name: Check Consul service status
      command: systemctl is-active consul
      register: consul_service_status
      ignore_errors: true
      changed_when: false

    - name: Start and enable Consul (if not running)
      systemd:
        name: consul
        state: started
        enabled: true
        daemon_reload: true
      when: consul_service_status.stdout != "active"

    - name: Wait for Consul to be ready
      wait_for:
        port: 8500
        delay: 10

    - name: Ensure libnss-resolve is installed (NSS plugin)
      apt:
        name: libnss-resolve
        state: present
      when: ansible_os_family == "Debian"

    - name: Install and configure dnsmasq for Consul DNS forwarding
      block:
        - name: Ensure dnsmasq is installed
          apt:
            name: dnsmasq
            state: present
          when: ansible_os_family == "Debian"

        - name: Configure dnsmasq to forward .consul to Consul DNS
          copy:
            dest: /etc/dnsmasq.d/consul.conf
            owner: root
            group: root
            mode: '0644'
            content: |
              # Forward .consul to local Consul DNS on port 8600
              server=/consul/127.0.0.1#8600
              # Upstream resolvers for non-consul domains
              server=1.1.1.1
              server=8.8.8.8
              # Bind only to loopback
              listen-address=127.0.0.1
              bind-interfaces
              # Cache and host mapping
              cache-size=1000
              addn-hosts=/etc/hosts
          register: dnsmasq_cfg

        - name: Enable and restart dnsmasq
          systemd:
            name: dnsmasq
            state: restarted
            enabled: true
          when: dnsmasq_cfg.changed

    - name: Configure systemd-resolved for Consul domain routing
      blockinfile:
        path: /etc/systemd/resolved.conf
        create: yes
        block: |
          [Resolve]
          DNS=127.0.0.1
          Domains=~consul
        marker: "# {mark} CONSUL DNS CONFIGURATION"
        backup: yes
      notify: restart systemd-resolved
      register: dns_config_changed

    - name: Link /etc/resolv.conf to systemd-resolved stub for proper DNS routing
      file:
        src: /run/systemd/resolve/stub-resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: yes
      notify: restart systemd-resolved

    - name: Force systemd-resolved restart if DNS config changed
      systemd:
        name: systemd-resolved
        state: restarted
      when: dns_config_changed.changed

    - name: Wait for systemd-resolved to fully restart
      wait_for:
        timeout: 10
      when: dns_config_changed.changed

    - name: Verify systemd-resolved is running and configured
      systemd:
        name: systemd-resolved
      register: resolved_status

    - name: Display systemd-resolved status
      debug:
        msg: "systemd-resolved status: {{ resolved_status.status.ActiveState }}"

    - name: Test Consul DNS resolution with resolvectl
      shell: resolvectl query nomad.service.consul
      register: consul_dns_test
      retries: 5
      delay: 3
      until: consul_dns_test.rc == 0
      failed_when: false

    - name: Display Consul DNS test result
      debug:
        msg: |
          Consul DNS Resolution Test:
          Command: resolvectl query nomad.service.consul
          Result: {{ consul_dns_test.stdout if consul_dns_test.rc == 0 else 'FAILED - ' + consul_dns_test.stderr }}
          Status: {{ 'SUCCESS' if consul_dns_test.rc == 0 else 'FAILED' }}

    - name: Verify /etc/resolv.conf configuration
      shell: cat /etc/resolv.conf
      register: resolv_conf_content
      changed_when: false

    - name: Display /etc/resolv.conf content
      debug:
        msg: |
          /etc/resolv.conf configuration:
          {{ resolv_conf_content.stdout_lines | join('\n') }}

    - name: Test Consul service discovery from Go programs
      shell: |
        export GODEBUG=netdns=go+2
        getent hosts consul.service.consul || nslookup consul.service.consul 127.0.0.1
      register: go_dns_test
      failed_when: false
      changed_when: false

    - name: Ensure nsswitch uses systemd-resolved first for hosts
      lineinfile:
        path: /etc/nsswitch.conf
        regexp: '^hosts:'
        line: 'hosts:          files resolve dns mymachines'
        backrefs: no
      notify: restart systemd-resolved

    - name: Display Go DNS compatibility test
      debug:
        msg: |
          Go DNS Resolution Test (consul.service.consul):
          {{ go_dns_test.stdout if go_dns_test.rc == 0 else 'FAILED - ' + (go_dns_test.stderr | default('No error output')) }}
          Status: {{ 'SUCCESS' if go_dns_test.rc == 0 else 'FAILED' }}

    - name: Check Vault service status
      command: systemctl is-active vault
      register: vault_service_status
      ignore_errors: true
      changed_when: false

    - name: Start and enable Vault (if not running)
      systemd:
        name: vault
        state: started
        enabled: true
        daemon_reload: true
      when: vault_service_status.stdout != "active"

    - name: Wait for Vault to be ready
      wait_for:
        port: 8200
        delay: 10

    - name: Check Nomad service status
      command: systemctl is-active nomad
      register: nomad_service_status
      ignore_errors: true
      changed_when: false

    # Validate Nomad prerequisites before starting
    - name: Validate Nomad volume directories exist
      stat:
        path: "{{ item }}"
      register: nomad_volume_dirs
      loop:
        - "/opt/ploy/artifacts"
        - "/opt/ploy/logs"
        - "/opt/ploy/metadata"
        - "/opt/ploy/debug"
        - "/opt/ploy/cache"
        - "/opt/ploy/temp"
      failed_when: false

    - name: Check if all Nomad volume directories exist
      fail:
        msg: "Required Nomad volume directory {{ item.item }} does not exist"
      loop: "{{ nomad_volume_dirs.results }}"
      when: not item.stat.exists

    - name: Restart Nomad if configuration changed
      systemd:
        name: nomad
        state: restarted
        daemon_reload: true
      when: nomad_config.changed or (nomad_meta_config is defined and nomad_meta_config.changed)
      register: nomad_restart_result
      retries: 3
      delay: 5
      until: nomad_restart_result is succeeded

    - name: Start and enable Nomad (if not running)
      systemd:
        name: nomad
        state: started
        enabled: true
        daemon_reload: true
      when: 
        - nomad_service_status.stdout != "active"
        - not (nomad_config.changed | default(false))
      register: nomad_start_result
      retries: 3
      delay: 5
      until: nomad_start_result is succeeded

    - name: Check Nomad service status after start
      systemd:
        name: nomad
      register: nomad_post_start_status
      when: nomad_service_status.stdout != "active"

    - name: Display Nomad startup logs on failure
      command: journalctl -u nomad.service --no-pager -n 20
      register: nomad_startup_logs
      when: 
        - nomad_service_status.stdout != "active"
        - nomad_post_start_status.status.ActiveState != "active"
      failed_when: false

    - name: Fail if Nomad didn't start successfully
      fail:
        msg: |
          Nomad failed to start. Recent logs:
          {{ nomad_startup_logs.stdout if nomad_startup_logs is defined else 'No logs available' }}
      when:
        - nomad_service_status.stdout != "active"
        - nomad_post_start_status is defined
        - nomad_post_start_status.status.ActiveState != "active"

    - name: Wait for Nomad to be ready
      wait_for:
        port: 4646
        delay: 10
        timeout: 60

    - name: Verify Nomad server status
      uri:
        url: "http://localhost:4646/v1/status/leader"
        method: GET
        status_code: 200
      register: nomad_leader_check
      retries: 6
      delay: 10
      until: nomad_leader_check.status == 200

    - name: Display Nomad leader status
      debug:
        msg: "Nomad cluster leader: {{ nomad_leader_check.json | default('Leader election in progress') }}"

    - name: Verify Nomad node status
      uri:
        url: "http://localhost:4646/v1/nodes"
        method: GET
        status_code: 200
      register: nomad_nodes_check
      retries: 3
      delay: 5

    - name: Display Nomad node count
      debug:
        msg: "Nomad nodes registered: {{ nomad_nodes_check.json | length if nomad_nodes_check.json is defined else 0 }}"

    - name: Add ploy user to hashicorp group for Nomad access
      user:
        name: ploy
        groups: hashicorp
        append: true

    - name: Create Ploy configuration directory
      file:
        path: /etc/ploy
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'

    - name: Initialize Vault (if not already initialized)
      uri:
        url: "http://localhost:8200/v1/sys/init"
        method: POST
        body_format: json
        body:
          secret_shares: 1
          secret_threshold: 1
        status_code: [200, 400]
      register: vault_init
      ignore_errors: true

    - name: Save Vault initialization data
      copy:
        content: "{{ vault_init.json | to_nice_json }}"
        dest: /opt/hashicorp/vault/init.json
        owner: ploy
        group: ploy
        mode: '0600'
      when: vault_init.status == 200

    - name: Read Vault initialization data (if exists)
      stat:
        path: /opt/hashicorp/vault/init.json
      register: vault_init_file

    - name: Load Vault initialization data
      slurp:
        src: /opt/hashicorp/vault/init.json
      register: vault_init_data
      when: vault_init_file.stat.exists

    - name: Unseal Vault with initialization key (dev environment)
      uri:
        url: "http://localhost:8200/v1/sys/unseal"
        method: POST
        body_format: json
        body:
          key: "{{ (vault_init_data.content | b64decode | from_json).keys[0] }}"
        status_code: [200, 400]
      register: vault_unseal
      ignore_errors: true
      when: vault_init_file.stat.exists

    - name: Display Vault unsealing status
      debug:
        msg: "Vault unsealing result: {{ vault_unseal.json.sealed | default('Already unsealed or error occurred') }}"
      when: vault_init_file.stat.exists

    - name: Check A-records for root domains (resilient)
      block:
        - name: Verify platform domain A-record
          command: nslookup api.{{ ploy.platform_domain }} 8.8.8.8
          register: platform_dns_check
          ignore_errors: true
          changed_when: false

        - name: Parse platform DNS IPs
          set_fact:
            platform_dns_ips: "{{ (platform_dns_check.stdout | default('') | regex_findall('Address: ([0-9.]+)')) | list }}"

        - name: Select platform DNS IP (exclude resolver IP)
          set_fact:
            platform_dns_ip: "{{ (platform_dns_ips | default([]) | difference(['8.8.8.8']) | first | default('')) }}"

        - name: Display platform domain DNS resolution
          debug:
            msg: "Platform domain DNS: {{ platform_dns_ips | default([]) }} (selected: {{ platform_dns_ip | default('') }})"

        - name: Verify apps domain A-record
          command: nslookup {{ ploy.apps_domain }} 8.8.8.8
          register: apps_dns_check
          ignore_errors: true
          changed_when: false

        - name: Parse apps domain DNS IP
          set_fact:
            apps_dns_ips: "{{ (apps_dns_check.stdout | default('') | regex_findall('Address: ([0-9.]+)')) | list }}"

        - name: Display apps domain DNS resolution
          debug:
            msg: "Apps domain DNS: {{ apps_dns_ips | default([]) }}"

        - name: Check if DNS points to current VPS
          debug:
            msg: "DNS Resolution Status - VPS IP: {{ ansible_default_ipv4.address }}, Platform DNS: {{ platform_dns_ip | default('') }}"

    - name: Validate required environment variables for SSL certificates
      block:
        - name: Check for Namecheap API credentials
          fail:
            msg: "Missing required environment variables for SSL certificate automation. Please set: NAMECHEAP_API_KEY, NAMECHEAP_API_USER, NAMECHEAP_USERNAME, NAMECHEAP_CLIENT_IP"
          when: >
            lookup('env', 'NAMECHEAP_API_KEY') == '' or
            lookup('env', 'NAMECHEAP_API_USER') == '' or
            lookup('env', 'NAMECHEAP_USERNAME') == '' or
            lookup('env', 'NAMECHEAP_CLIENT_IP') == ''

        - name: Display SSL automation status
          debug:
            msg: "SSL certificate automation: ENABLED (Namecheap API configured)"

    - name: Create Nomad job and data directories
      file:
        path: "{{ item }}"
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'
      loop:
        - /opt/hashicorp/nomad/jobs
        - /opt/hashicorp/nomad/logs
        - /opt/hashicorp/nomad/alloc
        - /opt/hashicorp/nomad/client
        - /opt/hashicorp/nomad/plugins

    # Ploy directories already created in main.yml comprehensive structure

    - name: Create Nomad log file with proper permissions
      file:
        path: /var/log/nomad.log
        state: touch
        owner: ploy
        group: ploy
        mode: '0644'

    # Note: API embeds platform Nomad templates; avoid blanket copies to VPS
    # The following find/copy tasks were pruned to prevent stale or unused HCLs
    # from being synced. Targeted IaC-managed jobs (e.g., Traefik) are handled
    # explicitly below.

    - name: Create Nomad environment file for systemd
      copy:
        content: |
          # Nomad environment variables
          NOMAD_ADDR=http://localhost:4646
          NOMAD_LOG_LEVEL=INFO
        dest: /etc/nomad.d/nomad.env
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Set up Nomad CLI access for ploy user
      lineinfile:
        path: /home/ploy/.bashrc
        line: "export NOMAD_ADDR=http://localhost:4646"
        create: true
        owner: ploy
        group: ploy

    - name: Add Nomad SDK resilience env defaults for ploy user (dev)
      blockinfile:
        path: /home/ploy/.bashrc
        create: true
        owner: ploy
        group: ploy
        mode: '0644'
        block: |
          # Nomad SDK backoff and blocking defaults (dev)
          export NOMAD_HTTP_MAX_RETRIES="${NOMAD_HTTP_MAX_RETRIES:-5}"
          export NOMAD_HTTP_BASE_DELAY="${NOMAD_HTTP_BASE_DELAY:-500ms}"
          export NOMAD_HTTP_MAX_DELAY="${NOMAD_HTTP_MAX_DELAY:-30s}"
          export NOMAD_SUBMIT_MAX_CONCURRENCY="${NOMAD_SUBMIT_MAX_CONCURRENCY:-4}"
          export NOMAD_BLOCKING_WAIT="${NOMAD_BLOCKING_WAIT:-30s}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Nomad SDK Resilience (dev)"

    - name: Set PLOY_TEMPLATE_DIR for ploy user (dev)
      lineinfile:
        path: /home/ploy/.bashrc
        line: "export PLOY_TEMPLATE_DIR=/home/ploy/ploy"
        create: true
        owner: ploy
        group: ploy

    - name: Deploy Traefik system job to Nomad (Nomad-only; systemd Traefik disabled)
      block:
        - name: Ensure Traefik ACME storage files exist with strict permissions
          file:
            path: "{{ item }}"
            state: touch
            owner: root
            group: root
            mode: '0600'
          loop:
            - /opt/ploy/traefik-data/acme.json
            - /opt/ploy/traefik-data/platform-acme.json
            - /opt/ploy/traefik-data/apps-acme.json

        - name: Ensure systemd Traefik service is stopped and disabled (Nomad-only)
          systemd:
            name: traefik
            state: stopped
            enabled: false
          ignore_errors: true

        - name: Check if Traefik is already installed
          stat:
            path: /usr/local/bin/traefik
          register: traefik_binary

        - name: Get current Traefik version (if installed)
          command: /usr/local/bin/traefik version
          register: current_traefik_version
          changed_when: false
          ignore_errors: true
          when: traefik_binary.stat.exists

        - name: Copy job manager script
          copy:
            src: "{{ playbook_dir }}/../../common/scripts/nomad-job-manager.sh"
            dest: /opt/hashicorp/bin/nomad-job-manager.sh
            mode: '0755'
            owner: root
            group: root

        - name: Check if Traefik job is already running
          uri:
            url: "http://localhost:4646/v1/job/traefik-system"
            method: GET
            status_code: [200, 404]
          register: traefik_job_check
          ignore_errors: true

        - name: Check Traefik allocations count (when job exists)
          uri:
            url: "http://localhost:4646/v1/job/traefik-system/allocations"
            method: GET
            status_code: 200
          register: traefik_allocs
          when: traefik_job_check.status == 200
          ignore_errors: true

        - name: Set flag to (re)submit Traefik when no allocations
          set_fact:
            traefik_needs_submit: true
          when: traefik_job_check.status == 404 or (traefik_allocs.json is defined and (traefik_allocs.json | length) == 0)

        - name: Check Nomad client meta via agent API (non-fatal)
          block:
            - name: Read Nomad agent self configuration
              uri:
                url: "http://localhost:4646/v1/agent/self"
                method: GET
                status_code: 200
              register: nomad_agent_self
              retries: 5
              delay: 2
              until: nomad_agent_self.status == 200
              failed_when: false
              changed_when: false

            - name: Extract Nomad client meta role (case-robust)
              set_fact:
                nomad_client_meta_role: >-
                  {{
                    (nomad_agent_self.json.config.Client.meta[ploy_gateway_node_meta_key | default('role')] 
                      if (nomad_agent_self.json is defined and nomad_agent_self.json.config is defined and nomad_agent_self.json.config.Client is defined and nomad_agent_self.json.config.Client.meta is defined)
                      else '')
                  }}
              when: nomad_agent_self.json is defined

            - name: Display Nomad client meta
              debug:
                msg: "Nomad client meta map: {{ nomad_agent_self.json.config.Client.meta | default({}) }} (role resolved='{{ nomad_client_meta_role | default('') }}')"
              when: nomad_agent_self.json is defined

            - name: Warn if Nomad client meta is not set for Traefik placement
              debug:
                msg: "Nomad client meta '{{ ploy_gateway_node_meta_key | default('role') }}' is '{{ nomad_client_meta_role | default('') }}' but expected '{{ ploy_gateway_node_class }}'. Traefik scheduling may be constrained. Set in /etc/nomad.d/nomad.hcl under client.meta and restart nomad."
              when: (nomad_client_meta_role | default('')) != (ploy_gateway_node_class)

        - name: Download and install Traefik binary (if needed)
          block:
            - name: Download Traefik
              get_url:
                url: "https://github.com/traefik/traefik/releases/download/v{{ traefik_version }}/traefik_v{{ traefik_version }}_linux_amd64.tar.gz"
                dest: /tmp/traefik.tar.gz
                timeout: 300
              when: not traefik_binary.stat.exists or traefik_version not in (current_traefik_version.stdout | default(''))

            - name: Extract Traefik
              unarchive:
                src: /tmp/traefik.tar.gz
                dest: /usr/local/bin
                remote_src: true
                mode: '0755'
              when: not traefik_binary.stat.exists or traefik_version not in (current_traefik_version.stdout | default(''))

            - name: Verify Traefik installation
              command: /usr/local/bin/traefik version
              register: traefik_install_version
              changed_when: false

            - name: Display Traefik version
              debug:
                msg: "Traefik installed successfully: {{ traefik_install_version.stdout_lines[0] if traefik_install_version.stdout_lines else 'Version info not available' }}"

        - name: Deploy Traefik Nomad job with environment variables
          template:
            src: ../../common/templates/nomad-traefik-system.hcl.j2
            dest: "/opt/hashicorp/nomad/jobs/traefik-system.hcl"
            owner: ploy
            group: ploy
            mode: '0644'

        - name: Validate Traefik job syntax
          command: nomad job validate /opt/hashicorp/nomad/jobs/traefik-system.hcl
          register: traefik_validate
          changed_when: false
          environment:
            NOMAD_ADDR: "http://localhost:4646"

        - name: Submit Traefik system job to Nomad (initial or recover)
          shell: /opt/hashicorp/bin/nomad-job-manager.sh run --job traefik-system --file /opt/hashicorp/nomad/jobs/traefik-system.hcl
          register: traefik_job_submit
          environment:
            NOMAD_ADDR: "http://localhost:4646"
          when: traefik_needs_submit | default(false)

        - name: Wait for Traefik service to be healthy
          shell: /opt/hashicorp/bin/nomad-job-manager.sh wait --job traefik-system --timeout 180
          environment:
            NOMAD_ADDR: "http://localhost:4646"
          register: traefik_wait_result
          failed_when: traefik_wait_result.rc != 0
          when: traefik_needs_submit | default(false)

        - name: Verify Traefik is accessible
          uri:
            url: "http://localhost:{{ traefik_admin_port }}/ping"
            method: GET
            status_code: 200
          register: traefik_health_check
          retries: 6
          delay: 10
          until: traefik_health_check.status == 200

        - name: Display Traefik deployment status
          debug:
            msg: "Traefik system job deployed successfully and is healthy"

        # Traefik directories already created in main.yml comprehensive structure


        - name: Set up firewall rules for Traefik
          ufw:
            rule: allow
            port: "{{ item }}"
            comment: "Traefik routing"
          loop:
            - "80"   # HTTP
            - "443"  # HTTPS
            - "{{ traefik_admin_port }}" # Traefik dashboard/admin

      rescue:
        - name: Handle Traefik deployment failure
          debug:
            msg: "Warning: Traefik deployment failed. Manual intervention may be required."
        
        - name: Show Traefik job status on failure
          command: nomad job status traefik-system
          register: traefik_status
          environment:
            NOMAD_ADDR: "http://localhost:4646"
          ignore_errors: true
        
        - name: Display failure information
          debug:
            var: traefik_status.stdout_lines
          when: traefik_status.stdout_lines is defined

      always:
        - name: Deploy Traefik dynamic configuration for API routing with SSL
          template:
            src: ../../common/templates/traefik-dynamic-config.yml.j2
            dest: /opt/ploy/traefik-data/dynamic-config.yml
            owner: ploy
            group: ploy
            mode: '0644'

        - name: Ensure certificate data directory exists (no recursive perms)
          file:
            path: /opt/ploy/traefik-data
            state: directory
            owner: root
            group: root
            mode: '0755'

    - name: Final validation and health checks
      block:
        - name: Validate all HashiCorp services are healthy
          uri:
            url: "{{ item.url }}"
            method: GET
            status_code: 200
          register: service_health
          retries: 3
          delay: 10
          loop:
            - { name: "Traefik", url: "http://localhost:{{ traefik_admin_port | default(8090) }}/ping" }
            - { name: "Nomad", url: "http://localhost:4646/v1/status/leader" }
            - { name: "Consul", url: "http://localhost:8500/v1/status/leader" }
          loop_control:
            label: "{{ item.name }}"

        - name: Validate API service accessibility via domain
          uri:
            url: "https://api.{{ ploy.platform_domain }}/health"
            method: GET
            status_code: 200
            validate_certs: no
          environment:
            PLOY_PLATFORM_DOMAIN: "dev.ployman.app"
          register: api_health
          retries: 3
          delay: 10

        - name: Display deployment success summary
          debug:
            msg: |
              ✅ HashiCorp Stack Deployment Complete!
              
              Services Status:
              - Traefik: ✅ {{ 'Healthy' if service_health.results[0].status == 200 else 'Failed' }} (Port {{ traefik_admin_port | default(8090) }})
              - Nomad: ✅ {{ 'Healthy' if service_health.results[1].status == 200 else 'Failed' }} (Port 4646)  
              - Consul: ✅ {{ 'Healthy' if service_health.results[2].status == 200 else 'Failed' }} (Port 8500)
              - API: ✅ {{ 'Healthy' if api_health.status == 200 else 'Failed' }} (via https://api.{{ ploy.platform_domain }})
              
              SSL Certificates:
              - Platform (*.dev.ployman.app): ✅ Configured
              - Apps (*.dev.ployd.app): ✅ Ready for auto-provisioning
              
              Access Points:
              - API: https://api.{{ ploy.platform_domain }}/health
              - Traefik Dashboard: http://{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}:{{ traefik_admin_port | default(8090) }}
              - Nomad UI: http://{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}:4646
              - Consul UI: http://{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}:8500

  handlers:
    - name: restart systemd-resolved
      systemd:
        name: systemd-resolved
        state: restarted
