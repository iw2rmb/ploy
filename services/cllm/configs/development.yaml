# CLLM Development Configuration
# Optimized for local development with debugging enabled

server:
  host: "127.0.0.1"
  port: 8082
  read_timeout: "60s"
  write_timeout: "60s"
  shutdown_timeout: "5s"

sandbox:
  work_dir: "/tmp/cllm-dev-sandbox"
  max_memory: "2GB"
  max_cpu_time: "600s"
  max_processes: 50
  cleanup_timeout: "10s"

providers:
  default: "ollama"
  ollama:
    base_url: "http://localhost:11434"
    model: "codellama:7b"
    timeout: "300s"
    max_context: 8192

logging:
  level: "debug"
  format: "text"
  output: "stdout"

security:
  max_request_size: "100MB"
  rate_limit: "1000/min"
  cors_origins: ["*"]