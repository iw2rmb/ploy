# Java 11 to 17 Migration Recipe
metadata:
  name: "java11to17-migration"
  description: "Migrate Java applications from version 11 to 17"
  version: "1.0.0"
  author: "ploy-arf"
  tags:
    - "java"
    - "migration"
    - "java11"
    - "java17"
  categories:
    - "migration"
  languages:
    - "java"
  min_platform: "1.0.0"
  license: "Apache-2.0"
  documentation: "https://docs.oracle.com/en/java/javase/17/migrate/"

steps:
  - name: "Java 11 to 17 Migration"
    type: "openrewrite"
    description: "Apply OpenRewrite Java migration recipes"
    config:
      recipe: "org.openrewrite.java.migrate.Java11toJava17"
    timeout: "15m"
    on_error: "fail"

execution:
  timeout: "30m"
  resource_limits:
    cpu: "2"
    memory: "4Gi"

validation:
  pre_conditions:
    - type: "language_version"
      config:
        language: "java"
        min_version: "11"
  post_conditions:
    - type: "compilation"
      config:
        language: "java"
        must_compile: true