---
# Ploy Development Environment Setup Playbook
# 
# This playbook sets up a complete development environment including:
# - Development tools (Go, Node.js, Java, Python)
# - Build tools (KraftKit, Cosign, Syft, Grype)
# - Container runtime (Docker)
# - Object storage (SeaweedFS)
# - Proper PATH configuration to avoid conflicts
# - GitHub credentials setup for the ploy user
#
# Key improvements:
# - Fixed PATH configuration to prevent multiple conflicting declarations
# - Cosign installation with verification
# - Cleanup of conflicting environment variables
#
- name: Setup Ploy Development Environment
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
    - ../vars/dev-wildcard.yml
  
  tasks:
    - name: Update system packages
      apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install basic development tools
      apt:
        name: "{{ testing_tools }}"
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
        state: present

    - name: Check Docker service status
      command: systemctl is-active docker
      register: docker_service_status
      ignore_errors: true
      changed_when: false

    - name: Start and enable Docker (if not running)
      systemd:
        name: docker
        state: started
        enabled: true
      when: docker_service_status.stdout != "active"

    - name: Install Docker Compose
      block:
        - name: Check if Docker Compose is already installed
          stat:
            path: /usr/local/bin/docker-compose
          register: docker_compose_binary

        - name: Get current Docker Compose version (if installed)
          command: /usr/local/bin/docker-compose version --short
          register: current_docker_compose_version
          changed_when: false
          ignore_errors: true
          when: docker_compose_binary.stat.exists

        - name: Download Docker Compose
          get_url:
            url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
            dest: /usr/local/bin/docker-compose
            mode: '0755'
          when: not docker_compose_binary.stat.exists or docker_compose_version not in (current_docker_compose_version.stdout | default(''))

    - name: Install Go
      block:
        - name: Check if Go is already installed
          stat:
            path: /usr/local/go/bin/go
          register: go_binary

        - name: Get current Go version (if installed)
          command: /usr/local/go/bin/go version
          register: current_go_version
          changed_when: false
          ignore_errors: true
          when: go_binary.stat.exists

        - name: Download Go
          get_url:
            url: "https://golang.org/dl/go{{ go_version }}.linux-{{ go_arch }}.tar.gz"
            dest: /tmp/go.tar.gz
          when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

        - name: Remove existing Go installation
          file:
            path: /usr/local/go
            state: absent
          when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

        - name: Extract Go
          unarchive:
            src: /tmp/go.tar.gz
            dest: /usr/local
            remote_src: true
          when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

        - name: Configure system PATH with Go
          lineinfile:
            path: /etc/environment
            regexp: '^PATH='
            line: 'PATH="/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin"'
            create: true

        - name: Create Go workspace
          file:
            path: /root/go
            state: directory

    - name: Install QEMU for OSv runtime support
      apt:
        name:
          - qemu-system-x86
          - qemu-utils
          - qemu-system-common
          - libvirt-daemon-system
          - libvirt-clients
        state: present
        update_cache: yes

    - name: Install Python3 and pip
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present

    - name: Install Java and build tools for ARF
      apt:
        name:
          - openjdk-17-jdk
          - maven
          - gradle
        state: present

    - name: Set JAVA_HOME environment variable
      lineinfile:
        path: /etc/environment
        regexp: '^JAVA_HOME='
        line: 'JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64'
        create: true

    - name: Download OpenRewrite Maven plugin (for ARF integration)
      get_url:
        url: "https://repo1.maven.org/maven2/org/openrewrite/rewrite-maven/{{ openrewrite_version }}/rewrite-maven-{{ openrewrite_version }}.jar"
        dest: /usr/local/bin/rewrite-maven.jar
        mode: '0644'
      vars:
        openrewrite_version: "8.60.0"
      ignore_errors: true

    - name: Create OpenRewrite CLI wrapper script for Maven-based transformations
      copy:
        content: |
          #!/bin/bash
          # OpenRewrite CLI wrapper for ARF integration
          # Uses Maven plugin for code transformations
          if [ -f pom.xml ]; then
            mvn org.openrewrite.maven:rewrite-maven:8.60.0:run -Drewrite.recipeArtifactCoordinates=org.openrewrite:rewrite-java -Drewrite.activeRecipes="$1"
          else
            echo "Error: Maven project (pom.xml) required for OpenRewrite transformations"
            exit 1
          fi
        dest: /usr/local/bin/rewrite
        mode: '0755'

    - name: Install PostgreSQL for ARF learning database
      apt:
        name:
          - postgresql
          - postgresql-contrib
          - postgresql-client
          - libpq-dev
          - python3-psycopg2
        state: present

    - name: Start and enable PostgreSQL
      systemd:
        name: postgresql
        state: started
        enabled: true

    - name: Create ARF database user
      become_user: postgres
      postgresql_user:
        name: ploy
        password: "{{ arf_db_password | default('arf_dev_password') }}"
        state: present

    - name: Create ARF learning database
      become_user: postgres
      postgresql_db:
        name: arf_learning
        owner: ploy
        state: present

    - name: Grant all privileges on ARF database to ploy user
      become_user: postgres
      postgresql_privs:
        db: arf_learning
        privs: ALL
        type: database
        role: ploy
        state: present

    - name: Install tree-sitter CLI for multi-language AST parsing
      block:
        - name: Check if tree-sitter is installed
          stat:
            path: /usr/local/bin/tree-sitter
          register: tree_sitter_binary

        - name: Download tree-sitter CLI
          get_url:
            url: "https://github.com/tree-sitter/tree-sitter/releases/download/v{{ tree_sitter_version }}/tree-sitter-linux-x64.gz"
            dest: /tmp/tree-sitter.gz
          vars:
            tree_sitter_version: "0.20.8"
          when: not tree_sitter_binary.stat.exists

        - name: Extract tree-sitter CLI
          shell: |
            gunzip /tmp/tree-sitter.gz
            mv /tmp/tree-sitter /usr/local/bin/tree-sitter
            chmod +x /usr/local/bin/tree-sitter
          when: not tree_sitter_binary.stat.exists

        - name: Install tree-sitter language parsers
          npm:
            name: "{{ item }}"
            global: true
            state: latest
          loop:
            - tree-sitter-cli
            - tree-sitter-java
            - tree-sitter-javascript
            - tree-sitter-typescript
            - tree-sitter-python
            - tree-sitter-go
            - tree-sitter-rust
            - tree-sitter-c
            - tree-sitter-cpp

    - name: Install LLM API dependencies
      pip:
        name:
          - openai>=1.0.0
          - anthropic>=0.7.0
          - requests>=2.28.0
          - tiktoken>=0.5.0
          - redis>=4.5.0
          - sqlalchemy>=2.0.0
          - psycopg2-binary>=2.9.0
          - numpy>=1.24.0
          - scipy>=1.10.0
        state: present
        executable: pip3
        extra_args: --break-system-packages
      ignore_errors: true  # Ignore conflicts with system packages

    # ARF Phase 4: Security & Production Hardening Dependencies
    - name: Install security scanning dependencies
      apt:
        name:
          - libssl-dev
          - libffi-dev
          - libxml2-dev
          - libxslt1-dev
          - zlib1g-dev
          - libjpeg-dev
          - libpng-dev
          - build-essential
          - pkg-config
        state: present

    - name: Install vulnerability database management tools
      pip:
        name:
          - cvss>=2.4
          - python-nvd3>=0.15.0
          - safety>=2.3.0
          - bandit>=1.7.0
          - semgrep>=1.0.0
          - cyclonedx-bom>=3.11.0
          - spdx-tools>=0.8.0
          - packageurl-python>=0.11.0
        state: present
        executable: pip3
        extra_args: --break-system-packages
      ignore_errors: true

    - name: Install SBOM generation and analysis tools
      block:
        - name: Install syft for SBOM generation
          get_url:
            url: "https://github.com/anchore/syft/releases/download/v{{ syft_version }}/syft_{{ syft_version }}_linux_amd64.tar.gz"
            dest: /tmp/syft.tar.gz
          vars:
            syft_version: "0.95.0"

        - name: Extract and install syft
          unarchive:
            src: /tmp/syft.tar.gz
            dest: /tmp
            remote_src: true
            creates: /tmp/syft

        - name: Move syft to system PATH
          copy:
            src: /tmp/syft
            dest: /usr/local/bin/syft
            mode: '0755'
            remote_src: true

        - name: Install grype for vulnerability scanning
          get_url:
            url: "https://github.com/anchore/grype/releases/download/v{{ grype_version }}/grype_{{ grype_version }}_linux_amd64.tar.gz"
            dest: /tmp/grype.tar.gz
          vars:
            grype_version: "0.73.0"

        - name: Extract and install grype
          unarchive:
            src: /tmp/grype.tar.gz
            dest: /tmp
            remote_src: true
            creates: /tmp/grype

        - name: Move grype to system PATH
          copy:
            src: /tmp/grype
            dest: /usr/local/bin/grype
            mode: '0755'
            remote_src: true

    - name: Configure NVD API for vulnerability data
      block:
        - name: Create NVD API configuration directory
          file:
            path: /etc/ploy/nvd
            state: directory
            mode: '0755'
            owner: ploy
            group: ploy

        - name: Create NVD API configuration file
          copy:
            content: |
              # NVD API Configuration for ARF Phase 4
              # API documentation: https://nvd.nist.gov/developers/vulnerabilities
              api_endpoint: "https://services.nvd.nist.gov/rest/json/cves/2.0"
              rate_limit: 5  # requests per second for public API
              timeout: 30  # seconds
              cache_duration: 3600  # 1 hour in seconds
              # To use enhanced rate limits, add your API key:
              # api_key: "your-nvd-api-key-here"
            dest: /etc/ploy/nvd/config.yaml
            owner: ploy
            group: ploy
            mode: '0644'

    - name: Install human workflow and notification dependencies
      pip:
        name:
          - jinja2>=3.1.0
          - pyyaml>=6.0
          - markdown>=3.4.0
          - email-validator>=2.0.0
          - python-dateutil>=2.8.0
          - croniter>=1.4.0
          - pytz>=2023.3
          - celery>=5.3.0
          - kombu>=5.3.0
        state: present
        executable: pip3
        extra_args: --break-system-packages
      ignore_errors: true

    - name: Install production monitoring dependencies
      apt:
        name:
          - htop
          - iotop
          - netstat-nat
          - tcpdump
          - strace
          - lsof
          - sysstat
          - procps
        state: present

    - name: Configure performance monitoring tools
      block:
        - name: Enable sysstat data collection
          replace:
            path: /etc/default/sysstat
            regexp: '^ENABLED="false"'
            replace: 'ENABLED="true"'

        - name: Start sysstat service
          systemd:
            name: sysstat
            state: started
            enabled: true

    - name: Create ARF Phase 4 configuration directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: ploy
        group: ploy
      loop:
        - /etc/ploy/security
        - /etc/ploy/workflows
        - /etc/ploy/monitoring
        - /var/log/ploy/security
        - /var/log/ploy/workflows
        - /var/cache/ploy/vulnerability-db

    - name: Configure security scanning settings
      copy:
        content: |
          # ARF Phase 4 Security Configuration
          security:
            vulnerability_scanning:
              enabled: true
              scan_interval: 24h  # Daily scans
              critical_threshold: 9.0  # CVSS score threshold for critical alerts
              databases:
                - nvd
                - osv
                - github_advisory
            
            remediation:
              auto_apply: false  # Require human approval
              max_concurrent: 3  # Maximum concurrent remediation operations
              timeout: 30m  # Maximum time per remediation
              
            human_workflow:
              enabled: true
              approval_required: true
              escalation_timeout: 4h  # Escalate if no response within 4 hours
              notification_channels:
                - email
                - webhook
            
            compliance:
              frameworks:
                - owasp
                - nist
              reporting_interval: weekly
              
          monitoring:
            performance:
              enabled: true
              collection_interval: 30s
              retention_period: 7d
              alert_thresholds:
                cpu_usage: 80
                memory_usage: 80
                disk_usage: 85
                error_rate: 5  # 5%
                
            metrics:
              endpoint: "/v1/metrics"
              format: "prometheus"
              
          production:
            optimization:
              enabled: true
              auto_scaling: true
              resource_limits:
                max_cpu: 4
                max_memory: 8g
                max_disk: 50g
              
            caching:
              enabled: true
              ttl: 30m
              max_size: 1g
              
            rate_limiting:
              enabled: true
              requests_per_minute: 60
              burst_size: 10
        dest: /etc/ploy/security/config.yaml
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Install Redis for LLM caching and coordination
      apt:
        name:
          - redis-server
          - redis-tools
        state: present

    - name: Configure Redis for ARF Phase 3
      copy:
        content: |
          # Redis configuration for ARF Phase 3 - LLM caching and coordination
          bind 127.0.0.1
          port 6379
          protected-mode yes
          timeout 0
          tcp-keepalive 300
          
          # Memory configuration
          maxmemory 1gb
          maxmemory-policy allkeys-lru
          
          # Persistence for learning data
          save 900 1
          save 300 10
          save 60 10000
          
          # Logging
          loglevel notice
          logfile /var/log/redis/redis-server.log
          
          # Database configuration
          databases 16
          
          # ARF-specific databases:
          # db 0: LLM response cache
          # db 1: Recipe template cache  
          # db 2: Learning pattern cache
          # db 3: A/B test coordination
          # db 4: Performance metrics
        dest: /etc/redis/redis-arf.conf
        backup: yes

    - name: Start and enable Redis
      systemd:
        name: redis-server
        state: started
        enabled: true

    - name: Install Ollama for local LLM inference
      block:
        - name: Check if Ollama is already installed
          stat:
            path: /usr/local/bin/ollama
          register: ollama_binary

        - name: Download Ollama installer
          get_url:
            url: https://ollama.com/install.sh
            dest: /tmp/ollama-install.sh
            mode: '0755'
          when: not ollama_binary.stat.exists

        - name: Install Ollama
          shell: /tmp/ollama-install.sh
          when: not ollama_binary.stat.exists

        - name: Create systemd service for Ollama
          copy:
            content: |
              [Unit]
              Description=Ollama Server
              After=network-online.target

              [Service]
              ExecStart=/usr/local/bin/ollama serve
              User=ploy
              Group=ploy
              Restart=always
              RestartSec=3
              Environment="OLLAMA_HOST=127.0.0.1:11434"
              Environment="OLLAMA_MODELS=/home/ploy/.ollama/models"
              Environment="OLLAMA_MAX_LOADED_MODELS=2"
              Environment="OLLAMA_NUM_PARALLEL=1"

              [Install]
              WantedBy=default.target
            dest: /etc/systemd/system/ollama.service
            mode: '0644'

        - name: Create Ollama models directory
          file:
            path: /home/ploy/.ollama/models
            state: directory
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Reload systemd daemon
          systemd:
            daemon_reload: true

        - name: Start and enable Ollama service
          systemd:
            name: ollama
            state: started
            enabled: true

        - name: Wait for Ollama service to start
          wait_for:
            host: 127.0.0.1
            port: 11434
            delay: 5
            timeout: 30

        - name: Download CodeLlama model for ARF (7B parameter model for code)
          become_user: ploy
          command: /usr/local/bin/ollama pull codellama:7b
          async: 300  # 5 minutes timeout
          poll: 10    # Check every 10 seconds
          ignore_errors: true  # Don't fail if model download times out

        - name: Download Llama2 model for general text processing (7B parameter model)
          become_user: ploy
          command: /usr/local/bin/ollama pull llama2:7b
          async: 300  # 5 minutes timeout
          poll: 10    # Check every 10 seconds
          ignore_errors: true  # Don't fail if model download times out

    - name: Create ARF Phase 3 executables and tools
      block:
        - name: Create ARF executables directory
          file:
            path: /usr/local/bin/arf-executors
            state: directory
            mode: '0755'

        - name: Create ARF Phase 3 executor stub scripts
          copy:
            content: |
              #!/bin/bash
              # ARF Phase 3 - {{ item.name }}
              # This is a development stub - actual implementation will be built by the controller
              
              echo "ARF Phase 3 {{ item.name }} - Development Environment"
              echo "Arguments: $@"
              echo "Working Directory: $(pwd)"
              echo ""
              
              # {{ item.description }}
              
              {% for command in item.commands %}
              echo "{{ command }}"
              {% endfor %}
              
              # Simulate execution time
              sleep {{ item.sim_time | default(2) }}
              
              {% if item.exit_success | default(true) %}
              echo "{{ item.name }} completed successfully"
              exit 0
              {% else %}
              echo "{{ item.name }} simulation - some features require actual controller"
              exit 1
              {% endif %}
            dest: "/usr/local/bin/{{ item.binary }}"
            mode: '0755'
          loop:
            - name: "LLM Recipe Generator"
              binary: "arf-llm-generator"
              description: "Generates ARF recipes using Large Language Models"
              commands:
                - "Analyzing error context..."
                - "Querying LLM for recipe generation..."
                - "Validating generated recipe syntax..."
                - "Optimizing recipe confidence..."
              sim_time: 5
              exit_success: true
            
            - name: "Multi-Language AST Parser"
              binary: "arf-multi-lang-parser"
              description: "Parses code using tree-sitter for multiple languages"
              commands:
                - "Detecting source language..."
                - "Loading tree-sitter parser..."
                - "Parsing AST structure..."
                - "Extracting symbols and imports..."
              sim_time: 3
              exit_success: true
            
            - name: "Hybrid Pipeline Coordinator" 
              binary: "arf-hybrid-coordinator"
              description: "Coordinates OpenRewrite and LLM transformations"
              commands:
                - "Analyzing transformation complexity..."
                - "Selecting optimal strategy..."
                - "Coordinating parallel execution..."
                - "Merging transformation results..."
              sim_time: 8
              exit_success: true
            
            - name: "Learning Pattern Extractor"
              binary: "arf-learning-extractor"
              description: "Extracts patterns from transformation history"
              commands:
                - "Querying transformation database..."
                - "Running statistical analysis..."
                - "Extracting success patterns..."
                - "Updating strategy weights..."
              sim_time: 4
              exit_success: true
            
            - name: "A/B Test Manager"
              binary: "arf-ab-test-manager" 
              description: "Manages A/B testing experiments for recipes"
              commands:
                - "Setting up experiment configuration..."
                - "Tracking transformation outcomes..."
                - "Computing statistical significance..."
                - "Generating recommendations..."
              sim_time: 3
              exit_success: true

        - name: Create ARF Phase 3 validation tools
          copy:
            content: |
              #!/bin/bash
              # ARF Phase 3 Validation Suite
              
              echo "🔍 ARF Phase 3 Infrastructure Validation"
              echo "========================================"
              echo ""
              
              # Check database connectivity
              echo "Checking PostgreSQL connection..."
              if pg_isready -h localhost -p 5432 > /dev/null 2>&1; then
                  echo "✅ PostgreSQL: Ready"
              else
                  echo "❌ PostgreSQL: Not available"
              fi
              
              # Check Redis connectivity  
              echo "Checking Redis connection..."
              if redis-cli ping > /dev/null 2>&1; then
                  echo "✅ Redis: Ready"
              else
                  echo "❌ Redis: Not available"
              fi
              
              # Check tree-sitter installation
              echo "Checking tree-sitter installation..."
              if command -v tree-sitter >/dev/null 2>&1; then
                  echo "✅ Tree-sitter: $(tree-sitter --version)"
              else
                  echo "❌ Tree-sitter: Not installed"
              fi
              
              # Check language parsers
              echo "Checking language parsers..."
              parser_count=0
              for parser in tree-sitter-java tree-sitter-javascript tree-sitter-python tree-sitter-go; do
                  if npm list -g "$parser" >/dev/null 2>&1; then
                      parser_count=$((parser_count + 1))
                  fi
              done
              echo "✅ Language parsers: $parser_count/4 installed"
              
              # Check Python dependencies
              echo "Checking Python LLM dependencies..."
              python_deps=0
              for dep in openai anthropic requests redis sqlalchemy; do
                  if python3 -c "import $dep" >/dev/null 2>&1; then
                      python_deps=$((python_deps + 1))
                  fi
              done
              echo "✅ Python LLM deps: $python_deps/5 available"
              
              # Check Ollama installation and service
              echo "Checking Ollama installation..."
              if command -v ollama >/dev/null 2>&1; then
                  echo "✅ Ollama: $(ollama --version 2>/dev/null || echo 'installed')"
                  
                  # Check if Ollama service is running
                  if systemctl is-active ollama >/dev/null 2>&1; then
                      echo "✅ Ollama service: running"
                      
                      # Check if models are available
                      model_count=$(ollama list 2>/dev/null | grep -c "codellama\|llama2" || echo "0")
                      if [ "$model_count" -gt 0 ]; then
                          echo "✅ Ollama models: $model_count available"
                      else
                          echo "⚠️  Ollama models: downloading in background"
                      fi
                  else
                      echo "❌ Ollama service: not running"
                  fi
              else
                  echo "❌ Ollama: not installed"
              fi
              
              echo ""
              echo "ARF Phase 3 validation complete."
              
              if [ "$parser_count" -ge 3 ] && [ "$python_deps" -ge 4 ]; then
                  echo "🎉 Infrastructure ready for ARF Phase 3 testing"
                  exit 0
              else
                  echo "⚠️  Some dependencies missing - proceed with caution"  
                  exit 1
              fi
            dest: /usr/local/bin/arf-phase3-validate
            mode: '0755'

    - name: Add ARF Phase 3 environment variables for ploy user
      blockinfile:
        path: /home/ploy/.bashrc
        create: true
        owner: ploy
        group: ploy
        mode: '0644'
        block: |
          # Ploy Controller API endpoint configuration
          export PLOY_APPS_DOMAIN={{ ploy.apps_domain | default('ployd.app') }}
          export PLOY_ENVIRONMENT={{ ploy_environment | default('dev') }}
          {% if ploy_environment == 'dev' %}
          export PLOY_CONTROLLER=https://api.dev.{{ ploy.apps_domain | default('ployd.app') }}/v1
          {% else %}
          export PLOY_CONTROLLER=https://api.{{ ploy.apps_domain | default('ployd.app') }}/v1
          {% endif %}
          
          # ARF (Automated Remediation Framework) environment variables
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export OPENREWRITE_JAR_PATH=/usr/local/bin/rewrite.jar
          export ARF_SANDBOX_BASE_DIR=/tmp/arf-sandboxes
          export ARF_CACHE_DIR=/tmp/arf-cache
          
          # ARF Phase 3 - LLM Integration & Learning
          export ARF_LEARNING_DB_URL="postgres://ploy:{{ arf_db_password | default('arf_dev_password') }}@localhost/arf_learning?sslmode=disable"
          export ARF_TREE_SITTER_PATH=/usr/local/bin/tree-sitter
          export ARF_LLM_CACHE_DIR=/tmp/arf-llm-cache
          export ARF_AB_TEST_DIR=/tmp/arf-ab-tests
          
          # Tree-sitter parser paths
          export TREE_SITTER_PARSER_DIR=/usr/local/lib/node_modules
          
          # ARF Phase 4 - Security & Production Hardening
          export ARF_SECURITY_CONFIG_DIR=/etc/ploy/security
          export ARF_NVD_CONFIG_FILE=/etc/ploy/nvd/config.yaml
          export ARF_VULNERABILITY_CACHE_DIR=/var/cache/ploy/vulnerability-db
          export ARF_WORKFLOW_LOG_DIR=/var/log/ploy/workflows
          export ARF_SECURITY_LOG_DIR=/var/log/ploy/security
          export ARF_MONITORING_CONFIG_DIR=/etc/ploy/monitoring
          
          # Security scanning tools
          export SYFT_PATH=/usr/local/bin/syft
          export GRYPE_PATH=/usr/local/bin/grype
          export ARF_SCAN_RESULTS_DIR=/tmp/arf-scan-results
          
          # Human workflow configuration
          export ARF_WORKFLOW_ENGINE=enabled
          export ARF_APPROVAL_TIMEOUT=4h
          export ARF_ESCALATION_ENABLED=true
          export ARF_NOTIFICATION_CHANNELS=email,webhook
          
          # Production optimization
          export ARF_OPTIMIZATION_ENABLED=true
          export ARF_PERFORMANCE_MONITORING=enabled
          export ARF_METRICS_COLLECTION_INTERVAL=30s
          export ARF_CACHE_ENABLED=true
          export ARF_BATCH_PROCESSING=enabled
          export ARF_CIRCUIT_BREAKER_ENABLED=true
          export ARF_RATE_LIMITING_ENABLED=true
          
          # Security compliance
          export ARF_COMPLIANCE_FRAMEWORKS=owasp,nist
          export ARF_SECURITY_BASELINE=production
          export ARF_AUDIT_LOGGING=enabled
          
          # Redis configuration for ARF Phase 3
          export ARF_REDIS_URL="redis://localhost:6379"
          export ARF_REDIS_LLM_DB=0
          export ARF_REDIS_TEMPLATE_DB=1
          export ARF_REDIS_PATTERN_DB=2
          export ARF_REDIS_AB_TEST_DB=3
          export ARF_REDIS_METRICS_DB=4
          
          # LLM Configuration
          export ARF_LLM_PROVIDER="${ARF_LLM_PROVIDER:-ollama}"
          export ARF_LLM_MODEL="${ARF_LLM_MODEL:-codellama:7b}"
          export ARF_LLM_TEMPERATURE="${ARF_LLM_TEMPERATURE:-0.1}"
          export ARF_LLM_MAX_TOKENS="${ARF_LLM_MAX_TOKENS:-2048}"
          export ARF_LLM_TIMEOUT="${ARF_LLM_TIMEOUT:-30s}"
          export ARF_LLM_CACHE_ENABLED="${ARF_LLM_CACHE_ENABLED:-true}"
          export ARF_LLM_CACHE_TTL="${ARF_LLM_CACHE_TTL:-24h}"
          
          # Ollama Configuration
          export OLLAMA_HOST="${OLLAMA_HOST:-127.0.0.1:11434}"
          export OLLAMA_MODELS_DIR="/home/ploy/.ollama/models"
          export ARF_OLLAMA_ENDPOINT="http://127.0.0.1:11434"
          export ARF_OLLAMA_CODE_MODEL="codellama:7b"
          export ARF_OLLAMA_TEXT_MODEL="llama2:7b"
          export ARF_OLLAMA_TIMEOUT="120s"
          export ARF_OLLAMA_MAX_RETRIES="3"
          
          # Hybrid Pipeline Configuration
          export ARF_HYBRID_DEFAULT_STRATEGY="${ARF_HYBRID_DEFAULT_STRATEGY:-sequential}"
          export ARF_HYBRID_CONFIDENCE_THRESHOLD="${ARF_HYBRID_CONFIDENCE_THRESHOLD:-0.7}"
          export ARF_HYBRID_TIMEOUT="${ARF_HYBRID_TIMEOUT:-15m}"
          export ARF_HYBRID_MAX_PARALLEL_TASKS="${ARF_HYBRID_MAX_PARALLEL_TASKS:-3}"
          
          # Learning System Configuration
          export ARF_LEARNING_ENABLED="${ARF_LEARNING_ENABLED:-true}"
          export ARF_LEARNING_MIN_SAMPLES="${ARF_LEARNING_MIN_SAMPLES:-10}"
          export ARF_LEARNING_PATTERN_CONFIDENCE="${ARF_LEARNING_PATTERN_CONFIDENCE:-0.8}"
          export ARF_LEARNING_UPDATE_INTERVAL="${ARF_LEARNING_UPDATE_INTERVAL:-1h}"
          
          # A/B Testing Configuration
          export ARF_AB_TEST_ENABLED="${ARF_AB_TEST_ENABLED:-true}"
          export ARF_AB_TEST_MIN_SAMPLE_SIZE="${ARF_AB_TEST_MIN_SAMPLE_SIZE:-50}"
          export ARF_AB_TEST_CONFIDENCE_LEVEL="${ARF_AB_TEST_CONFIDENCE_LEVEL:-0.95}"
          export ARF_AB_TEST_MAX_DURATION="${ARF_AB_TEST_MAX_DURATION:-7d}"
          
          # Multi-Language Support
          export ARF_SUPPORTED_LANGUAGES="java,javascript,typescript,python,go,rust,c,cpp"
          export ARF_DEFAULT_LANGUAGE_TIMEOUT="30s"
          export ARF_AST_CACHE_SIZE="1000"
          
          # Development and Debug Settings
          export ARF_DEBUG_MODE="${ARF_DEBUG_MODE:-false}"
          export ARF_LOG_LEVEL="${ARF_LOG_LEVEL:-info}"
          export ARF_METRICS_ENABLED="${ARF_METRICS_ENABLED:-true}"
          export ARF_PROFILING_ENABLED="${ARF_PROFILING_ENABLED:-false}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - ARF vars"



    - name: Install build tools
      block:
        - name: Install make and build-essential
          apt:
            name:
              - build-essential
              - cmake
              - pkg-config
            state: present

        - name: Remove old KraftKit version
          file:
            path: /usr/local/bin/kraft
            state: absent

        - name: Download KraftKit
          get_url:
            url: "https://github.com/unikraft/kraftkit/releases/download/v{{ build_tools.kraft.version }}/kraft_{{ build_tools.kraft.version }}_linux_amd64.tar.gz"
            dest: /tmp/kraft.tar.gz

        - name: Extract KraftKit
          unarchive:
            src: /tmp/kraft.tar.gz
            dest: /usr/local/bin
            remote_src: true

        - name: Make KraftKit executable
          file:
            path: /usr/local/bin/kraft
            mode: '0755'

        - name: Verify KraftKit installation
          command: /usr/local/bin/kraft version
          register: kraft_version
          changed_when: false

        - name: Display KraftKit version
          debug:
            msg: "KraftKit installed successfully: {{ kraft_version.stdout_lines[0] if kraft_version.stdout_lines else 'Version info not available' }}"

        - name: Check if Capstan is already installed
          stat:
            path: /usr/local/bin/capstan
          register: capstan_binary

        - name: Download Capstan for OSv builds
          get_url:
            url: "https://github.com/cloudius-systems/capstan/releases/download/v{{ build_tools.capstan.version }}/capstan"
            dest: /usr/local/bin/capstan
            mode: '0755'
          when: not capstan_binary.stat.exists

        - name: Verify Capstan installation
          command: /usr/local/bin/capstan --version
          register: capstan_version
          changed_when: false
          ignore_errors: true

        - name: Display Capstan version
          debug:
            msg: "Capstan installed successfully: {{ capstan_version.stdout if capstan_version.rc == 0 else 'Version check not available' }}"

        - name: Setup OSv base image for Capstan
          block:
            - name: Create capstan repository structure for hashicorp user
              file:
                path: /opt/hashicorp/.capstan/repository/cloudius/osv/mike
                state: directory
                owner: hashicorp
                group: hashicorp
                mode: '0755'
              become: true

            - name: Download OSv loader image
              get_url:
                url: "https://github.com/cloudius-systems/osv/releases/download/v0.57.0/osv-loader.qemu.x86_64"
                dest: /tmp/osv-loader.qemu
                mode: '0644'
              become: true

            - name: Compress OSv loader image
              archive:
                path: /tmp/osv-loader.qemu
                dest: /opt/hashicorp/.capstan/repository/cloudius/osv/mike/osv-loader.qemu.gz
                format: gz
                remove: true
                owner: hashicorp
                group: hashicorp
                mode: '0644'
              become: true

            - name: Create index.yaml for OSv base image
              copy:
                content: |
                  format_version: "1"
                  version: "v0.57.0"
                  created: "2025-08-25T06:00:00Z"
                  description: "OSv base image for capstan"
                  platform: "x86_64"
                dest: /opt/hashicorp/.capstan/repository/cloudius/osv/index.yaml
                owner: hashicorp
                group: hashicorp
                mode: '0644'
              become: true

        - name: Setup Capstan Java packages
          block:
            - name: Create capstan packages directory
              file:
                path: /opt/hashicorp/.capstan/packages
                state: directory
                owner: hashicorp
                group: hashicorp
                mode: '0755'
              become: true

            - name: Download osv.bootstrap package from GitHub
              shell: |
                sudo -u hashicorp capstan package pull osv.bootstrap
              ignore_errors: true
              become: true

            - name: Download openjdk8-zulu-full package from S3
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/packages/openjdk8-zulu-full.mpm"
                dest: /opt/hashicorp/.capstan/packages/openjdk8-zulu-full.mpm
                owner: hashicorp
                group: hashicorp
                mode: '0644'
              become: true

            - name: Download openjdk8-zulu-full package YAML from S3
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/packages/openjdk8-zulu-full.yaml"
                dest: /opt/hashicorp/.capstan/packages/openjdk8-zulu-full.yaml
                owner: hashicorp
                group: hashicorp
                mode: '0644'
              become: true

            - name: Download openjdk8-zulu-compact1 package from S3
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/packages/openjdk8-zulu-compact1.mpm"
                dest: /opt/hashicorp/.capstan/packages/openjdk8-zulu-compact1.mpm
                owner: hashicorp
                group: hashicorp
                mode: '0644'
              become: true

            - name: Download openjdk8-zulu-compact1 package YAML from S3
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/packages/openjdk8-zulu-compact1.yaml"
                dest: /opt/hashicorp/.capstan/packages/openjdk8-zulu-compact1.yaml
                owner: hashicorp
                group: hashicorp
                mode: '0644'
              become: true

            - name: Download osv-loader from S3 to mike directory
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/mike/osv-loader/osv-loader.qemu.gz"
                dest: /opt/hashicorp/.capstan/repository/mike/osv-loader/osv-loader.qemu.gz
                owner: hashicorp
                group: hashicorp
                mode: '0644'
              become: true

            - name: Download osv-loader index from S3
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/mike/osv-loader/index.yaml"
                dest: /opt/hashicorp/.capstan/repository/mike/osv-loader/index.yaml
                owner: hashicorp
                group: hashicorp
                mode: '0644'
              become: true

            - name: Ensure mike directory structure exists
              file:
                path: /opt/hashicorp/.capstan/repository/mike/osv-loader
                state: directory
                owner: hashicorp
                group: hashicorp
                mode: '0755'
              become: true

        - name: Check if Cosign is already installed
          stat:
            path: /usr/local/bin/cosign
          register: cosign_binary

        - name: Get current Cosign version (if installed)
          command: /usr/local/bin/cosign version
          register: current_cosign_version
          changed_when: false
          ignore_errors: true
          when: cosign_binary.stat.exists

        - name: Download Cosign
          get_url:
            url: "https://github.com/sigstore/cosign/releases/download/v{{ build_tools.cosign.version }}/cosign-linux-amd64"
            dest: /usr/local/bin/cosign
            mode: '0755'
          when: not cosign_binary.stat.exists or build_tools.cosign.version not in (current_cosign_version.stdout | default(''))

        - name: Verify Cosign installation
          command: /usr/local/bin/cosign version
          register: cosign_version
          changed_when: false

        - name: Display Cosign version
          debug:
            msg: "Cosign installed successfully: {{ cosign_version.stdout_lines[0] if cosign_version.stdout_lines else 'Version info not available' }}"

        - name: Check if Syft is already installed
          stat:
            path: /usr/local/bin/syft
          register: syft_binary

        - name: Get current Syft version (if installed)
          command: /usr/local/bin/syft version
          register: current_syft_version
          changed_when: false
          ignore_errors: true
          when: syft_binary.stat.exists

        - name: Download Syft
          get_url:
            url: "https://github.com/anchore/syft/releases/download/v{{ build_tools.syft.version }}/syft_{{ build_tools.syft.version }}_linux_amd64.tar.gz"
            dest: /tmp/syft.tar.gz
          when: not syft_binary.stat.exists or build_tools.syft.version not in (current_syft_version.stdout | default(''))

        - name: Extract Syft
          unarchive:
            src: /tmp/syft.tar.gz
            dest: /usr/local/bin
            remote_src: true
          when: not syft_binary.stat.exists or build_tools.syft.version not in (current_syft_version.stdout | default(''))

        - name: Verify Syft installation
          command: /usr/local/bin/syft version
          register: syft_version
          changed_when: false

        - name: Display Syft version
          debug:
            msg: "Syft installed successfully: {{ syft_version.stdout_lines[1] if syft_version.stdout_lines|length > 1 else 'Version info not available' }}"

        - name: Check if Grype is already installed
          stat:
            path: /usr/local/bin/grype
          register: grype_binary

        - name: Get current Grype version (if installed)
          command: /usr/local/bin/grype version
          register: current_grype_version
          changed_when: false
          ignore_errors: true
          when: grype_binary.stat.exists

        - name: Download Grype
          get_url:
            url: "https://github.com/anchore/grype/releases/download/v{{ build_tools.grype.version }}/grype_{{ build_tools.grype.version }}_linux_amd64.tar.gz"
            dest: /tmp/grype.tar.gz
          when: not grype_binary.stat.exists or build_tools.grype.version not in (current_grype_version.stdout | default(''))

        - name: Extract Grype
          unarchive:
            src: /tmp/grype.tar.gz
            dest: /usr/local/bin
            remote_src: true
          when: not grype_binary.stat.exists or build_tools.grype.version not in (current_grype_version.stdout | default(''))

        - name: Verify Grype installation
          command: /usr/local/bin/grype version
          register: grype_version
          changed_when: false

        - name: Display Grype version
          debug:
            msg: "Grype installed successfully: {{ grype_version.stdout_lines[0] if grype_version.stdout_lines else 'Version info not available' }}"

        - name: Check if OPA is already installed
          stat:
            path: /usr/local/bin/opa
          register: opa_binary

        - name: Get current OPA version (if installed)
          command: /usr/local/bin/opa version
          register: current_opa_version
          changed_when: false
          ignore_errors: true
          when: opa_binary.stat.exists

        - name: Download OPA
          get_url:
            url: "https://github.com/open-policy-agent/opa/releases/download/v{{ build_tools.opa.version }}/opa_linux_amd64"
            dest: /usr/local/bin/opa
            mode: '0755'
          when: not opa_binary.stat.exists or build_tools.opa.version not in (current_opa_version.stdout | default(''))

        - name: Verify OPA installation
          command: /usr/local/bin/opa version
          register: opa_version
          changed_when: false

        - name: Display OPA version
          debug:
            msg: "OPA installed successfully: {{ opa_version.stdout_lines[0] if opa_version.stdout_lines else 'Version info not available' }}"

    - name: Install WASM development tools
      block:
        - name: Install Rust toolchain
          become_user: ploy
          block:
            - name: Check if rustup is installed
              stat:
                path: /home/ploy/.cargo/bin/rustup
              register: rustup_binary

            - name: Download rustup installer
              get_url:
                url: https://sh.rustup.rs
                dest: /tmp/rustup-init.sh
                mode: '0755'
              when: not rustup_binary.stat.exists

            - name: Install rustup
              command: /tmp/rustup-init.sh -y --default-toolchain stable
              when: not rustup_binary.stat.exists

            - name: Add wasm32-wasi target (legacy name)
              command: /home/ploy/.cargo/bin/rustup target add wasm32-wasi
              when: not rustup_binary.stat.exists
              ignore_errors: true

            - name: Add wasm32-wasip1 target (new WASI name)
              command: /home/ploy/.cargo/bin/rustup target add wasm32-wasip1
              when: not rustup_binary.stat.exists

            - name: Add wasm32-unknown-unknown target (browser WASM)
              command: /home/ploy/.cargo/bin/rustup target add wasm32-unknown-unknown
              when: not rustup_binary.stat.exists

            - name: Install WASM-related Rust tools
              command: /home/ploy/.cargo/bin/cargo install {{ item }}
              when: not rustup_binary.stat.exists
              loop:
                - wasm-bindgen-cli  # For JavaScript bindings
                - wasm-pack         # For building Rust WASM packages

        - name: Install Node.js and AssemblyScript
          block:
            - name: Install Node.js using NodeSource repository
              shell: |
                curl -fsSL https://deb.nodesource.com/setup_{{ nodejs_version }}.x | sudo -E bash -
                apt-get install -y nodejs
              args:
                creates: /usr/bin/node

            - name: Install AssemblyScript globally (latest stable)
              npm:
                name: assemblyscript
                global: true
                state: latest

            - name: Install additional WASM tools
              npm:
                name: "{{ item }}"
                global: true
                state: latest
              loop:
                - wasm-pack   # For Rust WASM builds
                - wasmtime    # WASM runtime for testing

        - name: Install Emscripten toolchain
          become_user: ploy
          block:
            - name: Clone Emscripten SDK
              git:
                repo: https://github.com/emscripten-core/emsdk.git
                dest: /home/ploy/emsdk
                version: main
              register: emsdk_clone

            - name: Install latest stable Emscripten
              shell: |
                cd /home/ploy/emsdk
                ./emsdk install latest
                ./emsdk activate latest
                echo 'source "/home/ploy/emsdk/emsdk_env.sh"' >> /home/ploy/.bashrc
              when: emsdk_clone.changed or not ansible_check_mode

            - name: Add Emscripten to user PATH
              lineinfile:
                path: /home/ploy/.bashrc
                line: 'source /home/ploy/emsdk/emsdk_env.sh'
                create: true
                owner: ploy
                group: ploy

        - name: Update ploy user environment for WASM development
          lineinfile:
            path: /home/ploy/.bashrc
            line: '{{ item }}'
            create: true
            owner: ploy
            group: ploy
          loop:
            - '# WASM Development Environment'
            - 'export PATH="$HOME/.cargo/bin:$PATH"'
            - 'export RUSTUP_HOME="$HOME/.rustup"'
            - 'export CARGO_HOME="$HOME/.cargo"'

    # MinIO has been replaced with SeaweedFS for better scalability and performance

    - name: Create ploy user for testing
      user:
        name: ploy
        groups: docker
        append: true
        shell: /bin/bash
        create_home: true

    - name: Clean up conflicting environment variables from /etc/environment
      lineinfile:
        path: /etc/environment
        regexp: '^GITHUB_PLOY_DEV_(USERNAME|PAT)='
        state: absent

    - name: Clean up conflicting PATH entries from user profile
      lineinfile:
        path: /home/ploy/.profile
        regexp: '^export PATH="/usr/bin:/bin:\$PATH"'
        state: absent
        owner: ploy
        group: ploy

    - name: Set GitHub environment variables for ploy user
      blockinfile:
        path: /home/ploy/.bashrc
        create: true
        owner: ploy
        group: ploy
        mode: '0644'
        block: |
          # GitHub environment variables for Ploy development
          export GITHUB_PLOY_DEV_USERNAME="{{ lookup('env', 'GITHUB_PLOY_DEV_USERNAME') }}"
          export GITHUB_PLOY_DEV_PAT="{{ lookup('env', 'GITHUB_PLOY_DEV_PAT') }}"
          
          # DNS provider environment variables
          {% if lookup('env', 'CLOUDFLARE_API_TOKEN') %}
          export CLOUDFLARE_API_TOKEN="{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"
          export CLOUDFLARE_ZONE_ID="{{ lookup('env', 'CLOUDFLARE_ZONE_ID') }}"
          {% endif %}
          {% if lookup('env', 'NAMECHEAP_SANDBOX_API_KEY') %}
          # Development environment uses sandbox API key
          export NAMECHEAP_API_KEY="{{ lookup('env', 'NAMECHEAP_SANDBOX_API_KEY') }}"
          export NAMECHEAP_API_USER="{{ lookup('env', 'NAMECHEAP_API_USER') | default('iw2rmb') }}"
          export NAMECHEAP_USERNAME="{{ lookup('env', 'NAMECHEAP_USERNAME') | default('iw2rmb') }}"
          export NAMECHEAP_CLIENT_IP="{{ lookup('env', 'NAMECHEAP_CLIENT_IP') | default(hostvars[groups['all'][0]]['ansible_default_ipv4']['address']) }}"
          export NAMECHEAP_SANDBOX="{{ lookup('env', 'NAMECHEAP_SANDBOX') | default('true') }}"
          {% endif %}
          
          # DNS configuration environment variables
          export PLOY_DNS_PROVIDER="{{ lookup('env', 'PLOY_DNS_PROVIDER') | default('namecheap') }}"
          export PLOY_DNS_DOMAIN="{{ lookup('env', 'PLOY_DNS_DOMAIN') | default('ployd.app') }}"
          export PLOY_DNS_TARGET_IP="{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}"
          
          # Platform wildcard certificate configuration
          export PLOY_APPS_DOMAIN="{{ ploy.apps_domain }}"
          export PLOY_APPS_DOMAIN_PROVIDER="{{ ploy.apps_domain_provider }}"
          
          # Development environment wildcard certificate (*.dev.ployd.app)
          # This is for DEV environment ONLY
          {% if ploy_environment is defined and ploy_environment == 'dev' %}
          export PLOY_DEV_SUBDOMAIN="dev"
          export PLOY_DEV_APPS_DOMAIN="dev.{{ ploy.apps_domain }}"
          export PLOY_WILDCARD_DOMAIN="*.dev.{{ ploy.apps_domain }}"
          export PLOY_CONTROLLER_DOMAIN="api.dev.{{ ploy.apps_domain }}"
          {% endif %}
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Environment vars"


    - name: Clone Ploy repository
      git:
        repo: https://github.com/iw2rmb/ploy.git
        dest: /home/ploy/ploy
        force: true
      become_user: ploy
      become: true

    - name: Create external storage configuration directory
      file:
        path: /etc/ploy/storage
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'

    - name: Create external storage configuration file
      copy:
        content: |
          # External Storage Configuration for Ploy Controller
          # SeaweedFS-based distributed storage
          
          storage:
            provider: seaweedfs
            
            # SeaweedFS Configuration
            master: "{{ storage_config.seaweedfs.master | default('localhost:9333') }}"
            filer: "{{ storage_config.seaweedfs.filer | default('localhost:8888') }}"
            collection: "{{ storage_config.seaweedfs.collection | default('ploy-artifacts') }}"
            replication: "{{ seaweedfs_single_node.replication | default(storage_config.seaweedfs.replication | default('001')) }}"
            timeout: {{ storage_config.seaweedfs.timeout | default(30) }}
            datacenter: "{{ storage_config.seaweedfs.datacenter | default('') }}"
            rack: "{{ storage_config.seaweedfs.rack | default('') }}"
            collections:
              artifacts: "{{ storage_config.seaweedfs.collections.artifacts | default('ploy-artifacts') }}"
              metadata: "{{ storage_config.seaweedfs.collections.metadata | default('ploy-metadata') }}"
              debug: "{{ storage_config.seaweedfs.collections.debug | default('ploy-debug') }}"
            
            # Client Configuration
            client:
              retry_config:
                max_retries: {{ storage_config.client.retry_config.max_retries | default(3) }}
                initial_delay: "{{ storage_config.client.retry_config.initial_delay | default('1s') }}"
                max_delay: "{{ storage_config.client.retry_config.max_delay | default('30s') }}"
                multiplier: {{ storage_config.client.retry_config.multiplier | default(2.0) }}
              health_check_config:
                interval: "{{ storage_config.client.health_check_config.interval | default('30s') }}"
                timeout: "{{ storage_config.client.health_check_config.timeout | default('10s') }}"
                failure_threshold: {{ storage_config.client.health_check_config.failure_threshold | default(3) }}
              enable_metrics: {{ storage_config.client.enable_metrics | default(true) }}
              enable_health_check: {{ storage_config.client.enable_health_check | default(true) }}
              max_operation_time: "{{ storage_config.client.max_operation_time | default('5m') }}"
        dest: /etc/ploy/storage/config.yaml
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Create DNS configuration directory
      file:
        path: /etc/ploy/dns
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'

    - name: Create DNS configuration file
      copy:
        content: |
          {
            "provider": "{{ ploy.dns.provider }}",
            "domain": "{{ ploy.dns.domain }}",
            "target_ip": "{{ ploy.dns.target_ip }}",
            "ttl": {{ ploy.dns.ttl }},
            "enable_ipv6": {{ ploy.dns.enable_ipv6 }},
            "cloudflare": {
              "api_token": "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}",
              "zone_id": "{{ lookup('env', 'CLOUDFLARE_ZONE_ID') }}"
            },
            "namecheap": {
              "api_user": "{{ lookup('env', 'NAMECHEAP_API_USER') }}",
              "api_key": "{{ lookup('env', 'NAMECHEAP_API_KEY') }}",
              "username": "{{ lookup('env', 'NAMECHEAP_USERNAME') }}",
              "client_ip": "{{ lookup('env', 'NAMECHEAP_CLIENT_IP') }}",
              "sandbox": {{ lookup('env', 'NAMECHEAP_SANDBOX') | default('false') | bool }}
            }
          }
        dest: /etc/ploy/dns/config.json
        owner: ploy
        group: ploy
        mode: '0600'
      when: ploy.dns is defined

    - name: Set up firewall
      ufw:
        rule: allow
        port: "{{ item }}"
      loop:
        - "22"
        - "{{ ploy.controller_port }}"
        - "4646"  # Nomad
        - "8500"  # Consul
        - "8200"  # Vault
        - "80"    # HTTP (Traefik)
        - "443"   # HTTPS (Traefik)
        - "8080"  # Traefik dashboard

    # SSL Certificate Provisioning Infrastructure
    - name: Install SSL certificate management tools
      block:
        - name: Install certbot for Let's Encrypt ACME client
          apt:
            name:
              - certbot
              - python3-certbot-dns-cloudflare
            state: present

        - name: Install lego ACME client (alternative to certbot with better DNS provider support)
          get_url:
            url: "https://github.com/go-acme/lego/releases/download/v{{ lego_version | default('4.14.2') }}/lego_v{{ lego_version | default('4.14.2') }}_linux_amd64.tar.gz"
            dest: /tmp/lego.tar.gz

        - name: Extract lego ACME client
          unarchive:
            src: /tmp/lego.tar.gz
            dest: /usr/local/bin
            remote_src: true

        - name: Make lego executable
          file:
            path: /usr/local/bin/lego
            mode: '0755'

        - name: Create SSL certificates directory (for legacy compatibility)
          file:
            path: /etc/ploy/certs
            state: directory
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Create Traefik data directory for ACME certificates
          file:
            path: /opt/ploy/traefik-data
            state: directory
            owner: root
            group: root
            mode: '0755'

        - name: Initialize ACME certificate files (with proper permissions)
          file:
            path: "{{ item }}"
            state: touch
            owner: root
            group: root
            mode: '0600'
          loop:
            - /opt/ploy/traefik-data/acme.json
            - /opt/ploy/traefik-data/dev-wildcard-acme.json

        - name: Create SSL certificate scripts directory
          file:
            path: /home/ploy/ploy/scripts/ssl
            state: directory
            owner: ploy
            group: ploy
            mode: '0755'

    - name: Setup platform certificate renewal automation
      block:
        - name: Create DNS validation script
          template:
            src: ../../common/templates/validate-dns-records.sh.j2
            dest: /home/ploy/ploy/scripts/ssl/validate-dns-records.sh
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Remove platform certificate renewal cron job (now handled by Traefik)
          cron:
            name: "Platform Wildcard Certificate Renewal"
            state: absent

    - name: Configure Namecheap DNS API environment
      block:
        - name: Set Namecheap API environment variables for certificate automation
          blockinfile:
            path: /home/ploy/.bashrc
            create: true
            owner: ploy
            group: ploy
            mode: '0644'
            block: |
              # SSL Certificate Automation Environment
              export CERT_EMAIL="{{ ploy_dev_certificate.email | default('admin@ployd.app') }}"
              export ACME_STAGING="{{ ploy_dev_certificate.staging | default('false') }}"
              
              # Certificate storage paths
              export CERT_DIR="/etc/ploy/certs"
              export DEV_CERT_PATH="{{ ploy_dev_certificate.cert_path | default('/etc/ploy/certs/dev-wildcard.crt') }}"
              export DEV_KEY_PATH="{{ ploy_dev_certificate.key_path | default('/etc/ploy/certs/dev-wildcard.key') }}"
              
              # Dev environment certificate domains
              export DEV_WILDCARD_DOMAIN="{{ ploy_dev_certificate.wildcard_domain | default('*.dev.ployd.app') }}"
              export DEV_BASE_DOMAIN="{{ ploy_dev_certificate.base_domain | default('dev.ployd.app') }}"
              export DEV_CONTROLLER_DOMAIN="{{ ploy_dev_routing.controller_domain | default('api.dev.ployd.app') }}"
            marker: "# {mark} ANSIBLE MANAGED BLOCK - SSL Certificate vars"

    - name: Initialize SSL certificate provisioning for dev environment
      block:
        - name: Check if DNS records are properly configured
          shell: |
            DEV_IP=$(dig +short {{ ploy_dev_certificate.base_domain | default('dev.ployd.app') }} | tail -n1)
            API_IP=$(dig +short {{ ploy_dev_routing.controller_domain | default('api.dev.ployd.app') }} | tail -n1)
            TARGET_IP="{{ ansible_default_ipv4.address }}"
            
            if [ "$DEV_IP" = "$TARGET_IP" ] && [ "$API_IP" = "$TARGET_IP" ]; then
              echo "DNS_READY"
            else
              echo "DNS_NOT_READY"
              echo "Current: {{ ploy_dev_certificate.base_domain | default('dev.ployd.app') }} -> $DEV_IP"
              echo "Current: {{ ploy_dev_routing.controller_domain | default('api.dev.ployd.app') }} -> $API_IP"
              echo "Required: $TARGET_IP"
            fi
          register: dns_status
          changed_when: false

        - name: Display DNS configuration status
          debug:
            msg: |
              DNS Configuration Status: {{ dns_status.stdout_lines[0] }}
              {% if dns_status.stdout_lines|length > 1 %}
              Details:
              {% for line in dns_status.stdout_lines[1:] %}
                {{ line }}
              {% endfor %}
              {% endif %}

        - name: Skip manual certificate provisioning (now handled by Traefik ACME)
          debug:
            msg: |
              Manual certificate provisioning disabled - Traefik will automatically obtain certificates via ACME.
              Traefik configuration includes:
              - DNS challenge with Namecheap provider
              - Wildcard certificate for {{ ploy_dev_certificate.wildcard_domain | default('*.dev.ployd.app') }}
              - Automatic certificate renewal
              
              Certificate will be available at: https://api.dev.ployd.app
          when: ploy_environment is defined and ploy_environment == 'dev'

        - name: Display certificate provisioning approach
          debug:
            msg: |
              Certificate provisioning approach: Traefik ACME automation
              - Certificates will be automatically obtained when Traefik starts
              - DNS challenge will use Namecheap API
              - Wildcard certificate will cover *.dev.ployd.app
              - No manual intervention required

    # Platform wildcard certificate health check (after controller deployment)
    - name: Wait for controller health endpoint to be available
      uri:
        url: "http://localhost:{{ ploy.controller_port }}/health"
        method: GET
        status_code: 200
      register: health_check
      retries: 30
      delay: 5
      until: health_check.status == 200
      when: ploy.apps_domain is defined and ploy.apps_domain != ""

    - name: Check platform wildcard certificate health
      uri:
        url: "http://localhost:{{ ploy.controller_port }}/health/platform-certificates"
        method: GET
        status_code: [200, 503]  # 503 is acceptable during initial provisioning
      register: cert_health_check
      retries: 60  # More retries for certificate provisioning
      delay: 15
      until: cert_health_check.status == 200
      when: ploy.apps_domain is defined and ploy.apps_domain != ""
      ignore_errors: true  # Don't fail playbook if certificate provisioning has issues

    - name: Display platform certificate health status
      debug:
        msg: |
          Platform Certificate Health Status: {{ cert_health_check.json.status if cert_health_check.json is defined else 'unavailable' }}
          Domain: {{ cert_health_check.json.platform_domain if cert_health_check.json is defined and cert_health_check.json.platform_domain is defined else ploy.apps_domain }}
          Wildcard: {{ cert_health_check.json.wildcard_domain if cert_health_check.json is defined and cert_health_check.json.wildcard_domain is defined else 'not provisioned' }}
          {% if cert_health_check.json is defined and cert_health_check.json.expires_at is defined %}
          Expires: {{ cert_health_check.json.expires_at }}
          Days until expiry: {{ cert_health_check.json.days_until_expiry }}
          {% endif %}
      when: 
        - ploy.apps_domain is defined and ploy.apps_domain != ""
        - cert_health_check is defined