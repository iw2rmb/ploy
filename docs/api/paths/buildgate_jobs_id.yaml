get:
  tags: [Control]
  summary: Get build validation job status
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
  responses:
    '200':
      description: Job status
      content:
        application/json:
          schema:
            $ref: '../OpenAPI.yaml#/components/schemas/BuildGateJobStatusResponse'
    '404': { description: Job not found }
