# Mods environment defaults for VPS

- name: Configure Mods environment defaults
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
  vars:
    mods_registry: "registry.{{ ploy.platform_domain }}"
    planner_image: "{{ mods_registry }}/langgraph-runner:latest"
    reducer_image: "{{ mods_registry }}/langgraph-runner:latest"
    llm_exec_image: "{{ mods_registry }}/langgraph-runner:latest"
    orw_apply_image: "{{ mods_registry }}/openrewrite-jvm:latest"

  tasks:
    - name: Add Mods registry and image environment variables for ploy user (.bashrc)
      blockinfile:
        path: /home/ploy/.bashrc
        create: true
        owner: ploy
        group: ploy
        mode: '0644'
        block: |
          # Mods container registry and image defaults
          export MODS_REGISTRY="{{ mods_registry }}"
          export MODS_PLANNER_IMAGE="{{ planner_image }}"
          export MODS_REDUCER_IMAGE="{{ reducer_image }}"
          export MODS_LLM_EXEC_IMAGE="{{ llm_exec_image }}"
          export MODS_ORW_APPLY_IMAGE="{{ orw_apply_image }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Mods Images"

    - name: Add Mods registry and image environment variables for ploy user (.profile)
      blockinfile:
        path: /home/ploy/.profile
        create: true
        owner: ploy
        group: ploy
        mode: '0644'
        block: |
          # Mods container registry and image defaults
          export MODS_REGISTRY="{{ mods_registry }}"
          export MODS_PLANNER_IMAGE="{{ planner_image }}"
          export MODS_REDUCER_IMAGE="{{ reducer_image }}"
          export MODS_LLM_EXEC_IMAGE="{{ llm_exec_image }}"
          export MODS_ORW_APPLY_IMAGE="{{ orw_apply_image }}"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Mods Images"

    - name: Print Mods environment configuration summary
      debug:
        msg: |
          Mods environment configured:
            MODS_REGISTRY={{ mods_registry }}
            MODS_PLANNER_IMAGE={{ planner_image }}
            MODS_REDUCER_IMAGE={{ reducer_image }}
            MODS_LLM_EXEC_IMAGE={{ llm_exec_image }}
            MODS_ORW_APPLY_IMAGE={{ orw_apply_image }}
