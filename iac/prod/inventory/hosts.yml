# Production Inventory - Multi-Node Ploy Cluster
# 
# REQUIREMENTS:
# - Minimum 3 nodes total
# - At least 2 Linux nodes
# - At least 1 FreeBSD node
# 
# EXAMPLE CONFIGURATION:
# Replace with your actual production servers

all:
  vars:
    # Global production settings
    ansible_user: root
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    # Linux nodes for primary services
    linux_hosts:
      hosts:
        ploy-prod-01:
          ansible_host: 10.0.1.10
          # Primary node - runs all services
          node_role: primary
          services:
            - nomad-server
            - consul-server
            - vault-server
            - seaweedfs-master
            - seaweedfs-volume
            - seaweedfs-filer
            - traefik
            - controller
        
        ploy-prod-02:
          ansible_host: 10.0.1.11
          # Secondary node - backup services
          node_role: secondary
          services:
            - nomad-server
            - consul-server
            - vault-server
            - seaweedfs-master
            - seaweedfs-volume
            - nomad-client

    # FreeBSD nodes for specialized workloads
    freebsd_hosts:
      hosts:
        ploy-prod-freebsd:
          ansible_host: 10.0.1.20
          ansible_python_interpreter: /usr/local/bin/python3.9
          node_role: worker
          services:
            - nomad-client
            - jail-runtime
          # FreeBSD-specific configuration
          freebsd_version: "14.1"
          jail_config:
            enabled: true
            base_datasets:
              - "zfs create -o mountpoint=/jails zroot/jails"
              - "zfs create zroot/jails/base"

    # Load balancer group (optional)
    loadbalancers:
      hosts:
        # Add load balancer nodes if needed

