# GET /v1/runs/{id}/logs — SSE stream for run logs and events
#
# Event payloads:
# - `event: run` → RunSummary (canonical schema, no wrapper)
# - `event: log` → LogRecord (enriched log line)
# - `event: retention` → RetentionHint
# - `event: done` → Terminal sentinel
#
# See docs/mods-lifecycle.md § 7 for complete SSE contract.
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    description: Run ID (KSUID string, 27 characters).
  - in: header
    name: Last-Event-ID
    required: false
    description: |
      Optional SSE resume token. Server replays events with `id` greater than
      this value. Use for reconnection after network failures.
    schema:
      type: string
      example: "42"
get:
  tags: [Control]
  summary: Stream run logs (SSE)
  description: |
    Server-Sent Events stream for real-time run status and log updates.
    Supports `Last-Event-ID` header for resume after reconnection.

    ## Event Types

    | Event Type   | Payload Schema | Description                                    |
    |--------------|----------------|------------------------------------------------|
    | `run`        | `RunSummary`   | Run lifecycle snapshot (state changes)         |
    | `log`        | `LogRecord`    | Enriched log line with execution context       |
    | `retention`  | `RetentionHint`| Artifact retention metadata                    |
    | `done`       | `Status`       | Terminal sentinel; stream closes after this    |

    ## `event: run` — Run Lifecycle Snapshots

    Each `event: run` frame carries the canonical `RunSummary` schema:
    - `run_id`: KSUID string (27 characters).
    - `state`: `pending`, `running`, `succeeded`, `failed`, `cancelling`, `cancelled`.
    - `repository`: Git repository URL.
    - `metadata`: Derived context (refs, node_id, gate_summary, reason).
    - `stages`: Map of job IDs (KSUID) to `StageStatus` objects.
    - `created_at`, `updated_at`: RFC 3339 timestamps.

    **Example:**
    ```
    event: run
    data: {"run_id":"2NQPoBfVkc8dFmGAQqJnUwMu9jR","state":"running","repository":"https://github.com/org/repo.git","metadata":{"node_id":"aB3xY9"},"created_at":"2025-01-15T10:00:00Z","updated_at":"2025-01-15T10:05:00Z","stages":{"2NQPoBfVkc8dFmGAQqJnUwMu9jS":{"state":"succeeded","step_index":1000}}}
    ```

    ## `event: log` — Enriched Log Records

    Each `event: log` frame carries a JSON-encoded `LogRecord`:

    **Core fields (always present):**
    | Field       | Type   | Description                                       |
    |-------------|--------|---------------------------------------------------|
    | `timestamp` | string | RFC 3339 timestamp when the log line was captured |
    | `stream`    | string | Output stream (`stdout` or `stderr`)              |
    | `line`      | string | Log message content                               |

    **Enriched fields (optional, omitempty):**
    | Field        | Type   | Description                                                      |
    |--------------|--------|------------------------------------------------------------------|
    | `node_id`    | string | Node ID (NanoID 6-character string) that produced this log line  |
    | `job_id`     | string | Job ID (KSUID string) that produced this log line                |
    | `mod_type`   | string | Job phase: `pre_gate`, `mod`, `post_gate`, `heal`, `re_gate`     |
    | `step_index` | number | Float index of the job (e.g., 1000, 2000, 3000; may be fractional) |

    **Example:**
    ```
    event: log
    data: {"timestamp":"2025-01-15T10:05:00Z","stream":"stdout","line":"Step started","node_id":"aB3xY9","job_id":"2NQPoBfVkc8dFmGAQqJnUwMu9jR","mod_type":"mod","step_index":2000}
    ```

    ## `event: retention` — Retention Metadata

    Emitted when artifact retention status changes:
    ```
    event: retention
    data: {"retained":true,"ttl":86400,"expires_at":"2025-01-16T10:00:00Z","bundle_cid":"QmXyz..."}
    ```

    ## `event: done` — Terminal Sentinel

    Signals stream completion. The server closes the connection after this event:
    ```
    event: done
    data: {"status":"done"}
    ```

    See `docs/mods-lifecycle.md` § 7 for the complete SSE contract specification.
  responses:
    '200':
      description: OK — SSE stream established.
      content:
        text/event-stream:
          schema:
            type: string
            description: |
              Server-Sent Events stream. Each frame consists of `event:` type and
              `data:` JSON payload. See description above for payload schemas.
    '400':
      description: Bad Request — missing or invalid run ID.
    '404':
      description: Not Found — run does not exist.
    '500':
      description: Internal Server Error.

post:
  tags: [Control]
  summary: Upload run log chunk
  description: |
    Uploads a gzipped log chunk for a run with an optional job association.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            job_id:
              type: string
              nullable: true
              description: Optional job ID (KSUID string).
            chunk_no:
              type: integer
              format: int32
              description: Monotonic chunk number per (run_id, job_id).
            data:
              type: string
              format: byte
              description: Base64-encoded gzipped log bytes (<= 10 MiB decoded).
          required: [chunk_no, data]
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            type: object
            properties:
              id: { type: integer, format: int64 }
              chunk_no: { type: integer, format: int32 }
            required: [id, chunk_no]
    '400':
      description: Bad request
    '404':
      description: Run not found
    '413':
      description: Payload too large
    '500':
      description: Server error
