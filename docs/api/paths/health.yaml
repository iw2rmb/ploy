get:
  tags: [Control]
  summary: Readiness probe with process identity
  description: |
    Reports whether the control plane is ready to serve traffic. This legacy
    probe uses the same readiness contract as `/readyz` and includes the running
    binary identity plus database schema version metadata.
  security: []
  responses:
    '200':
      description: Control plane is ready
      content:
        application/json:
          schema:
            $ref: "../components/schemas/controlplane.yaml#/ControlPlaneReadinessHealth"
    '503':
      description: Control plane is not ready
      content:
        application/json:
          schema:
            $ref: "../components/schemas/controlplane.yaml#/ControlPlaneReadinessHealth"
