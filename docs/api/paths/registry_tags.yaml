get:
  tags: [Registry]
  summary: List tags for a repository.
  parameters:
    - $ref: '#/components/parameters/RegistryRepository'
  responses:
    '200':
      description: Tags (empty if none).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegistryTagList'
    '403':
      description: Caller lacks the required scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '503':
      description: Registry backend unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
