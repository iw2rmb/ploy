http:
  listen: ":8080"

metrics:
  listen: ":9100"

admin:
  socket: "/run/ployd.sock"

auth:
  bearer_tokens:
    enabled: true
    secret: ""  # Load from PLOY_AUTH_SECRET env var

control_plane:
  endpoint: "http://localhost:8080"
  token: ""  # Set via PLOY_ADMIN_TOKEN env var or generate after startup

pki:
  ca_cert_path: "/etc/ploy/pki/ca.crt"
  ca_key_path: "/etc/ploy/pki/ca.key"

postgres:
  dsn: ""

