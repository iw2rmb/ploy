---
# Ploy Controller Deployment via Nomad
#
# This playbook handles the controller deployment through Nomad instead of systemd:
# - Builds controller binary and distribution tools
# - Uploads controller binary to SeaweedFS storage
# - Deploys controller as Nomad job with high availability
# - Validates controller deployment and health
# - Implements proper service ordering and dependencies
#
- name: Deploy Ploy Controller via Nomad
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
    - ../vars/dev-wildcard.yml
  
  tasks:
    - name: Ensure proper service ordering - verify dependencies are running
      block:
        - name: Wait for SeaweedFS services to be healthy
          wait_for:
            port: "{{ item }}"
            delay: 5
            timeout: 60
          loop:
            - "{{ seaweedfs.master_port }}"
            - "{{ seaweedfs.volume_port }}"
            - "{{ seaweedfs.filer_port }}"

        - name: Wait for HashiCorp services to be healthy
          wait_for:
            port: "{{ item }}"
            delay: 5
            timeout: 60
          loop:
            - "8500"  # Consul
            - "4646"  # Nomad
            - "8200"  # Vault

        - name: Verify Nomad cluster is ready
          uri:
            url: "http://localhost:4646/v1/status/leader"
            method: GET
            status_code: 200
          register: nomad_leader_check
          retries: 6
          delay: 10
          until: nomad_leader_check.status == 200

        - name: Display service dependency status
          debug:
            msg: "All required services (SeaweedFS, Consul, Nomad, Vault) are healthy and ready"

    - name: Build required binaries for unified deployment
      block:
        - name: Build controller API binary
          shell: cd /home/ploy/ploy && /usr/local/go/bin/go build -o bin/api ./controller
          become_user: ploy
          register: controller_build
          changed_when: controller_build.rc == 0

        - name: Build CLI (ploy) binary
          shell: cd /home/ploy/ploy && /usr/local/go/bin/go build -o bin/ploy ./cmd/ploy
          become_user: ploy
          register: ploy_build
          changed_when: ploy_build.rc == 0

        - name: Build ployman CLI for management
          shell: cd /home/ploy/ploy && /usr/local/go/bin/go build -o bin/ployman ./cmd/ployman
          become_user: ploy
          register: ployman_build
          changed_when: ployman_build.rc == 0

        - name: Verify binaries were created successfully
          stat:
            path: "/home/ploy/ploy/bin/{{ item }}"
          register: binary_check
          loop:
            - api
            - ploy
            - ployman

        - name: Display build results
          debug:
            msg: "Successfully built: {{ item.item }} (exists: {{ item.stat.exists }})"
          loop: "{{ binary_check.results }}"

    - name: Initialize unified deployment system
      block:
        - name: Generate deployment version identifier
          shell: echo "$(date +%Y%m%d-%H%M%S)-$(cd /home/ploy/ploy && git rev-parse --short HEAD)"
          register: deployment_version
          become_user: ploy
          changed_when: false

        - name: Set deployment version variable
          set_fact:
            current_deployment_version: "{{ deployment_version.stdout }}"

        - name: Bootstrap API using local binary deployment
          shell: |
            cd /home/ploy/ploy
            # Create a bootstrap Nomad job using local binary
            cp /home/ploy/ploy/bin/api /tmp/ploy-api-bootstrap
            chmod +x /tmp/ploy-api-bootstrap
          become_user: ploy
          register: bootstrap_prepare
          changed_when: bootstrap_prepare.rc == 0

        - name: Display bootstrap preparation results
          debug:
            msg: "Bootstrap binary prepared for deployment version {{ current_deployment_version }}"

    - name: Deploy controller using unified deployment approach
      block:
        - name: Create bootstrap Nomad job for initial deployment
          template:
            src: ../templates/nomad-ploy-api-bootstrap.hcl.j2
            dest: /opt/hashicorp/nomad/jobs/ploy-api-bootstrap.hcl
            owner: hashicorp
            group: hashicorp
            mode: '0644'
          vars:
            deployment_version: "{{ current_deployment_version }}"

        - name: Validate bootstrap job syntax
          command: nomad job validate /opt/hashicorp/nomad/jobs/ploy-api-bootstrap.hcl
          register: bootstrap_validate
          changed_when: false
          environment:
            NOMAD_ADDR: "http://localhost:4646"

        - name: Check if any controller job is running
          uri:
            url: "http://localhost:4646/v1/job/ploy-api"
            method: GET
            status_code: [200, 404]
          register: controller_job_check
          ignore_errors: true

        - name: Stop existing controller job if running
          command: nomad job stop ploy-api
          environment:
            NOMAD_ADDR: "http://localhost:4646"
          when: controller_job_check.status == 200
          ignore_errors: true

        - name: Deploy bootstrap controller job
          command: nomad job run /opt/hashicorp/nomad/jobs/ploy-api-bootstrap.hcl
          register: bootstrap_deploy
          environment:
            NOMAD_ADDR: "http://localhost:4646"

        - name: Wait for bootstrap allocation to be running
          uri:
            url: "http://localhost:4646/v1/job/ploy-api/allocations"
            method: GET
            status_code: 200
          register: bootstrap_allocs
          until: >
            bootstrap_allocs.json | length > 0 and
            (bootstrap_allocs.json | map(attribute='ClientStatus') | list | unique) == ['running']
          retries: 20
          delay: 15

        - name: Display bootstrap deployment status
          debug:
            msg: "Bootstrap controller deployed successfully with {{ bootstrap_allocs.json | length }} allocation(s)"

        - name: Wait for bootstrap API to be available
          uri:
            url: "http://localhost:{{ ploy.controller_port }}/health"
            method: GET
            status_code: 200
          register: bootstrap_health
          retries: 10
          delay: 15
          until: bootstrap_health.status == 200

        - name: Mark bootstrap as ready for unified deployment transition
          copy:
            content: |
              # Bootstrap deployment completed at {{ ansible_date_time.iso8601 }}
              # Ready for transition to unified deployment system
              # Use: PLOY_CONTROLLER=https://api.dev.ployman.app/v1 ./bin/ployman push -a ploy-api
              BOOTSTRAP_VERSION={{ current_deployment_version }}
              UNIFIED_TRANSITION_READY=true
            dest: /opt/ploy/bootstrap-status
            owner: ploy
            group: ploy
            mode: '0644'

        - name: Display transition instructions
          debug:
            msg: |
              Bootstrap deployment complete!
              
              To transition to unified deployment system:
              1. Verify API is accessible: curl https://api.dev.ployman.app/health
              2. Deploy via unified system: PLOY_CONTROLLER=https://api.dev.ployman.app/v1 ./bin/ployman push -a ploy-api
              3. Verify deployment: curl https://api.dev.ployman.app/v1/version
              
              Bootstrap version: {{ current_deployment_version }}

    - name: Validate bootstrap deployment
      block:
        - name: Wait for bootstrap API health endpoint
          uri:
            url: "http://localhost:{{ ploy.controller_port }}/health"
            method: GET
            status_code: 200
          register: bootstrap_health
          retries: 12
          delay: 10
          until: bootstrap_health.status == 200

        - name: Verify bootstrap API readiness
          uri:
            url: "http://localhost:{{ ploy.controller_port }}/ready"
            method: GET
            status_code: 200
          register: bootstrap_ready
          retries: 6
          delay: 10
          until: bootstrap_ready.status == 200

        - name: Test bootstrap API endpoints
          uri:
            url: "http://localhost:{{ ploy.controller_port }}/v1/health"
            method: GET
            status_code: 200
          register: bootstrap_api_test
          ignore_errors: true

        - name: Display bootstrap validation results
          debug:
            msg: "Bootstrap API is healthy and ready. Ready for unified deployment transition."

        - name: Save current deployment version for future reference
          copy:
            content: "{{ current_deployment_version }}"
            dest: /opt/ploy/current-api-version
            owner: ploy
            group: ploy
            mode: '0644'

        - name: Enable unified deployment for future updates
          copy:
            content: "unified-deployment-enabled"
            dest: /opt/ploy/deployment-method
            owner: ploy
            group: ploy
            mode: '0644'

    - name: Configure controller management tools
      block:
        - name: Create controller management scripts directory
          file:
            path: /home/ploy/controller-scripts
            state: directory
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Create controller update script
          template:
            src: ../templates/update-api.sh.j2
            dest: /home/ploy/controller-scripts/update-api.sh
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Create controller rollback script
          template:
            src: ../templates/rollback-api.sh.j2
            dest: /home/ploy/controller-scripts/rollback-api.sh
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Create controller status script
          template:
            src: ../templates/controller-status.sh.j2
            dest: /home/ploy/controller-scripts/controller-status.sh
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Create controller migration script
          template:
            src: ../templates/migrate-api.sh.j2
            dest: /home/ploy/controller-scripts/migrate-api.sh
            owner: ploy
            group: ploy
            mode: '0755'

    - name: Set up firewall for controller
      ufw:
        rule: allow
        port: "{{ ploy.controller_port }}"
        comment: "Ploy Controller API"

    - name: Display bootstrap deployment summary
      debug:
        msg: |
          Bootstrap API deployment completed successfully:
          - Version: {{ current_deployment_version }}
          - Deployment method: Bootstrap Nomad job (local binary)
          - Health endpoint: http://localhost:{{ ploy.controller_port }}/health
          - External access: https://api.dev.ployman.app/health
          - Management tools: Available in /home/ploy/controller-scripts/
          
          NEXT STEPS:
          1. Verify external API access: curl https://api.dev.ployman.app/health
          2. Transition to unified deployment: PLOY_CONTROLLER=https://api.dev.ployman.app/v1 ./bin/ployman push -a ploy-api
          3. Future deployments will use the unified system automatically