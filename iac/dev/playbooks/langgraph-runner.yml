# LangGraph Runner Image Provisioning for Mods
# Pulls or builds the LangGraph runner image and pushes it to the local Docker Registry.

- name: Provision LangGraph Runner image for Mods
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
  vars:
    mods_registry: "registry.{{ ploy_domain | default('dev.ployman.app') }}"
    langgraph_image_name: "langgraph-runner"
    langgraph_image_tag: "latest"

  tasks:
    - name: Ensure Nomad job manager directory exists
      file:
        path: /opt/hashicorp/bin
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Install Nomad job manager wrapper
      copy:
        src: "{{ playbook_dir }}/../../common/scripts/nomad-job-manager.sh"
        dest: "/opt/hashicorp/bin/nomad-job-manager.sh"
        owner: root
        group: root
        mode: '0755'

    - name: Ensure remote build directory exists
      file:
        path: /home/ploy/ploy/services/langgraph-runner
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'

    - name: Copy stub Dockerfile to remote
      copy:
        src: "{{ playbook_dir }}/../../../services/langgraph-runner/Dockerfile"
        dest: "/home/ploy/ploy/services/langgraph-runner/Dockerfile"
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Copy stub entrypoint to remote
      copy:
        src: "{{ playbook_dir }}/../../../services/langgraph-runner/entrypoint.sh"
        dest: "/home/ploy/ploy/services/langgraph-runner/entrypoint.sh"
        owner: ploy
        group: ploy
        mode: '0755'
    - name: Ensure Docker is installed and running
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Pull LangGraph runner image from local registry (if available)
      shell: |
        set -euo pipefail
        docker pull {{ mods_registry }}/{{ langgraph_image_name }}:{{ langgraph_image_tag }} >/dev/null 2>&1 && echo "Pulled from local registry" || echo "Not present in local registry"
      args:
        executable: /bin/bash
      register: pull_local
      ignore_errors: true

    - name: Build LangGraph runner image with no cache (ensure latest)
      shell: |
        set -euo pipefail
        docker build --no-cache -t {{ mods_registry }}/{{ langgraph_image_name }}:{{ langgraph_image_tag }} /home/ploy/ploy/services/langgraph-runner
      args:
        executable: /bin/bash

    - name: Push LangGraph runner image to local registry
      shell: |
        set -euo pipefail
        docker push {{ mods_registry }}/{{ langgraph_image_name }}:{{ langgraph_image_tag }}
      args:
        executable: /bin/bash

    - name: Display LangGraph image info
      debug:
        msg: "LangGraph runner available at {{ mods_registry }}/{{ langgraph_image_name }}:{{ langgraph_image_tag }}"

    - name: Ensure prune script exists
      copy:
        dest: "/usr/local/bin/registry-prune.sh"
        mode: '0755'
        content: |
          {% raw %}
          #!/usr/bin/env bash
          set -euo pipefail
          REGISTRY="${1}"
          IMAGE="${2}"
          KEEP=3
          echo "Pruning tags for ${IMAGE} at ${REGISTRY} (keeping ${KEEP})"
          # Try HTTPS then HTTP for tag listing
          tags_json=$(curl -fsSL https://${REGISTRY}/v2/${IMAGE}/tags/list || curl -fsSL http://${REGISTRY}/v2/${IMAGE}/tags/list || echo '{}')
          tags=$(echo "$tags_json" | jq -r '.tags[]' | sort -V || true)
          # Always keep 'latest'
          keep_tags=(latest)
          mapfile -t other_tags < <(echo "${tags}" | grep -v '^latest$' || true)
          if [ ${#other_tags[@]} -gt 0 ]; then
            # take last (highest) two by version-sort if available
            cnt=${#other_tags[@]}
            if [ $cnt -ge 2 ]; then
              keep_tags+=("${other_tags[$((cnt-2))]}" "${other_tags[$((cnt-1))]}")
            else
              keep_tags+=("${other_tags[0]}")
            fi
          fi
          echo "Keeping: ${keep_tags[*]}"
          for tag in ${tags}; do
            skip=false
            for k in "${keep_tags[@]}"; do
              if [ "$tag" = "$k" ]; then skip=true; break; fi
            done
            if [ "$skip" = true ]; then continue; fi
            # Fetch manifest digest for tag
            digest=$(curl -fsSI -H 'Accept: application/vnd.docker.distribution.manifest.v2+json' \\
                     https://${REGISTRY}/v2/${IMAGE}/manifests/${tag} | awk -F': ' '/Docker-Content-Digest/{print $2}' | tr -d '\\r')
            if [ -z "$digest" ]; then
              digest=$(curl -fsSI -H 'Accept: application/vnd.docker.distribution.manifest.v2+json' \\
                       http://${REGISTRY}/v2/${IMAGE}/manifests/${tag} | awk -F': ' '/Docker-Content-Digest/{print $2}' | tr -d '\\r' || true)
            fi
            if [ -n "$digest" ]; then
              echo "Deleting ${IMAGE}:${tag} (digest ${digest})"
              curl -fsS -X DELETE https://${REGISTRY}/v2/${IMAGE}/manifests/${digest} || \
              curl -fsS -X DELETE http://${REGISTRY}/v2/${IMAGE}/manifests/${digest} || true
            fi
          done
          echo "Prune complete"
          {% endraw %}

    - name: Prune old LangGraph runner tags in registry (keep latest + 2 previous)
      shell: "/usr/local/bin/registry-prune.sh {{ mods_registry }} {{ langgraph_image_name }}"
      args:
        executable: /bin/bash
      ignore_errors: true
