manifest_version = "v2"
name = "smoke"
version = "2025-09-26"
summary = """
## Purpose
Ensure migs workflows stick to baseline caches and fixtures.
"""

[topology]
description = "Standard migs topology"

[[topology.allow]]
from = "migs-api"
to = "postgres"

[[topology.allow]]
from = "migs-api"
to = "redis"

[[topology.deny]]
from = "migs-api"
to = "internet"
reason = "Block egress"

[[services]]
name = "migs-postgres"
kind = "postgres"
[services.identity]
dns = "migs-postgres.svc.local"
[[services.ports]]
name = "psql"
port = 5432
protocol = "tcp"

[[services]]
name = "migs-api"
kind = "http"
[services.identity]
dns = "migs-api.svc.local"
[[services.ports]]
name = "metrics"
port = 9100
protocol = "tcp"
[[services.ports]]
name = "http"
port = 8080
protocol = "tcp"
[[services.requires]]
target = "migs-postgres"
edge = "api->postgres"
[[services.requires]]
target = "migs-redis"
edge = "api->redis"

[[services]]
name = "migs-redis"
kind = "redis"
optional = true
[services.identity]
dns = "migs-redis.svc.local"
[[services.ports]]
name = "tcp"
port = 6379
protocol = "tcp"

[fixtures]

[[fixtures.required]]
name = "postgres"
reference = "snapshot:dev-db"

[[fixtures.required]]
name = "redis"
reference = "cache:redis"

[[fixtures.optional]]
name = "elasticsearch"
reference = "service:es"
reason = "Only when search stack enabled"

[lanes]

[[lanes.required]]
name = "node-wasm"
reason = "migs DAG"

[[lanes.required]]
name = "go-native"
reason = "build/test baseline"

[[lanes.allowed]]
name = "python-slim"
reason = "data tooling"

[[edges]]
source = "migs-api"
target = "migs-redis"
ports = ["tcp"]
protocols = ["tcp"]

[[edges]]
source = "migs-api"
target = "migs-postgres"
ports = ["psql"]
protocols = ["tcp"]

[[exposures]]
service = "migs-api"
port = "http"
mode = "public"

[[exposures]]
service = "migs-api"
port = "metrics"
mode = "cluster"
