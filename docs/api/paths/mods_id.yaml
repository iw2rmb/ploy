get:
  tags: [Control]
  summary: Get Mods run status
  description: |
    Return the current status of a Mods run identified by its `run_id`
    (KSUID string). The response includes status, derived failure/gate metadata,
    repo details, refs, optional commit SHA, and timestamps.
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
      # Run IDs are KSUID strings (27 characters, lexicographically sortable).
      description: Run ID (KSUID string)
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/RunStatus'
    '400':
      description: Bad request (missing or empty run id)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Run not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
