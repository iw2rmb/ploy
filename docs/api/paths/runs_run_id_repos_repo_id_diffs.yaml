get:
  tags: [Artifacts]
  summary: List diffs for a repo execution within a run
  description: |
    Returns all diffs for a specific repository execution within a run.
    This is the v1 repo-scoped diffs endpoint.

    Behavior:
    - Repo attribution comes from joining diffs.job_id -> jobs.repo_id
    - Diffs for repo A are excluded from repo B listing
    - Response shape is `DiffListResponse`

    Download mode:
    - When `download=true` and `diff_id` is provided, the endpoint returns the
      gzipped patch bytes for that diff (only if it belongs to this run+repo).

    Diffs are ordered by execution chain position, then by created_at (ascending).
  parameters:
    - in: path
      name: run_id
      required: true
      schema:
        type: string
      # Run IDs are KSUID strings (27 characters, lexicographically sortable).
      description: Run ID (KSUID string)
    - in: path
      name: repo_id
      required: true
      schema:
        type: string
      # Repo IDs are NanoID strings (8 characters, URL-safe alphabet).
      description: Repo ID (NanoID 8-character string)
    - in: query
      name: download
      required: false
      schema:
        type: string
        enum: ["true"]
      description: When set to `true`, return the gzipped patch for `diff_id` instead of a JSON listing.
    - in: query
      name: diff_id
      required: false
      schema:
        type: string
        format: uuid
      description: Diff ID to download when `download=true`.
    - in: query
      name: auth_token
      required: false
      schema:
        type: string
      description: |
        Optional bearer token supplied as a query parameter for browser/OSC8
        artifact link flows when setting the `Authorization` header is not
        possible.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/DiffListResponse'
        application/gzip:
          schema:
            type: string
            format: binary
    '400':
      description: Bad request (missing or empty run_id or repo_id)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
