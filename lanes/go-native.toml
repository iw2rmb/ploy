name = "go-native"
description = "Go builds targeting native Grid runners with race-enabled tests"
runtime_family = "go-native"
cache_namespace = "go-native"

[commands]
build = ["go", "build", "./..."]
test = ["go", "test", "-race", "./..."]

[job]
image = "registry.dev/ploy/go-native:latest"
command = ["bash", "-lc", "go test -race ./..."]
priority = "standard"

  [job.env]
  GOFLAGS = "-mod=vendor"
  CGO_ENABLED = "1"

  [job.resources]
  cpu = "4000m"
  memory = "8Gi"
