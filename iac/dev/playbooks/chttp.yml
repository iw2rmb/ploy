---
# CHTTP Services Deployment Playbook
#
# This playbook deploys CHTTP static analysis services to the VPS environment
# following the migration roadmap requirements for containerized microservices
- name: Deploy CHTTP Services
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
    - ../vars/dev-wildcard.yml

  vars:
    chttp_user: "chttp"
    chttp_home: "/opt/chttp"
    chttp_config_dir: "/etc/chttp"
    chttp_log_dir: "/var/log/chttp"
    chttp_services:
      - name: "pylint-chttp"
        port: 8080
        binary: "pylint-chttp"
        config: "pylint-chttp-config.yaml"
        description: "Python static analysis via Pylint CHTTP service"

  tasks:
    # System preparation
    - name: Create CHTTP system user
      user:
        name: "{{ chttp_user }}"
        system: true
        home: "{{ chttp_home }}"
        shell: /usr/sbin/nologin
        create_home: true
      tags: [chttp, user]

    - name: Create CHTTP directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ chttp_user }}"
        group: "{{ chttp_user }}"
        mode: '0755'
      loop:
        - "{{ chttp_home }}"
        - "{{ chttp_home }}/bin"
        - "{{ chttp_config_dir }}"
        - "{{ chttp_log_dir }}"
        - "/tmp/chttp"
      tags: [chttp, directories]

    # Install Python and Pylint for the service
    - name: Install Python and pip
      package:
        name: 
          - python3
          - python3-pip
          - python3-venv
        state: present
      tags: [chttp, python]

    - name: Install Pylint for CHTTP service
      pip:
        name: pylint==3.0.0
        state: present
        executable: pip3
      tags: [chttp, pylint]

    - name: Verify Pylint installation
      command: python3 -m pylint --version
      register: pylint_version
      changed_when: false
      tags: [chttp, pylint]

    - name: Display Pylint version
      debug:
        msg: "Installed Pylint version: {{ pylint_version.stdout }}"
      tags: [chttp, pylint]

    # Deploy CHTTP binaries
    - name: Deploy CHTTP service binaries
      copy:
        src: "{{ playbook_dir }}/../../chttp/build/{{ item.binary }}"
        dest: "{{ chttp_home }}/bin/{{ item.binary }}"
        owner: "{{ chttp_user }}"
        group: "{{ chttp_user }}"
        mode: '0755'
      loop: "{{ chttp_services }}"
      notify: restart chttp services
      tags: [chttp, binaries]

    # Deploy configurations
    - name: Deploy CHTTP service configurations
      template:
        src: "{{ item.config }}.j2"
        dest: "{{ chttp_config_dir }}/{{ item.config }}"
        owner: "{{ chttp_user }}"
        group: "{{ chttp_user }}"
        mode: '0644'
      loop: "{{ chttp_services }}"
      notify: restart chttp services
      tags: [chttp, config]

    # Create systemd services
    - name: Create CHTTP systemd service files
      template:
        src: "chttp-service.service.j2"
        dest: "/etc/systemd/system/{{ item.name }}.service"
        mode: '0644'
      loop: "{{ chttp_services }}"
      notify:
        - reload systemd
        - restart chttp services
      tags: [chttp, systemd]

    # Firewall configuration
    - name: Configure firewall for CHTTP services
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: tcp
        comment: "CHTTP {{ item.name }} service"
      loop: "{{ chttp_services }}"
      when: ansible_os_family == "Debian"
      tags: [chttp, firewall]

    # Service management
    - name: Enable and start CHTTP services
      systemd:
        name: "{{ item.name }}"
        enabled: true
        state: started
        daemon_reload: true
      loop: "{{ chttp_services }}"
      tags: [chttp, services]

    # Health checks
    - name: Wait for CHTTP services to be ready
      uri:
        url: "http://localhost:{{ item.port }}/health"
        method: GET
        timeout: 10
      register: health_check
      until: health_check.status == 200
      retries: 30
      delay: 2
      loop: "{{ chttp_services }}"
      tags: [chttp, health]

    - name: Display service health status
      debug:
        msg: "{{ item.item.name }} health check: {{ item.json.status | default('unknown') }}"
      loop: "{{ health_check.results }}"
      when: item.json is defined
      tags: [chttp, health]

    # Security hardening
    - name: Set secure permissions on CHTTP directories
      file:
        path: "{{ item }}"
        owner: "{{ chttp_user }}"
        group: "{{ chttp_user }}"
        mode: '0750'
        recurse: true
      loop:
        - "{{ chttp_home }}"
        - "{{ chttp_config_dir }}"
        - "{{ chttp_log_dir }}"
      tags: [chttp, security]

    - name: Create CHTTP temp directory with proper permissions
      file:
        path: "/tmp/chttp"
        state: directory
        owner: "{{ chttp_user }}"
        group: "{{ chttp_user }}"
        mode: '1750'  # Sticky bit for temp directory
      tags: [chttp, security]

    # Monitoring and logging
    - name: Configure log rotation for CHTTP services
      template:
        src: "chttp-logrotate.j2"
        dest: "/etc/logrotate.d/chttp"
        mode: '0644'
      tags: [chttp, logging]

    # Integration with reverse proxy (if Traefik is deployed)
    - name: Check if Traefik is running
      systemd:
        name: traefik
      register: traefik_status
      ignore_errors: true
      tags: [chttp, traefik]

    - name: Deploy Traefik CHTTP configuration
      template:
        src: "traefik-chttp.yml.j2"
        dest: "/etc/traefik/dynamic/chttp.yml"
        mode: '0644'
      when: traefik_status.status.ActiveState == "active"
      notify: reload traefik
      tags: [chttp, traefik]

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: true

    - name: restart chttp services
      systemd:
        name: "{{ item.name }}"
        state: restarted
      loop: "{{ chttp_services }}"

    - name: reload traefik
      systemd:
        name: traefik
        state: reloaded
      ignore_errors: true