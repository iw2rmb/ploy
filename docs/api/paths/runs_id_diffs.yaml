post:
  tags: [Control]
  summary: Upload run diff
  description: |
    Uploads a gzipped diff for a run with an optional job association.
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: string }
      description: Run ID (KSUID string, 27 characters).
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            job_id:
              type: string
              nullable: true
              description: Optional job ID (KSUID string).
            patch:
              type: string
              format: byte
              description: Base64-encoded gzipped patch bytes (<= 10 MiB decoded).
            summary:
              type: object
              additionalProperties: true
              description: Diff summary metadata.
          required: [patch, summary]
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            type: object
            properties:
              diff_id: { type: string, format: uuid }
            required: [diff_id]
    '400':
      description: Bad request
    '404':
      description: Not found (run or job)
    '413':
      description: Payload too large
    '500':
      description: Server error
