openapi: 3.1.0
info:
  title: Ploy Control Plane API
  version: "0.1.0"
  description: |
    REST surface exposed by the Ploy control-plane `ployd` deployment. All routes
    require mutual TLS authentication. Bearer token auth has been removed.
    Primary endpoints expose the Mods facade under `/v1/mods` (ticket submission,
    status, events, and artifact/log/diff uploads). The old `/v1/mods/crud` and
    `/v1/runs/*` read/stream endpoints have been removed.

    Type semantics and labels:
    - The server and node use strong domain types in code (e.g., `RepoURL`, `GitRef`, `CommitSHA`, `TicketID/RunID`, resource units). On the wire these remain JSON strings with the same formats (UUIDs for IDs), preserving compatibility.
    - Protocol values are restricted to `tcp` or `udp` and log levels to `debug|info|warn|error` in code; API fields remain strings.
    - Runner containers are labeled with `com.ploy.run_id=<ticket UUID>` for correlation. Earlier mislabeling with a step identifier has been corrected.
servers:
  - url: https://{control_host}
    description: Control-plane endpoint (direct HTTPS; SSH tunnels removed)
    variables:
      control_host:
        default: cluster-alpha.example.com
        description: Control-plane host recorded in the descriptor.
tags:
  - name: Security
    description: PKI operations (CA info, CSR signing).
  - name: Config
    description: Configuration management (GitLab, runtime settings).
  - name: Control
    description: Core control-plane surfaces (repos, mods ticket lifecycle, runs).
  - name: Artifacts
    description: Artifact bundles, diffs, and logs stored in PostgreSQL.
security:
  - mtls: []
paths:
  # Config endpoints
  /v1/config/gitlab:
    $ref: './paths/config_gitlab.yaml'
  # PKI endpoints
  /v1/pki/sign:
    $ref: './paths/pki_sign.yaml'
  /v1/pki/sign/admin:
    $ref: './paths/pki_sign_admin.yaml'
  /v1/pki/sign/client:
    $ref: './paths/pki_sign_client.yaml'
  # Control-plane CRUD
  # Jobs endpoints removed; use /v1/mods/* for read/stream, legacy ingest under /v1/runs/{id}/*.
  # Legacy job write endpoints removed; nodes must use /v1/nodes/* equivalents.
  # Legacy mods logs stream removed; use /v1/mods/{id}/events.
  # Future runs endpoints (target naming)
  /v1/mods:
    $ref: './paths/mods.yaml'
  /v1/mods/{id}:
    $ref: './paths/mods_id.yaml'
  /v1/mods/{id}/cancel:
    $ref: './paths/mods_id_cancel.yaml'
  /v1/mods/{id}/events:
    $ref: './paths/mods_id_events.yaml'
  /v1/mods/{id}/artifact_bundles:
    $ref: './paths/mods_id_artifact_bundles.yaml'
  /v1/mods/{id}/logs:
    $ref: './paths/mods_id_logs.yaml'
  /v1/mods/{id}/diffs:
    $ref: './paths/mods_id_diffs.yaml'
  /v1/diffs/{id}:
    $ref: './paths/diffs_id.yaml'
  /v1/artifacts:
    $ref: './paths/artifacts.yaml'
  /v1/artifacts/{id}:
    $ref: './paths/artifacts_id.yaml'
  # Node heartbeat endpoint
  /v1/nodes/{id}/heartbeat:
    $ref: './paths/nodes_id_heartbeat.yaml'
  # Node drain/undrain and list endpoints
  /v1/nodes:
    $ref: './paths/nodes.yaml'
  /v1/nodes/{id}/drain:
    $ref: './paths/nodes_id_drain.yaml'
  /v1/nodes/{id}/undrain:
    $ref: './paths/nodes_id_undrain.yaml'
  # Node claim endpoint (pull-based work assignment)
  /v1/nodes/{id}/claim:
    $ref: './paths/nodes_id_claim.yaml'
  # Node run-start acknowledgement endpoint
  /v1/nodes/{id}/ack:
    $ref: './paths/nodes_id_ack.yaml'
  # Node run completion endpoint
  /v1/nodes/{id}/complete:
    $ref: './paths/nodes_id_complete.yaml'
  # Job-level completion endpoint (job-scoped, no node ID)
  /v1/jobs/{job_id}/complete:
    $ref: './paths/jobs_job_id_complete.yaml'
  # Node events endpoint
  /v1/nodes/{id}/events:
    $ref: './paths/nodes_id_events.yaml'
  # Node logs endpoint (gzipped chunks)
  /v1/nodes/{id}/logs:
    $ref: './paths/nodes_id_logs.yaml'
  # Job diff upload endpoint (run-scoped, no node ID)
  /v1/runs/{run_id}/jobs/{job_id}/diff:
    $ref: './paths/runs_run_id_jobs_job_id_diff.yaml'
  # Job artifact bundle upload endpoint (run-scoped, no node ID)
  /v1/runs/{run_id}/jobs/{job_id}/artifact:
    $ref: './paths/runs_run_id_jobs_job_id_artifact.yaml'
  # Build Gate service
  /v1/buildgate/validate:
    $ref: './paths/buildgate_validate.yaml'
  /v1/buildgate/jobs/{id}:
    $ref: './paths/buildgate_jobs_id.yaml'
  /v1/nodes/{id}/buildgate/claim:
    $ref: './paths/nodes_id_buildgate_claim.yaml'
  /v1/nodes/{id}/buildgate/{job_id}/ack:
    $ref: './paths/nodes_id_buildgate_jobid_ack.yaml'
  /v1/nodes/{id}/buildgate/{job_id}/complete:
    $ref: './paths/nodes_id_buildgate_jobid_complete.yaml'
  # Legacy removed:
  # - /v1/config/gitlab (GitLab signer removed)
  # - /v2/artifacts/* (artifacts replaced with PostgreSQL storage)
components:
  securitySchemes:
    mtls:
      type: mutualTLS
      description: |
        Mutual TLS authentication using certificates issued by the cluster CA.
        The server verifies client certificates during the TLS handshake.
        Node certificates are issued via the `/v1/pki/sign` endpoint.
  parameters: {}
  schemas:
    # PKI schemas
    PKISignRequest:
      $ref: './components/schemas/pki.yaml#/PKISignRequest'
    PKISignResponse:
      $ref: './components/schemas/pki.yaml#/PKISignResponse'
    PKIAdminSignRequest:
      $ref: './components/schemas/pki.yaml#/PKIAdminSignRequest'
    PKIClientSignRequest:
      $ref: './components/schemas/pki.yaml#/PKIClientSignRequest'
    # Control-plane schemas
    Error:
      $ref: './components/schemas/common.yaml#/Error'
    Run:
      $ref: './components/schemas/controlplane.yaml#/Run'
    CreateRunRequest:
      $ref: './components/schemas/controlplane.yaml#/CreateRunRequest'
    CreateRunResponse:
      $ref: './components/schemas/controlplane.yaml#/CreateRunResponse'
    TicketSubmitRequest:
      $ref: './components/schemas/controlplane.yaml#/TicketSubmitRequest'
    TicketSummary:
      $ref: './components/schemas/controlplane.yaml#/TicketSummary'
    TicketStatus:
      $ref: './components/schemas/controlplane.yaml#/TicketStatus'
    NodeClaimResponse:
      $ref: './components/schemas/controlplane.yaml#/NodeClaimResponse'
    Event:
      $ref: './components/schemas/controlplane.yaml#/Event'
    Stage:
      $ref: './components/schemas/controlplane.yaml#/Stage'
    Node:
      $ref: './components/schemas/controlplane.yaml#/Node'
    NodeCreateLogResponse:
      $ref: './components/schemas/controlplane.yaml#/NodeCreateLogResponse'
    # Build Gate schemas
    BuildGateValidateRequest:
      $ref: './components/schemas/controlplane.yaml#/BuildGateValidateRequest'
    BuildGateValidateResponse:
      $ref: './components/schemas/controlplane.yaml#/BuildGateValidateResponse'
    BuildGateJobStatusResponse:
      $ref: './components/schemas/controlplane.yaml#/BuildGateJobStatusResponse'
    BuildGateJobCompleteRequest:
      $ref: './components/schemas/controlplane.yaml#/BuildGateJobCompleteRequest'
    NodeBuildGateClaimResponse:
      $ref: './components/schemas/controlplane.yaml#/NodeBuildGateClaimResponse'
    # Legacy removed:
    # - Node schemas (nodes.yaml) — node registry handled via mTLS RPC
    # - GitLab schemas (gitlab.yaml) — GitLab signer removed
