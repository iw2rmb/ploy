---
# Ploy API Deployment via Nomad
#
# This playbook handles the API deployment through Nomad instead of systemd:
# - Builds API binary and distribution tools
# - Uploads API binary to SeaweedFS storage
# - Deploys API as Nomad job with high availability
# - Validates API deployment and health
# - Implements proper service ordering and dependencies
#
- name: Deploy Ploy API via Nomad
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
  pre_tasks:
    - name: Assert required dev domain variables are set (api)
      assert:
        that:
          - ploy is defined
          - ploy.platform_domain is defined
          - ploy.platform_domain | length > 0
        fail_msg: "Required variables missing: set PLOY_PLATFORM_DOMAIN in environment or inventory."
        success_msg: "Required dev domain variables are set."
  
  tasks:
    - name: Ensure proper service ordering - verify dependencies are running
      block:
        - name: Wait for SeaweedFS services to be healthy
          wait_for:
            port: "{{ item }}"
            delay: 5
            timeout: 300
          loop:
            - "{{ seaweedfs.master_port }}"
            - "{{ seaweedfs.volume_port }}"
            - "{{ seaweedfs.filer_port }}"

        - name: Wait for HashiCorp services to be healthy
          wait_for:
            port: "{{ item }}"
            delay: 5
            timeout: 300
          loop:
            - "8500"  # Consul
            - "4646"  # Nomad
            - "8200"  # Vault

        - name: Verify Nomad cluster is ready
          uri:
            url: "http://localhost:4646/v1/status/leader"
            method: GET
            status_code: 200
          register: nomad_leader_check
          retries: 6
          delay: 10
          until: nomad_leader_check.status == 200

        - name: Display service dependency status
          debug:
            msg: "All required services (SeaweedFS, Consul, Nomad, Vault) are healthy and ready"

    - name: Update code and build binaries
      block:
        - name: Check if repository already exists
          stat:
            path: /home/ploy/ploy/.git
          register: git_repo_exists
          
        - name: Stash any local changes if repository exists
          shell: cd /home/ploy/ploy && git stash push -m "Ansible deployment stash $(date +%Y%m%d-%H%M%S)"
          become_user: ploy
          when: git_repo_exists.stat.exists
          register: git_stash
          failed_when: false  # Don't fail if nothing to stash
          
        - name: Display stash status
          debug:
            msg: "Local changes stashed: {{ git_stash.stdout }}"
          when: git_repo_exists.stat.exists and git_stash.rc == 0 and 'No local changes to save' not in git_stash.stdout
        
        - name: Ensure GitHub environment variables are available for Git operations
          shell: |
            # Source the bashrc to get environment variables
            source /home/ploy/.bashrc
            
            # Verify Git authentication works
            if ! git ls-remote https://github.com/iw2rmb/ploy.git HEAD > /dev/null 2>&1; then
              echo "ERROR: Git authentication failed. Please ensure GitHub credentials are properly configured."
              echo "Check that GITHUB_PLOY_DEV_USERNAME and GITHUB_PLOY_DEV_PAT are set in the local environment."
              exit 1
            fi
          become_user: ploy
          register: git_auth_check
          failed_when: git_auth_check.rc != 0
          
        - name: Display Git authentication status
          debug:
            msg: "Git authentication verified successfully for repository access"
          when: git_auth_check.rc == 0
          
        - name: Pull latest code from git repository
          shell: |
            cd /home/ploy/ploy
            # Reset any local changes and pull latest
            git fetch origin
            git reset --hard origin/{{ deploy_branch | default('main') }}
            git clean -fd
            echo "Updated to commit: $(git rev-parse HEAD)"
          become_user: ploy
          register: git_update
          environment:
            HOME: /home/ploy
          changed_when: true
          
        - name: Display git update status
          debug:
            msg: "Git repository updated: {{ git_update.stdout }}"
          when: git_update.rc == 0
        
        - name: Ensure /tmp has proper permissions for all users
          file:
            path: /tmp
            mode: '1777'
            state: directory
          become: yes
        
        - name: Build API binary with version information
          shell: cd /home/ploy/ploy && ./scripts/build.sh api bin
          become_user: ploy
          register: api_build
          changed_when: api_build.rc == 0

        - name: Build CLI (ploy) binary with version information  
          shell: cd /home/ploy/ploy && ./scripts/build.sh cli bin
          become_user: ploy
          register: ploy_build
          changed_when: ploy_build.rc == 0

        - name: Build ployman CLI for API management
          shell: cd /home/ploy/ploy && /usr/local/go/bin/go build -o bin/ployman ./cmd/ployman
          become_user: ploy
          register: ployman_build
          changed_when: ployman_build.rc == 0

        - name: Verify binaries were created successfully
          stat:
            path: "/home/ploy/ploy/bin/{{ item }}"
          register: binary_check
          loop:
            - api
            - ploy
            - ployman

        - name: Display build results
          debug:
            msg: "Successfully built: {{ item.item }} (exists: {{ item.stat.exists }})"
          loop: "{{ binary_check.results }}"

    - name: Upload API binary to SeaweedFS for self-update
      block:
        - name: Ensure SeaweedFS artifacts directory has correct ownership
          file:
            path: /var/lib/seaweedfs/filer/artifacts
            state: directory
            owner: seaweedfs
            group: seaweedfs
            mode: '0755'
          become: yes
          ignore_errors: yes  # May not exist yet

        - name: Verify SeaweedFS filer is accessible
          uri:
            url: "http://{{ ansible_default_ipv4.address }}:{{ seaweedfs.filer_port }}/"
            method: GET
            status_code: [200, 301, 302]
            timeout: 10
          register: seaweedfs_check
          retries: 3
          delay: 5
          until: seaweedfs_check.status in [200, 301, 302]
          ignore_errors: false

        - name: Display SeaweedFS connectivity status
          debug:
            msg: "SeaweedFS filer is accessible at {{ ansible_default_ipv4.address }}:{{ seaweedfs.filer_port }}"

        - name: Generate version identifier for binary upload
          shell: echo "$(date +%Y%m%d-%H%M%S)-$(cd /home/ploy/ploy && git rev-parse --short HEAD)"
          register: binary_version
          become_user: ploy
          changed_when: false

        - name: Get git commit hash
          shell: cd /home/ploy/ploy && git rev-parse HEAD
          register: git_commit_full
          become_user: ploy
          changed_when: false

        - name: Get git branch
          shell: cd /home/ploy/ploy && git rev-parse --abbrev-ref HEAD
          register: git_branch
          become_user: ploy
          changed_when: false

        - name: Calculate SHA256 hash of API binary
          shell: sha256sum /home/ploy/ploy/bin/api | awk '{print $1}'
          register: api_binary_hash
          become_user: ploy
          changed_when: false

        - name: Get API binary size
          stat:
            path: /home/ploy/ploy/bin/api
          register: api_binary_stat

        - name: Create metadata JSON for API binary
          copy:
            content: |
              {
                "version": "{{ binary_version.stdout }}",
                "build_time": "{{ ansible_date_time.iso8601 }}",
                "git_commit": "{{ git_commit_full.stdout }}",
                "git_branch": "{{ git_branch.stdout }}",
                "platform": "linux",
                "architecture": "amd64",
                "sha256_hash": "{{ api_binary_hash.stdout }}",
                "size": {{ api_binary_stat.stat.size }},
                "path": "api-binaries/{{ binary_version.stdout }}/linux/amd64/api"
              }
            dest: /tmp/api-metadata.json
            owner: ploy
            group: ploy
            mode: '0644'

        - name: Upload API binary to SeaweedFS
          shell: |
            # Upload binary via HTTP to ensure SeaweedFS indexes it properly
            VERSION="{{ binary_version.stdout }}"
            
            # Copy binary to temp location for faster local access
            cp /home/ploy/ploy/bin/api /tmp/api-${VERSION}
            
            echo "Uploading API binary to SeaweedFS ({{ api_binary_stat.stat.size }} bytes)..."
            
            # Upload to the full path that Nomad expects
            # Note: SeaweedFS will create parent directories automatically
            curl -X POST \
              -F "file=@/tmp/api-${VERSION}" \
              --max-time 60 \
              --connect-timeout 10 \
              -w "\nHTTP Status: %{http_code}, Time: %{time_total}s\n" \
              "http://localhost:{{ seaweedfs.filer_port }}/artifacts/api-binaries/${VERSION}/linux/amd64/api"
            
            RESULT=$?
            
            # Clean up temp file
            rm -f /tmp/api-${VERSION}
            
            # Verify upload succeeded
            if [ $RESULT -eq 0 ]; then
              echo "Upload successful, verifying accessibility..."
              sleep 1
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:{{ seaweedfs.filer_port }}/artifacts/api-binaries/${VERSION}/linux/amd64/api")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✓ Binary is accessible via HTTP"
              else
                echo "⚠ Binary uploaded but not accessible (HTTP $HTTP_CODE)"
                exit 1
              fi
            else
              echo "Upload failed with exit code $RESULT"
              exit $RESULT
            fi
          register: binary_upload
          become_user: ploy

        - name: Upload metadata to SeaweedFS
          shell: |
            VERSION="{{ binary_version.stdout }}"
            
            echo "Uploading metadata to SeaweedFS..."
            
            # Upload metadata via HTTP
            curl -X POST \
              -F "file=@/tmp/api-metadata.json" \
              --max-time 30 \
              --connect-timeout 10 \
              -w "\nHTTP Status: %{http_code}, Time: %{time_total}s\n" \
              "http://localhost:{{ seaweedfs.filer_port }}/artifacts/api-binaries/${VERSION}/linux/amd64/metadata.json"
            
            RESULT=$?
            
            if [ $RESULT -eq 0 ]; then
              echo "✓ Metadata uploaded successfully"
            else
              echo "Metadata upload failed with exit code $RESULT"
              exit $RESULT
            fi
          register: metadata_upload
          become_user: ploy

        - name: Verify upload by listing versions
          uri:
            url: "http://localhost:{{ seaweedfs.filer_port }}/artifacts/api-binaries/?pretty=y"
            method: GET
            timeout: 10
          register: version_list
          ignore_errors: true
          retries: 2
          delay: 3

        - name: Display upload results
          debug:
            msg: |
              API binary uploaded successfully:
              - Version: {{ binary_version.stdout }}
              - SHA256: {{ api_binary_hash.stdout }}
              - Size: {{ api_binary_stat.stat.size }} bytes
              - Location: artifacts/api-binaries/{{ binary_version.stdout }}/linux/amd64/api

        - name: Clean up old API binary versions (keep only current and previous)
          shell: |
            echo "Cleaning up old API binary versions..."
            
            # Get list of all versions, sorted by date (newest first)
            VERSIONS=$(curl -s "http://localhost:{{ seaweedfs.filer_port }}/artifacts/api-binaries/" | \
              grep -o "20[0-9][0-9][0-9][0-9][0-9][0-9]-[0-9]*-[a-f0-9]*" | \
              sort -u -r | head -10)
            
            echo "Current versions found:"
            echo "$VERSIONS"
            
            # Skip first 2 versions (current and previous), delete the rest
            OLD_VERSIONS=$(echo "$VERSIONS" | tail -n +3)
            
            if [ -n "$OLD_VERSIONS" ]; then
              echo "Deleting old versions:"
              echo "$OLD_VERSIONS" | while read version; do
                if [ -n "$version" ]; then
                  echo "  Deleting version: $version"
                  curl -X DELETE "http://localhost:{{ seaweedfs.filer_port }}/artifacts/api-binaries/$version/?recursive=true"
                fi
              done
              echo "✓ Old versions cleaned up"
            else
              echo "✓ No old versions to clean up"
            fi
          register: cleanup_result
          failed_when: false

        - name: Save uploaded version for reference
          copy:
            content: "{{ binary_version.stdout }}"
            dest: /opt/ploy/uploaded-api-version
            owner: ploy
            group: ploy
            mode: '0644'

    - name: Initialize unified deployment system
      block:
        - name: Generate deployment version identifier
          shell: echo "$(date +%Y%m%d-%H%M%S)-$(cd /home/ploy/ploy && git rev-parse --short HEAD)"
          register: deployment_version
          become_user: ploy
          changed_when: false

        - name: Set deployment version variable
          set_fact:
            current_deployment_version: "{{ deployment_version.stdout }}"

        - name: Display deployment version
          debug:
            msg: "Deploying API version {{ binary_version.stdout }} with deployment ID {{ current_deployment_version }}"

    - name: Deploy API using unified deployment approach
      block:
        - name: Debug deployment version variables
          debug:
            msg: |
              deployment_version object: {{ deployment_version }}
              current_deployment_version: {{ current_deployment_version }}
              api_version: {{ binary_version.stdout }}
        
        - name: Create Nomad job for API deployment
          template:
            src: ../../common/templates/nomad-ploy-api.hcl.j2
            dest: /opt/hashicorp/nomad/jobs/ploy-api.hcl
            owner: ploy
            group: ploy
            mode: '0644'
          vars:
            api_version: "{{ binary_version.stdout }}"
            version_string: "{{ current_deployment_version }}"

        - name: Validate job syntax
          command: nomad job validate /opt/hashicorp/nomad/jobs/ploy-api.hcl
          register: bootstrap_validate
          changed_when: false
          environment:
            NOMAD_ADDR: "http://localhost:4646"

        - name: Copy job manager script
          copy:
            src: /Users/vk/@iw2rmb/ploy/iac/common/scripts/nomad-job-manager.sh
            dest: /opt/hashicorp/bin/nomad-job-manager.sh
            mode: '0755'
            owner: root
            group: root

        - name: Copy service monitoring script
          copy:
            src: /Users/vk/@iw2rmb/ploy/iac/common/scripts/consul-service-monitor.sh
            dest: /opt/hashicorp/bin/consul-service-monitor.sh
            mode: '0755'
            owner: root
            group: root

        - name: Clean up stale service registrations before deployment
          shell: /opt/hashicorp/bin/consul-service-monitor.sh --job-name ploy-api --cleanup
          environment:
            CONSUL_ADDR: "http://localhost:8500"
            NOMAD_ADDR: "http://localhost:4646"
          register: cleanup_result
          failed_when: false

        - name: Display cleanup results
          debug:
            msg: "Service cleanup completed: {{ cleanup_result.stdout_lines[-1] if cleanup_result.stdout_lines else 'No output' }}"
          when: cleanup_result.stdout_lines is defined

        # NOTE: Do not stop the existing job. Rely on Nomad update stanza for zero-downtime rollout.

        - name: Deploy API job using HTTP API
          shell: /opt/hashicorp/bin/nomad-job-manager.sh run --job ploy-api --file /opt/hashicorp/nomad/jobs/ploy-api.hcl
          environment:
            NOMAD_ADDR: "http://localhost:4646"
          register: bootstrap_deploy

        - name: Wait for bootstrap allocation to be running
          shell: /opt/hashicorp/bin/nomad-job-manager.sh wait --job ploy-api --timeout 300
          environment:
            NOMAD_ADDR: "http://localhost:4646"
          register: wait_result
          failed_when: wait_result.rc != 0

        - name: Get allocation status for verification
          shell: /opt/hashicorp/bin/nomad-job-manager.sh status --job ploy-api
          environment:
            NOMAD_ADDR: "http://localhost:4646"
          register: bootstrap_allocs
          failed_when: false

        - name: Display bootstrap deployment status
          debug:
            msg: "Bootstrap API deployed successfully. Status: {{ wait_result.rc == 0 | ternary('Running', 'Failed') }}"

        - name: Wait for API to be available via domain (versioned)
          uri:
            url: "https://api.{{ ploy.platform_domain }}/v1/health"
            method: GET
            status_code: 200
            validate_certs: no  # May need time for cert provisioning
          environment:
            PLOY_PLATFORM_DOMAIN: "dev.ployman.app"
          register: versioned_health
          retries: 10
          delay: 15
          until: versioned_health.status == 200

        - name: Verify Consul service tags include Traefik router labels
          uri:
            url: "http://localhost:8500/v1/catalog/service/ploy-api"
            method: GET
            status_code: 200
          register: consul_api_service
          retries: 5
          delay: 5
          until: consul_api_service.status == 200

        - name: Assert required Traefik labels on Consul service
          assert:
            that:
              - consul_api_service.json | length > 0
              - (consul_api_service.json[0].ServiceTags | join(',')) is search('traefik.enable=true')
              - (consul_api_service.json[0].ServiceTags | join(',')) is search('traefik.http.routers.ploy-api.rule=Host\(`api\.' + ploy.platform_domain + '`\)')
            fail_msg: "Consul service tags for ploy-api missing required Traefik router labels"
            success_msg: "Consul service tags contain required Traefik router labels"

        - name: Mark bootstrap as ready for unified deployment transition
          copy:
            content: |
              # Bootstrap deployment completed at {{ ansible_date_time.iso8601 }}
              # Ready for transition to unified deployment system
              # Use: ensure PLOY_CONTROLLER=https://api.dev.ployman.app/v1, then run: ./bin/ployman push -a ploy-api
              BOOTSTRAP_VERSION={{ current_deployment_version }}
              UNIFIED_TRANSITION_READY=true
            dest: /opt/ploy/bootstrap-status
            owner: ploy
            group: ploy
            mode: '0644'

    - name: Validate bootstrap deployment
      block:
        - name: Verify API health endpoint via domain
          uri:
            url: "https://api.{{ ploy.platform_domain }}/v1/health"
            method: GET
            status_code: 200
            validate_certs: no  # May need time for cert provisioning
          environment:
            PLOY_PLATFORM_DOMAIN: "dev.ployman.app"
          register: versioned_health_check
          retries: 3
          delay: 5
          until: versioned_health_check.status == 200
          ignore_errors: true

        - name: Verify API readiness via domain
          uri:
            url: "https://api.{{ ploy.platform_domain }}/v1/ready"
            method: GET
            status_code: 200
            validate_certs: no  # May need time for cert provisioning
          environment:
            PLOY_PLATFORM_DOMAIN: "dev.ployman.app"
          register: versioned_ready
          retries: 3
          delay: 5
          until: versioned_ready.status == 200
          ignore_errors: true

        - name: Test bootstrap API endpoints via domain
          uri:
            url: "https://api.{{ ploy.platform_domain }}/v1/health"
            method: GET
            status_code: 200
            environment:
            PLOY_PLATFORM_DOMAIN: "dev.ployman.app"
          register: bootstrap_api_test
          ignore_errors: true

        - name: Verify clean service registrations post-deployment
          shell: /opt/hashicorp/bin/consul-service-monitor.sh --job-name ploy-api
          environment:
            CONSUL_ADDR: "http://localhost:8500"
            NOMAD_ADDR: "http://localhost:4646"
          register: post_deployment_check
          failed_when: false

        - name: Display service registration status
          debug:
            msg: "{{ post_deployment_check.stdout_lines }}"
          when: post_deployment_check.stdout_lines is defined

        - name: Display bootstrap validation results
          debug:
            msg: "Bootstrap API is healthy and ready. Service registrations are clean. Ready for unified deployment transition."

        - name: Save current deployment version for future reference
          copy:
            content: "{{ current_deployment_version }}"
            dest: /opt/ploy/current-api-version
            owner: ploy
            group: ploy
            mode: '0644'

        - name: Enable unified deployment for future updates
          copy:
            content: "unified-deployment-enabled"
            dest: /opt/ploy/deployment-method
            owner: ploy
            group: ploy
            mode: '0644'

    - name: Configure API management tools
      block:
        - name: Create API management scripts directory
          file:
            path: /home/ploy/api-scripts
            state: directory
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Create API update script
          template:
            src: ../../common/templates/update-api.sh.j2
            dest: /home/ploy/api-scripts/update-api.sh
            owner: ploy
            group: ploy
            mode: '0755'
          ignore_errors: true

        - name: Create API rollback script
          template:
            src: ../../common/templates/rollback-api.sh.j2
            dest: /home/ploy/api-scripts/rollback-api.sh
            owner: ploy
            group: ploy
            mode: '0755'
          ignore_errors: true

        - name: Create API status script
          template:
            src: ../../common/templates/api-status.sh.j2
            dest: /home/ploy/api-scripts/api-status.sh
            owner: ploy
            group: ploy
            mode: '0755'
          ignore_errors: true

        - name: Create API migration script
          template:
            src: ../../common/templates/migrate-api.sh.j2
            dest: /home/ploy/api-scripts/migrate-api.sh
            owner: ploy
            group: ploy
            mode: '0755'
          ignore_errors: true

    # Firewall rule removed - API only accessible via Traefik/domain routing
    # Direct port access is prohibited for security

    - name: Display bootstrap deployment summary
      debug:
            msg: |
              Bootstrap API deployment completed successfully:
              - Version: {{ current_deployment_version }}
              - Deployment method: Bootstrap Nomad job (unified deployment system)
              - Health endpoint: https://api.{{ ploy.platform_domain }}/health
              - External access: https://api.{{ ploy.platform_domain }}/health
              - Management tools: Available in /home/ploy/api-scripts/
              
              NEXT STEPS:
              1. Verify external API access: curl https://api.{{ ploy.platform_domain }}/health
              2. Transition to unified deployment: ensure PLOY_CONTROLLER=https://api.{{ ploy.platform_domain }}/v1, then run: ./bin/ployman push -a ploy-api
              3. Future deployments will use the unified system automatically
