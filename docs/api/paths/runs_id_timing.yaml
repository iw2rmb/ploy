parameters:
  - in: path
    name: id
    required: true
    schema: { type: string, format: uuid }
get:
  tags: [Control]
  summary: Get run timing by ID
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/RunTiming'
    '404': { description: Not Found }

