---
# Global configuration for Ploy dev environment

# Go version for building Ploy
go_version: "1.22.0"
go_arch: "amd64"

# Docker configuration
docker_compose_version: "2.24.0"


# Nomad/Consul versions
nomad_version: "1.7.2"
consul_version: "1.17.1"
vault_version: "1.15.4"

# Traefik version
traefik_version: "3.0.4"

# Node Exporter version
node_exporter_version: "1.7.0"

# FreeBSD VM configuration
freebsd_vm:
  name: "freebsd-dev"
  cpus: 2
  memory: 4096
  disk_size: "20G"
  network_interface: "em0"
  ip: "192.168.100.10"
  netmask: "255.255.255.0"
  gateway: "192.168.100.1"

# Testing tools
testing_tools:
  - curl
  - jq
  - git
  - make
  - wget
  - unzip

# Ploy specific configuration
ploy:
  controller_port: 8081
  storage_backend: "seaweedfs"

# Build tools for different lanes
build_tools:
  kraft: 
    version: "0.7.6"
  capstan:
    version: "0.54.0"
  cosign:
    version: "2.2.2"
  syft:
    version: "0.100.0"
  grype:
    version: "0.74.0"

# SeaweedFS configuration
seaweedfs:
  version: "3.96"
  master_port: 9333
  volume_port: 8080
  filer_port: 8888
  
  # Collection configuration for different artifact types
  collections:
    artifacts:
      name: "ploy-artifacts"
      replication: "001"  # Single copy for large build artifacts
    metadata:
      name: "ploy-metadata"
      replication: "010"  # Replicated for small critical files (SBOMs, sigs, certs)
    debug:
      name: "ploy-debug"
      replication: "000"  # No replication for ephemeral debug artifacts

# External storage configuration for controller
storage_config:
  seaweedfs:
    master: "localhost:9333"
    filer: "localhost:8888"
    collection: "ploy-artifacts"
    replication: "001"
    timeout: 30
    datacenter: ""
    rack: ""
    collections:
      artifacts: "ploy-artifacts"
      metadata: "ploy-metadata"
      debug: "ploy-debug"
  
  client:
    retry_config:
      max_retries: 3
      initial_delay: "1s"
      max_delay: "30s"
      multiplier: 2.0
    health_check_config:
      interval: "30s"
      timeout: "10s"
      failure_threshold: 3
    enable_metrics: true
    enable_health_check: true
    max_operation_time: "5m"