# ARF Phase 3 - Hybrid Pipeline Configuration
# This file configures the hybrid transformation pipeline that combines 
# deterministic transformations with LLM enhancement

hybrid_pipeline:
  # Strategy selection parameters
  strategy_selection:
    complexity_threshold: 0.8    # Threshold for complex transformations
    resource_weight: 0.3         # Weight for resource constraints
    time_weight: 0.4            # Weight for time constraints
    success_weight: 0.3         # Weight for success probability
    
    # Strategy matrix based on complexity
    strategy_matrix:
      simple:     # Complexity < 0.3
        primary: "openrewrite_only"
        enhancement: "none"
      moderate:   # Complexity 0.3-0.7
        primary: "openrewrite_first"
        enhancement: "post_processing"
      complex:    # Complexity > 0.7
        primary: "hybrid"
        enhancement: "full_llm"
  
  # Confidence thresholds for different approaches
  confidence_thresholds:
    min_openrewrite: 0.6    # Minimum confidence for OpenRewrite only
    min_llm: 0.7           # Minimum confidence for LLM generation
    min_hybrid: 0.8        # Minimum confidence for hybrid approach
    required_build: 0.9    # Required confidence for build success
    auto_apply: 0.85       # Threshold for automatic application
  
  # Enhancement modes configuration
  enhancement_modes:
    simple_transformations: "NoEnhancement"
    moderate_complexity: "PostProcessing"
    high_complexity: "FullHybrid"
    experimental: "ParallelValidation"
  
  # Execution configuration
  execution:
    parallel_processing: true      # Enable parallel execution
    max_concurrent_jobs: 5        # Maximum concurrent transformations
    timeout_per_file: "5m"        # Timeout per file transformation
    batch_size: 10               # Files to process in batch
    
  # Validation pipeline
  validation:
    stages:
      - name: "syntax"
        enabled: true
        timeout: "10s"
      - name: "compilation"
        enabled: true
        timeout: "1m"
      - name: "unit_tests"
        enabled: true
        timeout: "5m"
      - name: "integration_tests"
        enabled: false
        timeout: "10m"
    
    # Rollback configuration
    rollback:
      enabled: true
      on_validation_failure: true
      on_confidence_drop: true
      confidence_drop_threshold: 0.2
  
  # Resource limits
  resource_limits:
    max_memory: "4Gi"
    max_cpu: "2000m"
    max_disk: "10Gi"
    max_execution_time: "30m"
  
  # Monitoring and metrics
  monitoring:
    collect_metrics: true
    metrics_interval: "30s"
    export_prometheus: true
    export_path: "/metrics"
    
    tracked_metrics:
      - "transformation_success_rate"
      - "average_execution_time"
      - "llm_enhancement_rate"
      - "validation_failure_rate"
      - "resource_utilization"