settingsEvaluated { settings ->
  def cacheUrl = System.getenv("PLOY_GRADLE_BUILD_CACHE_URL")
  if (cacheUrl == null || cacheUrl.trim().isEmpty()) return

  settings.buildCache {
    local { enabled = true }
    remote(HttpBuildCache) {
      // NOTE: In Groovy closures, `this` refers to the script object, not the delegate.
      // Assign to the delegate property directly.
      url = new URI(cacheUrl)
      push = (System.getenv("PLOY_GRADLE_BUILD_CACHE_PUSH") ?: "true").toBoolean()
      allowInsecureProtocol = true
    }
  }
}

// Emit a stable marker when tasks are loaded from the build cache.
// This is used by E2E tests to verify that the remote build cache node is actually used.
def _ployCacheURL = System.getenv("PLOY_GRADLE_BUILD_CACHE_URL")
if (_ployCacheURL != null && !_ployCacheURL.trim().isEmpty()) {
  gradle.taskGraph.afterTask { task, state ->
    def msg = state.getSkipMessage()
    def outcomeStr = null
    try {
      outcomeStr = state.getOutcome()?.toString()
    } catch (Throwable ignored) {
      // Older Gradle versions may not expose getOutcome(); skip.
    }

    def hit = false
    if (msg != null && msg.toUpperCase().contains("FROM-CACHE")) hit = true
    if (outcomeStr != null && outcomeStr.toUpperCase().contains("FROM_CACHE")) hit = true

    if (hit) {
      // Best-effort: record cache hits into a tmp file so the gate executor can
      // surface them in structured metadata (even when Gradle runs with `-q`).
      try {
        def hitsFile = new File("/tmp/gradle-build-cache-hits")
        hitsFile << (task.path + "\n")
      } catch (Throwable ignored) {
        // Do not fail the build if workspace is not writable.
      }

      // Use stderr so markers are visible even under `gradle -q`.
      System.err.println("[ploy-gradle-cache] HIT " + task.path)
    }
  }
}

// Force Gradle test reports into the gate /out mount so nodeagent can upload
// them as gate artifacts without repository-level build script changes.
allprojects {
  tasks.withType(Test).configureEach {
    reports {
      junitXml.required = true
      junitXml.outputLocation = file("/out/gradle-test-results")
      html.required = true
      html.outputLocation = file("/out/gradle-test-report")
    }
  }
}

// Best-effort SBOM wiring for Gradle builds:
// - If CycloneDX plugin task `cyclonedxBom` exists, force JSON output into /out.
// - Ensure it runs after gate entry tasks (`build` and `test`) so `build -x test`
//   can still produce SBOM evidence without test execution.
allprojects { project ->
  project.tasks.matching { it.name == "cyclonedxBom" }.configureEach { sbomTask ->
    try {
      if (sbomTask.hasProperty("destination")) {
        sbomTask.destination = new File("/out")
      }
      if (sbomTask.hasProperty("outputName")) {
        sbomTask.outputName = "sbom.cyclonedx"
      }
      if (sbomTask.hasProperty("outputFormat")) {
        sbomTask.outputFormat = "json"
      }
      if (sbomTask.hasProperty("jsonOutput")) {
        sbomTask.jsonOutput = true
      }
      if (sbomTask.hasProperty("xmlOutput")) {
        sbomTask.xmlOutput = false
      }
    } catch (Throwable ignored) {
      // Keep gate execution resilient when plugin API differs across versions.
    }

    project.tasks.matching { it.name == "build" || it.name == "test" }.configureEach { gateTask ->
      gateTask.finalizedBy(sbomTask)
    }
  }
}

// Plugin-independent fallback SBOM generation:
// - Always attempts to write SPDX JSON at /out/sbom.spdx.json from resolved
//   Gradle dependency configurations, even when cyclonedxBom is not available.
// - Never fails the build if dependency inspection or file write fails.
def _ployCollectMiguleCoords = { configuration, packageMap ->
  if (configuration == null || packageMap == null) return
  try {
    if (!configuration.canBeResolved) return
  } catch (Throwable ignored) {
    return
  }

  try {
    def deps = configuration.resolvedConfiguration?.lenientConfiguration?.allMiguleDependencies
    deps?.each { dep ->
      def g = (dep.moduleGroup ?: "").toString().trim()
      def n = (dep.moduleName ?: "").toString().trim()
      def v = (dep.moduleVersion ?: "").toString().trim()
      if (n.isEmpty() || v.isEmpty()) return
      def lib = g.isEmpty() ? n : (g + ":" + n)
      packageMap[lib + "@" + v] = [name: lib, versionInfo: v]
    }
  } catch (Throwable ignored) {
    // Ignore unresolved/broken configurations and keep collecting from others.
  }
}

def _ployCollectDeclaredCoords = { configuration, packageMap ->
  if (configuration == null || packageMap == null) return

  try {
    configuration.allDependencies?.each { dep ->
      def g = ""
      def n = ""
      def v = ""
      try {
        g = (dep.group ?: "").toString().trim()
      } catch (Throwable ignored) {}
      try {
        n = (dep.name ?: "").toString().trim()
      } catch (Throwable ignored) {}
      try {
        v = (dep.version ?: "").toString().trim()
      } catch (Throwable ignored) {}
      if (n.isEmpty() || v.isEmpty()) return
      def lib = g.isEmpty() ? n : (g + ":" + n)
      packageMap[lib + "@" + v] = [name: lib, versionInfo: v]
    }
  } catch (Throwable ignored) {
    // Ignore malformed dependency declarations and keep collecting.
  }
}

def _ployWriteFallbackSBOM = {
  def packageMap = [:]
  def preferred = [
    "runtimeClasspath",
    "compileClasspath",
    "testRuntimeClasspath",
    "testCompileClasspath",
  ]

  def projects = []
  try {
    projects = gradle?.rootProject?.allprojects ?: []
  } catch (Throwable ignored) {
    projects = []
  }

  projects.each { p ->
    preferred.each { cfgName ->
      _ployCollectMiguleCoords(p.configurations?.findByName(cfgName), packageMap)
    }
  }

  def preferredDeclared = [
    "implementation",
    "api",
    "compileOnly",
    "runtimeOnly",
    "testImplementation",
    "testRuntimeOnly",
  ]
  projects.each { p ->
    preferredDeclared.each { cfgName ->
      _ployCollectDeclaredCoords(p.configurations?.findByName(cfgName), packageMap)
    }
  }

  if (packageMap.isEmpty()) {
    projects.each { p ->
      p.configurations?.each { cfg ->
        _ployCollectMiguleCoords(cfg, packageMap)
      }
    }
  }

  if (packageMap.isEmpty()) {
    projects.each { p ->
      p.configurations?.each { cfg ->
        _ployCollectDeclaredCoords(cfg, packageMap)
      }
    }
  }

  def packages = packageMap.values().toList().sort { a, b ->
    if (a.name == b.name) {
      return a.versionInfo <=> b.versionInfo
    }
    return a.name <=> b.name
  }

  def outDir = new File("/out")
  def outFile = new File(outDir, "sbom.spdx.json")
  try {
    outDir.mkdirs()
    def payload = [
      spdxVersion: "SPDX-2.3",
      packages   : packages,
    ]
    outFile.text = groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(payload))
    System.err.println("[ploy-gradle-sbom] WROTE /out/sbom.spdx.json packages=" + packages.size())
  } catch (Throwable ignored) {
    System.err.println("[ploy-gradle-sbom] WARN failed to write fallback SPDX SBOM")
  }
}

gradle.buildFinished {
  try {
    _ployWriteFallbackSBOM()
  } catch (Throwable ignored) {
    System.err.println("[ploy-gradle-sbom] WARN fallback SPDX SBOM collection failed")
  }
}
