# Java 11 to 17 Migration Recipe
metadata:
  name: java11-to-java17-migration
  description: Migrates Java projects from version 11 to 17 with modern language features
  author: Ploy Platform
  version: 1.2.0
  license: MIT
  homepage: https://ployd.app/recipes/java-migration
  repository: https://github.com/iw2rmb/ploy
  tags:
    - java
    - migration
    - java17
    - modernization
    - upgrade
  categories:
    - language-upgrade
    - modernization
  languages:
    - java
  frameworks:
    - spring-boot
    - maven
    - gradle
  requirements:
    - Java 11 or higher installed
    - Maven 3.6+ or Gradle 6+

# Transformation steps
steps:
  - name: Update Maven Java Version
    type: openrewrite
    config:
      recipe: org.openrewrite.java.migrate.Java11toJava17
      options:
        target_version: "17"
        update_compiler_plugin: true
        update_properties: true
    conditions:
      - type: file_exists
        value: pom.xml
    on_error: continue
    timeout: 5m

  - name: Update Gradle Java Version
    type: openrewrite
    config:
      recipe: org.openrewrite.java.migrate.JavaVersion11to17
      options:
        target_version: "17"
    conditions:
      - type: file_exists
        value: build.gradle
    on_error: continue
    timeout: 5m

  - name: Apply Text Blocks Transformation
    type: openrewrite
    config:
      recipe: org.openrewrite.java.migrate.lang.StringLiteralsToTextBlocks
      description: Convert multi-line string concatenations to Java 15+ text blocks
    conditions:
      - type: language
        value: java
      - type: min_java_version
        value: "15"
    on_error: continue
    timeout: 3m

  - name: Migrate Switch Expressions
    type: openrewrite
    config:
      recipe: org.openrewrite.java.migrate.lang.SwitchExpression
      description: Convert traditional switch statements to switch expressions
    conditions:
      - type: language
        value: java
    on_error: continue
    timeout: 3m

  - name: Update Dependencies
    type: openrewrite
    config:
      recipe: org.openrewrite.java.dependencies.UpgradeDependencyVersion
      options:
        group_id: "*"
        artifact_id: "*"
        new_version: "latest.release"
        only_if_using: true
    on_error: continue
    timeout: 5m

  - name: Apply Records Pattern
    type: openrewrite
    config:
      recipe: org.openrewrite.java.migrate.lang.UseRecords
      description: Convert eligible classes to Java 14+ records
    conditions:
      - type: min_java_version
        value: "14"
    on_error: continue
    timeout: 3m

  - name: Remove Unused Imports
    type: openrewrite
    config:
      recipe: org.openrewrite.java.cleanup.RemoveUnusedImports
    on_error: continue
    timeout: 2m

# Execution configuration
execution:
  parallelism: 2
  max_duration: 15m
  retry_policy:
    max_attempts: 2
    backoff: 5s
    max_backoff: 30s
  sandbox:
    enabled: true
    allow_network: false
    allow_file_write: true
    max_memory: 2GB
    max_cpu: 2
    max_disk_usage: 1GB
    isolation_level: medium
  environment:
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk
    MAVEN_OPTS: -Xmx1024m -XX:MaxPermSize=256m

# Validation rules
validation:
  required_files:
    - pom.xml
    - build.gradle
  file_patterns:
    - "**/*.java"
  min_file_count: 1
  max_repo_size: 1073741824  # 1GB
  language_detection:
    primary: java
    min_confidence: 0.7
    required: true
  custom_rules:
    - name: Check Java Version
      description: Ensure project is using Java 11 or compatible
      type: file_content
      value: "<java.version>11</java.version>"
      required: false