name: Coverage (native)

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  coverage:
    name: Coverage per component
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mods
            path: ./internal/migs
            min: 80
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Run unit tests with coverage
        working-directory: ${{ matrix.path }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/coverage
          go test -short -covermode=atomic -coverprofile=$GITHUB_WORKSPACE/coverage/${{ matrix.name }}.out ./...
      - name: Extract coverage percent
        id: cov
        run: |
          pct=$(go tool cover -func=coverage/${{ matrix.name }}.out | awk '/total:/ {print $3}')
          echo "pct=$pct" >> $GITHUB_OUTPUT
      - name: Enforce coverage threshold
        run: |
          pct_str='${{ steps.cov.outputs.pct }}'
          pct=${pct_str%%%}
          min=${{ matrix.min }}
          # convert to integer if needed
          pct_int=$(printf '%.0f' "$pct")
          echo "Coverage $pct_str; required >= ${min}%"
          if [ "$pct_int" -lt "$min" ]; then
            echo "::error::Coverage for ${{ matrix.name }} is below threshold (${pct_str} < ${min}%)"
            exit 1
          fi
      - name: Comment PR with coverage
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const pct = '${{ steps.cov.outputs.pct }}';
            const name = '${{ matrix.name }}';
            const body = `Coverage (${name}): ${pct}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

  update-badges:
    name: Update coverage badges
    needs: coverage
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Compute coverage and write badges
        shell: bash
        run: |
          set -euo pipefail
          components=(
            "mods ./internal/migs"
          )
          mkdir -p badges
          gen_badge() {
            local label="$1"; shift
            local pct_str="$1"; shift
            local pct=${pct_str%%%}
            local color="red"
            if (( $(echo "$pct >= 80" | bc -l) )); then color="brightgreen";
            elif (( $(echo "$pct >= 60" | bc -l) )); then color="yellow";
            elif (( $(echo "$pct >= 40" | bc -l) )); then color="orange";
            fi
          cat > badges/${label}-coverage.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="150" height="20" role="img" aria-label="${label}: ${pct_str}">
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <mask id="m"><rect width="150" height="20" rx="3" fill="#fff"/></mask>
            <g mask="url(#m)"><rect width="90" height="20" fill="#555"/><rect x="90" width="60" height="20" fill="${color}"/><rect width="150" height="20" fill="url(#s)"/></g>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="45" y="15">${label}</text>
              <text x="120" y="15">${pct_str}</text>
            </g>
          </svg>
          EOF
          }
          # you may need bc
          sudo apt-get update -y && sudo apt-get install -y bc >/dev/null 2>&1 || true
          for entry in "${components[@]}"; do
            name=$(echo "$entry" | awk '{print $1}')
            path=$(echo "$entry" | cut -d' ' -f2-)
            echo "::group::Component $name"
            (cd "$path" && go test -short -covermode=atomic -coverprofile="$GITHUB_WORKSPACE/coverage_$name.out" ./...)
            pct=$(go tool cover -func=coverage_${name}.out | awk '/total:/ {print $3}')
            echo "$name coverage: $pct"
            gen_badge "$name" "$pct"
            echo "::endgroup::"
          done
          # Generate overall coverage badge by merging component profiles
          echo "mode: atomic" > coverage_all.out
          for f in coverage_*.out; do
            tail -n +2 "$f" >> coverage_all.out || true
          done
          overall=$(go tool cover -func=coverage_all.out | awk '/total:/ {print $3}')
          echo "overall coverage: $overall"
          gen_badge "overall" "$overall"
      - name: Commit badges
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain badges)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add badges/*.svg
            git commit -m "chore(ci): update coverage badges"
            git push
          fi

  overall:
    name: Overall coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Run coverage for components and merge
        run: |
          set -euo pipefail
          components=(
            "mods ./internal/migs"
          )
          echo "mode: atomic" > coverage_all.out
          for entry in "${components[@]}"; do
            name=$(echo "$entry" | awk '{print $1}')
            path=$(echo "$entry" | cut -d' ' -f2-)
            echo "::group::Coverage for $name ($path)"
            (cd "$path" && go test -short -covermode=atomic -coverprofile="$GITHUB_WORKSPACE/coverage_$name.out" ./...)
            tail -n +2 "$GITHUB_WORKSPACE/coverage_$name.out" >> coverage_all.out || true
            echo "::endgroup::"
          done
          pct=$(go tool cover -func=coverage_all.out | awk '/total:/ {print $3}')
          echo "overall=$pct" >> $GITHUB_OUTPUT
        id: overall
      - name: Enforce overall threshold
        run: |
          pct_str='${{ steps.overall.outputs.overall }}'
          pct=${pct_str%%%}
          min=75
          pct_int=$(printf '%.0f' "$pct")
          echo "Overall coverage $pct_str; required >= ${min}%"
          if [ "$pct_int" -lt "$min" ]; then
            echo "::error::Overall coverage is below threshold (${pct_str} < ${min}%)"
            exit 1
          fi
      - name: Comment PR with overall coverage
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const pct = '${{ steps.overall.outputs.overall }}';
            const body = `Overall coverage: ${pct}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
