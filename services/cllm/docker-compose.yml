version: '3.8'

services:
  cllm:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - CLLM_SERVER_HOST=0.0.0.0
      - CLLM_SERVER_PORT=8082
      - CLLM_SANDBOX_WORK_DIR=/tmp/cllm-sandbox
      - CLLM_OLLAMA_URL=http://ollama:11434
    volumes:
      - cllm-data:/tmp/cllm-sandbox
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - cllm-network

  # Ollama for local LLM serving (development only)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - cllm-network
    # Pull and serve CodeLlama model
    command: >
      sh -c "ollama serve & 
             sleep 10 && 
             ollama pull codellama:7b && 
             wait"

volumes:
  cllm-data:
    driver: local
  ollama-data:
    driver: local

networks:
  cllm-network:
    driver: bridge