# Minimal spec for the failing Build Gate → amata heal → re-gate → ORW apply scenario.
# Submit with:
#   dist/ploy mig run \
#     --repo-url https://gitlab.com/iw2rmb/ploy-orw-java11-maven.git \
#     --repo-base-ref e2e/fail-missing-symbol \
#     --repo-target-ref migs-upgrade-java17-heal \
#     --spec tests/e2e/migs/scenario-orw-fail/mig.yaml \
#     --follow

apiVersion: ploy.mig/v1alpha1
kind: MigRunSpec

steps:
  - image: localhost:5000/ploy/orw-cli-maven:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17

build_gate:
  enabled: true

  heal:
    retries: 1
    # Healing: amata mode.
    image: localhost:5000/ploy/amata:latest
    amata:
      spec: |
        version: amata/v1
        name: code-healer
        entry: main
        workspace:
          root: /workspace
        flows:
          main:
            steps:
              - codex: |
                  Fix the build failure described in /in/build-gate.log.
                  Edit files under /workspace as needed.
                  End with one JSON line:
                  {"action_summary":"<<=200 chars, single line>"}
    home:
      - ~/.codex/auth.json:.codex/auth.json

mr_on_fail: false
mr_on_success: true
