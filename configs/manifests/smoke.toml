manifest_version = "v2"
name = "smoke"
version = "2025-09-26"
summary = """
## Purpose
Ensure mods workflows stick to baseline caches and fixtures.

## Notes
- Exercises the Grid-compatible v2 manifest schema with service, edge, and exposure metadata.
- Keeps optional Redis cache available for feature-flagged smoke tests.
"""

[topology]
description = "Standard mods topology"

[[topology.allow]]
from = "mods-api"
to = "postgres"

[[topology.allow]]
from = "mods-api"
to = "redis"

[[topology.deny]]
from = "mods-api"
to = "internet"
reason = "Block egress"

[[services]]
name = "mods-postgres"
kind = "postgres"
[services.identity]
dns = "mods-postgres.smoke.local"
[[services.ports]]
name = "psql"
port = 5432
protocol = "tcp"

[[services]]
name = "mods-api"
kind = "http"
[services.identity]
dns = "mods-api.smoke.local"
[[services.ports]]
name = "http"
port = 8080
protocol = "tcp"
[[services.ports]]
name = "metrics"
port = 9100
protocol = "tcp"
[[services.requires]]
target = "mods-postgres"
edge = "api->postgres"
[[services.requires]]
target = "mods-redis"
edge = "api->redis"

[[services]]
name = "mods-redis"
kind = "redis"
optional = true
[services.identity]
dns = "mods-redis.smoke.local"
[[services.ports]]
name = "tcp"
port = 6379
protocol = "tcp"

[fixtures]

[[fixtures.required]]
name = "postgres"
reference = "snapshot:dev-db"

[[fixtures.required]]
name = "redis"
reference = "cache:redis"

[[fixtures.optional]]
name = "elasticsearch"
reference = "service:es"
reason = "Only when search stack enabled"

[lanes]

[[lanes.required]]
name = "mods-plan"
reason = "mods planning"

[[lanes.required]]
name = "mods-java"
reason = "mods OpenRewrite execution"

[[lanes.required]]
name = "mods-llm"
reason = "mods LLM planning/execution"

[[lanes.required]]
name = "mods-human"
reason = "mods human-in-the-loop review"

[[lanes.required]]
name = "build-gate"
reason = "build gate"

[[lanes.required]]
name = "static-checks"
reason = "static analysis"

[[lanes.required]]
name = "test"
reason = "test baseline"

[[lanes.allowed]]
name = "python-slim"
reason = "data tooling"

[aster]
required = ["plan"]
optional = ["exec", "lint"]

[[edges]]
source = "mods-api"
target = "mods-redis"
ports = ["tcp"]
protocols = ["tcp"]

[[edges]]
source = "mods-api"
target = "mods-postgres"
ports = ["psql"]
protocols = ["tcp"]

[[exposures]]
service = "mods-api"
port = "metrics"
mode = "cluster"

[[exposures]]
service = "mods-api"
port = "http"
mode = "public"
