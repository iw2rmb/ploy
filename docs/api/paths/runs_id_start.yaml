post:
  tags: [Control]
  summary: Start pending repos
  description: |
    Starts execution for pending repos in a batch run by creating per-repo execution
    runs and jobs. Returns counts of started/already_done/pending.
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: string }
      description: Run ID (KSUID string, 27 characters).
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              run_id: { type: string }
              started: { type: integer }
              already_done: { type: integer }
              pending: { type: integer }
            required: [run_id, started, already_done, pending]
    '400':
      description: Bad request
    '404':
      description: Run not found
    '409':
      description: Conflict — cannot start a terminal run
    '500':
      description: Server error
