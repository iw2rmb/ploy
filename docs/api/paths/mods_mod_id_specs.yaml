post:
  tags: [Control]
  summary: Set mod spec
  description: |
    Create a new specs row (append-only) and update mods.spec_id to point at it.

    Refuses updates for archived mods.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/SetModSpecRequest'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/SetModSpecResponse'
    '400':
      description: Bad request — missing or invalid fields in the request body.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '409':
      description: Conflict — mod is archived.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
