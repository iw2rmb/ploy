# RunRepoStatus defines the per-repo execution state within a batch run.
# Tracks the lifecycle of individual repositories as they progress through
# the batch processing pipeline (Queued → Running → terminal).
RunRepoStatus:
  type: string
  description: |
    Per-repo execution status within a batch run.
    - Queued: Repo is queued and waiting to start execution.
    - Running: Repo execution is in progress (claimed by a node).
    - Success: Repo completed successfully.
    - Fail: Repo execution failed.
    - Cancelled: Repo was cancelled (explicit user action or run cancelled).
  enum: [Queued, Running, Success, Fail, Cancelled]

# RunBatchDerivedStatus represents the batch-level aggregate status computed
# from the per-repo states in RunRepoCounts.DerivedStatus.
RunBatchDerivedStatus:
  type: string
  description: |
    Batch-level status derived from aggregated per-repo states.
    - pending: No repos have started (all queued or no repos).
    - running: At least one repo is currently running.
    - completed: All repos are terminal with no failures.
    - failed: At least one repo failed (and none running).
    - cancelled: Batch was stopped and repos were cancelled.
  enum: [pending, running, completed, failed, cancelled]

Run:
  type: object
  description: |
    Database-backed run row (v1 execution model).
    Note: run IDs are KSUID-backed strings (27 characters); format: uuid removed.
  properties:
    id:
      type: string
      description: Run ID (KSUID string)
    mig_id:
      type: string
      minLength: 1
      description: Mig (project) ID (NanoID string). Must be non-empty.
    spec_id:
      type: string
      minLength: 1
      description: Spec ID (NanoID string). Must be non-empty.
    created_by:
      type: string
      nullable: true
      description: User or system that created the run.
    status:
      type: string
      description: "Run status. Values: Started, Finished, Cancelled."
    created_at:
      type: string
      format: date-time
      description: Timestamp when the run was created.
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the run started.
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the run reached a terminal state.
    stats:
      description: |
        Job/run metrics JSON object. Contains exit_code for failure context,
        gate results, and other execution statistics. Replaces the deprecated
        `reason` field for failure analysis.
      type: object
      additionalProperties: true
      nullable: true
  required: [id, mig_id, spec_id, status, created_at]

RunRepoCounts:
  type: object
  description: |
    Aggregated per-repo status counts for a batch run. Provides a summary of
    how many repos are in each lifecycle state (queued, running, terminal).
    The derived_status field computes a single batch-level status from these
    counts for easy display in CLI/UI surfaces.
  properties:
    total:
      type: integer
      format: int32
      description: Total number of repos in the batch.
    queued:
      type: integer
      format: int32
      description: Repos waiting to start execution.
    running:
      type: integer
      format: int32
      description: Repos currently executing.
    success:
      type: integer
      format: int32
      description: Repos that completed successfully.
    fail:
      type: integer
      format: int32
      description: Repos that failed execution.
    cancelled:
      type: integer
      format: int32
      description: Repos stopped while running.
    derived_status:
      $ref: "#/RunBatchDerivedStatus"
      description: |
        Batch-level status computed from per-repo states. Precedence order:
        cancelled > running > failed > completed > pending.
  required: [total]

RunRepo:
  type: object
  description: |
    Repo entry within a batch run, backed by the `run_repos` table.
    Represents a single repository's execution state within the batch,
    tracking refs, status, attempt count, and timing information.
    Note: repo_id is NanoID(8), run_id is KSUID (27 characters).
  properties:
    run_id:
      type: string
      description: Parent batch run ID (KSUID string).
    repo_id:
      type: string
      description: Repository ID (repos.id, NanoID string).
    repo_url:
      type: string
      description: Git repository URL (https, ssh, or file scheme).
    base_ref:
      type: string
      description: Git ref used as the base for comparisons (e.g., main, master).
    target_ref:
      type: string
      description: Git ref representing the target branch for the run.
    status:
      $ref: "#/RunRepoStatus"
      description: Current execution status for this repo.
    attempt:
      type: integer
      format: int32
      description: |
        Retry attempt number for this repo within the batch.
        Starts at 1, incremented on each restart.
    last_error:
      type: string
      nullable: true
      description: |
        Human-readable error message from the most recent failed attempt.
        Cleared when the repo is restarted.
    created_at:
      type: string
      format: date-time
      description: Timestamp when the repo entry was created.
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution started (status transitioned to running).
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution completed (terminal status reached).
  required:
    - run_id
    - repo_id
    - repo_url
    - base_ref
    - target_ref
    - status
    - attempt
    - created_at

RunSummary:
  type: object
  description: |
    Run summary with optional aggregated repo status counts.
    Note: id is now a KSUID-backed string (27 characters).
  properties:
    id:
      type: string
      minLength: 1
      description: Unique run identifier (KSUID string). Must be non-empty.
    mig_id:
      type: string
      minLength: 1
      description: Mig (project) identifier for the run. Must be non-empty.
    spec_id:
      type: string
      minLength: 1
      description: Spec identifier for the run. Must be non-empty.
    status:
      type: string
      description: |
        Run status. Values: Started, Finished, Cancelled.
    created_by:
      type: string
      nullable: true
      description: User or system that created the run.
    created_at:
      type: string
      format: date-time
      description: Timestamp when the run was created.
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the run started.
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the run reached a terminal state.
    repo_counts:
      $ref: "#/RunRepoCounts"
      nullable: true
      description: Aggregated per-repo status counts (optional).
  required:
    - id
    - mig_id
    - spec_id
    - status
    - created_at

CreateRunRequest:
  type: object
  properties:
    repo_url:
      type: string
