openapi: 3.1.0
info:
  title: Ploy Control Plane API
  version: "1.0.0"
  description: |
    REST surface exposed by the Ploy control-plane `ployd` deployment. All routes
    require authentication. The server supports both mutual TLS and JWT bearer
    tokens (`Authorization: Bearer ...`) depending on client and deployment.

    v1 API surfaces:
    - `/v1/migs` — mod project CRUD (create/list/delete/archive).
    - `/v1/migs/{mod_id}/specs` — spec management for mod projects.
    - `/v1/migs/{mod_id}/repos` — repo set management (add/list/delete repos).
    - `/v1/migs/{mod_id}/runs` — create multi-repo batch runs for a mod.
    - `/v1/migs/{mod_id}/pull` — resolve repo execution for `ploy mig pull`.
    - `/v1/runs` — single-repo run submission and run listing.
    - `/v1/runs/{id}/*` — run lifecycle (inspect/cancel/start/timing).
    - `/v1/runs/{run_id}/repos/{repo_id}/*` — repo-scoped execution surfaces:
      - `/diffs` — list diffs for a repo execution.
      - `/logs` — SSE stream of logs/events for a repo execution.
      - `/artifacts` — list artifact bundles for a repo execution.
      - `/jobs` — list jobs for a repo execution (for --follow job graph).
      - `/cancel` — cancel a repo execution within a run.
      - `/restart` — restart a repo execution within a run.
    - `/v1/runs/{run_id}/pull` — resolve repo execution for `ploy run pull`.

    Type semantics and labels:
    - The server and node use strong domain types in code (e.g., `RepoURL`, `GitRef`, `CommitSHA`, `RunID`, resource units). On the wire these remain JSON strings; run, job, and build IDs are KSUID-backed strings, repo and node IDs use NanoID, and only selected resources (diffs, artifact bundles, API/bootstrap tokens) remain UUID-backed.
    - Protocol values are restricted to `tcp` or `udp` and log levels to `debug|info|warn|error` in code; API fields remain strings.
    - Runner containers are labeled with `com.ploy.run_id=<run-id>` where `<run-id>` is the run ID (KSUID string) for correlation. Earlier mislabeling with a step identifier has been corrected.
servers:
  - url: https://{control_host}
    description: Control-plane endpoint (direct HTTPS; SSH tunnels removed)
    variables:
      control_host:
        default: cluster-alpha.example.com
        description: Control-plane host recorded in the descriptor.
tags:
  - name: Security
    description: PKI operations (CA info, CSR signing).
  - name: Config
    description: Configuration management (GitLab, runtime settings).
  - name: Control
    description: Core control-plane surfaces (repos, mods run lifecycle, runs).
  - name: Artifacts
    description: Artifact bundles, diffs, and logs stored in PostgreSQL.
security:
  - bearerAuth: []
  - mtls: []
paths:
  # Config endpoints
  /v1/config/gitlab:
    $ref: './paths/config_gitlab.yaml'
  /v1/config/env:
    $ref: './paths/config_env.yaml'
  /v1/config/env/{key}:
    $ref: './paths/config_env_key.yaml'
  # Token management (JWT bearer tokens)
  /v1/tokens:
    $ref: './paths/tokens.yaml'
  /v1/tokens/{id}:
    $ref: './paths/tokens_id.yaml'
  # Bootstrap tokens and node enrollment
  /v1/bootstrap/tokens:
    $ref: './paths/bootstrap_tokens.yaml'
  /v1/pki/bootstrap:
    $ref: './paths/pki_bootstrap.yaml'
  # PKI endpoints
  /v1/pki/sign:
    $ref: './paths/pki_sign.yaml'
  /v1/pki/sign/admin:
    $ref: './paths/pki_sign_admin.yaml'
  /v1/pki/sign/client:
    $ref: './paths/pki_sign_client.yaml'
  # Control-plane surfaces
  # Run lifecycle and streaming are exposed under /v1/runs/*.
  # Nodes upload logs/diffs/artifacts under /v1/runs/* and complete jobs under /v1/jobs/*.
  /v1/migs:
    $ref: './paths/mods.yaml'
  /v1/migs/{mod_id}:
    $ref: './paths/mods_mod_id.yaml'
  /v1/migs/{mod_id}/archive:
    $ref: './paths/mods_mod_id_archive.yaml'
  /v1/migs/{mod_id}/unarchive:
    $ref: './paths/mods_mod_id_unarchive.yaml'
  /v1/migs/{mod_id}/specs:
    $ref: './paths/mods_mod_id_specs.yaml'
  /v1/migs/{mod_id}/repos:
    $ref: './paths/mods_mod_id_repos.yaml'
  /v1/migs/{mod_id}/repos/{repo_id}:
    $ref: './paths/mods_mod_id_repos_repo_id.yaml'
  /v1/migs/{mod_id}/repos/bulk:
    $ref: './paths/mods_mod_id_repos_bulk.yaml'
  /v1/migs/{mod_id}/runs:
    $ref: './paths/mods_mod_id_runs.yaml'
  /v1/migs/{mod_id}/pull:
    $ref: './paths/mods_mod_id_pull.yaml'
  /v1/runs/{id}/logs:
    $ref: './paths/runs_id_logs.yaml'
  /v1/artifacts:
    $ref: './paths/artifacts.yaml'
  /v1/artifacts/{id}:
    $ref: './paths/artifacts_id.yaml'
  # Node heartbeat endpoint
  /v1/nodes/{id}/heartbeat:
    $ref: './paths/nodes_id_heartbeat.yaml'
  # Node drain/undrain and list endpoints
  /v1/nodes:
    $ref: './paths/nodes.yaml'
  /v1/nodes/{id}/drain:
    $ref: './paths/nodes_id_drain.yaml'
  /v1/nodes/{id}/undrain:
    $ref: './paths/nodes_id_undrain.yaml'
  # Node claim endpoint (pull-based work assignment)
  # Note: The ack endpoint (/v1/nodes/{id}/ack) has been removed. Claim is the
  # canonical endpoint for pulling work from the unified jobs queue.
  /v1/nodes/{id}/claim:
    $ref: './paths/nodes_id_claim.yaml'
  # NOTE: Node-based completion endpoint (/v1/nodes/{id}/complete) has been removed.
  # Use the job-level endpoint POST /v1/jobs/{job_id}/complete instead.

  # Job-level completion endpoint (job-scoped, no node ID) — canonical endpoint for job completion
  /v1/jobs/{job_id}/complete:
    $ref: './paths/jobs_job_id_complete.yaml'
  # Job-level runtime image persistence — nodes persist the resolved container image name (jobs.job_image)
  /v1/jobs/{job_id}/image:
    $ref: './paths/jobs_job_id_image.yaml'
  # Node events endpoint
  /v1/nodes/{id}/events:
    $ref: './paths/nodes_id_events.yaml'
  # Node logs endpoint (gzipped chunks)
  /v1/nodes/{id}/logs:
    $ref: './paths/nodes_id_logs.yaml'
  # Batch runs endpoints (list/inspect/cancel)
  /v1/runs:
    $ref: './paths/runs.yaml'
  /v1/runs/{id}:
    $ref: './paths/runs_id.yaml'
  /v1/runs/{id}/status:
    $ref: './paths/mods_id.yaml'
  /v1/runs/{id}/start:
    $ref: './paths/runs_id_start.yaml'
  /v1/runs/{id}/cancel:
    $ref: './paths/runs_id_cancel.yaml'
  /v1/runs/{id}/timing:
    $ref: './paths/runs_id_timing.yaml'
  /v1/runs/{id}/repos:
    $ref: './paths/runs_id_repos.yaml'
  /v1/runs/{id}/repos/{repo_id}/restart:
    $ref: './paths/runs_id_repos_repo_id_restart.yaml'
  # Repo-scoped diffs listing — see docs/mods-lifecycle.md § "Pulling Diffs Locally"
  /v1/runs/{run_id}/repos/{repo_id}/diffs:
    $ref: './paths/runs_run_id_repos_repo_id_diffs.yaml'
  # Repo-scoped logs SSE stream — filters run logs to jobs in this repo
  /v1/runs/{run_id}/repos/{repo_id}/logs:
    $ref: './paths/runs_run_id_repos_repo_id_logs.yaml'
  # Repo-scoped artifact listing — filters artifacts to jobs in this repo
  /v1/runs/{run_id}/repos/{repo_id}/artifacts:
    $ref: './paths/runs_run_id_repos_repo_id_artifacts.yaml'
  # Repo-scoped jobs listing — lists jobs for a repo execution
  /v1/runs/{run_id}/repos/{repo_id}/jobs:
    $ref: './paths/runs_run_id_repos_repo_id_jobs.yaml'
  # Repo-scoped cancel — cancels a single repo execution within a run
  /v1/runs/{run_id}/repos/{repo_id}/cancel:
    $ref: './paths/runs_run_id_repos_repo_id_cancel.yaml'
  /v1/runs/{run_id}/pull:
    $ref: './paths/runs_run_id_pull.yaml'
  # Repo-centric endpoints — list repos and show runs for a given repo
  /v1/repos:
    $ref: './paths/repos.yaml'
  /v1/repos/{repo_id}/runs:
    $ref: './paths/repos_repo_id_runs.yaml'
  # Job diff upload endpoint (run-scoped, no node ID)
  /v1/runs/{run_id}/jobs/{job_id}/diff:
    $ref: './paths/runs_run_id_jobs_job_id_diff.yaml'
  # Job artifact bundle upload endpoint (run-scoped, no node ID)
  /v1/runs/{run_id}/jobs/{job_id}/artifact:
    $ref: './paths/runs_run_id_jobs_job_id_artifact.yaml'
  # Control-plane diff ingestion endpoint
  /v1/runs/{id}/diffs:
    $ref: './paths/runs_id_diffs.yaml'
  # Build Gate HTTP service removed: gate runs as jobs in the Mods pipeline.
  # Nodes claim gate work via the unified /v1/nodes/{id}/claim endpoint.
  # Legacy removed:
  # - /v2/artifacts/* (artifacts replaced with PostgreSQL storage)
components:
  securitySchemes:
    mtls:
      type: mutualTLS
      description: |
        Mutual TLS authentication using certificates issued by the cluster CA.
        The server verifies client certificates during the TLS handshake.
        Node certificates are issued via the `/v1/pki/sign` endpoint.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT bearer token authentication using `Authorization: Bearer <token>`.
  parameters: {}
  schemas:
    # PKI schemas
    PKISignRequest:
      $ref: './components/schemas/pki.yaml#/PKISignRequest'
    PKISignResponse:
      $ref: './components/schemas/pki.yaml#/PKISignResponse'
    PKIAdminSignRequest:
      $ref: './components/schemas/pki.yaml#/PKIAdminSignRequest'
    PKIClientSignRequest:
      $ref: './components/schemas/pki.yaml#/PKIClientSignRequest'
    # Config schemas (global env, GitLab settings)
    GlobalEnvScope:
      $ref: './components/schemas/config.yaml#/GlobalEnvScope'
    GlobalEnvListItem:
      $ref: './components/schemas/config.yaml#/GlobalEnvListItem'
    GlobalEnvVar:
      $ref: './components/schemas/config.yaml#/GlobalEnvVar'
    GlobalEnvPutRequest:
      $ref: './components/schemas/config.yaml#/GlobalEnvPutRequest'
    # Control-plane schemas
    Error:
      $ref: './components/schemas/common.yaml#/Error'
    Run:
      $ref: './components/schemas/controlplane.yaml#/Run'
    RunSummary:
      $ref: './components/schemas/controlplane.yaml#/RunSummary'
    RunRepo:
      $ref: './components/schemas/controlplane.yaml#/RunRepo'
    RunRepoCounts:
      $ref: './components/schemas/controlplane.yaml#/RunRepoCounts'
    RunRepoStatus:
      $ref: './components/schemas/controlplane.yaml#/RunRepoStatus'
    RunBatchDerivedStatus:
      $ref: './components/schemas/controlplane.yaml#/RunBatchDerivedStatus'
    CreateRunRequest:
      $ref: './components/schemas/controlplane.yaml#/CreateRunRequest'
    CreateRunResponse:
      $ref: './components/schemas/controlplane.yaml#/CreateRunResponse'
    RunSubmitRequest:
      $ref: './components/schemas/controlplane.yaml#/RunSubmitRequest'
    ModsRunSummary:
      $ref: './components/schemas/controlplane.yaml#/ModsRunSummary'
    StageStatus:
      $ref: './components/schemas/controlplane.yaml#/StageStatus'
    NodeClaimResponse:
      $ref: './components/schemas/controlplane.yaml#/NodeClaimResponse'
    Event:
      $ref: './components/schemas/controlplane.yaml#/Event'
    Stage:
      $ref: './components/schemas/controlplane.yaml#/Stage'
    WorkflowGraphNode:
      $ref: './components/schemas/controlplane.yaml#/WorkflowGraphNode'
    WorkflowGraph:
      $ref: './components/schemas/controlplane.yaml#/WorkflowGraph'
    Node:
      $ref: './components/schemas/controlplane.yaml#/Node'
    NodeCreateLogResponse:
      $ref: './components/schemas/controlplane.yaml#/NodeCreateLogResponse'
    # Build Gate HTTP schemas removed: gate runs as jobs in the Mods pipeline.
    # Nodes claim gate work via the unified /v1/nodes/{id}/claim endpoint using NodeClaimResponse.
    # Repo-centric API types
    RepoSummary:
      $ref: './components/schemas/controlplane.yaml#/RepoSummary'
    RepoRunSummary:
      $ref: './components/schemas/controlplane.yaml#/RepoRunSummary'
    # Mod project CRUD types — POST /v1/migs, GET /v1/migs, DELETE /v1/migs/{mod_id}
    CreateMigRequest:
      $ref: './components/schemas/controlplane.yaml#/CreateMigRequest'
    CreateMigResponse:
      $ref: './components/schemas/controlplane.yaml#/CreateMigResponse'
    ModListItem:
      $ref: './components/schemas/controlplane.yaml#/ModListItem'
    ListMigsResponse:
      $ref: './components/schemas/controlplane.yaml#/ListMigsResponse'
    ModArchiveResponse:
      $ref: './components/schemas/controlplane.yaml#/ModArchiveResponse'
    # Spec management types — POST /v1/migs/{mod_id}/specs
    SetModSpecRequest:
      $ref: './components/schemas/controlplane.yaml#/SetModSpecRequest'
    SetModSpecResponse:
      $ref: './components/schemas/controlplane.yaml#/SetModSpecResponse'
    # Mod repo types — POST/GET /v1/migs/{mod_id}/repos, DELETE /v1/migs/{mod_id}/repos/{repo_id}
    ModRepo:
      $ref: './components/schemas/controlplane.yaml#/ModRepo'
    AddModRepoRequest:
      $ref: './components/schemas/controlplane.yaml#/AddModRepoRequest'
    ListModReposResponse:
      $ref: './components/schemas/controlplane.yaml#/ListModReposResponse'
    BulkUpsertMigReposResponse:
      $ref: './components/schemas/controlplane.yaml#/BulkUpsertMigReposResponse'
    BulkUpsertError:
      $ref: './components/schemas/controlplane.yaml#/BulkUpsertError'
    # Mod run types — POST /v1/migs/{mod_id}/runs
    RepoSelectorMode:
      $ref: './components/schemas/controlplane.yaml#/RepoSelectorMode'
    ModRepoSelector:
      $ref: './components/schemas/controlplane.yaml#/ModRepoSelector'
    CreateMigRunRequest:
      $ref: './components/schemas/controlplane.yaml#/CreateMigRunRequest'
    CreateMigRunResponse:
      $ref: './components/schemas/controlplane.yaml#/CreateMigRunResponse'
    # Pull resolution types — POST /v1/migs/{mod_id}/pull, POST /v1/runs/{run_id}/pull
    PullResolutionMode:
      $ref: './components/schemas/controlplane.yaml#/PullResolutionMode'
    ModPullRequest:
      $ref: './components/schemas/controlplane.yaml#/ModPullRequest'
    RunPullRequest:
      $ref: './components/schemas/controlplane.yaml#/RunPullRequest'
    PullResolutionResponse:
      $ref: './components/schemas/controlplane.yaml#/PullResolutionResponse'
    # Single-repo run submission — POST /v1/runs
    CreateSingleRepoRunResponse:
      $ref: './components/schemas/controlplane.yaml#/CreateSingleRepoRunResponse'
    # Repo-scoped diff listing — GET /v1/runs/{run_id}/repos/{repo_id}/diffs
    DiffItem:
      $ref: './components/schemas/controlplane.yaml#/DiffItem'
    DiffListResponse:
      $ref: './components/schemas/controlplane.yaml#/DiffListResponse'
    # Repo-scoped jobs listing — GET /v1/runs/{run_id}/repos/{repo_id}/jobs
    RepoJobItem:
      $ref: './components/schemas/controlplane.yaml#/RepoJobItem'
    ListRepoJobsResponse:
      $ref: './components/schemas/controlplane.yaml#/ListRepoJobsResponse'
    # Legacy removed:
    # - Node schemas (nodes.yaml) — node registry handled via mTLS RPC
    # - GitLab schemas (gitlab.yaml) — GitLab signer removed
