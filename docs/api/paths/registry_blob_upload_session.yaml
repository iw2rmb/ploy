patch:
  tags: [Registry]
  summary: Report progress for an in-flight blob upload session.
  parameters:
    - $ref: '#/components/parameters/RegistryRepository'
    - $ref: '#/components/parameters/RegistrySession'
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/RegistryUploadProgressRequest'
  responses:
    '202':
      description: Progress acknowledged.
      content:
        application/json:
          schema:
            type: object
            properties:
              upload_id:
                type: string
              uploaded:
                type: integer
                format: int64
    '400':
      description: Invalid payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '403':
      description: Caller lacks the required scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '404':
      description: Upload session not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
put:
  tags: [Registry]
  summary: Finalise an upload session and publish the blob via IPFS.
  parameters:
    - $ref: '#/components/parameters/RegistryRepository'
    - $ref: '#/components/parameters/RegistrySession'
    - in: query
      name: digest
      required: true
      schema:
        type: string
      description: Expected digest for the staged blob (for example `sha256:deadbeef`).
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/RegistryUploadCommitRequest'
  responses:
    '201':
      description: Blob committed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegistryBlobCommitResponse'
    '400':
      description: Validation failed (missing digest, size mismatch, etc.).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '403':
      description: Caller lacks the required scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '404':
      description: Upload session not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '503':
      description: Registry backend unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
