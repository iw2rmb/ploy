patch:
  tags: [Control]
  summary: Archive mig
  description: |
    Archive a mig project. An archived mig cannot be executed.

    Refuses archiving if the mig has any queued or running jobs.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/MigArchiveResponse'
    '400':
      description: Bad request (invalid mig id)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '409':
      description: Conflict — mig has queued or running jobs.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
