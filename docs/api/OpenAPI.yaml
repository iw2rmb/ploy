openapi: 3.1.0
info:
  title: Ploy Control Plane API
  version: "0.1.0"
  description: |
    REST surface exposed by the Ploy control-plane `ployd` deployment. All routes
    require mutual TLS and a bearer token with the appropriate scope.
servers:
  - url: https://{control_host}
    description: Control-plane endpoint (typically reached via SSH tunnel)
    variables:
      control_host:
        default: cluster-alpha.example.com
        description: SSH-targeted control-plane host recorded in the descriptor.
tags:
  - name: Nodes
    description: Worker onboarding, listing, and deregistration.
  - name: GitLab
    description: GitLab signer configuration.
  - name: Registry
    description: OCI registry-style artifact staging and retrieval.
security:
  - bearerAuth: []
paths:
  /v1/nodes:
    $ref: './paths/nodes.yaml'
  /v1/config/gitlab:
    $ref: './paths/gitlab_config.yaml'
  /v1/registry/{repository}/blobs/uploads:
    $ref: './paths/registry_blob_uploads.yaml'
  /v1/registry/{repository}/blobs/uploads/{session_id}:
    $ref: './paths/registry_blob_upload_session.yaml'
  /v1/registry/{repository}/blobs/{digest}:
    $ref: './paths/registry_blob_digest.yaml'
  /v1/registry/{repository}/manifests/{reference}:
    $ref: './paths/registry_manifest.yaml'
  /v1/registry/{repository}/tags/list:
    $ref: './paths/registry_tags.yaml'
components:
  securitySchemes:
    bearerAuth:
      $ref: './components/securitySchemes/bearerAuth.yaml'
  parameters:
    RegistryRepository:
      $ref: './components/parameters/registry.yaml#/RegistryRepository'
    RegistrySession:
      $ref: './components/parameters/registry.yaml#/RegistrySession'
    RegistryDigest:
      $ref: './components/parameters/registry.yaml#/RegistryDigest'
    RegistryReference:
      $ref: './components/parameters/registry.yaml#/RegistryReference'
  schemas:
    NodeJoinRequest:
      $ref: './components/schemas/nodes.yaml#/NodeJoinRequest'
    NodeProbe:
      $ref: './components/schemas/nodes.yaml#/NodeProbe'
    NodeJoinResponse:
      $ref: './components/schemas/nodes.yaml#/NodeJoinResponse'
    NodeDescriptor:
      $ref: './components/schemas/nodes.yaml#/NodeDescriptor'
    WorkerStatus:
      $ref: './components/schemas/nodes.yaml#/WorkerStatus'
    WorkerProbeResult:
      $ref: './components/schemas/nodes.yaml#/WorkerProbeResult'
    LeafCertificate:
      $ref: './components/schemas/nodes.yaml#/LeafCertificate'
    NodeDeleteRequest:
      $ref: './components/schemas/nodes.yaml#/NodeDeleteRequest'
    NodeDrainConflict:
      $ref: './components/schemas/nodes.yaml#/NodeDrainConflict'
    RevokedRecord:
      $ref: './components/schemas/nodes.yaml#/RevokedRecord'
    GitLabConfigResponse:
      $ref: './components/schemas/gitlab.yaml#/GitLabConfigResponse'
    GitLabConfigWriteRequest:
      $ref: './components/schemas/gitlab.yaml#/GitLabConfigWriteRequest'
    GitLabConfig:
      $ref: './components/schemas/gitlab.yaml#/GitLabConfig'
    GitLabToken:
      $ref: './components/schemas/gitlab.yaml#/GitLabToken'
    GitLabBranchPolicy:
      $ref: './components/schemas/gitlab.yaml#/GitLabBranchPolicy'
    GitLabRBAC:
      $ref: './components/schemas/gitlab.yaml#/GitLabRBAC'
    RegistryUploadStartRequest:
      $ref: './components/schemas/registry.yaml#/RegistryUploadStartRequest'
    RegistryUploadStartResponse:
      $ref: './components/schemas/registry.yaml#/RegistryUploadStartResponse'
    RegistryUploadProgressRequest:
      $ref: './components/schemas/registry.yaml#/RegistryUploadProgressRequest'
    RegistryUploadCommitRequest:
      $ref: './components/schemas/registry.yaml#/RegistryUploadCommitRequest'
    RegistryBlobCommitResponse:
      $ref: './components/schemas/registry.yaml#/RegistryBlobCommitResponse'
    RegistryTagList:
      $ref: './components/schemas/registry.yaml#/RegistryTagList'
    Error:
      $ref: './components/schemas/common.yaml#/Error'
