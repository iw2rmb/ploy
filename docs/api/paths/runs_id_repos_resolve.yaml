post:
  summary: Resolve a repository inside a run
  parameters:
    - name: run_id
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [repo_url]
          properties:
            repo_url:
              type: string
  responses:
    '200':
      description: Matching run repository
      content:
        application/json:
          schema:
            type: object
            required: [run_id, repo_id]
            properties:
              run_id:
                type: string
              repo_id:
                type: string
              repo_url:
                type: string
              source_commit_sha:
                type: string
    '404':
      description: Run or repository not found
    '409':
      description: Multiple repositories match
