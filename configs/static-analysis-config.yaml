# Static Analysis Configuration
# This configuration file defines settings for the Ploy static analysis framework

# Global analysis settings
enabled: true
fail_on_critical: true
arf_integration: true
max_issues: 1000
timeout: 30m
cache_enabled: true
cache_ttl: 1h

# File patterns to exclude from analysis
exclude_patterns:
  - "**/node_modules/**"
  - "**/vendor/**"
  - "**/.git/**"
  - "**/build/**"
  - "**/dist/**"
  - "**/target/**"
  - "**/.idea/**"
  - "**/.vscode/**"
  - "**/coverage/**"
  - "**/test-results/**"

# File patterns to include (overrides excludes)
include_patterns:
  - "**/src/**"
  - "**/lib/**"
  - "**/app/**"
  - "**/cmd/**"
  - "**/pkg/**"

# Custom rules and patterns
custom_rules:
  - "ploy-security-headers"
  - "ploy-api-versioning"
  - "ploy-error-handling"

# Language-specific configurations
languages:
  java:
    enabled: true
    error_prone:
      enabled: true
      javac_path: "javac"
      errorprone_path: "/opt/errorprone/error_prone_core.jar"
      max_heap_size: "2G"
      checker_options:
        - "-Xep:NullAway:ERROR"
        - "-Xep:UnusedVariable:ERROR"
        - "-Xep:UnusedMethod:WARN"
        - "-Xep:EqualsIncompatibleType:ERROR"
        - "-Xep:CollectionIncompatibleType:ERROR"
        - "-Xep:MissingOverride:WARN"
        - "-Xep:DefaultCharset:ERROR"
        - "-Xep:DoubleCheckedLocking:ERROR"
      disabled_checks:
        - "FutureReturnValueIgnored"
        - "ImmutableEnumChecker"
      severity_mapping:
        ERROR: "high"
        WARNING: "medium"
        SUGGESTION: "low"
        NOTE: "info"
      custom_patterns:
        - "com.ploy.errorprone.PloyNullCheck"
        - "com.ploy.errorprone.PloyResourceLeak"
    
    # Additional Java analyzers (future)
    spotbugs:
      enabled: false
      effort: "max"
      threshold: "low"
    
    pmd:
      enabled: false
      rulesets:
        - "java-basic"
        - "java-design"
        - "java-security"
  
  python:
    enabled: true
    pylint:
      enabled: true
      rcfile: ".pylintrc"
      score_threshold: 8.0
    
    bandit:
      enabled: true
      severity_level: "medium"
      confidence_level: "medium"
    
    mypy:
      enabled: true
      strict: false
      ignore_missing_imports: true
  
  go:
    enabled: true
    golangci_lint:
      enabled: true
      config: ".golangci.yml"
      linters:
        - "govet"
        - "golint"
        - "ineffassign"
        - "deadcode"
        - "gosec"
        - "goimports"
    
    gosec:
      enabled: true
      confidence: "medium"
      severity: "medium"
  
  javascript:
    enabled: true
    eslint:
      enabled: true
      config: ".eslintrc.json"
      fix: false
      extensions:
        - ".js"
        - ".jsx"
        - ".ts"
        - ".tsx"
    
    typescript:
      enabled: true
      strict: true
      no_implicit_any: true
  
  csharp:
    enabled: true
    roslyn_analyzers:
      enabled: true
      treat_warnings_as_errors: false
      analyzers:
        - "Microsoft.CodeAnalysis.NetAnalyzers"
        - "Microsoft.CodeAnalysis.CSharp"
    
    fxcop:
      enabled: false
      minimum_priority: "medium"
  
  rust:
    enabled: true
    clippy:
      enabled: true
      all_targets: true
      all_features: true
      deny_warnings: false
    
    cargo_audit:
      enabled: true
      ignore: []
  
  cpp:
    enabled: false
    clang_static_analyzer:
      enabled: true
      checkers:
        - "core"
        - "unix"
        - "deadcode"
        - "security"
    
    cppcheck:
      enabled: true
      standard: "c++17"
      enable: "all"
      suppress: []

# ARF integration settings
arf_integration_config:
  auto_modify: true
  require_approval_for:
    - "critical"
    - "security"
  max_auto_fixes_per_run: 50
  create_pull_requests: true
  batch_fixes: true
  
  # Recipe mapping priorities
  recipe_priorities:
    security: 1
    bug: 2
    performance: 3
    maintenance: 4
    style: 5

# Quality gates
quality_gates:
  enabled: true
  gates:
    - name: "no-critical-issues"
      condition: "critical_count == 0"
      action: "block"
    
    - name: "security-threshold"
      condition: "security_score >= 80"
      action: "warn"
    
    - name: "overall-quality"
      condition: "overall_score >= 70"
      action: "warn"
    
    - name: "max-technical-debt"
      condition: "technical_debt_hours <= 100"
      action: "info"

# Reporting configuration
reporting:
  formats:
    - "json"
    - "html"
    - "sarif"
    - "junit"
  
  output_dir: "analysis-reports"
  
  # Issue grouping for reports
  group_by:
    - "severity"
    - "category"
    - "file"
  
  # Metrics to include
  include_metrics:
    - "total_issues"
    - "issues_by_severity"
    - "issues_by_category"
    - "technical_debt"
    - "code_coverage"
    - "complexity_metrics"

# Performance optimization
performance:
  parallel_analyzers: true
  max_parallel_jobs: 4
  incremental_analysis: true
  cache_ast: true
  cache_results: true
  
  # Resource limits
  max_memory_per_analyzer: "1G"
  max_cpu_per_analyzer: 2
  analyzer_timeout: "10m"

# Notification settings
notifications:
  enabled: false
  channels:
    - type: "webhook"
      url: "${ANALYSIS_WEBHOOK_URL}"
      events:
        - "analysis_complete"
        - "critical_issue_found"
        - "quality_gate_failed"
    
    - type: "email"
      smtp_server: "${SMTP_SERVER}"
      from: "analysis@ploy.dev"
      to:
        - "dev-team@example.com"
      events:
        - "critical_issue_found"

# Enterprise features (future)
enterprise:
  enabled: false
  
  # Team collaboration
  team_collaboration:
    code_review_integration: true
    pull_request_comments: true
    issue_assignment: true
  
  # Compliance and audit
  compliance:
    enabled: true
    standards:
      - "OWASP"
      - "CWE"
      - "GDPR"
      - "PCI-DSS"
    
    audit_log: true
    retention_days: 365
  
  # Advanced analytics
  analytics:
    trend_analysis: true
    predictive_metrics: true
    team_dashboards: true
    custom_reports: true