post:
  tags: [Control]
  summary: Node claims a pending build gate job
  parameters:
    - in: path
      name: id
      required: true
      # Node IDs are NanoID strings (6 characters, URL-safe alphabet).
      schema: { type: string }
      description: Node ID (NanoID 6-character string)
  responses:
    '200':
      description: Job claimed
      content:
        application/json:
          schema:
            $ref: '../OpenAPI.yaml#/components/schemas/NodeBuildGateClaimResponse'
    '204': { description: No job available }
    '500': { description: Server error }
