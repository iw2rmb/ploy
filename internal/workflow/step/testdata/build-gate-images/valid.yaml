# valid.yaml - Complete valid image mapping for testing
BuildGateImages:
  # Java 17 with Maven
  - image: maven:3-eclipse-temurin-17
    language: java
    tool: maven
    release: "17"

  # Java 17 with Gradle
  - image: gradle:8.8-jdk17
    language: java
    tool: gradle
    release: "17"

  # Java 17 tool-agnostic fallback
  - image: eclipse-temurin:17-jdk
    language: java
    release: "17"

  # Java 11 with Maven
  - image: maven:3-eclipse-temurin-11
    language: java
    tool: maven
    release: "11"

  # Java 11 tool-agnostic fallback
  - image: eclipse-temurin:11-jdk
    language: java
    release: "11"
