reviews:
  - gaps: ["\"Evaluate on_match on_add on_remove and on_change against current and previous sbom snapshots with normalized version comparison.\" is not wired into runtime decisions: claim-time matching is called with empty runtime input (`hook.MatchInput{}`) and the returned `match.ShouldRun`/predicate outcomes are ignored, while `HookShouldRun` is hardcoded `true` unless ledger skip exists (`internal/server/handlers/nodes_claim_hook_once.go:63-79`, matcher semantics in `internal/workflow/hook/matcher.go:71-91`).", "\"Compute deterministic hook hash from canonical hook content and return once eligibility metadata for persistence keying.\" is not implemented end-to-end for unresolved relative hook sources: claim-time fallback hashes only the source path prefix and bypasses canonical spec hashing/once-eligibility semantics (`internal/server/handlers/nodes_claim_hook_once.go:49-59`, `internal/server/handlers/nodes_claim_hook_once.go:121-123`)."]
    commit: 1b233cbf
  - gaps: ["\"Resolve hook sources from mig spec root hooks entries for direct manifest files URLs and recursive hook.yaml discovery in directories.\" is not wired end-to-end in runtime scheduling/claim: job planning creates one hook job per raw `migsSpec.Hooks` entry instead of resolved manifests (`internal/server/handlers/migs_ticket.go:241-246`), and claim-time runtime rejects sources resolving to multiple manifests with `expected exactly 1 resolved hook spec` (`internal/server/handlers/nodes_claim_hook_once.go:244-253`).", "\"Resolve hook sources from mig spec root hooks entries for direct manifest files URLs and recursive hook.yaml discovery in directories.\" is brittle for normal relative hook declarations: claim-time loading hardcodes `specRoot` to `\".\"` (`internal/server/handlers/nodes_claim_hook_once.go:245-247`) while mig parsing only trims hook strings and preserves relativity (`internal/workflow/contracts/migs_spec_parse.go:52-56`), so relative hooks fail to resolve at claim time (covered by `TestResolveHookRuntimeDecision_RelativeSourceNotFoundReturnsError` in `internal/server/handlers/nodes_claim_hook_once_test.go:276-297`).", "\"Evaluate on_match on_add on_remove and on_change against current and previous sbom snapshots with normalized version comparison.\" is not wired with live runtime data: hook matching reads snapshots from DB rows via `ListSBOMRowsByJob` during claim (`internal/server/handlers/nodes_claim_hook_once.go:125-149`), but SBOM rows are only written in `maybePersistLatestSuccessfulCycleSBOMRows` (`internal/server/handlers/jobs_complete_sbom.go:12-63`) invoked after repo success reconciliation (`internal/server/handlers/jobs_complete_service_post_actions.go:216-224`), so pre/post hook claim-time predicate evaluation lacks current-cycle SBOM snapshots."]
    commit: 94d66be3
  - gaps: ["\"Resolve hook sources from mig spec root hooks entries for direct manifest files URLs and recursive hook.yaml discovery in directories.\" is not wired for healing/re-gate hook scheduling: `maybeCreateHealingJobs` still creates hook jobs from raw `spec.Hooks` count (`len(spec.Hooks)`) and raw index naming, without manifest resolution, so directory sources are not expanded into per-manifest jobs (`internal/server/handlers/nodes_complete_healing.go:111-115`, `internal/server/handlers/nodes_complete_healing.go:133-152`). This also leaves hook jobs without persisted resolved source metadata (`hook_source`) because healing uses generic prelude meta for hook jobs (`internal/server/handlers/nodes_complete_healing.go:96-99`, `internal/server/handlers/nodes_complete_healing.go:148`), so claim-time runtime falls back to raw spec entries."]
    commit: 98f5ab22
