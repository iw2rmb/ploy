get:
  tags: [Config]
  summary: List global environment variables
  operationId: listGlobalEnv
  description: |
    Returns all global environment variable entries known to the control plane.
    Each item includes the key, target, and secret flag. For entries marked as
    secret, the value field is omitted from the response to avoid leaking
    sensitive data.

    A key may appear multiple times with different targets when the same
    variable is configured for multiple injection points.

    Global environment variables are automatically injected into job containers
    or processes based on their target.

    **Target semantics:**
    - `server` — Inject into the server process
    - `nodes` — Inject into node agent processes
    - `gates` — Inject into gate jobs (pre_gate, re_gate, post_gate)
    - `steps` — Inject into step jobs (mig, heal)

    **Precedence:** Per-run env vars (in spec or CLI flags) take precedence over
    global env. Existing keys in the spec are never overwritten.

    Requires `cli-admin` role.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/config.yaml#/GlobalEnvListItem'
          example:
            - key: "OPENAI_API_KEY"
              target: "steps"
              secret: true
            - key: "CUSTOM_VAR"
              value: "myvalue"
              target: "steps"
              secret: false
    '401':
      description: Unauthorized
    '403':
      description: Forbidden (requires cli-admin role)
    '500':
      description: Server error
