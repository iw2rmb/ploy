version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/store/schema.sql"
    queries: "internal/store/queries"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          # Primary key ID columns → domain newtypes (end-to-end typed IDs)
          - column: "runs.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "jobs.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.JobID"
          - column: "nodes.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.NodeID"
          - column: "mods.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.ModID"
          - column: "specs.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.SpecID"
          - column: "mod_repos.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.ModRepoID"
          # Foreign key references → matching domain newtypes
          - column: "runs.mod_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.ModID"
          - column: "runs.spec_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.SpecID"
          - column: "runs_timing.id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "jobs.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "jobs.repo_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.ModRepoID"
          - column: "jobs.node_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "NodeID"
              pointer: true
          - column: "mods.spec_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "SpecID"
              pointer: true
          - column: "mod_repos.mod_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.ModID"
          - column: "events.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "events.job_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
          - column: "logs.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "logs.job_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
          - column: "diffs.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "diffs.job_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
          - column: "artifact_bundles.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "artifact_bundles.job_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
          - column: "run_repos.mod_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.ModID"
          - column: "run_repos.run_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.RunID"
          - column: "run_repos.repo_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.ModRepoID"
          - column: "node_metrics.node_id"
            go_type: "github.com/iw2rmb/ploy/internal/domain/types.NodeID"
          - column: "bootstrap_tokens.node_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "NodeID"
              pointer: true
          - column: "jobs.next_id"
            go_type:
              import: "github.com/iw2rmb/ploy/internal/domain/types"
              type: "JobID"
              pointer: true
