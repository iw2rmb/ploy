openapi: 3.1.0
info:
  title: Ploy Control Plane API
  version: "0.1.0"
  description: |
    REST surface exposed by the Ploy control-plane `ployd` deployment. All routes
    require mutual TLS authentication. Bearer token auth has been removed.
    During the naming transition, endpoints are available under both `/v1/jobs/*`
    (current CLI/tests) and `/v1/runs/*` (target naming in SIMPLE.md).
servers:
  - url: https://{control_host}
    description: Control-plane endpoint (direct HTTPS; SSH tunnels removed)
    variables:
      control_host:
        default: cluster-alpha.example.com
        description: Control-plane host recorded in the descriptor.
tags:
  - name: Security
    description: PKI operations (CA info, CSR signing).
  - name: Control
    description: Core control-plane CRUD surfaces (repos, mods, runs).
  - name: Artifacts
    description: Artifact bundles, diffs, and logs stored in PostgreSQL.
security:
  - mtls: []
paths:
  # PKI endpoints
  /v1/pki/sign:
    $ref: './paths/pki_sign.yaml'
  # Control-plane CRUD
  # Jobs (current CLI/tests)
  /v1/jobs:
    $ref: './paths/jobs.yaml'
  /v1/jobs/{id}:
    $ref: './paths/jobs_id.yaml'
  /v1/jobs/{id}/logs/stream:
    $ref: './paths/jobs_id_logs_stream.yaml'
  /v1/jobs/{id}/retry:
    $ref: './paths/jobs_id_retry.yaml'
  /v1/jobs/{id}/heartbeat:
    $ref: './paths/jobs_id_heartbeat.yaml'
  /v1/jobs/{id}/complete:
    $ref: './paths/jobs_id_complete.yaml'
  # Mods ticket log stream (legacy path used by CLI)
  /v1/mods/{ticket}/logs/stream:
    $ref: './paths/mods_ticket_logs_stream.yaml'
  # Future runs endpoints (target naming)
  /v1/repos:
    $ref: './paths/repos.yaml'
  /v1/repos/{id}:
    $ref: './paths/repos_id.yaml'
  /v1/mods/crud:
    $ref: './paths/mods_crud.yaml'
  /v1/mods/crud/{id}:
    $ref: './paths/mods_crud_id.yaml'
  /v1/runs:
    $ref: './paths/runs.yaml'
  /v1/runs/{id}:
    $ref: './paths/runs_id.yaml'
  /v1/runs/{id}/events:
    $ref: './paths/runs_id_events.yaml'
  /v1/runs/{id}/timing:
    $ref: './paths/runs_id_timing.yaml'
  /v1/runs/{id}/diffs:
    $ref: './paths/runs_id_diffs.yaml'
  /v1/runs/{id}/logs:
    $ref: './paths/runs_id_logs.yaml'
  /v1/runs/{id}/artifact_bundles:
    $ref: './paths/runs_id_artifact_bundles.yaml'
  # Node heartbeat endpoint
  /v1/nodes/{id}/heartbeat:
    $ref: './paths/nodes_id_heartbeat.yaml'
  # Node claim endpoint (pull-based work assignment)
  /v1/nodes/{id}/claim:
    $ref: './paths/nodes_id_claim.yaml'
  # Node events endpoint
  /v1/nodes/{id}/events:
    $ref: './paths/nodes_id_events.yaml'
  # Node diff upload endpoint
  /v1/nodes/{id}/stage/{stage}/diff:
    $ref: './paths/nodes_id_stage_stage_diff.yaml'
  # Node artifact bundle upload endpoint
  /v1/nodes/{id}/stage/{stage}/artifact:
    $ref: './paths/nodes_id_stage_stage_artifact.yaml'
  # Legacy removed:
  # - /v1/nodes (node registry now managed via server → node mTLS RPC)
  # - /v1/config/gitlab (GitLab signer removed)
  # - /v2/artifacts/* (IPFS artifacts replaced with PostgreSQL storage)
components:
  securitySchemes:
    mtls:
      type: mutualTLS
      description: |
        Mutual TLS authentication using certificates issued by the cluster CA.
        The server verifies client certificates during the TLS handshake.
        Node certificates are issued via the `/v1/pki/sign` endpoint.
  parameters: {}
  schemas:
    # PKI schemas
    PKISignRequest:
      $ref: './components/schemas/pki.yaml#/PKISignRequest'
    PKISignResponse:
      $ref: './components/schemas/pki.yaml#/PKISignResponse'
    # Control-plane schemas
    Error:
      $ref: './components/schemas/common.yaml#/Error'
    Repo:
      $ref: './components/schemas/controlplane.yaml#/Repo'
    CreateRepoRequest:
      $ref: './components/schemas/controlplane.yaml#/CreateRepoRequest'
    Mod:
      $ref: './components/schemas/controlplane.yaml#/Mod'
    CreateModRequest:
      $ref: './components/schemas/controlplane.yaml#/CreateModRequest'
    Run:
      $ref: './components/schemas/controlplane.yaml#/Run'
    CreateRunRequest:
      $ref: './components/schemas/controlplane.yaml#/CreateRunRequest'
    CreateRunResponse:
      $ref: './components/schemas/controlplane.yaml#/CreateRunResponse'
    NodeClaimResponse:
      $ref: './components/schemas/controlplane.yaml#/NodeClaimResponse'
    Event:
      $ref: './components/schemas/controlplane.yaml#/Event'
    Stage:
      $ref: './components/schemas/controlplane.yaml#/Stage'
    # Legacy removed:
    # - Node schemas (nodes.yaml) — node registry handled via mTLS RPC
    # - GitLab schemas (gitlab.yaml) — GitLab signer removed
