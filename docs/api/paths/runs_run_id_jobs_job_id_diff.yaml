parameters:
  - in: path
    name: run_id
    required: true
    # Run IDs are KSUID strings (27 characters, lexicographically sortable).
    schema: { type: string }
    description: Run ID (KSUID string)
  - in: path
    name: job_id
    required: true
    # Job IDs are KSUID strings (27 characters, lexicographically sortable).
    schema: { type: string }
    description: Job ID (KSUID string)
  - in: header
    name: PLOY_NODE_UUID
    required: true
    schema: { type: string }
    description: Worker node ID (NanoID 6-character string) uploading the diff
post:
  tags: [Artifacts]
  summary: Upload gzipped unified diff for a job (node → server)
  description: |
    Nodes upload a gzipped unified diff for a specific job of a run. The server stores
    the diff in PostgreSQL under the `diffs` table. The decoded patch bytes are limited
    to ≤ 10 MiB. The request body allows up to 16 MiB to accommodate base64 overhead.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [patch]
          properties:
            patch:
              type: string
              description: Gzipped unified diff (≤10 MiB gzipped), base64-encoded.
              contentEncoding: base64
            summary:
              type: object
              description: Optional summary metadata (stored as JSONB)
        examples:
          minimal_diff:
            summary: Minimal diff upload
            description: |
              Basic diff upload with gzipped unified diff data (base64-encoded).
              The patch field contains the gzipped diff limited to 10 MiB.
            value:
              patch: "H4sIAAAAAAAA/0rOyS9NScxRKM8vyknV1VHIT0/VLy4pysxL1wEAAAD//3fmxMMbAAAA"
          with_summary:
            summary: Diff upload with summary metadata
            description: |
              Example including optional summary with metadata about the changes.
              Summary is stored as JSONB and can contain arbitrary structured data.
            value:
              patch: "H4sIAAAAAAAA/0rOyS9NScxRKM8vyknV1VHIT0/VLy4pysxL1wEAAAD//3fmxMMbAAAA"
              summary:
                files_changed: 3
                insertions: 42
                deletions: 17
                is_conflict: false
          size_limit:
            summary: Maximum size boundary
            description: |
              The decoded gzipped patch is capped at 10 MiB (10485760 bytes).
              The JSON body limit is 16 MiB to accommodate base64 encoding overhead (~33%).
              Server returns 413 if decoded patch exceeds 10 MiB or body exceeds 16 MiB.
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            type: object
            properties:
              diff_id:
                type: string
                format: uuid
                description: Identifier of the stored diff
    '400':
      description: Bad Request (missing or empty IDs, missing fields, or job/run mismatch)
    '404':
      description: Run or Job not found
    '413':
      description: Payload Too Large (decoded patch > 10 MiB or body over limit)
    '500':
      description: Internal server error
