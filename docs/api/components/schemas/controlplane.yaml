# Node describes a registered worker node.
Node:
  type: object
  properties:
    id: { type: string, format: uuid }
    name: { type: string }
    ip_address: { type: string }
    version: { type: string, nullable: true }
    concurrency: { type: integer, format: int32 }
    cpu_total_millis: { type: integer, format: int32 }
    cpu_free_millis: { type: integer, format: int32 }
    mem_total_bytes: { type: integer, format: int64 }
    mem_free_bytes: { type: integer, format: int64 }
    disk_total_bytes: { type: integer, format: int64 }
    disk_free_bytes: { type: integer, format: int64 }
    cert_serial: { type: string, nullable: true }
    cert_fingerprint: { type: string, nullable: true }
    cert_not_before: { type: string, format: date-time, nullable: true }
    cert_not_after: { type: string, format: date-time, nullable: true }
    last_heartbeat: { type: string, format: date-time, nullable: true }
    drained: { type: boolean }
    created_at: { type: string, format: date-time }
  required:
    - id
    - name
    - ip_address
    - concurrency
    - cpu_total_millis
    - cpu_free_millis
    - mem_total_bytes
    - mem_free_bytes
    - disk_total_bytes
    - disk_free_bytes
    - drained
    - created_at

WorkflowGraphNode:
  type: object
  # Note: job IDs (id, parent_ids, child_ids) are now KSUID-backed strings.
  properties:
    id:
      type: string
      description: Job ID (KSUID string)
    name:
      type: string
      description: Logical job name (e.g., "pre-gate", "mod-0", "post-gate")
    type:
      type: string
      description: Job phase type derived from jobs.mod_type
      enum: [pre_gate, mod, heal, re_gate, post_gate]
    step_index:
      type: number
      format: double
      description: Float index used for job ordering (matches jobs.step_index)
    status:
      type: string
      description: Job execution status (matches jobs.status)
      enum: [created, pending, running, succeeded, failed, skipped, canceled]
    attempt:
      type: integer
      format: int32
      description: Retry attempt number (1 for current implementation)
    parent_ids:
      type: array
      description: IDs of predecessor jobs derived from step_index ordering
      items:
        type: string
        description: Job ID (KSUID string)
    child_ids:
      type: array
      description: IDs of successor jobs derived from step_index ordering
      items:
        type: string
        description: Job ID (KSUID string)
    image:
      type: string
      nullable: true
      description: Container image used for this job, when available
    started_at:
      type: string
      format: date-time
      nullable: true
    finished_at:
      type: string
      format: date-time
      nullable: true
    duration_ms:
      type: integer
      format: int64
      description: Job duration in milliseconds
    exit_code:
      type: integer
      format: int32
      nullable: true
      description: Exit code for the job, when available
  required: [id, name, type, step_index, status, attempt]

WorkflowGraph:
  type: object
  # Note: run_id and job IDs (root_ids, leaf_ids) are now KSUID-backed strings.
  properties:
    run_id:
      type: string
      description: Ticket/run identifier (KSUID string)
    nodes:
      type: object
      description: Map of job IDs to graph nodes
      additionalProperties:
        $ref: '#/WorkflowGraphNode'
    root_ids:
      type: array
      description: IDs of entry-point nodes (jobs with no parents)
      items:
        type: string
        description: Job ID (KSUID string)
    leaf_ids:
      type: array
      description: IDs of terminal nodes (jobs with no children)
      items:
        type: string
        description: Job ID (KSUID string)
    linear:
      type: boolean
      description: True when graph is a simple linear chain
  required: [run_id, nodes, root_ids, leaf_ids, linear]

# -------------------------------------------------------------------------
# Repo-centric API types — list repos and show runs for a given repo
# -------------------------------------------------------------------------

RepoSummary:
  type: object
  description: |
    Repository summary returned by GET /v1/repos. Includes the repo URL
    along with metadata from the most recent run (if any).
  properties:
    repo_url:
      type: string
      description: Git repository URL (https, ssh, or file scheme)
    last_run_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the most recent run started (if any)
    last_status:
      type: string
      nullable: true
      description: Status of the most recent run (pending, running, succeeded, etc.)
  required:
    - repo_url

RepoRunSummary:
  type: object
  description: |
    Run summary for a specific repository, returned by GET /v1/repos/{repo_id}/runs.
    Includes both the parent run status and per-repo status within the batch.
    Note: run_id is now a KSUID-backed string (27 characters).
  properties:
    run_id:
      type: string
      description: Unique run identifier (KSUID string)
    name:
      type: string
      nullable: true
      description: Optional batch run name
    run_status:
      type: string
      description: Parent run status (queued, running, succeeded, failed, canceled)
    repo_status:
      type: string
      description: Per-repo status within the batch (pending, running, succeeded, etc.)
    base_ref:
      type: string
      description: Git base ref for the run
    target_ref:
      type: string
      description: Git target ref for the run
    attempt:
      type: integer
      format: int32
      description: Retry attempt number for this repo in the batch
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution started
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution completed
  required:
    - run_id
    - run_status
    - repo_status
    - base_ref
    - target_ref
    - attempt
