get:
  tags: [Control]
  summary: List repositories
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              repos:
                type: array
                items:
                  $ref: '../components/schemas/controlplane.yaml#/Repo'
post:
  tags: [Control]
  summary: Create repository
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/CreateRepoRequest'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/Repo'

