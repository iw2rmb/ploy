Repo:
  type: object
  properties:
    id: { type: string, format: uuid }
    url: { type: string }
    branch: { type: string, nullable: true }
    commit_sha: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
  required: [id, url, created_at]

CreateRepoRequest:
  type: object
  properties:
    url: { type: string }
    branch: { type: string, nullable: true }
    commit_sha: { type: string, nullable: true }
  required: [url]

Run:
  type: object
  properties:
    id: { type: string, format: uuid }
    repo_url: { type: string }
    spec: {}
    created_by: { type: string, nullable: true }
    status: { type: string }
    reason: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
    node_id: { type: string, format: uuid, nullable: true }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    stats: {}
  required: [id, repo_url, status, created_at, base_ref, target_ref]

CreateRunRequest:
  type: object
  properties:
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    spec: {}
  required: [repo_url, base_ref, target_ref]

CreateRunResponse:
  type: object
  properties:
    run_id: { type: string, format: uuid }
  required: [run_id]

# Ticket submission (simplified Mods facade)
TicketSubmitRequest:
  type: object
  properties:
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    spec: {}
    created_by: { type: string, nullable: true }
  required: [repo_url, base_ref, target_ref]

TicketSummary:
  type: object
  properties:
    ticket_id: { type: string, format: uuid }
    status: { type: string }
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
  required: [ticket_id, status, repo_url, base_ref, target_ref]

# Detailed status returned by GET /v1/mods/{id}
TicketStatus:
  type: object
  properties:
    ticket_id: { type: string, format: uuid }
    status: { type: string }
    reason: { type: string, nullable: true }
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
    metadata:
      description: Additional ticket metadata (e.g., mr_url)
      type: object
      additionalProperties:
        type: string
  required: [ticket_id, status, repo_url, base_ref, target_ref, created_at]

# Build Gate — client requests and responses
BuildGateValidateRequest:
  type: object
  description: |
    Submit a build validation job. Requires repo_url and ref for Git-based
    validation using the repo+diff model.

    Optionally, callers may supply diff_patch (gzipped unified diff, base64-encoded)
    to apply on top of the cloned repo_url+ref baseline. This enables healing flows
    to replay changes without shipping full workspace archives.
  properties:
    repo_url: { type: string, description: Git repository URL to clone (required) }
    ref: { type: string, description: Git ref (branch, tag, or commit SHA) to validate (required) }
    diff_patch:
      type: string
      format: byte
      nullable: true
      description: |
        Gzipped unified diff (base64-encoded) to apply on top of the cloned
        repo_url+ref baseline. Used by healing mods to verify changes without
        transmitting full workspace archives. If non-empty, the executor clones
        repo_url at ref, then applies the decoded/decompressed patch via
        "git apply" before running the build.
    profile: { type: string, description: Gate profile (e.g., auto, java), nullable: true }
    timeout: { type: string, description: Duration string (e.g., 5m), nullable: true }
    limit_memory_bytes: { type: integer, format: int64, nullable: true }
    limit_cpu_millis: { type: integer, format: int64, nullable: true }
    limit_disk_space: { type: integer, format: int64, nullable: true }
  required: [repo_url, ref]

BuildGateValidateResponse:
  type: object
  description: Returns result when ready; otherwise JobID for polling.
  properties:
    job_id: { type: string, format: uuid }
    status: { type: string, enum: [pending, claimed, running, completed, failed] }
    result:
      description: Present only for completed jobs.
      type: object
      additionalProperties: true
      nullable: true
  required: [job_id, status]

BuildGateJobStatusResponse:
  type: object
  properties:
    job_id: { type: string, format: uuid }
    status: { type: string, enum: [pending, claimed, running, completed, failed] }
    result:
      type: object
      additionalProperties: true
      nullable: true
    error: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
  required: [job_id, status, created_at]

BuildGateJobCompleteRequest:
  type: object
  properties:
    status: { type: string, enum: [completed, failed] }
    result: { type: object, additionalProperties: true, nullable: true }
    error: { type: string, nullable: true }
  required: [status]

NodeBuildGateClaimResponse:
  type: object
  properties:
    job_id: { type: string, format: uuid }
    request:
      $ref: '#/BuildGateValidateRequest'
    status: { type: string, enum: [claimed] }
  required: [job_id, request, status]

# Response returned by POST /v1/nodes/{id}/claim
# Schema aligned with claimJobHandler response — exposes job-centric fields.
NodeClaimResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: Run ID (parent run of the claimed job)
    job_id:
      type: string
      format: uuid
      description: Claimed job ID
    job_name:
      type: string
      description: Logical job name (e.g., "pre-gate", "mod-0", "post-gate")
    job_meta:
      type: object
      additionalProperties: true
      description: Job metadata (mod_type, mod_image, etc.)
    repo_url: { type: string }
    status: { type: string }
    node_id: { type: string, format: uuid }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    step_index:
      type: number
      format: double
      description: Float index used for job ordering; always present for claimed jobs
    started_at: { type: string, format: date-time }
    created_at: { type: string, format: date-time }
    spec:
      description: |
        Opaque run specification JSON merged by the server at claim time.
        Includes `job_id` and any server defaults (e.g., `gitlab_pat`, `gitlab_domain`,
        `mr_on_success`, `mr_on_fail`).
      type: object
      additionalProperties: true
  required:
    - id
    - job_id
    - job_name
    - repo_url
    - status
    - node_id
    - base_ref
    - target_ref
    - step_index
    - started_at
    - created_at

Event:
  type: object
  properties:
    id: { type: integer, format: int64 }
    run_id: { type: string, format: uuid }
    job_id: { type: string, format: uuid, nullable: true }
    time: { type: string, format: date-time }
    level: { type: string }
    message: { type: string }
    meta: {}
  required: [id, run_id, time, level, message]

Stage:
  type: object
  properties:
    id: { type: string, format: uuid }
    run_id: { type: string, format: uuid }
    name: { type: string }
    status: { type: string }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
    duration_ms: { type: integer, format: int64 }
    meta: {}
  required: [id, run_id, name, status, duration_ms]

RunTiming:
  type: object
  properties:
    id: { type: string, format: uuid }
    queue_ms: { type: integer, format: int64 }
    run_ms: { type: integer, format: int64 }
  required: [id, queue_ms, run_ms]

ListRunsTimingsResponse:
  type: object
  properties:
    timings:
      type: array
      items:
        $ref: '#/RunTiming'
  required: [timings]

Diff:
  type: object
  properties:
    id: { type: string, format: uuid }
    run_id: { type: string, format: uuid }
    job_id: { type: string, format: uuid, nullable: true }
    patch:
      type: string
      description: Gzipped unified diff (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    summary: {}
    created_at: { type: string, format: date-time }
  required: [id, run_id, patch, created_at]

CreateDiffRequest:
  type: object
  properties:
    job_id: { type: string, format: uuid, nullable: true }
    patch:
      type: string
      description: Gzipped unified diff (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    summary: {}
  required: [patch]

Log:
  type: object
  properties:
    id: { type: integer, format: int64 }
    run_id: { type: string, format: uuid }
    job_id: { type: string, format: uuid, nullable: true }
    build_id: { type: string, format: uuid, nullable: true }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped log chunk (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    created_at: { type: string, format: date-time }
  required: [id, run_id, chunk_no, data, created_at]

# Minimal acknowledgement returned by POST /v1/nodes/{id}/logs
# when a log chunk is stored. This mirrors the server's typed DTO
# `nodeLogCreateResponse`.
NodeCreateLogResponse:
  type: object
  properties:
    id: { type: integer, format: int64 }
    chunk_no: { type: integer, format: int32 }
  required: [id, chunk_no]

CreateLogRequest:
  type: object
  properties:
    job_id: { type: string, format: uuid, nullable: true }
    build_id: { type: string, format: uuid, nullable: true }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped log chunk (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [chunk_no, data]

# Request used by node → server log ingestion.
NodeCreateLogRequest:
  type: object
  properties:
    run_id: { type: string, format: uuid }
    job_id: { type: string, format: uuid, nullable: true }
    build_id: { type: string, format: uuid, nullable: true }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped log chunk (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [run_id, chunk_no, data]

ArtifactBundle:
  type: object
  properties:
    id: { type: string, format: uuid }
    run_id: { type: string, format: uuid }
    job_id: { type: string, format: uuid, nullable: true }
    build_id: { type: string, format: uuid, nullable: true }
    name: { type: string, nullable: true }
    bundle:
      type: string
      description: Gzipped tar archive (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    created_at: { type: string, format: date-time }
  required: [id, run_id, bundle, created_at]

CreateArtifactBundleRequest:
  type: object
  properties:
    job_id: { type: string, format: uuid, nullable: true }
    build_id: { type: string, format: uuid, nullable: true }
    name: { type: string, nullable: true }
    bundle:
      type: string
      description: Gzipped tar archive (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [bundle]

# Node describes a registered worker node.
Node:
  type: object
  properties:
    id: { type: string, format: uuid }
    name: { type: string }
    ip_address: { type: string }
    version: { type: string, nullable: true }
    concurrency: { type: integer, format: int32 }
    cpu_total_millis: { type: integer, format: int32 }
    cpu_free_millis: { type: integer, format: int32 }
    mem_total_bytes: { type: integer, format: int64 }
    mem_free_bytes: { type: integer, format: int64 }
    disk_total_bytes: { type: integer, format: int64 }
    disk_free_bytes: { type: integer, format: int64 }
    cert_serial: { type: string, nullable: true }
    cert_fingerprint: { type: string, nullable: true }
    cert_not_before: { type: string, format: date-time, nullable: true }
    cert_not_after: { type: string, format: date-time, nullable: true }
    last_heartbeat: { type: string, format: date-time, nullable: true }
    drained: { type: boolean }
    created_at: { type: string, format: date-time }
  required:
    - id
    - name
    - ip_address
    - concurrency
    - cpu_total_millis
    - cpu_free_millis
    - mem_total_bytes
    - mem_free_bytes
    - disk_total_bytes
    - disk_free_bytes
    - drained
    - created_at
