post:
  tags: [Security]
  summary: Create API token
  description: |
    Creates a long-lived JWT bearer token for CLI usage.
    Requires `cli-admin` role.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            role:
              type: string
              description: Token role (`cli-admin`, `control-plane`, or `worker`).
            description:
              type: string
              description: Optional human description.
            expires_in_days:
              type: integer
              description: Optional expiration in days (default 365).
          required: [role]
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              token: { type: string, description: JWT token (shown once) }
              token_id: { type: string }
              role: { type: string }
              expires_at: { type: string, format: date-time }
              warning: { type: string }
            required: [token, token_id, role, expires_at, warning]
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '403':
      description: Forbidden (requires cli-admin role)
    '500':
      description: Server error

get:
  tags: [Security]
  summary: List API tokens
  description: |
    Lists API tokens for the current cluster.
    Requires `cli-admin` role.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              tokens:
                type: array
                items:
                  type: object
                  properties:
                    token_id: { type: string }
                    role: { type: string }
                    description: { type: string, nullable: true }
                    issued_at: { type: string, format: date-time }
                    expires_at: { type: string, format: date-time }
                    last_used_at: { type: string, format: date-time, nullable: true }
                    revoked_at: { type: string, format: date-time, nullable: true }
                    created_by: { type: string, nullable: true }
                  required: [token_id, role, issued_at, expires_at]
            required: [tokens]
    '401':
      description: Unauthorized
    '403':
      description: Forbidden (requires cli-admin role)
    '500':
      description: Server error
