get:
  tags: [Config]
  summary: List global environment variables
  operationId: listGlobalEnv
  description: |
    Returns all global environment variable entries known to the control plane.
    Each item includes the key, scope, and secret flag. For entries marked as
    secret, the value field is omitted from the response to avoid leaking
    sensitive data.

    Global environment variables are automatically injected into job containers
    based on their scope. This enables cluster-wide configuration of credentials,
    CA bundles, and API keys without embedding them in every spec file.

    **Scope semantics:**
    - `all` — Inject into every job type (mig, heal, pre_gate, re_gate, post_gate)
    - `migs` — Inject into `mig` and `post_gate` jobs (code modification phases)
    - `heal` — Inject into `heal` and `re_gate` jobs (healing/retry phases)
    - `gate` — Inject into `pre_gate`, `re_gate`, and `post_gate` jobs (gate execution phases)

    **Precedence:** Per-run env vars (in spec or CLI flags) take precedence over
    global env. Existing keys in the spec are never overwritten.

    Requires `cli-admin` role.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/config.yaml#/GlobalEnvListItem'
          example:
            - key: "CA_CERTS_PEM_BUNDLE"
              scope: "all"
              secret: true
            - key: "CUSTOM_VAR"
              value: "myvalue"
              scope: "all"
              secret: false
    '401':
      description: Unauthorized
    '403':
      description: Forbidden (requires cli-admin role)
    '500':
      description: Server error
