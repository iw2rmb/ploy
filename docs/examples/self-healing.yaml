# Advanced Self-Healing Configuration
# This example demonstrates comprehensive self-healing capabilities
# with aggressive retry policies and multiple healing strategies.

version: v1alpha1
id: advanced-self-healing-workflow
target_repo: https://gitlab.com/your-org/complex-java-project.git
target_branch: refs/heads/develop
base_ref: refs/heads/main
build_timeout: 15m         # Longer timeout for complex projects

steps:
  - type: recipe
    id: java-17-migration
    engine: openrewrite
    recipes:
      - org.openrewrite.java.migrate.Java11toJava17
      - org.openrewrite.java.migrate.UpgradeDependencyVersion:
          groupId: org.springframework
          artifactId: "*"
          newVersion: "6.x"
      - org.openrewrite.java.cleanup.CommonStaticAnalysis

# Comprehensive self-healing configuration
self_heal:
  enabled: true
  kb_learning: true
  
  # Aggressive retry policy
  max_retries: 5           # More attempts for complex issues
  cooldown: 60s           # Longer cooldown between attempts
  
  # Strategy preferences (optional)
  preferred_strategies:
    - llm-exec             # Try LLM healing first
    - orw-gen             # Then try additional OpenRewrite recipes
    - human-step          # Finally, create MR for manual intervention
  
  # Healing timeouts
  strategy_timeout: 10m   # Maximum time per healing strategy
  total_timeout: 30m      # Maximum total healing time

# Advanced LLM configuration
llm_model: gpt-4o-mini@2024-08-06
llm_config:
  temperature: 0.1        # Lower temperature for more deterministic fixes
  max_tokens: 4096        # Allow longer responses for complex fixes
  timeout: 60s           # Longer timeout for LLM requests

# KB learning configuration
kb_config:
  confidence_threshold: 0.7  # Apply KB suggestions with 70%+ confidence
  max_suggestions: 3         # Try up to 3 KB suggestions before new healing
  learning_enabled: true    # Record results for future learning