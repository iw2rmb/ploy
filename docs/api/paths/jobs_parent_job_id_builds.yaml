post:
  operationId: createJobBuild
  tags: [ Jobs ]
  summary: Create a child build job for a running parent job
  description: |
    Creates a worker-scoped child build request under a parent job.

    The parent type is derived server-side from `parent_job_id`; clients must
    not provide `parent_job_type`.
  parameters:
    - in: path
      name: parent_job_id
      required: true
      schema:
        type: string
      description: Parent job ID (KSUID string)
    - in: header
      name: PLOY_NODE_UUID
      required: true
      schema:
        type: string
      description: Worker node ID (NanoID 6-character string)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required: [ build_kind, reason ]
          properties:
            build_kind:
              type: string
              description: Child build kind. v1 supports `re_gate`.
              enum: [ re_gate ]
            reason:
              type: string
              description: Short machine-readable child-build reason.
        examples:
          reGate:
            value:
              build_kind: re_gate
              reason: child_build_validation
  responses:
    '201':
      description: Child build created
      content:
        application/json:
          schema:
            type: object
            required: [ child_job_id, status_url, status ]
            properties:
              child_job_id:
                type: string
                description: Child job ID (KSUID string)
              status_url:
                type: string
                description: Absolute URL for child build polling.
              status:
                type: string
                description: Initial child job status.
                enum: [ Created, Queued, Running, Success, Fail, Error, Cancelled ]
          examples:
            created:
              value:
                child_job_id: 35YfU3rq9CHMiiQ9g4qUg01fR6v
                status_url: https://cluster-alpha.example.com/v1/jobs/35YfU3rcN5a8eJ7pO8wV8LJyxTt/builds/35YfU3rq9CHMiiQ9g4qUg01fR6v
                status: Created
    '400':
      description: Bad request (invalid payload, IDs, or node header)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '403':
      description: Parent job is not assigned to the calling worker node
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Parent job not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '409':
      description: Parent job type/state does not allow child builds
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
