RegistryRepository:
  name: repository
  in: path
  required: true
  schema:
    type: string
    pattern: .+
  description: Full repository path (encode '/' as %2F when constructing URLs).
RegistrySession:
  name: session_id
  in: path
  required: true
  schema:
    type: string
    minLength: 1
  description: Upload session identifier returned by POST /v1/registry/{repository}/blobs/uploads.
RegistryDigest:
  name: digest
  in: path
  required: true
  schema:
    type: string
    pattern: '^[A-Za-z0-9]+:[a-f0-9]{32,}$'
  description: Content digest (for example sha256:deadbeef...).
RegistryReference:
  name: reference
  in: path
  required: true
  schema:
    type: string
  description: Tag or digest referencing a manifest.
