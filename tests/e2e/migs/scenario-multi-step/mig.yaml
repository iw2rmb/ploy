# Multi-step mig spec demonstrating sequential transformation steps with
# global build gate and healing policy. This example shows a three-step Java
# migration workflow: Java 8 → Java 11 → Java 17, with each step producing
# a diff that enables per-step rehydration and multi-node execution.
#
# Submit with:
#   dist/ploy mig run \
#     --repo-url https://gitlab.com/example/my-java-project.git \
#     --repo-base-ref main \
#     --repo-target-ref migs-multi-step-java-upgrade \
#     --spec tests/e2e/migs/scenario-multi-step/mig.yaml \
#     --follow

apiVersion: ploy.mig/v1alpha1
kind: MigRunSpec

################################################################################
# MULTI-STEP MODS
################################################################################
# Sequential transformation steps: Java 8 → Java 11 → Java 17
# Each mig executes in array order, sharing the same repository and global
# build gate/healing policy. The diff from each step is captured before the
# next step begins.
steps:
  # Step 1: Migrate to Java 8
  - image: localhost:5000/ploy/orw-cli:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.Java8
      MIGRATION_STEP: "1"

  # Step 2: Migrate to Java 11
  - image: localhost:5000/ploy/orw-cli:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava11
      MIGRATION_STEP: "2"

  # Step 3: Migrate to Java 17
  - image: localhost:5000/ploy/orw-cli:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17
      MIGRATION_STEP: "3"

################################################################################
# GLOBAL BUILD GATE AND HEALING POLICY
################################################################################
# Build gate runs after each mig step. For multi-step runs, the gate validates
# the accumulated changes from all prior steps.
build_gate:
  enabled: true

  # Router emits bug_summary + error_kind before healing selection.
  router:
    image: localhost:5000/ploy/migs-codex:latest
    env:
      CODEX_PROMPT: |-
        Rules:
        - Read /in/build-gate.log.
        - Do not edit /workspace.
        - Your final message MUST be EXACTLY one line of JSON:
          {"bug_summary":"<<=200 chars, single line>","error_kind":"code"}

        Task:
        Summarize the failure and classify it for healing selection.

  # Healing policy applies to any step that fails its gate check. The healing
  # sequence runs once per retry count, then the gate is re-evaluated before
  # proceeding to the next step.
  healing:
    by_error_kind:
      code:
        retries: 1
        # Codex healing container using the workspace diff handshake.
        # Codex edits the workspace and exits when done; the node agent inspects
        # the workspace for diffs and re-runs the Build Gate externally when changes exist.
        # Codex never runs the gate itself.
        image: localhost:5000/ploy/migs-codex:latest
        env:
          CODEX_PROMPT: |-
            Rules:
            - Use /workspace and /in/build-gate.log to understand the compile error.
            - Edit files under /workspace as needed to fix the error.
            - When you believe the code is ready for a full build validation, stop editing and end the session.

            Task:
            Fix the compilation error described in /in/build-gate.log.
        env_from_file:
          # Inline Codex auth JSON from local file (resolved by CLI)
          # Uncomment and set your auth file path:
          # CODEX_AUTH_JSON: ~/.codex/auth.json

################################################################################
# GITLAB INTEGRATION (optional)
################################################################################
mr_on_fail: false
mr_on_success: true
# gitlab_domain: gitlab.com  # optional; defaults to gitlab.com when gitlab_pat is set
# gitlab_pat: ""  # optional; can be provided via CLI or env_from_file
