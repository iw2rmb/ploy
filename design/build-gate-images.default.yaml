## Example Build Gate image mapping file.
##
## This format matches the runtime loader used by Build Gate when Stack Gate mode is active.
## Operators can copy this file to `/etc/ploy/gates/build-gate-images.yaml` as a starting point,
## then layer `build_gate.images` (mod spec) overrides.
BuildGateImages:
  - image: docker.io/org/stack-gate-java-maven:11
    language: java
    tool: maven
    release: "11"
  - image: docker.io/org/stack-gate-java-maven:17
    language: java
    tool: maven
    release: "17"
  - image: docker.io/org/stack-gate-java-gradle:11
    language: java
    tool: gradle
    release: "11"
  - image: docker.io/org/stack-gate-java-gradle:17
    language: java
    tool: gradle
    release: "17"

  # Optional tool-agnostic combined runtime (used only when expectations omit tool).
  - image: docker.io/org/stack-gate-java:11
    language: java
    release: "11"
  - image: docker.io/org/stack-gate-java:17
    language: java
    release: "17"

  # Go (go.mod)
  - image: docker.io/org/stack-gate-go:1.22
    language: go
    tool: go
    release: "1.22"

  # Rust (Cargo)
  - image: docker.io/org/stack-gate-rust:1.76
    language: rust
    tool: cargo
    release: "1.76"

  # Python (examples; tool can be omitted if runtime image is tool-agnostic)
  - image: docker.io/org/stack-gate-python-poetry:3.11
    language: python
    tool: poetry
    release: "3.11"
  - image: docker.io/org/stack-gate-python:3.11
    language: python
    release: "3.11"
