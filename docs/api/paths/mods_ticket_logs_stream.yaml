parameters:
  - in: path
    name: ticket
    required: true
    schema: { type: string }
get:
  tags: [Control]
  summary: Stream Mods ticket logs (SSE)
  description: |
    Server-Sent Events stream of Mods ticket logs. Used by `ploy mods logs`.
  responses:
    '200':
      description: OK
      content:
        text/event-stream:
          schema:
            type: string
    '404': { description: Not Found }
