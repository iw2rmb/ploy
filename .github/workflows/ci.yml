name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  GO_VERSION: '1.22.x'

jobs:
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run pre-commit (all files)
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

  lint:
    name: GolangCI-Lint
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run make lint
        run: make lint

  vet:
    name: Go Vet
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run go vet
        run: make vet

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run staticcheck
        run: staticcheck ./...

  tests:
    name: Unit Tests & Coverage Threshold
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Enforce coverage threshold
        run: make test-coverage-threshold

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [tests, lint, vet, staticcheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build CLI and API binaries
        run: make build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ploy-build
          path: |
            bin/ploy
            bin/api

  supply:
    name: Supply Chain (SBOM, Scan, Sign)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Syft and Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Install Cosign
        run: |
          COSIGN_VERSION=v2.2.4
          sudo curl -sSfL -o /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64
          sudo chmod +x /usr/local/bin/cosign
      - name: Generate SBOM
        run: syft dir:. -o json > repo.sbom.json
      - name: Vulnerability Scan
        run: grype repo.sbom.json --fail-on high
      - name: Sign SBOM
        run: |
          cosign generate-key-pair --yes
          cosign sign-blob --yes --key cosign.key --output-signature repo.sbom.json.sig repo.sbom.json
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-signature
          path: |
            repo.sbom.json
            repo.sbom.json.sig


    name: Mods Integration Harness
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.VPS_SSH_PRIVATE_KEY != '' && secrets.TARGET_HOST != '' && secrets.PLOY_CONTROLLER != '' && secrets.PLOY_SEAWEEDFS_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      - name: Add VPS host to known_hosts
        run: ssh-keyscan -H ${{ secrets.TARGET_HOST }} >> ~/.ssh/known_hosts
      - name: Seed Mods fixtures
        run: ./scripts/mods-seed-fixtures.sh
        env:
          PLOY_SEAWEEDFS_URL: ${{ secrets.PLOY_SEAWEEDFS_URL }}
          SEAWEEDFS_FILER: ${{ secrets.PLOY_SEAWEEDFS_URL }}
          GITHUB_PLOY_DEV_USERNAME: ${{ secrets.GITHUB_PLOY_DEV_USERNAME }}
          GITHUB_PLOY_DEV_PAT: ${{ secrets.GITHUB_PLOY_DEV_PAT }}
          PLOY_E2E_GITLAB_TOKEN: ${{ secrets.PLOY_E2E_GITLAB_TOKEN }}
          MODS_FIXTURE_REPOS: ${{ secrets.MODS_FIXTURE_REPOS }}
      - name: Run Mods integration harness
        run: make mods-integration-vps
        env:
          TARGET_HOST: ${{ secrets.TARGET_HOST }}
          PLOY_CONTROLLER: ${{ secrets.PLOY_CONTROLLER }}
          PLOY_SEAWEEDFS_URL: ${{ secrets.PLOY_SEAWEEDFS_URL }}
          GITHUB_PLOY_DEV_USERNAME: ${{ secrets.GITHUB_PLOY_DEV_USERNAME }}
          GITHUB_PLOY_DEV_PAT: ${{ secrets.GITHUB_PLOY_DEV_PAT }}
          PLOY_E2E_GITLAB_TOKEN: ${{ secrets.PLOY_E2E_GITLAB_TOKEN }}
          NOMAD_DC: ${{ secrets.NOMAD_DC }}
          MODS_INTEGRATION_REPO: ${{ secrets.MODS_INTEGRATION_REPO }}
          MODS_INTEGRATION_REF: ${{ secrets.MODS_INTEGRATION_REF }}
          MODS_INTEGRATION_SHA: ${{ secrets.MODS_INTEGRATION_SHA }}
          MODS_INTEGRATION_TIMEOUT: ${{ secrets.MODS_INTEGRATION_TIMEOUT }}
          MODS_INTEGRATION_IMAGE: ${{ secrets.MODS_INTEGRATION_IMAGE }}
          MODS_SEAWEED_MASTER: ${{ secrets.MODS_SEAWEED_MASTER }}
          MODS_SEAWEED_FALLBACKS: ${{ secrets.MODS_SEAWEED_FALLBACKS }}
          MODS_ALLOW_PARTIAL_ORW: ${{ secrets.MODS_ALLOW_PARTIAL_ORW }}
          MODS_REGISTRY: ${{ secrets.MODS_REGISTRY }}
          MODS_PLANNER_IMAGE: ${{ secrets.MODS_PLANNER_IMAGE }}
          MODS_REDUCER_IMAGE: ${{ secrets.MODS_REDUCER_IMAGE }}
          MODS_LLM_EXEC_IMAGE: ${{ secrets.MODS_LLM_EXEC_IMAGE }}
          MODS_ORW_APPLY_IMAGE: ${{ secrets.MODS_ORW_APPLY_IMAGE }}
          CONSUL_HTTP_ADDR: ${{ secrets.CONSUL_HTTP_ADDR }}
          SEAWEEDFS_FILER: ${{ secrets.PLOY_SEAWEEDFS_URL }}
          SEAWEEDFS_MASTER: ${{ secrets.SEAWEEDFS_MASTER }}
          SEAWEEDFS_COLLECTION: ${{ secrets.SEAWEEDFS_COLLECTION }}
          MODS_INTEGRATION_WAIT: ${{ secrets.MODS_INTEGRATION_WAIT }}
          MODS_INTEGRATION_LOG_LINES: ${{ secrets.MODS_INTEGRATION_LOG_LINES }}

  nomad-wrapper-mock:
    name: Nomad Wrapper (Mock API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq and python3
        run: sudo apt-get update && sudo apt-get install -y jq python3
      - name: Run wrapper mock tests
        run: |
          chmod +x tests/scripts/test-nomad-wrapper-mock.sh
          ./tests/scripts/test-nomad-wrapper-mock.sh