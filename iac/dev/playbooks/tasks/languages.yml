---
# Language runtimes and Python dependencies
- name: Install Go
  block:
    - name: Check if Go is already installed
      stat:
        path: /usr/local/go/bin/go
      register: go_binary

    - name: Get current Go version (if installed)
      command: /usr/local/go/bin/go version
      register: current_go_version
      changed_when: false
      ignore_errors: true
      when: go_binary.stat.exists

    - name: Download Go
      get_url:
        url: "https://golang.org/dl/go{{ go_version }}.linux-{{ go_arch }}.tar.gz"
        dest: /tmp/go.tar.gz
      when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

    - name: Remove existing Go installation
      file:
        path: /usr/local/go
        state: absent
      when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

    - name: Extract Go
      unarchive:
        src: /tmp/go.tar.gz
        dest: /usr/local
        remote_src: true
      when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

    - name: Configure system PATH with Go
      lineinfile:
        path: /etc/environment
        regexp: '^PATH='
        line: 'PATH="/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin"'
        create: true

    - name: Create Go workspace
      file:
        path: /root/go
        state: directory

- name: Install Python3 and pip
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present

- name: Install human workflow and notification dependencies
  pip:
    name:
      - jinja2>=3.1.0
      - pyyaml>=6.0
      - markdown>=3.4.0
      - email-validator>=2.0.0
      - python-dateutil>=2.8.0
      - croniter>=1.4.0
      - pytz>=2023.3
      - celery>=5.3.0
      - kombu>=5.3.0
    state: present
    executable: pip3
    extra_args: --break-system-packages
  ignore_errors: true
