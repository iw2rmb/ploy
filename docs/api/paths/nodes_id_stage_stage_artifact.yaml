parameters:
  - in: path
    name: id
    required: true
    schema: { type: string, format: uuid }
    description: Node UUID
  - in: path
    name: stage
    required: true
    schema: { type: string, format: uuid }
    description: Stage UUID
post:
  tags: [Artifacts]
  summary: Upload gzipped artifact bundle for a stage (node → server)
  description: |
    Nodes upload a gzipped tar archive for a specific stage of a run. The server stores
    the bundle in PostgreSQL under the `artifact_bundles` table. The decoded bundle
    bytes are limited to ≤ 1 MiB. The request body allows up to ~2 MiB to accommodate
    base64 overhead.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [run_id, bundle]
          properties:
            run_id:
              type: string
              format: uuid
              description: The run ID associated with this stage
            build_id:
              type: string
              format: uuid
              nullable: true
              description: Optional build ID if artifacts are produced per build
            name:
              type: string
              nullable: true
              description: Optional logical name for the artifact bundle
            bundle:
              type: string
              description: Gzipped tar archive (≤1 MiB gzipped), base64-encoded.
              contentEncoding: base64
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            type: object
            properties:
              artifact_bundle_id:
                type: string
                format: uuid
                description: Identifier of the stored artifact bundle
    '400':
      description: Bad Request (invalid IDs, missing fields, or stage/run mismatch)
    '404':
      description: Node, Run, or Stage not found
    '413':
      description: Payload Too Large (decoded bundle > 1 MiB or body over limit)
    '500':
      description: Internal server error

