get:
  summary: List runs for a repository
  description: |
    Returns the run history for a specific repository identified by `mig_repos.id`.
    Results include both the parent run status and the per-repo status within each batch.
  operationId: listRunsForRepo
  tags:
    - Control
  security:
    - mtls: []
  parameters:
    - name: repo_id
      in: path
      required: true
      description: Repository identifier (mig_repos.id, NanoID string)
      schema:
        type: string
    - name: limit
      in: query
      required: false
      description: Maximum number of runs to return (default 50, max 100)
      schema:
        type: integer
        format: int32
        default: 50
        minimum: 1
        maximum: 100
    - name: offset
      in: query
      required: false
      description: Number of runs to skip for pagination (default 0)
      schema:
        type: integer
        format: int32
        default: 0
        minimum: 0
  responses:
    '200':
      description: List of runs for the repository
      content:
        application/json:
          schema:
            type: object
            properties:
              runs:
                type: array
                items:
                  $ref: '../components/schemas/controlplane.yaml#/RepoRunSummary'
    '400':
      description: Invalid repo_id or pagination parameters
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
