get:
  tags: [Control]
  summary: List migs
  description: |
    List mig projects with pagination and optional filters.
  parameters:
    - in: query
      name: limit
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
      description: Maximum number of migs to return (default 50, max 100).
    - in: query
      name: offset
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
      description: Number of migs to skip from the start of the result set.
    - in: query
      name: name_substring
      required: false
      schema:
        type: string
      description: Substring filter on mig name (case-insensitive).
    - in: query
      name: archived
      required: false
      schema:
        type: boolean
      description: When set, filters to archived (true) or active (false) migs.
    - in: query
      name: repo_url
      required: false
      schema:
        type: string
      description: When set, filters to migs that include this repo URL.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/ListMigsResponse'
    '400':
      description: Bad request (invalid query parameters)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'

post:
  tags: [Control]
  summary: Create mig
  description: |
    Create a mig project. Optionally creates an initial spec row and sets
    migs.spec_id.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/CreateMigRequest'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/CreateMigResponse'
    '400':
      description: Bad request — missing or invalid fields in the request body.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '409':
      description: Conflict — mig name already exists.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
