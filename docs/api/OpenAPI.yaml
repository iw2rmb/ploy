openapi: 3.1.0
info:
  title: Ploy Control Plane API
  version: "1.0.0"
  description: |
    REST surface exposed by the Ploy control-plane `ployd` deployment. Control
    routes require authentication, while `/health`, `/healthz`, and `/readyz`
    are unauthenticated probe endpoints. The server supports both mutual TLS and JWT bearer tokens
    (`Authorization: Bearer ...`) depending on client and deployment.

    v1 API surfaces:
    - `/v1/migs` — mig project CRUD (create/list/delete/archive).
    - `/v1/migs/{mig_id}/specs` and `/v1/migs/{mig_id}/specs/latest` — spec management for mig projects.
    - `/v1/migs/{mig_id}/repos` — repo set management (add/list/delete repos).
    - `/v1/migs/{mig_id}/waves` — create a launch wave for a mig.
    - `/v1/migs/{mig_id}/pull` — resolve run for `ploy mig pull`.
    - `/v1/repos/resolve` — expand `namespace/repo[:ref]` shorthand using server-owned GitLab config.
    - `/v1/runs` — single-repo run submission and run listing.
    - `/v1/runs/{run_id}/*` — run lifecycle, pull resolution, logs, diffs, artifacts, jobs, SBOM views, and worker snapshots.
    - `/v1/waves/{wave_id}/*` — wave inspect, run listing, and wave cancellation.

    Type semantics and labels:
    - The server and node use strong domain types in code (e.g., `RepoURL`, `GitRef`, `CommitSHA`, `RunID`, resource units). On the wire these remain JSON strings; run, job, and build IDs are KSUID-backed strings, repo and node IDs use NanoID, and only selected resources (diffs, artifact bundles, API/bootstrap tokens) remain UUID-backed.
    - Protocol values are restricted to `tcp` or `udp` and log levels to `debug|info|warn|error` in code; API fields remain strings.
    - Runner containers are labeled with `com.ploy.run_id=<run-id>` where `<run-id>` is the run ID (KSUID string) for correlation. Earlier mislabeling with a step identifier has been corrected.
servers:
  - url: https://{control_host}
    description: Control-plane endpoint (direct HTTPS; SSH tunnels removed)
    variables:
      control_host:
        default: cluster-alpha.example.com
        description: Control-plane host recorded in the descriptor.
tags:
  - name: Security
    description: PKI operations (CA info, CSR signing).
  - name: Config
    description: Configuration management for runtime settings.
  - name: Control
    description: Core control-plane surfaces (repos, migs run lifecycle, runs).
  - name: Artifacts
    description: Artifact bundles, diffs, and logs stored in PostgreSQL.
  - name: Utility
    description: Stateless utility endpoints that do not read or mutate stored control-plane state.
security:
  - bearerAuth: []
  - mtls: []
paths:
  /health:
    $ref: "./paths/health.yaml"
  /healthz:
    $ref: "./paths/healthz.yaml"
  /readyz:
    $ref: "./paths/readyz.yaml"
  # Config endpoints
  /v1/config/env:
    $ref: "./paths/config_env.yaml"
  /v1/config/env/{key}:
    $ref: "./paths/config_env_key.yaml"
  # Token management (JWT bearer tokens)
  /v1/tokens:
    $ref: "./paths/tokens.yaml"
  /v1/tokens/{id}:
    $ref: "./paths/tokens_id.yaml"
  # Bootstrap tokens and node enrollment
  /v1/bootstrap/tokens:
    $ref: "./paths/bootstrap_tokens.yaml"
  /v1/pki/bootstrap:
    $ref: "./paths/pki_bootstrap.yaml"
  # PKI endpoints
  /v1/pki/sign:
    $ref: "./paths/pki_sign.yaml"
  /v1/pki/sign/admin:
    $ref: "./paths/pki_sign_admin.yaml"
  /v1/pki/sign/client:
    $ref: "./paths/pki_sign_client.yaml"
  # Control-plane surfaces
  # Run lifecycle and streaming are exposed under /v1/runs/*.
  # Nodes upload logs/diffs/artifacts under /v1/runs/* and complete jobs under /v1/jobs/*.
  /v1/migs:
    $ref: "./paths/migs.yaml"
  /v1/migs/{mig_id}:
    $ref: "./paths/migs_mig_id.yaml"
  /v1/migs/{mig_id}/archive:
    $ref: "./paths/migs_mig_id_archive.yaml"
  /v1/migs/{mig_id}/unarchive:
    $ref: "./paths/migs_mig_id_unarchive.yaml"
  /v1/migs/{mig_id}/specs:
    $ref: "./paths/migs_mig_id_specs.yaml"
  /v1/migs/{mig_id}/specs/latest:
    $ref: "./paths/migs_mig_id_specs_latest.yaml"
  /v1/migs/{mig_id}/repos:
    $ref: "./paths/migs_mig_id_repos.yaml"
  /v1/migs/{mig_id}/repos/{repo_id}:
    $ref: "./paths/migs_mig_id_repos_repo_id.yaml"
  /v1/migs/{mig_id}/repos/bulk:
    $ref: "./paths/migs_mig_id_repos_bulk.yaml"
  /v1/migs/{mig_id}/waves:
    $ref: "./paths/migs_mig_id_waves.yaml"
  /v1/migs/{mig_id}/pull:
    $ref: "./paths/migs_mig_id_pull.yaml"
  /v1/artifacts:
    $ref: "./paths/artifacts.yaml"
  /v1/artifacts/{id}:
    $ref: "./paths/artifacts_id.yaml"
  # Node heartbeat endpoint
  /v1/nodes/{id}/heartbeat:
    $ref: "./paths/nodes_id_heartbeat.yaml"
  # Node drain/undrain and list endpoints
  /v1/nodes:
    $ref: "./paths/nodes.yaml"
  /v1/nodes/{id}/drain:
    $ref: "./paths/nodes_id_drain.yaml"
  /v1/nodes/{id}/undrain:
    $ref: "./paths/nodes_id_undrain.yaml"
  # Node claim endpoint (pull-based work assignment)
  # Note: The ack endpoint (/v1/nodes/{id}/ack) has been removed. Claim is the
  # canonical endpoint for pulling work from the unified jobs queue.
  /v1/nodes/{id}/claim:
    $ref: "./paths/nodes_id_claim.yaml"
  # NOTE: Node-based completion endpoint (/v1/nodes/{id}/complete) has been removed.
  # Use the job-level endpoint POST /v1/jobs/{job_id}/complete instead.

  # Jobs — global jobs listing for TUI (list across all runs with mig context)
  /v1/jobs:
    $ref: "./paths/jobs.yaml"
  # Job-level completion endpoint (job-scoped, no node ID) — canonical endpoint for job completion
  /v1/jobs/{job_id}/complete:
    $ref: "./paths/jobs_job_id_complete.yaml"
  # Job-level log SSE stream and ingest endpoint
  /v1/jobs/{job_id}/logs:
    $ref: "./paths/jobs_job_id_logs.yaml"
  # Job-level status polling endpoint — workers use this to detect remote cancellation.
  /v1/jobs/{job_id}/status:
    $ref: "./paths/jobs_job_id_status.yaml"
  # Job-level runtime image persistence — nodes persist the resolved container image name (jobs.job_image)
  /v1/jobs/{job_id}/image:
    $ref: "./paths/jobs_job_id_image.yaml"
  # Job-level SBOM persistence — nodes replace package rows detected by gate post-tasks
  /v1/jobs/{job_id}/sbom:
    $ref: "./paths/jobs_job_id_sbom.yaml"
  # Stateless utility endpoints
  /v1/trimmer/java/gradle:
    $ref: "./paths/trimmer_java_gradle.yaml"
  # Node events endpoint
  /v1/nodes/{id}/events:
    $ref: "./paths/nodes_id_events.yaml"
  # Node logs endpoint (gzipped chunks)
  /v1/nodes/{id}/logs:
    $ref: "./paths/nodes_id_logs.yaml"
  # Node daemon diagnostics/logs for long-lived node-side components.
  /v1/nodes/{id}/diagnostics:
    $ref: "./paths/nodes_id_diagnostics.yaml"
  /v1/nodes/{id}/daemon-logs:
    $ref: "./paths/nodes_id_daemon_logs.yaml"
  /v1/nodes/{id}/actions:
    $ref: "./paths/nodes_id_actions.yaml"
  # Run endpoints (list/inspect/cancel)
  /v1/runs:
    $ref: "./paths/runs.yaml"
  /v1/runs/{run_id}:
    $ref: "./paths/runs_id.yaml"
  /v1/runs/{run_id}/status:
    $ref: "./paths/migs_id.yaml"
  /v1/runs/{run_id}/cancel:
    $ref: "./paths/runs_id_cancel.yaml"
  /v1/runs/{run_id}/restart:
    $ref: "./paths/runs_run_id_restart.yaml"
  /v1/runs/{run_id}/pull:
    $ref: "./paths/runs_run_id_pull.yaml"
  /v1/runs/{run_id}/snapshot:
    $ref: "./paths/runs_run_id_snapshot.yaml"
  /v1/runs/{run_id}/diffs:
    $ref: "./paths/runs_run_id_diffs.yaml"
  /v1/runs/{run_id}/logs:
    $ref: "./paths/runs_run_id_logs.yaml"
  /v1/runs/{run_id}/artifacts:
    $ref: "./paths/runs_run_id_artifacts.yaml"
  /v1/runs/{run_id}/jobs:
    $ref: "./paths/runs_run_id_jobs.yaml"
  /v1/runs/{run_id}/sbom/{view}:
    $ref: "./paths/runs_run_id_sbom_view.yaml"
  /v1/waves/{wave_id}:
    $ref: "./paths/waves_wave_id.yaml"
  /v1/waves/{wave_id}/runs:
    $ref: "./paths/waves_wave_id_runs.yaml"
  /v1/waves/{wave_id}/cancel:
    $ref: "./paths/waves_wave_id_cancel.yaml"
  # Repo-centric endpoints — list repos and show runs for a given repo
  /v1/repos/resolve:
    $ref: "./paths/repos_resolve.yaml"
  /v1/repos:
    $ref: "./paths/repos.yaml"
  /v1/repos/{repo_id}/runs:
    $ref: "./paths/repos_repo_id_runs.yaml"
  # Spec bundle upload (CLI → server) and download (worker ← server)
  /v1/spec-bundles:
    $ref: "./paths/spec_bundles.yaml"
  /v1/spec-bundles/{id}:
    $ref: "./paths/spec_bundles_id.yaml"
  # Job diff upload endpoint (run-scoped, no node ID)
  /v1/runs/{run_id}/jobs/{job_id}/diff:
    $ref: "./paths/runs_run_id_jobs_job_id_diff.yaml"
  # Job artifact bundle upload endpoint (run-scoped, no node ID)
  /v1/runs/{run_id}/jobs/{job_id}/artifact:
    $ref: "./paths/runs_run_id_jobs_job_id_artifact.yaml"
  # Build Gate HTTP service removed: gate runs as jobs in the Migs pipeline.
  # Nodes claim gate work via the unified /v1/nodes/{id}/claim endpoint.
  # Legacy removed:
  # - /v2/artifacts/* (artifacts replaced with PostgreSQL storage)
components:
  securitySchemes:
    mtls:
      type: mutualTLS
      description: |
        Mutual TLS authentication using certificates issued by the cluster CA.
        The server verifies client certificates during the TLS handshake.
        Node certificates are issued via the `/v1/pki/sign` endpoint.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT bearer token authentication using `Authorization: Bearer <token>`.
  parameters: {}
  schemas:
    # PKI schemas
    PKISignRequest:
      $ref: "./components/schemas/pki.yaml#/PKISignRequest"
    PKISignResponse:
      $ref: "./components/schemas/pki.yaml#/PKISignResponse"
    PKIAdminSignRequest:
      $ref: "./components/schemas/pki.yaml#/PKIAdminSignRequest"
    PKIClientSignRequest:
      $ref: "./components/schemas/pki.yaml#/PKIClientSignRequest"
    # Config schemas (global env settings)
    GlobalEnvTarget:
      $ref: "./components/schemas/config.yaml#/GlobalEnvTarget"
    GlobalEnvListItem:
      $ref: "./components/schemas/config.yaml#/GlobalEnvListItem"
    GlobalEnvVar:
      $ref: "./components/schemas/config.yaml#/GlobalEnvVar"
    GlobalEnvPutRequest:
      $ref: "./components/schemas/config.yaml#/GlobalEnvPutRequest"
    # Control-plane schemas
    Error:
      $ref: "./components/schemas/common.yaml#/Error"
    Run:
      $ref: "./components/schemas/controlplane.yaml#/Run"
    RunSummary:
      $ref: "./components/schemas/controlplane.yaml#/RunSummary"
    RunCounts:
      $ref: "./components/schemas/controlplane.yaml#/RunCounts"
    RunExecution:
      $ref: "./components/schemas/controlplane.yaml#/RunExecution"
    CreateRunRequest:
      $ref: "./components/schemas/controlplane.yaml#/CreateRunRequest"
    CreateRunResponse:
      $ref: "./components/schemas/controlplane.yaml#/CreateRunResponse"
    RunSubmitRequest:
      $ref: "./components/schemas/controlplane.yaml#/RunSubmitRequest"
    MigsRunSummary:
      $ref: "./components/schemas/controlplane.yaml#/MigsRunSummary"
    StageStatus:
      $ref: "./components/schemas/controlplane.yaml#/StageStatus"
    NodeClaimResponse:
      $ref: "./components/schemas/controlplane.yaml#/NodeClaimResponse"
    Event:
      $ref: "./components/schemas/controlplane.yaml#/Event"
    Stage:
      $ref: "./components/schemas/controlplane.yaml#/Stage"
    WorkflowGraphNode:
      $ref: "./components/schemas/controlplane.yaml#/WorkflowGraphNode"
    WorkflowGraph:
      $ref: "./components/schemas/controlplane.yaml#/WorkflowGraph"
    Node:
      $ref: "./components/schemas/controlplane.yaml#/Node"
    NodeCreateLogResponse:
      $ref: "./components/schemas/controlplane.yaml#/NodeCreateLogResponse"
    NodeAction:
      $ref: "./components/schemas/controlplane.yaml#/NodeAction"
    # Utility schemas
    GradleTrimmerRequest:
      $ref: "./components/schemas/trimmer.yaml#/GradleTrimmerRequest"
    GradleTrimmerResult:
      $ref: "./components/schemas/trimmer.yaml#/GradleTrimmerResult"
    GradleTrimmerEvidence:
      $ref: "./components/schemas/trimmer.yaml#/GradleTrimmerEvidence"
    GradleTrimmerError:
      $ref: "./components/schemas/trimmer.yaml#/GradleTrimmerError"
    # Build Gate HTTP schemas removed: gate runs as jobs in the Migs pipeline.
    # Nodes claim gate work via the unified /v1/nodes/{id}/claim endpoint using NodeClaimResponse.
    # Repo-centric API types
    RepoSummary:
      $ref: "./components/schemas/controlplane.yaml#/RepoSummary"
    RepoRunSummary:
      $ref: "./components/schemas/controlplane.yaml#/RepoRunSummary"
    # Mig project CRUD types — POST /v1/migs, GET /v1/migs, DELETE /v1/migs/{mig_id}
    CreateMigRequest:
      $ref: "./components/schemas/controlplane.yaml#/CreateMigRequest"
    CreateMigResponse:
      $ref: "./components/schemas/controlplane.yaml#/CreateMigResponse"
    MigListItem:
      $ref: "./components/schemas/controlplane.yaml#/MigListItem"
    ListMigsResponse:
      $ref: "./components/schemas/controlplane.yaml#/ListMigsResponse"
    MigArchiveResponse:
      $ref: "./components/schemas/controlplane.yaml#/MigArchiveResponse"
    # Spec management types — POST /v1/migs/{mig_id}/specs
    SetMigSpecRequest:
      $ref: "./components/schemas/controlplane.yaml#/SetMigSpecRequest"
    SetMigSpecResponse:
      $ref: "./components/schemas/controlplane.yaml#/SetMigSpecResponse"
    # Mig repo types — POST/GET /v1/migs/{mig_id}/repos, DELETE /v1/migs/{mig_id}/repos/{repo_id}
    MigRepo:
      $ref: "./components/schemas/controlplane.yaml#/MigRepo"
    AddMigRepoRequest:
      $ref: "./components/schemas/controlplane.yaml#/AddMigRepoRequest"
    ListMigReposResponse:
      $ref: "./components/schemas/controlplane.yaml#/ListMigReposResponse"
    BulkUpsertMigReposResponse:
      $ref: "./components/schemas/controlplane.yaml#/BulkUpsertMigReposResponse"
    BulkUpsertError:
      $ref: "./components/schemas/controlplane.yaml#/BulkUpsertError"
    # Mig wave types — POST /v1/migs/{mig_id}/waves
    RepoSelectorMode:
      $ref: "./components/schemas/controlplane.yaml#/RepoSelectorMode"
    MigRepoSelector:
      $ref: "./components/schemas/controlplane.yaml#/MigRepoSelector"
    CreateMigRunRequest:
      $ref: "./components/schemas/controlplane.yaml#/CreateMigRunRequest"
    CreateMigRunResponse:
      $ref: "./components/schemas/controlplane.yaml#/CreateMigRunResponse"
    # Pull resolution types — POST /v1/migs/{mig_id}/pull, POST /v1/runs/{run_id}/pull
    PullResolutionMode:
      $ref: "./components/schemas/controlplane.yaml#/PullResolutionMode"
    MigPullRequest:
      $ref: "./components/schemas/controlplane.yaml#/MigPullRequest"
    RunPullResponse:
      $ref: "./components/schemas/controlplane.yaml#/RunPullResponse"
    PullResolutionResponse:
      $ref: "./components/schemas/controlplane.yaml#/PullResolutionResponse"
    # Single-repo run submission — POST /v1/runs
    CreateSingleRepoRunResponse:
      $ref: "./components/schemas/controlplane.yaml#/CreateSingleRepoRunResponse"
    # Run-scoped diff listing — GET /v1/runs/{run_id}/diffs
    DiffItem:
      $ref: "./components/schemas/controlplane.yaml#/DiffItem"
    DiffListResponse:
      $ref: "./components/schemas/controlplane.yaml#/DiffListResponse"
    # Run-scoped jobs listing — GET /v1/runs/{run_id}/jobs
    RunJobItem:
      $ref: "./components/schemas/controlplane.yaml#/RunJobItem"
    ListRunJobsResponse:
      $ref: "./components/schemas/controlplane.yaml#/ListRunJobsResponse"
    # Spec bundle upload/download schemas
    SpecBundleUploadResponse:
      $ref: "./paths/spec_bundles.yaml#/components/schemas/SpecBundleUploadResponse"
    # Legacy removed:
    # - Node schemas (nodes.yaml) — node registry handled via mTLS RPC
    # - GitLab schemas (gitlab.yaml) — GitLab signer removed
