# CHTTP Simple Configuration
server:
  host: "0.0.0.0"
  port: 8080

security:
  api_key: "your-secret-api-key"

commands:
  allowed:
    - "echo"
    - "ls"
    - "cat"
    - "grep"
    - "find"
  default_timeout: "30s"

logging:
  level: "info"      # info, warn, error
  format: "json"     # json, text

health:
  enabled: true
  endpoint: "/health"