name = "commit-db"
description = "Commit-scoped Postgres snapshot with masked customer data"

[source]
engine = "postgres"
dsn = "postgres://grid/commit-app"
fixture = "commit-db.json"

[[strip]]
table = "audit_logs"
columns = ["payload"]

[[mask]]
table = "customers"
column = "email"
strategy = "hash"

[[mask]]
table = "customers"
column = "phone"
strategy = "last4"

[[synthetic]]
table = "customers"
column = "api_token"
strategy = "uuid"
