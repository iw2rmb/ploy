---
- name: Setup Ploy Development Environment
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
  
  tasks:
    - name: Update system packages
      apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install basic development tools
      apt:
        name: "{{ testing_tools }}"
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Install Go
      block:
        - name: Download Go
          get_url:
            url: "https://golang.org/dl/go{{ go_version }}.linux-{{ go_arch }}.tar.gz"
            dest: /tmp/go.tar.gz

        - name: Remove existing Go installation
          file:
            path: /usr/local/go
            state: absent

        - name: Extract Go
          unarchive:
            src: /tmp/go.tar.gz
            dest: /usr/local
            remote_src: true

        - name: Add Go to PATH
          lineinfile:
            path: /etc/environment
            line: 'PATH="/usr/local/go/bin:$PATH"'
            create: true

        - name: Create Go workspace
          file:
            path: /root/go
            state: directory

    - name: Install Python3 and pip
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present

    - name: Install Node.js and npm
      block:
        - name: Add NodeSource GPG key
          apt_key:
            url: https://deb.nodesource.com/gpgkey/nodesource.gpg.key
            state: present

        - name: Add NodeSource repository
          apt_repository:
            repo: "deb https://deb.nodesource.com/node_18.x {{ ansible_distribution_release }} main"
            state: present

        - name: Install Node.js
          apt:
            name: nodejs
            state: present

    - name: Install Java 17
      apt:
        name: openjdk-17-jdk
        state: present

    - name: Install build tools
      block:
        - name: Install make and build-essential
          apt:
            name:
              - build-essential
              - cmake
              - pkg-config
            state: present

        - name: Download KraftKit
          get_url:
            url: "https://github.com/unikraft/kraftkit/releases/download/v{{ build_tools.kraft.version }}/kraft_{{ build_tools.kraft.version }}_linux_amd64.tar.gz"
            dest: /tmp/kraft.tar.gz

        - name: Extract KraftKit
          unarchive:
            src: /tmp/kraft.tar.gz
            dest: /usr/local/bin
            remote_src: true

        - name: Download Cosign
          get_url:
            url: "https://github.com/sigstore/cosign/releases/download/v{{ build_tools.cosign.version }}/cosign-linux-amd64"
            dest: /usr/local/bin/cosign
            mode: '0755'

        - name: Download Syft
          get_url:
            url: "https://github.com/anchore/syft/releases/download/v{{ build_tools.syft.version }}/syft_{{ build_tools.syft.version }}_linux_amd64.tar.gz"
            dest: /tmp/syft.tar.gz

        - name: Extract Syft
          unarchive:
            src: /tmp/syft.tar.gz
            dest: /usr/local/bin
            remote_src: true

        - name: Download Grype
          get_url:
            url: "https://github.com/anchore/grype/releases/download/v{{ build_tools.grype.version }}/grype_{{ build_tools.grype.version }}_linux_amd64.tar.gz"
            dest: /tmp/grype.tar.gz

        - name: Extract Grype
          unarchive:
            src: /tmp/grype.tar.gz
            dest: /usr/local/bin
            remote_src: true

    - name: Setup MinIO
      block:
        - name: Create MinIO user
          user:
            name: minio
            system: true
            shell: /bin/false
            home: /var/lib/minio

        - name: Create MinIO directories
          file:
            path: "{{ item }}"
            state: directory
            owner: minio
            group: minio
            mode: '0755'
          loop:
            - /var/lib/minio
            - /etc/minio

        - name: Download MinIO
          get_url:
            url: https://dl.min.io/server/minio/release/linux-amd64/minio
            dest: /usr/local/bin/minio
            mode: '0755'

        - name: Create MinIO systemd service
          template:
            src: ../templates/minio.service.j2
            dest: /etc/systemd/system/minio.service

        - name: Create MinIO environment file
          template:
            src: ../templates/minio.env.j2
            dest: /etc/minio/minio.env
            owner: minio
            group: minio
            mode: '0600'

        - name: Start and enable MinIO
          systemd:
            name: minio
            state: started
            enabled: true
            daemon_reload: true

    - name: Create ploy user for testing
      user:
        name: ploy
        groups: docker
        append: true
        shell: /bin/bash
        create_home: true

    - name: Clone Ploy repository
      git:
        repo: https://github.com/ploy/ploy.git
        dest: /home/ploy/ploy
        force: true
      become_user: ploy
      become: true

    - name: Set up firewall
      ufw:
        rule: allow
        port: "{{ item }}"
      loop:
        - "22"
        - "{{ ploy.controller_port }}"
        - "{{ minio.port }}"
        - "{{ minio.console_port }}"
        - "4646"  # Nomad
        - "8500"  # Consul
        - "8200"  # Vault