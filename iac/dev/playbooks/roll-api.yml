---
# Roll the Ploy API after updating environment (e.g., PLOY_KANIKO_IMAGE)

- name: Roll Ploy API (Dev)
  hosts: linux_hosts
  become: true
  vars:
    kaniko_image: "{{ lookup('env','PLOY_KANIKO_IMAGE') | default('registry.dev.ployman.app/kaniko-executor:debug', true) }}"
  tasks:
    - name: Ensure Kaniko image exists in internal registry
      block:
        - name: Check if Kaniko image is mirrored
          command: bash -lc "docker manifest inspect {{ kaniko_image }} >/dev/null 2>&1 && echo ok || echo missing"
          register: kaniko_mirror
          changed_when: false

        - name: Mirror Kaniko image
          when: kaniko_mirror.stdout != 'ok'
          block:
            - name: Pull upstream Kaniko image
              docker_image:
                name: gcr.io/kaniko-project/executor:debug
                source: pull
            - name: Tag for internal registry
              command: >-
                docker tag gcr.io/kaniko-project/executor:debug {{ kaniko_image }}
              changed_when: true
            - name: Push to internal registry
              command: docker push {{ kaniko_image }}

    - name: Ensure PLOY_KANIKO_IMAGE present in /home/ploy/api.env
      become_user: ploy
      lineinfile:
        path: /home/ploy/api.env
        line: "PLOY_KANIKO_IMAGE={{ kaniko_image }}"
        create: true
        state: present
        mode: '0600'

    - name: Roll API via job manager wrapper
      become_user: ploy
      shell: |
        set -e
        /opt/hashicorp/bin/nomad-job-manager.sh run --job ploy-api --file /opt/hashicorp/nomad/jobs/ploy-api.hcl
        /opt/hashicorp/bin/nomad-job-manager.sh wait --job ploy-api --timeout 300
      register: roll_out
      changed_when: true

    - name: Show rollout result
      debug:
        var: roll_out.stdout

