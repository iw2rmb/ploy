# Development Environment Wildcard Certificate Configuration
# This configuration is for DEV environment ONLY
# It provisions wildcard certificates for both *.dev.ployd.app and *.dev.ployman.app

# Development subdomain configuration
ploy_dev_subdomain: "dev"

# Certificate configuration for user apps domain
ploy_dev_apps_certificate:
  # Wildcard domain to provision
  wildcard_domain: "*.{{ ploy.apps_domain }}"
  
  # Base domain (needed for DNS challenge)
  base_domain: "{{ ploy.apps_domain }}"
  
  # Certificate storage paths
  cert_path: "/etc/ploy/certs/dev-apps-wildcard.crt"
  key_path: "/etc/ploy/certs/dev-apps-wildcard.key"
  
  # Let's Encrypt configuration
  staging: false  # Use production Let's Encrypt for valid certs
  email: "admin@ployd.app"
  
  # Auto-renewal configuration
  auto_renew: true
  renewal_threshold_days: 30

# Certificate configuration for platform services domain
ploy_dev_platform_certificate:
  # Wildcard domain to provision
  wildcard_domain: "*.{{ ploy.platform_domain }}"
  
  # Base domain (needed for DNS challenge)
  base_domain: "{{ ploy.platform_domain }}"
  
  # Platform services will be accessible at:
  # - api.dev.ployman.app (API service)
  # - openrewrite.dev.ployman.app (OpenRewrite service)
  # - metrics.dev.ployman.app (future metrics service)
  
  # Certificate storage paths
  cert_path: "/etc/ploy/certs/dev-platform-wildcard.crt"
  key_path: "/etc/ploy/certs/dev-platform-wildcard.key"
  
  # Let's Encrypt configuration
  staging: false  # Use production Let's Encrypt for valid certs
  email: "admin@ployman.app"
  
  # Auto-renewal configuration
  auto_renew: true
  renewal_threshold_days: 30

# Environment-specific routing
ploy_dev_routing:
  # API endpoint on platform domain
  api_domain: "api.{{ ploy.platform_domain }}"
  
  # User app pattern for dev environment
  app_pattern: "{app}.{{ ploy.apps_domain }}"
  
  # Platform service pattern for dev environment
  platform_pattern: "{service}.{{ ploy.platform_domain }}"
  
  # Examples:
  # User apps: node-hello.dev.ployd.app, java-app.dev.ployd.app
  # Platform services: api.dev.ployman.app, openrewrite.dev.ployman.app

# Traefik configuration for dual wildcard certificates
traefik_dev_config:
  # Router for API on platform domain
  api_router:
    rule: "Host(`api.{{ ploy.platform_domain }}`)"
    service: "ploy-api"
    tls:
      certResolver: "platform-wildcard"
      domains:
        - main: "{{ ploy.platform_domain }}"
          sans:
            - "*.{{ ploy.platform_domain }}"
  
  # Dynamic router for user apps
  apps_router:
    rule: "HostRegexp(`{app:[a-z0-9-]+}.{{ ploy.apps_domain }}`)"
    service: "dynamic-apps"
    tls:
      certResolver: "apps-wildcard"
      domains:
        - main: "{{ ploy.apps_domain }}"
          sans:
            - "*.{{ ploy.apps_domain }}"
  
  # Dynamic router for platform services
  platform_router:
    rule: "HostRegexp(`{service:[a-z0-9-]+}.{{ ploy.platform_domain }}`)"
    service: "dynamic-platform"
    tls:
      certResolver: "platform-wildcard"

# DNS-01 Challenge Configuration
dns_challenge_config:
  # Provider is inherited from main configuration
  provider: "{{ ploy.apps_domain_provider }}"
  
  # DNS propagation check
  propagation_timeout: 300
  polling_interval: 10
  
  # TTL for challenge records
  ttl: 60
