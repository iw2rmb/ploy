---
# Ploy Development Environment Setup Playbook
# 
# This playbook sets up a complete development environment including:
# - Development tools (Go, Node.js, Java, Python)
# - Build tools (KraftKit, Cosign, Syft, Grype)
# - Container runtime (Docker)
# - Object storage (SeaweedFS)
# - Proper PATH configuration to avoid conflicts
# - GitHub credentials setup for the ploy user
#
# Key improvements:
# - Fixed PATH configuration to prevent multiple conflicting declarations
# - Cosign installation with verification
# - Cleanup of conflicting environment variables
#
- name: Setup Ploy Development Environment
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
    - ../vars/dev-wildcard.yml
  
  tasks:
    - name: Create ploy user first
      user:
        name: ploy
        shell: /bin/bash
        create_home: true
        home: /home/ploy
        groups: sudo
        append: true

    # CRITICAL: Create all Ploy directories early to prevent service startup failures
    - name: Create comprehensive Ploy directory structure
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "/opt/ploy", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/artifacts", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/metadata", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/debug", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/logs", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/cache", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/temp", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/traefik-data", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/traefik-data/certificates", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/home/ploy/ploy", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/home/ploy/ploy/configs", owner: "ploy", group: "ploy", mode: "0755" }

    - name: Update system packages
      block:
        - name: Check if apt is locked
          shell: lsof /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock 2>/dev/null | wc -l
          register: apt_locked
          changed_when: false

        - name: Wait for apt locks to be released
          wait_for:
            path: /var/lib/dpkg/lock-frontend
            state: absent
            timeout: 300
          when: apt_locked.stdout|int > 0

        - name: Update package cache
          apt:
            update_cache: true
            cache_valid_time: 3600
          retries: 3
          delay: 10

        - name: Upgrade system packages
          apt:
            upgrade: dist
            force_apt_get: true
          async: 1200  # 20 minutes max
          poll: 30     # Check every 30 seconds
          retries: 2
          delay: 30
      rescue:
        - name: Handle package update failure
          debug:
            msg: "Package update failed but continuing with deployment. Check system later."
      when: ansible_os_family == "Debian"

    - name: Install basic development tools
      apt:
        name: "{{ testing_tools }}"
        state: present
      when: ansible_os_family == "Debian"
      
    - name: Install essential Ubuntu 24 dependencies
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - snapd
          - htop
          - net-tools
          - unzip
          - jq
          - ripgrep
          - fd-find
          - bat
          - tree
          - ncdu
          - tmux
          - screen
          - python3-docker  # Required for Ansible Docker module
          - python3-requests  # Required for URI module
        state: present

    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
        state: present

    - name: Add ploy user to docker group
      user:
        name: ploy
        groups: docker
        append: true

    - name: Enhanced Docker service management
      block:
        - name: Check Docker service status
          command: systemctl is-active docker
          register: docker_service_status
          ignore_errors: true
          changed_when: false

        - name: Check Docker service health if running
          command: docker info
          register: docker_info_check
          ignore_errors: true
          changed_when: false
          when: docker_service_status.stdout == "active"

        - name: Start and enable Docker service
          systemd:
            name: docker
            state: started
            enabled: true
            daemon_reload: true
          when: docker_service_status.stdout != "active"
          register: docker_start_result
          retries: 3
          delay: 5
          until: docker_start_result is succeeded

        - name: Wait for Docker socket to be available
          wait_for:
            path: /var/run/docker.sock
            state: present
            timeout: 30
          when: docker_service_status.stdout != "active" or docker_info_check is failed

        - name: Verify Docker is responding
          command: docker version
          register: docker_version_check
          retries: 3
          delay: 5
          until: docker_version_check.rc == 0
          changed_when: false

    - name: Setup Docker Registry for local image management
      block:
        - name: Create registry directory
          file:
            path: /var/lib/docker-registry
            state: directory
            mode: '0755'
            owner: root
            group: root
        
        - name: Pull Docker Registry image
          docker_image:
            name: registry:2
            source: pull
          retries: 3
          delay: 10

        - name: Run Docker Registry container
          docker_container:
            name: registry
            image: registry:2
            state: started
            restart_policy: always
            ports:
              - "5000:5000"
            volumes:
              - /var/lib/docker-registry:/var/lib/registry
            env:
              REGISTRY_STORAGE_DELETE_ENABLED: "true"
            healthcheck:
              test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://registry.dev.ployman.app/v2/"]
              interval: 30s
              timeout: 10s
              retries: 3
          register: registry_container_result
          retries: 3
          delay: 5
          until: registry_container_result is succeeded

        - name: Wait for Docker Registry to be ready
          uri:
            url: http://registry.dev.ployman.app/v2/
            method: GET
            status_code: 200
          register: registry_health_check
          retries: 10
          delay: 5
          until: registry_health_check.status == 200

    - name: Mirror Kaniko executor image into internal registry (Dev)
      block:
        - name: Pull Kaniko executor image
          docker_image:
            name: gcr.io/kaniko-project/executor:debug
            source: pull
          retries: 3
          delay: 10

        - name: Tag Kaniko image for internal registry
          command: >-
            docker tag gcr.io/kaniko-project/executor:debug
            registry.dev.ployman.app/kaniko-executor:debug
          changed_when: true

        - name: Push Kaniko image to internal registry
          command: docker push registry.dev.ployman.app/kaniko-executor:debug
          register: push_result
          retries: 3
          delay: 10
          until: push_result.rc == 0
    
    - name: Install Docker Compose
      block:
        - name: Check if Docker Compose is already installed
          stat:
            path: /usr/local/bin/docker-compose
          register: docker_compose_binary

        - name: Get current Docker Compose version (if installed)
          command: /usr/local/bin/docker-compose version --short
          register: current_docker_compose_version
          changed_when: false
          ignore_errors: true
          when: docker_compose_binary.stat.exists

        - name: Download Docker Compose
          get_url:
            url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
            dest: /usr/local/bin/docker-compose
            mode: '0755'
          when: not docker_compose_binary.stat.exists or docker_compose_version not in (current_docker_compose_version.stdout | default(''))

    - name: Setup Docker daemon configuration with optional Kontain runtime
      block:
        - name: Check if KVM is available
          stat:
            path: /dev/kvm
          register: kvm_device

        - name: Install Kontain using official script (if KVM available)
          shell: |
            curl -s https://raw.githubusercontent.com/kontainapp/km/current/km-releases/kontain-install.sh | bash
          when: kvm_device.stat.exists
          args:
            creates: /opt/kontain/bin/krun

        - name: Set KVM availability fact for template
          set_fact:
            kvm_available: "{{ kvm_device.stat.exists }}"

        - name: Configure Docker daemon using standardized template
          template:
            src: ../../common/templates/docker-daemon.json.j2
            dest: /etc/docker/daemon.json
            backup: true
            owner: root
            group: root
            mode: '0644'
          register: docker_config_result

        - name: Validate Docker daemon configuration
          command: dockerd --validate --config-file=/etc/docker/daemon.json
          register: docker_config_validation
          failed_when: docker_config_validation.rc != 0
          changed_when: false

        - name: Restart Docker if configuration changed
          systemd:
            name: docker
            state: restarted
            daemon_reload: true
          when: docker_config_result.changed
          register: docker_restart_result
          retries: 3
          delay: 5
          until: docker_restart_result is succeeded

        - name: Verify Docker restart was successful
          command: docker info
          retries: 5
          delay: 3
          register: docker_info_verify
          changed_when: false
          when: docker_config_result.changed

    - name: Install Docker Buildx
      block:
        - name: Create Docker CLI plugins directory
          file:
            path: /usr/local/lib/docker/cli-plugins
            state: directory
            mode: '0755'

        - name: Check if Docker Buildx is already installed
          stat:
            path: /usr/local/lib/docker/cli-plugins/docker-buildx
          register: buildx_binary

        - name: Get current Docker Buildx version (if installed)
          command: /usr/local/lib/docker/cli-plugins/docker-buildx version
          register: current_buildx_version
          changed_when: false
          ignore_errors: true
          when: buildx_binary.stat.exists

        - name: Download Docker Buildx plugin
          get_url:
            url: "https://github.com/docker/buildx/releases/download/v0.17.1/buildx-v0.17.1.linux-amd64"
            dest: /usr/local/lib/docker/cli-plugins/docker-buildx
            mode: '0755'
          when: not buildx_binary.stat.exists or "0.17.1" not in (current_buildx_version.stdout | default(''))

        - name: Create Docker config directory for ploy user
          file:
            path: /home/ploy/.docker
            state: directory
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Configure Docker to use buildx plugin
          copy:
            content: |
              {
                "cliPluginsExtraDirs": ["/usr/local/lib/docker/cli-plugins"]
              }
            dest: /home/ploy/.docker/config.json
            owner: ploy
            group: ploy
            mode: '0644'

    - name: Install Go
      block:
        - name: Check if Go is already installed
          stat:
            path: /usr/local/go/bin/go
          register: go_binary

        - name: Get current Go version (if installed)
          command: /usr/local/go/bin/go version
          register: current_go_version
          changed_when: false
          ignore_errors: true
          when: go_binary.stat.exists

        - name: Download Go
          get_url:
            url: "https://golang.org/dl/go{{ go_version }}.linux-{{ go_arch }}.tar.gz"
            dest: /tmp/go.tar.gz
          when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

        - name: Remove existing Go installation
          file:
            path: /usr/local/go
            state: absent
          when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

        - name: Extract Go
          unarchive:
            src: /tmp/go.tar.gz
            dest: /usr/local
            remote_src: true
          when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

        - name: Configure system PATH with Go
          lineinfile:
            path: /etc/environment
            regexp: '^PATH='
            line: 'PATH="/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin"'
            create: true

        - name: Create Go workspace
          file:
            path: /root/go
            state: directory

    - name: Install QEMU for OSv runtime support
      apt:
        name:
          - qemu-system-x86
          - qemu-utils
          - qemu-system-common
          - libvirt-daemon-system
          - libvirt-clients
        state: present
        update_cache: yes

    - name: Install Python3 and pip
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present

    - name: Install Java and build tools for ARF
      apt:
        name:
          - openjdk-17-jdk
          - maven
          - gradle
        state: present

    - name: Set JAVA_HOME environment variable
      lineinfile:
        path: /etc/environment
        regexp: '^JAVA_HOME='
        line: 'JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64'
        create: true

    - name: Install OpenRewrite Maven plugin (for ARF integration)
      block:
        - name: Set OpenRewrite version
          set_fact:
            openrewrite_version: "8.60.0"

        - name: Check if OpenRewrite Maven plugin exists
          stat:
            path: /usr/local/bin/rewrite-maven.jar
          register: openrewrite_jar

        - name: Download OpenRewrite Maven plugin
          get_url:
            url: "https://repo1.maven.org/maven2/org/openrewrite/rewrite-maven/{{ openrewrite_version }}/rewrite-maven-{{ openrewrite_version }}.jar"
            dest: /usr/local/bin/rewrite-maven.jar
            mode: '0644'
            force: no  # Don't re-download if already exists
      ignore_errors: true

    - name: Create OpenRewrite CLI wrapper script for Maven-based transformations
      copy:
        content: |
          #!/bin/bash
          # OpenRewrite CLI wrapper for ARF integration
          # Uses Maven plugin for code transformations
          if [ -f pom.xml ]; then
            mvn org.openrewrite.maven:rewrite-maven:8.60.0:run -Drewrite.recipeArtifactCoordinates=org.openrewrite:rewrite-java -Drewrite.activeRecipes="$1"
          else
            echo "Error: Maven project (pom.xml) required for OpenRewrite transformations"
            exit 1
          fi
        dest: /usr/local/bin/rewrite
        mode: '0755'

    # PostgreSQL tasks removed (no SQL database in use)

    # Tree-sitter removed: CLI and parsers not installed

    - name: Install LLM API dependencies
      block:
        - name: Install critical LLM packages
          pip:
            name:
              - openai>=1.0.0
              - anthropic>=0.7.0
              - requests>=2.28.0
              - tiktoken>=0.5.0
            state: present
            executable: pip3
            extra_args: --break-system-packages
          async: 300  # 5 minutes max
          poll: 15    # Check every 15 seconds

        - name: Install database packages
          pip:
            name:
              - redis>=4.5.0
              - sqlalchemy>=2.0.0
              - psycopg2-binary>=2.9.0
            state: present
            executable: pip3
            extra_args: --break-system-packages
          async: 300
          poll: 15

        - name: Install scientific packages
          pip:
            name:
              - numpy>=1.24.0
              - scipy>=1.10.0
            state: present
            executable: pip3
            extra_args: --break-system-packages
          async: 600  # 10 minutes for scientific packages
          poll: 30
      rescue:
        - name: Handle pip installation failure
          debug:
            msg: "Some Python packages failed to install. ARF functionality may be limited."

    # Static Analysis Phase 2: Python Analysis Tools
    - name: Install Python static analysis tools
      pip:
        name:
          - pylint>=3.0.0
          - mypy>=1.5.0
          - black>=23.0.0
          - isort>=5.12.0
          - flake8>=6.0.0
          - pylint-django>=2.5.0
          - pylint-flask>=0.6
        state: present
        executable: pip3
        extra_args: --break-system-packages
      ignore_errors: true  # Ignore conflicts with system packages

    # ARF Phase 4: Security & Production Hardening Dependencies
    - name: Install security scanning dependencies
      apt:
        name:
          - libssl-dev
          - libffi-dev
          - libxml2-dev
          - libxslt1-dev
          - zlib1g-dev
          - libjpeg-dev
          - libpng-dev
          - build-essential
          - pkg-config
        state: present

    - name: Install vulnerability database management tools (simplified)
      pip:
        name:
          - cvss>=2.4
          - bandit>=1.7.0
          - spdx-tools>=0.8.0
          - packageurl-python>=0.11.0
        state: present
        executable: pip3
        extra_args: --break-system-packages
      ignore_errors: true
      # Note: Temporarily skipping semgrep, safety, cyclonedx-bom, python-nvd3 due to dependency conflicts

    # Note: SBOM generation tools (syft and grype) are installed later with proper version checking

    - name: Configure NVD API for vulnerability data
      block:
        - name: Create NVD API configuration directory
          file:
            path: /etc/ploy/nvd
            state: directory
            mode: '0755'
            owner: ploy
            group: ploy

        - name: Create NVD API configuration file
          copy:
            content: |
              # NVD API Configuration for ARF Phase 4
              # API documentation: https://nvd.nist.gov/developers/vulnerabilities
              api_endpoint: "https://services.nvd.nist.gov/rest/json/cves/2.0"
              rate_limit: 5  # requests per second for public API
              timeout: 30  # seconds
              cache_duration: 3600  # 1 hour in seconds
              # To use enhanced rate limits, add your API key:
              # api_key: "your-nvd-api-key-here"
            dest: /etc/ploy/nvd/config.yaml
            owner: ploy
            group: ploy
            mode: '0644'

    - name: Install human workflow and notification dependencies
      pip:
        name:
          - jinja2>=3.1.0
          - pyyaml>=6.0
          - markdown>=3.4.0
          - email-validator>=2.0.0
          - python-dateutil>=2.8.0
          - croniter>=1.4.0
          - pytz>=2023.3
          - celery>=5.3.0
          - kombu>=5.3.0
        state: present
        executable: pip3
        extra_args: --break-system-packages
      ignore_errors: true

    - name: Install production monitoring dependencies
      apt:
        name:
          - htop
          - iotop
          - netstat-nat
          - tcpdump
          - strace
          - lsof
          - sysstat
          - procps
        state: present

    - name: Configure performance monitoring tools
      block:
        - name: Enable sysstat data collection
          replace:
            path: /etc/default/sysstat
            regexp: '^ENABLED="false"'
            replace: 'ENABLED="true"'

        - name: Start sysstat service
          systemd:
            name: sysstat
            state: started
            enabled: true

    - name: Create ARF Phase 4 configuration directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: ploy
        group: ploy
      loop:
        - /etc/ploy/security
        - /etc/ploy/workflows
        - /etc/ploy/monitoring
        - /var/log/ploy/security
        - /var/log/ploy/workflows
        - /var/cache/ploy/vulnerability-db

    - name: Configure security scanning settings
      copy:
        content: |
          # ARF Phase 4 Security Configuration
          security:
            vulnerability_scanning:
              enabled: true
              scan_interval: 24h  # Daily scans
              critical_threshold: 9.0  # CVSS score threshold for critical alerts
              databases:
                - nvd
                - osv
                - github_advisory
            
            remediation:
              auto_apply: false  # Require human approval
              max_concurrent: 3  # Maximum concurrent remediation operations
              timeout: 30m  # Maximum time per remediation
              
            human_workflow:
              enabled: true
              approval_required: true
              escalation_timeout: 4h  # Escalate if no response within 4 hours
              notification_channels:
                - email
                - webhook
            
            compliance:
              frameworks:
                - owasp
                - nist
              reporting_interval: weekly
              
          monitoring:
            performance:
              enabled: true
              collection_interval: 30s
              retention_period: 7d
              alert_thresholds:
                cpu_usage: 80
                memory_usage: 80
                disk_usage: 85
                error_rate: 5  # 5%
                
            metrics:
              endpoint: "/v1/metrics"
              format: "prometheus"
              
          production:
            optimization:
              enabled: true
              auto_scaling: true
              resource_limits:
                max_cpu: 4
                max_memory: 8g
                max_disk: 50g
              
            caching:
              enabled: true
              ttl: 30m
              max_size: 1g
              
            rate_limiting:
              enabled: true
              requests_per_minute: 60
              burst_size: 10
        dest: /etc/ploy/security/config.yaml
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Install Redis for LLM caching and coordination
      apt:
        name:
          - redis-server
          - redis-tools
        state: present

    - name: Configure Redis for ARF Phase 3
      copy:
        content: |
          # Redis configuration for ARF Phase 3 - LLM caching and coordination
          bind 127.0.0.1
          port 6379
          protected-mode yes
          timeout 0
          tcp-keepalive 300
          
          # Memory configuration
          maxmemory 1gb
          maxmemory-policy allkeys-lru
          
          # Persistence for learning data
          save 900 1
          save 300 10
          save 60 10000
          
          # Logging
          loglevel notice
          logfile /var/log/redis/redis-server.log
          
          # Database configuration
          databases 16
          
          # ARF-specific databases:
          # db 0: LLM response cache
          # db 1: Recipe template cache  
          # db 2: Learning pattern cache
          # db 3: A/B test coordination
          # db 4: Performance metrics
        dest: /etc/redis/redis-arf.conf
        backup: yes

    - name: Start and enable Redis
      systemd:
        name: redis-server
        state: started
        enabled: true

    # Ollama removed - using external LLM APIs via model registry instead

    - name: Install CLLM service dependencies
      block:
        - name: Create CLLM service directories
          file:
            path: "{{ item }}"
            state: directory
            owner: ploy
            group: ploy
            mode: '0755'
          loop:
            - /opt/ploy/cllm
            - /opt/ploy/cllm/sandbox
            - /opt/ploy/cllm/logs
            - /opt/ploy/cllm/configs
            - /var/log/ploy/cllm
            - /etc/ploy/cllm

        - name: Create CLLM configuration file
          copy:
            content: |
              # CLLM Service Configuration for VPS Environment
              server:
                host: "0.0.0.0"
                port: 8082
                read_timeout: "30s"
                write_timeout: "30s"
                shutdown_timeout: "10s"

              sandbox:
                work_dir: "/opt/ploy/cllm/sandbox"
                max_memory: "2GB"
                max_cpu_time: "300s"
                max_processes: 20
                cleanup_timeout: "30s"

              providers:
                default: "external"
                # Models configured via ploy arf models command
                  max_context: 4096

              logging:
                level: "info"
                format: "json"
                output: "/var/log/ploy/cllm/cllm.log"

              security:
                max_request_size: "50MB"
                rate_limit: "100/min"
                cors_origins: 
                  - "https://api.dev.ployman.app"
                  - "https://dev.ployman.app"
                  - "http://localhost:*"
            dest: /etc/ploy/cllm/config.yaml
            owner: ploy
            group: ploy
            mode: '0644'

        - name: Add CLLM environment variables to ploy user profile
          blockinfile:
            path: /home/ploy/.bashrc
            create: true
            owner: ploy
            group: ploy
            mode: '0644'
            block: |
              # CLLM Service Environment Variables
              export CLLM_SERVER_HOST="0.0.0.0"
              export CLLM_SERVER_PORT="8082"
              export CLLM_SANDBOX_WORK_DIR="/opt/ploy/cllm/sandbox"
              export CLLM_SANDBOX_MAX_MEMORY="2GB"
              export CLLM_SANDBOX_MAX_CPU_TIME="300s"
              # LLM models configured via model registry
              export CLLM_CONFIG_FILE="/etc/ploy/cllm/config.yaml"
              export CLLM_LOG_DIR="/var/log/ploy/cllm"
              
              # ARF-CLLM Integration Variables
              export ARF_CLLM_ENDPOINT="http://localhost:8082"
              export ARF_CLLM_TIMEOUT="120s"
              export ARF_CLLM_MAX_RETRIES="3"
              export ARF_CLLM_ENABLED="true"
            marker: "# {mark} ANSIBLE MANAGED BLOCK - CLLM vars"


    - name: Create ARF Phase 3 executables and tools
      block:
        - name: Create ARF executables directory
          file:
            path: /usr/local/bin/arf-executors
            state: directory
            mode: '0755'

        - name: Create ARF Phase 3 executor stub scripts
          copy:
            content: |
              #!/bin/bash
              # ARF Phase 3 - {{ item.name }}
              # This is a development stub - actual implementation will be built by the api
              
              echo "ARF Phase 3 {{ item.name }} - Development Environment"
              echo "Arguments: $@"
              echo "Working Directory: $(pwd)"
              echo ""
              
              # {{ item.description }}
              
              {% for command in item.commands %}
              echo "{{ command }}"
              {% endfor %}
              
              # Simulate execution time
              sleep {{ item.sim_time | default(2) }}
              
              {% if item.exit_success | default(true) %}
              echo "{{ item.name }} completed successfully"
              exit 0
              {% else %}
              echo "{{ item.name }} simulation - some features require actual api"
              exit 1
              {% endif %}
            dest: "/usr/local/bin/{{ item.binary }}"
            mode: '0755'
          loop:
            - name: "LLM Recipe Generator"
              binary: "arf-llm-generator"
              description: "Generates ARF recipes using Large Language Models"
              commands:
                - "Analyzing error context..."
                - "Querying LLM for recipe generation..."
                - "Validating generated recipe syntax..."
                - "Optimizing recipe confidence..."
              sim_time: 5
              exit_success: true
            
            - name: "Multi-Language AST Parser"
              binary: "arf-multi-lang-parser"
              description: "(Deprecated) Tree-sitter parsing pipeline removed"
              commands:
                - "Detecting source language..."
                - "Skipping tree-sitter parser loading (deprecated)"
                - "Parsing AST structure..."
                - "Extracting symbols and imports..."
              sim_time: 3
              exit_success: true
            
            - name: "Hybrid Pipeline Coordinator" 
              binary: "arf-hybrid-coordinator"
              description: "Coordinates OpenRewrite and LLM transformations"
              commands:
                - "Analyzing transformation complexity..."
                - "Selecting optimal strategy..."
                - "Coordinating parallel execution..."
                - "Merging transformation results..."
              sim_time: 8
              exit_success: true
            
            - name: "Learning Pattern Extractor"
              binary: "arf-learning-extractor"
              description: "Extracts patterns from transformation history"
              commands:
                - "Querying transformation database..."
                - "Running statistical analysis..."
                - "Extracting success patterns..."
                - "Updating strategy weights..."
              sim_time: 4
              exit_success: true
            
            - name: "A/B Test Manager"
              binary: "arf-ab-test-manager" 
              description: "Manages A/B testing experiments for recipes"
              commands:
                - "Setting up experiment configuration..."
                - "Tracking transformation outcomes..."
                - "Computing statistical significance..."
                - "Generating recommendations..."
              sim_time: 3
              exit_success: true

        - name: Create ARF Phase 3 validation tools
          copy:
            content: |
              #!/bin/bash
              # ARF Phase 3 Validation Suite
              
              echo "🔍 ARF Phase 3 Infrastructure Validation"
              echo "========================================"
              echo ""
              
              # Check Redis connectivity  
              echo "Checking Redis connection..."
              if redis-cli ping > /dev/null 2>&1; then
                  echo "✅ Redis: Ready"
              else
                  echo "❌ Redis: Not available"
              fi
              
              # Tree-sitter checks removed
              parser_count=0
              
              # Check Python dependencies
              echo "Checking Python LLM dependencies..."
              python_deps=0
              for dep in openai anthropic requests redis sqlalchemy; do
                  if python3 -c "import $dep" >/dev/null 2>&1; then
                      python_deps=$((python_deps + 1))
                  fi
              done
              echo "✅ Python LLM deps: $python_deps/5 available"
              
              # Check LLM model registry via API (LLMS)
              echo "Checking LLM model registry (LLMS)..."
              CONTROLLER="${PLOY_CONTROLLER:-http://localhost:8081/v1}"
              if resp=$(curl -sS -m 5 "$CONTROLLER/llms/models" | jq -r '.count // .models | length' 2>/dev/null); then
                  echo "✅ LLM models registered: ${resp}"
              else
                  echo "⚠️  Unable to query LLM registry at $CONTROLLER/llms/models"
              fi
              
              echo ""
              echo "ARF Phase 3 validation complete."
              
              if [ "$python_deps" -ge 4 ]; then
                  echo "🎉 Infrastructure ready for ARF Phase 3 testing"
                  exit 0
              else
                  echo "⚠️  Some dependencies missing - proceed with caution"  
                  exit 1
              fi
            dest: /usr/local/bin/arf-phase3-validate
            mode: '0755'

    - name: Add ARF Phase 3 environment variables for ploy user
