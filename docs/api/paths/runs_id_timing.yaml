get:
  tags: [Control]
  summary: Get run timing
  description: |
    Returns basic run timing metrics derived from run lifecycle timestamps.
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: string }
      description: Run ID (KSUID string, 27 characters).
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              id: { type: string }
              queue_ms: { type: integer, format: int64 }
              run_ms: { type: integer, format: int64 }
            required: [id, queue_ms, run_ms]
    '400':
      description: Bad request
    '404':
      description: Run not found
    '500':
      description: Server error
