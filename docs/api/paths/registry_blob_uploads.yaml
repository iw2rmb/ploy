post:
  tags: [Registry]
  summary: Start a blob upload session backed by the SSH transfer slots.
  parameters:
    - $ref: '#/components/parameters/RegistryRepository'
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/RegistryUploadStartRequest'
  responses:
    '202':
      description: Upload slot reserved.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegistryUploadStartResponse'
    '400':
      description: Invalid request payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '403':
      description: Caller lacks the `registry.push` scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '503':
      description: Transfer manager unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
