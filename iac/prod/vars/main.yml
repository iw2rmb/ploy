---
# Production configuration for Ploy environment

# Environment configuration
ploy_environment: "prod"  # Enables production environment features

# Go version for building Ploy
go_version: "1.23.0"  # Latest stable Go
go_arch: "amd64"

# Docker configuration
docker_compose_version: "2.29.2"  # Latest stable Docker Compose

# Node.js configuration for WASM development
nodejs_version: "20"  # LTS version for stability

# Nomad/Consul versions
nomad_version: "1.12.3"  # Latest stable Nomad
consul_version: "1.21.4"
vault_version: "1.20.2"

# Traefik version
traefik_version: "3.5.0"

# Node Exporter version
node_exporter_version: "1.7.0"

# Testing tools
testing_tools:
  - curl
  - jq
  - git
  - make
  - wget
  - unzip

# Production multi-node requirements
cluster_requirements:
  min_nodes: 3
  required_os_types:
    - "linux"
    - "freebsd"
  min_linux_nodes: 2
  min_freebsd_nodes: 1

# Ploy specific configuration
ploy:
  controller_port: 8081
  storage_backend: "seaweedfs"
  dns:
    provider: "namecheap"  # Use namecheap for production
    domain: "ployd.app" 
    target_ip: "{{ hostvars[groups['linux_hosts'][0]]['ansible_default_ipv4']['address'] }}"  # Primary node IP
    ttl: 300
    enable_ipv6: false
  
  # Platform wildcard certificate configuration for production
  apps_domain: "{{ lookup('env', 'PLOY_APPS_DOMAIN') | default('ployd.app') }}"
  apps_domain_provider: "{{ lookup('env', 'PLOY_APPS_DOMAIN_PROVIDER') | default('namecheap') }}"
  api_subdomain: "api"  # Controller will be accessible at api.ployd.app

# Production Nomad controller deployment configuration
nomad_controller:
  replicas: 3  # Production redundancy
  resources:
    cpu: 1000    # MHz - Higher for production
    memory: 1024 # MB - Higher for production

# Build tools for different lanes
build_tools:
  kraft: 
    version: "0.11.6"  # Latest stable KraftKit
  capstan:
    version: "0.54.0"
  cosign:
    version: "2.4.0"   # Latest stable Cosign
  syft:
    version: "1.3.0"  # Latest stable Syft
  grype:
    version: "0.84.0"  # Latest stable Grype
  opa:
    version: "0.69.0"  # Latest stable OPA

# Production SeaweedFS configuration with replication
seaweedfs:
  version: "3.96"
  master_port: 9333
  volume_port: 8080
  filer_port: 8888
  
  # Production collection configuration with replication
  collections:
    artifacts:
      name: "artifacts"
      replication: "001"  # Production replication across nodes
    metadata:
      name: "ploy-metadata"
      replication: "001"  # Production replication across nodes
    debug:
      name: "ploy-debug"
      replication: "000"  # Debug artifacts don't need replication

# External storage configuration for controller (production)
storage_config:
  seaweedfs:
    master: "{{ groups['linux_hosts'] | map('extract', hostvars, 'ansible_default_ipv4') | map(attribute='address') | list | join(':9333,') }}:9333"  # All masters
    filer: "{{ groups['linux_hosts'][0] }}:8888"  # Primary filer
    collection: "artifacts"
    replication: "001"  # Production replication
    timeout: 30
    datacenter: "prod"
    rack: "rack1"
    collections:
      artifacts: "artifacts"
      metadata: "ploy-metadata"
      debug: "ploy-debug"
  
  client:
    retry_config:
      max_retries: 5  # More retries for production
      initial_delay: "2s"
      max_delay: "60s"
      multiplier: 2.0
    health_check_config:
      interval: "15s"  # More frequent health checks
      timeout: "10s"
      failure_threshold: 2  # Lower threshold for production
    enable_metrics: true
    enable_health_check: true
    max_operation_time: "10m"  # Longer timeout for production

# Production SeaweedFS configuration with multi-node replication
seaweedfs_production:
  replication: "001"  # 1 copy on different nodes
  volumes_per_collection:
    artifacts: 4  # More volumes for production load
    metadata: 2
    debug: 1
  
  # Topology configuration for production
  topology:
    datacenters:
      prod:
        racks:
          rack1:
            nodes: "{{ groups['linux_hosts'] }}"