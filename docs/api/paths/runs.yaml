post:
  tags: [Control]
  summary: Submit single-repo run
  description: |
    Submit a single-repo run and start execution immediately.

    Side-effects:
    - Creates a mig project (mig name == mig id).
    - Creates a spec row and sets migs.spec_id.
    - Creates a mig repo row for the provided repo_url.
    - Creates a run and run repo row and enqueues jobs.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/RunSubmitRequest'
  responses:
    '201':
      description: Created — run accepted and started.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/CreateSingleRepoRunResponse'
    '400':
      description: Bad request — missing or invalid fields in the request body.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'

get:
  tags: [Control]
  summary: List batch runs
  description: |
    Return a paginated list of batch runs backed by the `runs` table. Each
    entry exposes basic run metadata (id, mod_id, spec_id, status, timestamps)
    and optional per-repo status counts aggregated from `run_repos`.
  parameters:
    - in: query
      name: limit
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
      description: Maximum number of runs to return (default 50, max 100).
    - in: query
      name: offset
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
      description: Number of runs to skip from the start of the result set.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              runs:
                type: array
                items:
                  $ref: '../components/schemas/controlplane.yaml#/RunSummary'
            required: [runs]
    '400':
      description: Bad request (invalid pagination parameters)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
