post:
  tags: [Control]
  summary: Submit a build validation job
  description: |
    Submit a Git-based build validation job. Requires repo_url and ref fields.
    Returns the result if completed within a short timeout, or a JobID for
    async polling via GET /v1/buildgate/jobs/{id}.

    The content_archive mode has been removed to simplify the Build Gate
    contract and avoid large workspace payloads.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../OpenAPI.yaml#/components/schemas/BuildGateValidateRequest'
  responses:
    '200':
      description: Validation completed; result in response
      content:
        application/json:
          schema:
            $ref: '../OpenAPI.yaml#/components/schemas/BuildGateValidateResponse'
    '202':
      description: Accepted; poll job status with the provided JobID
      content:
        application/json:
          schema:
            $ref: '../OpenAPI.yaml#/components/schemas/BuildGateValidateResponse'
    '400': { description: Invalid request (missing repo_url or ref) }
    '500': { description: Server error }
