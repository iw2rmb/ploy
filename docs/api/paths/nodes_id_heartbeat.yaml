parameters:
  - in: path
    name: id
    required: true
    schema: { type: string }
    description: Node ID (NanoID 6-character string)
post:
  tags: [Control]
  summary: Post a node heartbeat (node → server)
  description: |
    Updates the node's last heartbeat timestamp and resource snapshot (CPU, memory, disk).
    Node agents call this endpoint periodically to report health and resource availability.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - cpu_free_millis
            - cpu_total_millis
            - mem_free_bytes
            - mem_total_bytes
            - disk_free_bytes
            - disk_total_bytes
          properties:
            cpu_free_millis:
              type: integer
              format: int32
              description: Free CPU in millicores (millis)
              example: 1500
            cpu_total_millis:
              type: integer
              format: int32
              description: Total CPU in millicores (millis)
              example: 4000
            mem_free_bytes:
              type: integer
              format: int64
              description: Free memory in bytes
              example: 2147483648
            mem_total_bytes:
              type: integer
              format: int64
              description: Total memory in bytes
              example: 8589934592
            disk_free_bytes:
              type: integer
              format: int64
              description: Free disk space in bytes
              example: 10737418240
            disk_total_bytes:
              type: integer
              format: int64
              description: Total disk space in bytes
              example: 53687091200
            version:
              type: string
              description: Optional node agent version string. When omitted or empty, the stored version remains unchanged.
              example: "ployd-node/1.2.3 (linux/amd64)"
        examples:
          minimal:
            summary: Minimal heartbeat (all required fields)
            value:
              cpu_free_millis: 1500
              cpu_total_millis: 4000
              mem_free_bytes: 2147483648
              mem_total_bytes: 8589934592
              disk_free_bytes: 10737418240
              disk_total_bytes: 53687091200
          with_version:
            summary: Heartbeat with agent version
            value:
              cpu_free_millis: 2800
              cpu_total_millis: 4000
              mem_free_bytes: 5905580032
              mem_total_bytes: 17179869184
              disk_free_bytes: 214748364800
              disk_total_bytes: 536870912000
              version: "ployd-node/1.2.3 (linux/amd64)"
  responses:
    '204':
      description: Heartbeat accepted and node snapshot updated
    '400':
      description: Bad Request (invalid node ID or malformed payload)
    '404':
      description: Node not found
    '500':
      description: Internal server error
