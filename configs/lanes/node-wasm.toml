name = "node-wasm"
description = "Node.js mods executed inside the WASM runtime with pnpm caches"
runtime_family = "wasm-node"
cache_namespace = "node-wasm"

[commands]
setup = ["pnpm", "install"]
build = ["pnpm", "run", "build"]
test = ["pnpm", "run", "test"]

[job]
image = "registry.dev/ploy/node-wasm:latest"
command = ["pnpm", "run", "test"]
priority = "standard"

  [job.env]
  NODE_ENV = "test"
  PNPM_HOME = "/workspace/.pnpm"

  [job.resources]
  cpu = "2500m"
  memory = "6Gi"
