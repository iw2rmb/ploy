# E2E scenario: Remote Build Gate mode — Validate multi-VPS gate behavior.
#
# This spec is designed to test PLOY_BUILDGATE_MODE=remote-http where Build Gate
# jobs are routed through the HTTP API and executed by dedicated worker nodes.
#
# Key differences from local-docker mode (historical HTTP Build Gate design):
# 1. Gate execution is delegated to remote Build Gate workers via HTTP API.
# 2. Gate jobs appear in the unified jobs table with node assignments (historically buildgate_jobs).
# 3. Gates can run on different VPS nodes than the mods steps.
# 4. Repo+diff semantics: remote workers clone repo+ref and apply diff_patch.
#
# The scenario uses a failing branch to trigger healing, demonstrating:
# - Initial gate failure (routed to remote worker)
# - Codex healing with workspace diff handshake
# - Re-gate after healing (accumulated diffs passed via diff_patch)
# - Final ORW transformation
#
# Configuration:
# - Workers must have PLOY_BUILDGATE_MODE=remote-http in environment.
# - At least one node should be designated as a Build Gate worker.
# - PLOY_SERVER_URL must be set for HTTP gate client connectivity.
#
# Submit with:
#   PLOY_BUILDGATE_MODE=remote-http \
#   dist/ploy mod run \
#     --repo-url https://gitlab.com/iw2rmb/ploy-orw-java11-maven.git \
#     --repo-base-ref e2e/fail-missing-symbol \
#     --repo-target-ref mods-upgrade-java17-remote-gate \
#     --spec tests/e2e/mods/scenario-remote-buildgate/mod.yaml \
#     --follow

apiVersion: ploy.mod/v1alpha1
kind: ModRunSpec

################################################################################
# MAIN MOD: OpenRewrite Java 17 migration
################################################################################
# Standard Java migration mod. Runs after Build Gate passes (either initially
# or after healing). In remote-http mode, the gate is executed by a dedicated
# Build Gate worker, not the node running this mod.
mod:
  image: docker.io/iwtormb/mods-orw-maven:latest
  env:
    RECIPE_GROUP: org.openrewrite.recipe
    RECIPE_ARTIFACT: rewrite-migrate-java
    RECIPE_VERSION: "3.20.0"
    RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17
    MAVEN_PLUGIN_VERSION: "6.18.0"
    # Marker for E2E identification in logs.
    E2E_SCENARIO: "remote-buildgate"

################################################################################
# BUILD GATE: Remote execution via HTTP API
################################################################################
# When PLOY_BUILDGATE_MODE=remote-http is set on worker nodes (historical HTTP Build Gate design):
# 1. Gate requests are submitted via POST /v1/buildgate/validate.
# 2. Jobs enter the unified jobs table as "pending" (historically buildgate_jobs).
# 3. Build Gate workers claim jobs via /v1/nodes/{id}/buildgate/claim.
# 4. Workers execute gate and report results back.
# 5. Original node receives pass/fail status via polling.
#
# The gate configuration here is identical to local-docker mode; the execution
# mode is controlled by worker environment, not spec.
build_gate:
  enabled: true
  profile: auto  # Auto-detect Maven or Gradle

################################################################################
# HEALING: Codex with workspace diff handshake
################################################################################
# Healing configuration for when the initial Build Gate fails.
# The healing flow works identically in both local-docker and remote-http modes:
# 1. Codex modifies workspace to fix compilation errors.
# 2. Codex exits when done; node agent inspects workspace diffs.
# 3. Node agent triggers re-gate only when diffs are present.
#
# In remote-http mode:
# - Re-gate request includes diff_patch with accumulated healing changes.
# - Build Gate worker clones repo+ref and applies diff_patch.
# - This decouples the healing node from the gate execution node.
build_gate_healing:
  retries: 1
  mods:
    # Codex healing container using the workspace diff handshake.
    # Identical to scenario-orw-fail; execution mode doesn't change healing behavior.
    - image: docker.io/iwtormb/mods-codex:latest
      env:
        CODEX_PROMPT: |-
          Rules:
          - Use /workspace and /in/build-gate.log to understand the compile error.
          - Edit files under /workspace as needed to fix the error.
          - When you believe the code is ready for a full build validation, stop editing and end the session.

          Task:
          Fix the compilation error described in /in/build-gate.log.
        # Marker for E2E identification in logs.
        E2E_SCENARIO: "remote-buildgate-healing"
      env_from_file:
        CODEX_AUTH_JSON: ~/.codex/auth.json

################################################################################
# GITLAB MR INTEGRATION
################################################################################
mr_on_fail: false
mr_on_success: true

################################################################################
# E2E VALIDATION CHECKLIST (Remote Build Gate Mode)
################################################################################
# When running this scenario with PLOY_BUILDGATE_MODE=remote-http, verify:
#
# 1. Build Gate job routing:
#    - Check jobs table: SELECT * FROM jobs ORDER BY created_at DESC LIMIT 5;
#    - Jobs should have status transitions: pending -> claimed -> running -> passed/failed
#    - node_id column shows which Build Gate worker executed each job
#
# 2. Multi-VPS execution (if multi-node cluster):
#    - Gate jobs may be claimed by different nodes than mods execution
#    - Control plane logs: "buildgate job claimed by node <id>"
#    - Node logs: "executing buildgate job <id> via HTTP mode"
#
# 3. Repo+diff semantics (healing scenario):
#    - Initial gate: Request contains repo_url + ref (no diff_patch)
#    - Re-gate after healing: Request contains repo_url + ref + diff_patch
#    - diff_patch = accumulated workspace changes from healing mods
#    - Build Gate worker applies patch to cloned repo before validation
#
# 4. Comparison with local-docker baseline:
#    - Run scenario-orw-fail with PLOY_BUILDGATE_MODE unset
#    - Results should be identical (same pass/fail outcomes)
#    - Only difference: gate execution location
#
# 5. Observable behaviors in remote-http mode:
#    - Longer gate latency (HTTP round-trip + job queue wait)
#    - job records present in the unified jobs table (historically buildgate_jobs)
#    - "remote-http" gate mode logged by node agent
#    - Gate worker logs show container execution
#
# Success criteria:
# - Initial gate fails (expected for e2e/fail-missing-symbol branch)
# - Codex healing runs and edits the workspace
# - Re-gate passes after healing (diff_patch applied correctly)
# - ORW transformation completes successfully
# - MR created (if --gitlab-pat provided)
