name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25.8"
  POSTGRES_PASSWORD: ploy-test
  POSTGRES_USER: ploy
  POSTGRES_DB: ploy_test

jobs:
  # Unit tests run fast and don't require external services
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.8"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: |
          go test -json -v -race -coverprofile=coverage.out -covermode=atomic ./internal/... ./cmd/... > go-test-report.json

      - name: Check test coverage
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: $coverage%"
          if (( $(echo "$coverage < 60" | bc -l) )); then
            echo "❌ Coverage is below 60% threshold"
            exit 1
          fi
          echo "✅ Coverage meets 60% threshold"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Generate test report
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: Unit Test Results (${{ matrix.go-version }})
          path: go-test-report.json
          reporter: golang-json

  # Build verification ensures all code compiles
  build-verification:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build server
        run: |
          echo "🔨 Building server..."
          mkdir -p bin
          go build -v -o bin/ployd ./cmd/ployd

      - name: Build CLI
        run: |
          echo "🔨 Building CLI..."
          go build -v -o bin/ploy ./cmd/ploy

      - name: Build all packages
        run: |
          echo "🔨 Building all packages..."
          go build -v ./...

      - name: Verify binaries
        run: |
          echo "✅ Verifying binaries..."
          ls -la bin/
          ./bin/ploy --version || echo "CLI built successfully"
          echo "Controller built successfully"

  # Linting and code quality checks
  lint-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.6
          args: --timeout=5m --config=.golangci.yml

      - name: Check Go module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "⚠️ Code is not properly formatted:"
            gofmt -s -l .
            echo "Formatting differences detected; not failing this workflow."
          else
            echo "✅ Code formatting is correct"
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: "-no-fail -fmt sarif -out gosec.sarif ./..."

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: gosec.sarif

  # Performance benchmarks
  performance-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run benchmarks
        run: |
          echo "🏃 Running performance benchmarks..."
          go test -bench=. -benchmem -run=^$ ./... > benchmark.txt

      - name: Download previous benchmark data
        uses: actions/cache@v3
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark

      - name: Compare benchmarks
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Go Benchmark
          tool: "go"
          output-file-path: benchmark.txt
          external-data-json-path: ./cache/benchmark-data.json
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Final status check
  test-results:
    runs-on: ubuntu-latest
    needs: [unit-tests, build-verification, lint-and-quality, security-scan]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "🎯 Test Results Summary:"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Build Verification: ${{ needs.build-verification.result }}"
          echo "Lint & Quality: ${{ needs.lint-and-quality.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"

          if [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.build-verification.result }}" != "success" ]] || \
             [[ "${{ needs.lint-and-quality.result }}" != "success" ]]; then
            echo "❌ Some tests failed"
            exit 1
          fi

          echo "✅ All tests passed successfully!"

      - name: Comment PR
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          script: |
            const { owner, repo, number } = context.issue;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: `## 🧪 Test Results

              ✅ **All tests passed successfully!**

              - Unit Tests: ${{ needs.unit-tests.result }}
              - Build Verification: ${{ needs.build-verification.result }}
              - Lint & Quality: ${{ needs.lint-and-quality.result }}
              - Security Scan: ${{ needs.security-scan.result }}

              Your changes are ready for review! 🎉`
            });
