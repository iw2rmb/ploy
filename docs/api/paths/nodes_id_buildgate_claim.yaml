post:
  tags: [Control]
  summary: Node claims a pending build gate job
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
  responses:
    '200':
      description: Job claimed
      content:
        application/json:
          schema:
            $ref: '../OpenAPI.yaml#/components/schemas/NodeBuildGateClaimResponse'
    '204': { description: No job available }
    '500': { description: Server error }
