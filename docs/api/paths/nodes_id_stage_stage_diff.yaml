parameters:
  - in: path
    name: id
    required: true
    schema: { type: string, format: uuid }
    description: Node UUID
  - in: path
    name: stage
    required: true
    schema: { type: string, format: uuid }
    description: Stage UUID
post:
  tags: [Artifacts]
  summary: Upload gzipped unified diff for a stage (node → server)
  description: |
    Nodes upload a gzipped unified diff for a specific stage of a run. The server stores
    the diff in PostgreSQL under the `diffs` table. The decoded patch bytes are limited
    to ≤ 1 MiB. The request body allows up to ~2 MiB to accommodate base64 overhead.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [run_id, patch]
          properties:
            run_id:
              type: string
              format: uuid
              description: The run ID associated with this stage
            patch:
              type: string
              description: Gzipped unified diff (≤1 MiB gzipped), base64-encoded.
              contentEncoding: base64
            summary:
              type: object
              description: Optional summary metadata (stored as JSONB)
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            type: object
            properties:
              diff_id:
                type: string
                format: uuid
                description: Identifier of the stored diff
    '400':
      description: Bad Request (invalid IDs, missing fields, or stage/run mismatch)
    '404':
      description: Node, Run, or Stage not found
    '413':
      description: Payload Too Large (decoded patch > 1 MiB or body over limit)
    '500':
      description: Internal server error

