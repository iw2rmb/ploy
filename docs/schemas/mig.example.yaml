# Current mig spec contract. Validate with:
#   ploy spec validate docs/schemas/mig.example.yaml
apiVersion: ploy.mig/v1alpha1
name: migrate-java
description: Upgrade Java projects and summarize migration output.

# Environment variables applied to every step. Step-level envs override these.
envs:
  RECIPE_GROUP: org.openrewrite.recipe
  RECIPE_ARTIFACT: rewrite-migrate-java
  RECIPE_VERSION: "3.20.0"

# Required. Each step runs against the hydrated repository at /workspace.
steps:
  - name: migrate-java
    image:
      default: docker.io/your-dh-user/migs-openrewrite:latest
      java-maven: docker.io/your-dh-user/orw-cli-java-17-maven:latest
      java-gradle: docker.io/your-dh-user/orw-cli-java-17-gradle:latest
    command: ["/bin/sh", "-lc", "orw-cli --apply --dir /workspace --out /out"]
    envs:
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17
    options:
      mount_docker_socket: false
    in:
      - 0123456789ab:/in/settings.xml
    out:
      - fedcba987654:/out/report.json
    home:
      - 111111111111:.config/app.toml:ro
    tmp:
      - 333333333333:/tmp/ploy/lib/ploy-java-tools.jar
    stack:
      inbound:
        enabled: true
        expect:
          language: java
          tool: maven
          release: "11"
      outbound:
        enabled: true
        expect:
          language: java
          tool: maven
          release: "17"

  - name: summarize
    image: docker.io/your-dh-user/mig-summary:latest
    command: ["/bin/sh", "-lc", "summary-tool --workspace /workspace --out /out"]
    out:
      - 222222222222:/out/summary.json

# Build Gate settings apply globally.
build_gate:
  pre:
    stack:
      mode: strict
      language: java
      tool: maven
      release: "11"
  post:
    stack:
      mode: fallback
      language: java
      tool: maven
      release: "17"
  images:
    - stack:
        language: java
        tool: maven
        release: "17"
      image: docker.io/your-dh-user/build-gate-java-17-maven:latest
