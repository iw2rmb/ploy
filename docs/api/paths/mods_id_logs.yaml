parameters:
  - in: path
    name: id
    required: true
    schema: { type: string, format: uuid }
post:
  tags: [Artifacts]
  summary: Ingest gzipped log chunk for a run (mods facade)
  description: |
    Append a gzipped log chunk to the run's logs. The server enforces a 1 MiB
    cap on the gzipped payload. Intended for node/agent ingestion.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/CreateLogRequest'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/NodeCreateLogResponse'
    '400': { description: Bad Request }
    '404': { description: Run Not Found }
    '413': { description: Payload Too Large }
