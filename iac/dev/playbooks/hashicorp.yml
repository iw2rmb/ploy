---
- name: Setup HashiCorp Stack (Nomad, Consul, Vault)
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
  
  tasks:
    - name: Create hashicorp user
      user:
        name: hashicorp
        system: true
        shell: /bin/false
        home: /opt/hashicorp

    - name: Create HashiCorp directories
      file:
        path: "{{ item }}"
        state: directory
        owner: hashicorp
        group: hashicorp
        mode: '0755'
      loop:
        - /opt/hashicorp
        - /opt/hashicorp/bin
        - /opt/hashicorp/nomad
        - /opt/hashicorp/consul
        - /opt/hashicorp/vault
        - /etc/nomad.d
        - /etc/consul.d
        - /etc/vault.d

    - name: Download and install Nomad
      block:
        - name: Download Nomad
          get_url:
            url: "https://releases.hashicorp.com/nomad/{{ nomad_version }}/nomad_{{ nomad_version }}_linux_amd64.zip"
            dest: /tmp/nomad.zip

        - name: Extract Nomad
          unarchive:
            src: /tmp/nomad.zip
            dest: /opt/hashicorp/bin
            remote_src: true
            owner: hashicorp
            group: hashicorp

        - name: Create Nomad symlink
          file:
            src: /opt/hashicorp/bin/nomad
            dest: /usr/local/bin/nomad
            state: link

    - name: Download and install Consul
      block:
        - name: Download Consul
          get_url:
            url: "https://releases.hashicorp.com/consul/{{ consul_version }}/consul_{{ consul_version }}_linux_amd64.zip"
            dest: /tmp/consul.zip

        - name: Extract Consul
          unarchive:
            src: /tmp/consul.zip
            dest: /opt/hashicorp/bin
            remote_src: true
            owner: hashicorp
            group: hashicorp

        - name: Create Consul symlink
          file:
            src: /opt/hashicorp/bin/consul
            dest: /usr/local/bin/consul
            state: link

    - name: Download and install Vault
      block:
        - name: Download Vault
          get_url:
            url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_amd64.zip"
            dest: /tmp/vault.zip

        - name: Extract Vault
          unarchive:
            src: /tmp/vault.zip
            dest: /opt/hashicorp/bin
            remote_src: true
            owner: hashicorp
            group: hashicorp

        - name: Create Vault symlink
          file:
            src: /opt/hashicorp/bin/vault
            dest: /usr/local/bin/vault
            state: link

    - name: Create Consul configuration
      template:
        src: ../templates/consul-server.hcl.j2
        dest: /etc/consul.d/consul.hcl
        owner: hashicorp
        group: hashicorp
        mode: '0644'

    - name: Create Nomad server configuration
      template:
        src: ../templates/nomad-server.hcl.j2
        dest: /etc/nomad.d/nomad.hcl
        owner: hashicorp
        group: hashicorp
        mode: '0644'

    - name: Create Vault configuration
      template:
        src: ../templates/vault.hcl.j2
        dest: /etc/vault.d/vault.hcl
        owner: hashicorp
        group: hashicorp
        mode: '0644'

    - name: Create systemd service files
      template:
        src: "../templates/{{ item }}.service.j2"
        dest: "/etc/systemd/system/{{ item }}.service"
      loop:
        - consul
        - nomad
        - vault

    - name: Start and enable Consul
      systemd:
        name: consul
        state: started
        enabled: true
        daemon_reload: true

    - name: Wait for Consul to be ready
      wait_for:
        port: 8500
        delay: 10

    - name: Start and enable Vault
      systemd:
        name: vault
        state: started
        enabled: true
        daemon_reload: true

    - name: Wait for Vault to be ready
      wait_for:
        port: 8200
        delay: 10

    - name: Start and enable Nomad
      systemd:
        name: nomad
        state: started
        enabled: true
        daemon_reload: true

    - name: Wait for Nomad to be ready
      wait_for:
        port: 4646
        delay: 10

    - name: Initialize Vault (if not already initialized)
      uri:
        url: "http://localhost:8200/v1/sys/init"
        method: POST
        body_format: json
        body:
          secret_shares: 1
          secret_threshold: 1
        status_code: [200, 400]
      register: vault_init
      ignore_errors: true

    - name: Save Vault initialization data
      copy:
        content: "{{ vault_init.json | to_nice_json }}"
        dest: /opt/hashicorp/vault/init.json
        owner: hashicorp
        group: hashicorp
        mode: '0600'
      when: vault_init.status == 200

    - name: Create Nomad job directory
      file:
        path: /opt/hashicorp/nomad/jobs
        state: directory
        owner: hashicorp
        group: hashicorp

    - name: Copy Ploy Nomad job templates
      copy:
        src: "{{ item }}"
        dest: /opt/hashicorp/nomad/jobs/
        owner: hashicorp
        group: hashicorp
      with_fileglob:
        - "../../platform/nomad/*.hcl"