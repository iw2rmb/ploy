# Existing home entry at same destination causes rejection.
description: home conflict rejects migration
env:
  CODEX_AUTH_JSON:
    - value: '{"token":"new"}'
      target: steps
      secret: true
existing_ca: {}
existing_home:
  mig:
    - entry: "existinghash:.codex/auth.json:ro"
      dst: ".codex/auth.json"
expect:
  rewritten: 0
  rejected: 1
  skipped: 0
  entries:
    - env_key: CODEX_AUTH_JSON
      target: steps
      action: reject
      target_field: home
      destination: ".codex/auth.json"
      sections: [mig]
