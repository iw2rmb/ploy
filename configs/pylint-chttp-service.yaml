# Pylint CHTTP Service Configuration
# Dedicated static analysis service for Python code via HTTP

server:
  host: "0.0.0.0"
  port: 8080

security:
  api_key: "${PYLINT_CHTTP_API_KEY}"
  
commands:
  # Allow only Python analysis tools
  allowed:
    - "pylint"
    - "python"
    - "python3"
    - "pip"
    - "tar"
    - "gzip" 
    - "find"
    - "ls"
    - "cat"
  default_timeout: "300s"  # 5 minutes for large projects

logging:
  level: "info"
  format: "json"

health:
  enabled: true
  endpoint: "/health"

# Pylint-specific configuration
pylint:
  executable: "pylint"
  output_format: "json"
  additional_args:
    - "--output-format=json"
    - "--reports=no"
    - "--score=no"
    - "--msg-template={path}:{line}:{column}:{C}:{category}:{msg}"
  
  # Environment setup
  environment:
    PYTHONPATH: "/tmp/analysis"
    PYTHONDONTWRITEBYTECODE: "1"
    
  # Security restrictions
  security:
    max_memory: "512MB"
    max_cpu: "1.0"
    timeout: "300s"
    sandbox_user: "pylint"
    read_only_fs: true
    network_disabled: true
    
  # Input validation
  input:
    formats: ["tar.gz", "gzip"]
    allowed_extensions: [".py", ".pyw"]
    max_archive_size: "100MB"
    max_files: 1000
    exclude_patterns:
      - "__pycache__"
      - "*.pyc"
      - ".git"
      - ".venv"
      - "venv"
      - "node_modules"
    
  # Output processing
  output:
    format: "chttp_json"
    include_metrics: true
    sanitize_paths: true
    max_issues: 5000
    
  # Default Pylint configuration for consistent analysis
  default_pylint_config: |
    [MASTER]
    jobs=1
    unsafe-load-any-extension=no
    extension-pkg-whitelist=
    
    [MESSAGES CONTROL]
    disable=
        C0111,  # missing-docstring
        C0103,  # invalid-name  
        R0903,  # too-few-public-methods
        R0913,  # too-many-arguments
        W0511,  # fixme
        C0301   # line-too-long
        
    [REPORTS]
    output-format=json
    reports=no
    score=no
    
    [REFACTORING]
    max-nested-blocks=5
    
    [BASIC]
    good-names=i,j,k,ex,Run,_
    bad-names=foo,bar,baz,toto,tutu,tata
    
    [FORMAT]
    max-line-length=120
    indent-string='    '
    
    [DESIGN]
    max-args=7
    max-locals=15
    max-returns=6
    max-branches=12
    max-statements=50
    max-parents=7
    max-attributes=7
    min-public-methods=2
    max-public-methods=20
    max-bool-expr=5

# Service metadata
service:
  name: "pylint-chttp"
  version: "1.0.0"
  description: "Python static analysis via Pylint over HTTP"
  analyzer_info:
    name: "pylint"
    version: "3.0.0"
    language: "python"
    capabilities:
      - "syntax-analysis"
      - "style-checking"
      - "error-detection"
      - "complexity-analysis"
      - "security-basic"
  
  # Service discovery
  discovery:
    enabled: true
    service_name: "pylint-analysis"
    tags:
      - "static-analysis"
      - "python" 
      - "pylint"
      - "chttp"
    health_check:
      interval: "30s"
      timeout: "5s"
      
# Integration with Ploy platform
ploy_integration:
  lane_compatibility: ["C", "D", "E", "F"]  # Java/JVM, FreeBSD, OCI, VM lanes
  arf_integration: true
  deployment_mode: "container"  # Deployed as container via Ploy