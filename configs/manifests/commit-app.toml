manifest_version = "v2"
name = "commit-app"
version = "2025-09-26"
summary = """
## Purpose
Materialise commit-scoped environments for Go + Node services. The manifest captures topology, fixtures, lanes the runtime must honour, and records service, edge, and exposure metadata for the control-plane compiler.

## Notes
- Uses the snapshot toolkit fingerprints for masked production-like datasets.
- Allows optional GPU-enabled lanes when Aster toggles request ML workloads.
"""

[topology]
description = "Permit app services to reach backing stores and internal caches."

[[topology.allow]]
from = "app-worker"
to = "postgres-primary"

[[topology.allow]]
from = "app-worker"
to = "redis-cache"

[[topology.allow]]
from = "app-worker"
to = "minio-artifacts"

[[topology.deny]]
from = "app-worker"
to = "internet"
reason = "Commit environments block outbound egress by default."

[[services]]
name = "app-worker"
kind = "http"
[services.identity]
dns = "app-worker.commit.local"
[[services.ports]]
name = "http"
port = 8080
protocol = "tcp"
[[services.ports]]
name = "metrics"
port = 9100
protocol = "tcp"
[[services.requires]]
target = "postgres-primary"
edge = "worker->postgres"
[[services.requires]]
target = "redis-cache"
edge = "worker->redis"
[[services.requires]]
target = "minio-artifacts"
edge = "worker->minio"

[[services]]
name = "minio-artifacts"
kind = "object-storage"
[services.identity]
dns = "minio-artifacts.commit.local"
[[services.ports]]
name = "http"
port = 9000
protocol = "tcp"

[[services]]
name = "postgres-primary"
kind = "postgres"
[services.identity]
dns = "postgres-primary.commit.local"
[[services.ports]]
name = "psql"
port = 5432
protocol = "tcp"

[[services]]
name = "redis-cache"
kind = "redis"
optional = true
[services.identity]
dns = "redis-cache.commit.local"
[[services.ports]]
name = "tcp"
port = 6379
protocol = "tcp"

[fixtures]

[[fixtures.required]]
name = "postgres"
reference = "service:postgres-dev"

[[fixtures.required]]
name = "redis"
reference = "service:redis-dev"

[[fixtures.optional]]
name = "minio"
reference = "service:minio-dev"
reason = "Enabled when artifact diffing is requested."

[lanes]

[[lanes.required]]
name = "build-gate"
reason = "Build gate validation for Go workloads."

[[lanes.required]]
name = "static-checks"
reason = "Static analysis for Go workloads."

[[lanes.required]]
name = "test"
reason = "Test execution for Go workloads."

[[lanes.required]]
name = "node-wasm"
reason = "Run mods-based front-end flows."

[[lanes.allowed]]
name = "gpu-ml"
reason = "Provision ML workloads when Aster toggles demand it."

[aster]
required = ["plan"]
optional = ["ml", "lint"]

[[edges]]
source = "app-worker"
target = "postgres-primary"
ports = ["psql"]
protocols = ["tcp"]

[[edges]]
source = "app-worker"
target = "redis-cache"
ports = ["tcp"]
protocols = ["tcp"]

[[edges]]
source = "app-worker"
target = "minio-artifacts"
ports = ["http"]
protocols = ["tcp"]

[[exposures]]
service = "app-worker"
port = "metrics"
mode = "cluster"

[[exposures]]
service = "minio-artifacts"
port = "http"
mode = "cluster"
