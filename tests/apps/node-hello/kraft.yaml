spec_version: '0.6'
name: nodejs-app
unikraft:
  version: stable
  kconfig:
    # Node.js-specific kernel configuration
    # Core POSIX environment for Node.js runtime
    CONFIG_LIBPOSIX_ENVIRON: 'y'
    CONFIG_LIBPOSIX_SOCKET: 'y'
    CONFIG_LIBPOSIX_PROCESS: 'y'
    CONFIG_LIBPOSIX_USER: 'y'
    CONFIG_LIBPOSIX_TIME: 'y'
    CONFIG_LIBPOSIX_SYSINFO: 'y'
    
    # Enhanced debugging for Node.js development
    CONFIG_LIBUKDEBUG_PRINTD: 'y'
    CONFIG_LIBUKDEBUG_PRINTK_INFO: 'y'
    CONFIG_LIBUKDEBUG_PRINTK_WARN: 'y'
    CONFIG_LIBUKDEBUG_PRINTK_ERR: 'y'
    
    # Scheduler and threading for Node.js event loop
    CONFIG_LIBUKSCHED_SEMAPHORES: 'y'
    CONFIG_LIBUKSCHED_MUTEX: 'y'
    CONFIG_LIBUKSCHED_THREAD_CTX: 'y'
    
    # Random number generation for Node.js crypto
    CONFIG_LIBUKSWRAND: 'y'
    CONFIG_LIBUKSWRAND_DEVFS: 'y'
    CONFIG_LIBUKSWRAND_MWC: 'y'
    
    # Memory management for V8 engine
    CONFIG_LIBUKMMAP: 'y'
    CONFIG_LIBUKMMAP_VMEM: 'y'
    CONFIG_LIBUKALLOC_IFMALLOC: 'y'
    
    # File system support for Node.js file I/O
    CONFIG_LIBVFSCORE_PIPE: 'y'
    CONFIG_LIBVFSCORE_EVENTPOLL: 'y'
    CONFIG_LIBVFSCORE_NONLARGEFILE: 'y'
    CONFIG_LIBVFSCORE_SELECT: 'y'
    
    # Device files for Node.js runtime
    CONFIG_LIBDEVFS_DEV_NULL: 'y'
    CONFIG_LIBDEVFS_DEV_ZERO: 'y'
    CONFIG_LIBDEVFS_DEV_RANDOM: 'y'
    CONFIG_LIBDEVFS_DEV_URANDOM: 'y'
    
    # Signal handling for Node.js processes
    CONFIG_LIBPOSIX_SIGNAL: 'y'
    CONFIG_LIBPOSIX_SIGNAL_LIBRT: 'y'
    
    # Timer support for Node.js timers
    CONFIG_LIBPOSIX_TIMER: 'y'
    CONFIG_LIBPOSIX_CLOCK: 'y'

targets:
  - architecture: x86_64
    platform: qemu

libraries:
  - name: musl     # Enhanced POSIX libc for Node.js
    kconfig:
      CONFIG_LIBMUSL_COMPLEX: 'y'
      CONFIG_LIBMUSL_CRYPT: 'y'
      CONFIG_LIBMUSL_LOCALE: 'y'
      CONFIG_LIBMUSL_NETWORK: 'y'
      CONFIG_LIBMUSL_REGEX: 'y'
      CONFIG_LIBMUSL_MATH: 'y'
      CONFIG_LIBMUSL_STDIO: 'y'
      CONFIG_LIBMUSL_MALLOC: 'y'
      
  - name: lwip     # Optimized networking for Node.js HTTP servers
    kconfig:
      CONFIG_LWIP_UKNETDEV: 'y'
      CONFIG_LWIP_TCP: 'y'
      CONFIG_LWIP_UDP: 'y'
      CONFIG_LWIP_IPV4: 'y'
      CONFIG_LWIP_IPV6: 'y'
      CONFIG_LWIP_DHCP: 'y'
      CONFIG_LWIP_AUTOIFACE: 'y'
      CONFIG_LWIP_THREADS: 'y'
      CONFIG_LWIP_TCP_KEEPALIVE: 'y'
      CONFIG_LWIP_SO_REUSE: 'y'
      CONFIG_LWIP_SO_RCVTIMEO: 'y'
      CONFIG_LWIP_SO_SNDTIMEO: 'y'
      
  - name: libelf   # ELF loading support for Node.js binary
    kconfig:
      CONFIG_LIBELF: 'y'
      
  - name: pthread-embedded  # Threading support for Node.js worker threads
    kconfig:
      CONFIG_LIBPTHREAD_EMBEDDED_THREAD_SAFE: 'y'

application:
  sources: ./
  arguments: []

# Node.js-specific runtime options
options:
  http_port: 8080
  nodejs_heap_size: 128M
  nodejs_env: production
  unikernel_optimized: true# Node.js version requirement: 20
