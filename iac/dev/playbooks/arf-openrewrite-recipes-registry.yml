---
- name: Populate OpenRewrite Recipes in RecipeRegistry via API
  hosts: linux_hosts
  become: true
  
  vars:
    ploy_api_url: "https://api.dev.ployman.app"  # Use proper API domain
    recipe_register_endpoint: "{{ ploy_api_url }}/v1/arf/recipes/register"
    
    openrewrite_recipes:
      # Java Migration recipes
      - recipe_class: "org.openrewrite.java.migrate.Java11toJava17"
        maven_coords: "org.openrewrite.recipe:rewrite-migrate-java:2.11.0"
        jar_path: "maven/org/openrewrite/recipe/rewrite-migrate-java/2.11.0/rewrite-migrate-java-2.11.0.jar"
        name: "Java 11 to 17 Migration"
        description: "Migrate Java 11 to Java 17"
      
      - recipe_class: "org.openrewrite.java.migrate.Java8toJava11"
        maven_coords: "org.openrewrite.recipe:rewrite-migrate-java:2.11.0"
        jar_path: "maven/org/openrewrite/recipe/rewrite-migrate-java/2.11.0/rewrite-migrate-java-2.11.0.jar"
        name: "Java 8 to 11 Migration"
        description: "Migrate Java 8 to Java 11"
        
      - recipe_class: "org.openrewrite.java.migrate.jakarta.JavaxMigrationToJakarta"
        maven_coords: "org.openrewrite.recipe:rewrite-migrate-java:2.11.0"
        jar_path: "maven/org/openrewrite/recipe/rewrite-migrate-java/2.11.0/rewrite-migrate-java-2.11.0.jar"
        name: "Javax to Jakarta Migration"
        description: "Migrate from javax to Jakarta EE"
      
      # Spring recipes
      - recipe_class: "org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_2"
        maven_coords: "org.openrewrite.recipe:rewrite-spring:5.7.0"
        jar_path: "maven/org/openrewrite/recipe/rewrite-spring/5.7.0/rewrite-spring-5.7.0.jar"
        name: "Spring Boot 3.2 Upgrade"
        description: "Upgrade to Spring Boot 3.2"
        
      - recipe_class: "org.openrewrite.java.spring.security6.UpgradeSpringSecurity_6_0"
        maven_coords: "org.openrewrite.recipe:rewrite-spring:5.7.0"
        jar_path: "maven/org/openrewrite/recipe/rewrite-spring/5.7.0/rewrite-spring-5.7.0.jar"
        name: "Spring Security 6.0 Upgrade"
        description: "Upgrade to Spring Security 6.0"
      
      # Testing recipes
      - recipe_class: "org.openrewrite.java.testing.junit5.JUnit4to5Migration"
        maven_coords: "org.openrewrite.recipe:rewrite-testing-frameworks:2.6.0"
        jar_path: "maven/org/openrewrite/recipe/rewrite-testing-frameworks/2.6.0/rewrite-testing-frameworks-2.6.0.jar"
        name: "JUnit 4 to 5 Migration"
        description: "Migrate from JUnit 4 to JUnit 5"
        
      - recipe_class: "org.openrewrite.java.testing.mockito.Mockito1to4Migration"
        maven_coords: "org.openrewrite.recipe:rewrite-testing-frameworks:2.6.0"
        jar_path: "maven/org/openrewrite/recipe/rewrite-testing-frameworks/2.6.0/rewrite-testing-frameworks-2.6.0.jar"
        name: "Mockito 1 to 4 Migration"
        description: "Migrate Mockito 1 to Mockito 4"
        
      - recipe_class: "org.openrewrite.java.testing.assertj.JUnitToAssertj"
        maven_coords: "org.openrewrite.recipe:rewrite-testing-frameworks:2.6.0"
        jar_path: "maven/org/openrewrite/recipe/rewrite-testing-frameworks/2.6.0/rewrite-testing-frameworks-2.6.0.jar"
        name: "JUnit to AssertJ Conversion"
        description: "Convert JUnit assertions to AssertJ"
      
      # Logging recipes
      - recipe_class: "org.openrewrite.java.logging.slf4j.Slf4jBestPractices"
        maven_coords: "org.openrewrite.recipe:rewrite-logging-frameworks:2.5.0"
        jar_path: "maven/org/openrewrite/recipe/rewrite-logging-frameworks/2.5.0/rewrite-logging-frameworks-2.5.0.jar"
        name: "SLF4J Best Practices"
        description: "Apply SLF4J best practices"
        
      - recipe_class: "org.openrewrite.java.logging.log4j.Log4j1ToLog4j2"
        maven_coords: "org.openrewrite.recipe:rewrite-logging-frameworks:2.5.0"
        jar_path: "maven/org/openrewrite/recipe/rewrite-logging-frameworks/2.5.0/rewrite-logging-frameworks-2.5.0.jar"
        name: "Log4j 1 to 2 Migration"
        description: "Migrate from Log4j 1.x to Log4j 2.x"

  tasks:
    - name: Wait for Ploy API to be ready
      uri:
        url: "{{ ploy_api_url }}/health"
        method: GET
        status_code: [200, 404]  # 404 is OK if /health doesn't exist
      register: api_health_check
      retries: 10
      delay: 5
      until: api_health_check.status in [200, 404]

    - name: Register OpenRewrite recipes in RecipeRegistry
      uri:
        url: "{{ recipe_register_endpoint }}"
        method: POST
        body_format: json
        body:
          recipe_class: "{{ item.recipe_class }}"
          maven_coords: "{{ item.maven_coords }}"
          jar_path: "{{ item.jar_path }}"
          source: "ansible"
          timestamp: "{{ ansible_date_time.iso8601 }}"
        headers:
          Content-Type: "application/json"
        status_code: [200, 201]
        timeout: 30
      loop: "{{ openrewrite_recipes }}"
      loop_control:
        label: "{{ item.name }}"
      register: recipe_registration_results
      
    - name: Display registration results
      debug:
        msg: |
          Recipe: {{ item.item.name }}
          Status: {{ item.status }}
          Response: {{ item.json | default('No JSON response') }}
      loop: "{{ recipe_registration_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"
        
    - name: Verify recipes were registered by listing them
      uri:
        url: "{{ ploy_api_url }}/v1/arf/recipes"
        method: GET
        status_code: 200
        timeout: 30
      register: recipe_list
      
    - name: Display registered recipes count
      debug:
        msg: "Successfully registered recipes. Total available: {{ recipe_list.json.recipes | length if recipe_list.json.recipes is defined else 'Unable to determine count' }}"
        
    - name: Show any registration failures
      debug:
        msg: "Failed to register {{ item.item.name }}: {{ item.json.error | default('Unknown error') }}"
      loop: "{{ recipe_registration_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.status != 200 and item.status != 201