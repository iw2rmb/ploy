# Spring Boot 2.x -> 3.0 migration via OpenRewrite only.
# Submit with:
#   dist/ploy mig run \
#     --repo-url https://gitlab.example.com/group/repo.git \
#     --repo-base-ref master \
#     --repo-target-ref migs-sb2-to-3 \
#     --spec lib/sb2to3/mig.yaml \
#     --follow

apiVersion: ploy.mig/v1alpha1
kind: MigRunSpec
env:
  JAVA_TOOL_OPTIONS: "-Daether.connector.connectTimeout=10000 -Daether.connector.requestTimeout=120000"
steps:
  - image:
      java-maven: 127.0.0.1:5000/ploy/orw-cli-maven:latest
      java-gradle: 127.0.0.1:5000/ploy/orw-cli-gradle:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-spring
      RECIPE_CLASSNAME: org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_0
      RECIPE_VERSION: "6.28.2"
      MAVEN_PLUGIN_VERSION: "6.35.0"
      GRADLE_PLUGIN_VERSION: "7.29.0"
      ORW_REPOS: "https://artifactory.tcsbank.ru/artifactory/maven-all/"
      ORW_EXCLUDE_PATHS: "**/*.proto"
    env_from_file:
      CA_CERTS_PEM_BUNDLE: $PLOY_CA_CERTS
build_gate:
  enabled: true
  pre:
    target: build
    stack:
      default: true
      enabled: true
      language: java
      release: "17"
  post:
    target: build
    stack:
      default: true
      enabled: true
      language: java
      release: "17"
  router:
    spec_path: $PLOY_PATH/healing/router/spec.yaml
  healing:
    by_error_kind:
      infra:
        spec_path: $PLOY_PATH/healing/infra/spec.yaml
      code:
        spec_path: $PLOY_PATH/healing/code/spec.yaml
      deps:
        spec_path: $PLOY_PATH/healing/deps/spec.yaml
mr_on_fail: false
mr_on_success: true
