get:
  summary: Get prep state for a repository
  description: |
    Returns prep lifecycle state for a repository along with stored prep profile,
    artifacts references, and per-attempt prep evidence.
  operationId: getRepoPrep
  tags:
    - Control
  security:
    - mtls: []
  parameters:
    - name: repo_id
      in: path
      required: true
      description: Repository identifier (mig_repos.id, NanoID string)
      schema:
        type: string
  responses:
    '200':
      description: Repository prep state and attempt evidence
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/RepoPrepSummary'
    '400':
      description: Invalid repo_id
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Repository not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
