# CLLM Service Configuration
# This is the default configuration file for the CLLM service

# HTTP Server Configuration
server:
  host: "0.0.0.0"
  port: 8082
  read_timeout: "30s"
  write_timeout: "30s"
  shutdown_timeout: "10s"

# Sandbox Execution Configuration
sandbox:
  work_dir: "/tmp/cllm-sandbox"
  max_memory: "1GB"
  max_cpu_time: "300s"
  max_processes: 20
  cleanup_timeout: "30s"

# LLM Provider Configuration
providers:
  # Default provider to use
  default: "ollama"
  
  # Ollama configuration (local LLM serving)
  ollama:
    base_url: "http://localhost:11434"
    model: "codellama:7b"
    timeout: "120s"
    max_context: 4096
  
  # OpenAI configuration (cloud LLM serving)
  openai:
    api_key_env: "OPENAI_API_KEY"
    model: "gpt-4"
    timeout: "60s"
    max_tokens: 2048

# Logging Configuration
logging:
  level: "info"           # debug, info, warn, error
  format: "json"          # json, text
  output: "stdout"        # stdout, stderr, file path

# Security Configuration
security:
  max_request_size: "50MB"
  rate_limit: "100/min"
  cors_origins: ["*"]
  api_keys_env: "CLLM_API_KEYS"