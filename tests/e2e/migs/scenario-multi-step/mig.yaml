# Multi-step mig spec demonstrating sequential transformation steps with
# global Build Gate policy. This example shows a three-step Java
# migration workflow: Java 8 → Java 11 → Java 17, with each step producing
# a diff artifact while execution continues on the same sticky workspace.
#
# Submit with:
#   dist/ploy mig run \
#     --repo-url https://gitlab.com/example/my-java-project.git \
#     --repo-base-ref main \
#     --spec tests/e2e/migs/scenario-multi-step/mig.yaml \
#     --follow

apiVersion: ploy.mig/v1alpha1
kind: MigRunSpec

################################################################################
# MULTI-STEP MODS
################################################################################
# Sequential transformation steps: Java 8 → Java 11 → Java 17
# Each mig executes in array order, sharing the same repository and global
# Build Gate policy. The diff from each step is captured before the
# next step begins.
steps:
  # Step 1: Migrate to Java 8
  - image: localhost:5000/ploy/orw-cli-java-17-maven:latest
    envs:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.Java8
      MIGRATION_STEP: "1"

  # Step 2: Migrate to Java 11
  - image: localhost:5000/ploy/orw-cli-java-17-maven:latest
    envs:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava11
      MIGRATION_STEP: "2"

  # Step 3: Migrate to Java 17
  - image: localhost:5000/ploy/orw-cli-java-17-maven:latest
    envs:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17
      MIGRATION_STEP: "3"

################################################################################
# GLOBAL BUILD GATE POLICY
################################################################################
# Build gate runs after each mig step. For multi-step runs, the gate validates
# the accumulated changes from all prior steps.
build_gate: {}
