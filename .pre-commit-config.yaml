repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt (make fmt)
        entry: make fmt
        language: system
        pass_filenames: false
        files: \.go$

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        pass_filenames: false
        files: \.go$

      # Optional: block commits with race conditions in quick runs
      # - id: go-test-race
      #   name: go test -race (quick)
      #   entry: go test -race -short ./...
      #   language: system
      #   pass_filenames: false
      #   files: \.go$
