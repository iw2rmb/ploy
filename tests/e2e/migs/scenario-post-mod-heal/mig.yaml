# E2E scenario: Multi-step Mods run with post-mig gate healing.
#
# This spec validates gate-heal-regate behavior for post-mig gate failures:
# 1. Each migs[] entry is followed by a post-gate check
# 2. At least one step triggers post-gate failure requiring healing
# 3. Healing runs and fixes the error; re-gate passes
# 4. SSE events and final artifacts show gate and healing events for each step
#
# Scenario flow:
#   Step 0: Java8 migration (should pass post-gate)
#   Step 1: Java11 migration using fail-missing-symbol branch (may fail post-gate,
#           requiring healing to create missing class before re-gate passes)
#   Step 2: Java17 migration (should pass post-gate after step 1 healing)
#
# This tests the gate-heal-regate regression guard by exercising:
# - Post-mig gate failures (not just pre-mig)
# - Healing migs that fix post-mig failures
# - GateSummary reflecting the final (post-mig) gate result
# - Multi-step execution continuing after successful healing
#
# Prerequisites:
# - Cluster descriptor at ~/.config/ploy/clusters/default
# - Codex auth at ~/.codex/auth.json (for healing)
# - GitLab PAT for MR creation (optional)
#
# Submit with:
#   dist/ploy mig run \
#     --repo-url https://gitlab.com/iw2rmb/ploy-orw-java11-maven.git \
#     --repo-base-ref e2e/fail-missing-symbol \
#     --repo-target-ref migs-e2e-post-mig-heal-test \
#     --spec tests/e2e/migs/scenario-post-mig-heal/mig.yaml \
#     --follow

apiVersion: ploy.mig/v1alpha1
kind: MigRunSpec

################################################################################
# MULTI-STEP MODS WITH POST-MOD GATE HEALING
################################################################################
# Three-step Java migration workflow that intentionally triggers post-gate
# failures to validate the healing flow. The fail-missing-symbol branch
# contains code that references an undefined symbol (UnknownClass), which will
# cause post-gate failures until healing creates the missing class.
steps:
  # Step 0: Apply code formatting as warmup (should pass)
  # This step uses a lightweight recipe that formats code without introducing errors.
  - image: localhost:5000/ploy/orw-cli-maven:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.format.AutoFormat

  # Step 1: Migrate to Java 17 (may trigger post-gate failure on fail-missing-symbol branch)
  # This transformation may expose or interact with the UndefinedClass reference.
  # If post-gate fails, healing will create the missing UndefinedModSymbol class.
  - image: localhost:5000/ploy/orw-cli-maven:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-migrate-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17

  # Step 2: Apply cleanup recipe (should pass after step 1 healing)
  # This step runs after healing has fixed any post-gate failures from step 1.
  - image: localhost:5000/ploy/orw-cli-maven:latest
    env:
      RECIPE_GROUP: org.openrewrite.recipe
      RECIPE_ARTIFACT: rewrite-java
      RECIPE_VERSION: "3.20.0"
      RECIPE_CLASSNAME: org.openrewrite.java.cleanup.SimplifyBooleanExpression

################################################################################
# BUILD GATE VALIDATION
################################################################################
# Build gate runs after each step to validate the transformation.
# Post-mig gate failures trigger the healing sequence below.
build_gate:
  enabled: true

  # Router emits bug_summary + error_kind before healing selection.
  router:
    image: localhost:5000/ploy/migs-codex:latest
    env:
      CODEX_PROMPT: |-
        Rules:
        - Read /in/build-gate.log.
        - Do not edit /workspace.
        - Your final message MUST be EXACTLY one line of JSON:
          {"bug_summary":"<<=200 chars, single line>","error_kind":"code"}

        Task:
        Summarize the failure and classify it for healing selection.

  ################################################################################
  # HEALING POLICY FOR POST-MOD FAILURES
  ################################################################################
  # When a post-mig gate fails (transformation broke the build), this healing
  # sequence runs to fix the error. The healing mig:
  # 1. Reads /in/build-gate.log to understand the failure
  # 2. Edits the workspace to fix the issue
  # 3. Edits the workspace and exits; node agent re-gates only when workspace
  #    diffs are present. This tests the critical gate-heal-regate flow for
  #    post-mig failures using the workspace diff handshake.
  healing:
    by_error_kind:
      code:
        retries: 2 # Allow multiple healing attempts for complex errors
        # Codex healing container using the workspace diff handshake.
        # For this E2E, Codex will analyze the compile error (missing class) and
        # create the necessary stub class to fix the build.
        image: localhost:5000/ploy/migs-codex:latest
        env:
          CODEX_PROMPT: |-
            Rules:
            - Use /workspace and /in/build-gate.log to understand the compile error.
            - The error is likely a missing class reference (UnknownClass or similar).
            - Create the missing class in the appropriate package under /workspace.
            - The class should have a minimal implementation (empty constructor, toString).
            - Edit files under /workspace as needed to fix the error.
            - When you believe the code is ready for a full build validation, stop editing and end the session.

            Task:
            Fix the compilation error described in /in/build-gate.log.
            This is a post-mig gate failure (the mig transformation broke the build).
            Create any missing classes or fix any syntax errors introduced by the transformation.
        # Uncomment if you have Codex auth configured:
        env_from_file:
          CODEX_AUTH_JSON: ~/.codex/auth.json

################################################################################
# GITLAB MR INTEGRATION
################################################################################
# Create MR on success to validate final state after healing.
# The MR should contain:
# - Original transformation changes
# - Healing fix (e.g., missing class creation)
mr_on_fail: false
mr_on_success: true
# gitlab_domain: gitlab.com
# gitlab_pat: ""  # Provide via CLI: --gitlab-pat or env: PLOY_GITLAB_PAT

################################################################################
# E2E VALIDATION CHECKLIST
################################################################################
# When running this scenario, verify:
#
# 1. Post-mig gate failure detection:
#    - Step 1 post-gate should fail (missing class reference)
#    - SSE events should show "gate_failed" for step 1 post-gate
#    - Logs should indicate post-mig (not pre-mig) gate failure
#
# 2. Healing execution:
#    - Healing mig should run after post-gate failure
#    - Codex should edit the workspace to create the missing class file
#
# 3. Re-gate success:
#    - Re-gate after healing should pass
#    - SSE events should show "gate_passed" after healing
#    - GateSummary should reflect final post-gate result
#
# 4. Multi-step continuation:
#    - Step 2 should execute after step 1 healing succeeds
#    - Step 2 post-gate should pass
#    - Run should complete with status=success
#
# 5. Artifact validation:
#    - codex.log should contain healing output
#    - codex-run.json should include session_id/resumed fields
#    - Final workspace should include healing fix
#
# Success criteria:
# - At least one step triggers post-mig gate failure
# - Healing successfully fixes the error
# - All steps complete after healing
# - GateSummary reflects final (post-mig) gate state
# - SSE events show gate/healing sequence for affected steps
