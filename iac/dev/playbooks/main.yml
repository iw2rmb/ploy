          {% endif %}
          
          # ARF (Automated Remediation Framework) environment variables
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export OPENREWRITE_JAR_PATH=/usr/local/bin/rewrite.jar
          export ARF_SANDBOX_BASE_DIR=/tmp/arf-sandboxes
          export ARF_CACHE_DIR=/tmp/arf-cache
          
          # ARF Phase 3 - LLM Integration & Learning (DB disabled)
          # Tree-sitter removed
          export ARF_LLM_CACHE_DIR=/tmp/arf-llm-cache
          export ARF_AB_TEST_DIR=/tmp/arf-ab-tests
          
          # Tree-sitter parser paths
