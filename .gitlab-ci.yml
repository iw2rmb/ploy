stages: [validate, build, supply, deploy]

validate:
  stage: validate
  image: golang:1.22
  script: [ "go run ./tools/lane-pick --path apps" ]

test-transflow:
  stage: validate
  image: golang:1.22
  variables:
    GO111MODULE: "on"
  before_script:
    - go version
    - go env
    - go install honnef.co/go/tools/cmd/staticcheck@latest
    - export PATH="$(go env GOPATH)/bin:$PATH"
  script:
    - echo "Running transflow unit tests..."
    - go test -vet=off -race -short -count=1 -v ./internal/cli/transflow
    - echo "Running staticcheck for transflow..."
    - staticcheck ./internal/cli/transflow/...

build:
  stage: build
  image: golang:1.22
  script: [ "go build -o bin/api ./api" ]

supply:
  stage: supply
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl bash
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
    - wget -O /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/download/v2.2.4/cosign-linux-amd64 && chmod +x /usr/local/bin/cosign
  script:
    - syft dir:. -o json > repo.sbom.json
    - grype repo.sbom.json --fail-on high
    - cosign generate-key-pair && cosign sign-blob --key cosign.key --output-signature repo.sbom.json.sig repo.sbom.json
