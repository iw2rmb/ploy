name = "dev-db"
description = "Development Postgres snapshot"

[source]
engine = "postgres"
dsn = "postgres://localhost/dev"
fixture = "dev-db.json"

[[strip]]
table = "users"
columns = ["ssn"]

[[mask]]
table = "users"
column = "email"
strategy = "hash"

[[synthetic]]
table = "users"
column = "token"
strategy = "uuid"
