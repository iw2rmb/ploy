delete:
  tags: [Security]
  summary: Revoke API token
  description: |
    Revokes an API token by token ID.
    Requires `cli-admin` role.
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: string }
      description: Token ID.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
            required: [message]
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '403':
      description: Forbidden (requires cli-admin role)
    '500':
      description: Server error
