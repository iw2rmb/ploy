# Security Vulnerability Patches Recipe
metadata:
  name: java-security-patches
  description: Apply security patches and fix common vulnerabilities in Java applications
  author: Ploy Platform
  version: 2.0.0
  license: MIT
  tags:
    - security
    - vulnerability
    - patch
    - cve
    - owasp
  categories:
    - security-fix
    - dependency-update
  languages:
    - java
  frameworks:
    - spring-boot
    - spring-framework
    - maven
    - gradle
  requirements:
    - Java 11 or higher

steps:
  - name: Update Vulnerable Dependencies
    type: openrewrite
    config:
      recipe: org.openrewrite.java.dependencies.DependencyVulnerabilityCheck
      description: Scan and update dependencies with known CVEs
      options:
        scope: compile
        add_markers: true
        fail_on_severity: HIGH
    on_error: fail
    timeout: 10m

  - name: Fix SQL Injection Vulnerabilities
    type: openrewrite
    config:
      recipe: org.openrewrite.java.security.SecureSqlQueries
      description: Replace string concatenation in SQL with parameterized queries
    on_error: fail
    timeout: 5m

  - name: Fix XSS Vulnerabilities
    type: openrewrite
    config:
      recipe: org.openrewrite.java.security.XssVulnerabilityFix
      description: Escape user input in web responses
    conditions:
      - type: framework
        value: spring-boot
    on_error: fail
    timeout: 5m

  - name: Update Log4j Version
    type: openrewrite
    config:
      recipe: org.openrewrite.java.dependencies.UpgradeDependencyVersion
      options:
        group_id: org.apache.logging.log4j
        artifact_id: "*"
        new_version: 2.17.1
        only_if_using: true
      description: Update Log4j to fix Log4Shell vulnerability (CVE-2021-44228)
    on_error: fail
    timeout: 3m

  - name: Secure Random Number Generation
    type: openrewrite
    config:
      recipe: org.openrewrite.java.security.UseSecureRandom
      description: Replace Random with SecureRandom for cryptographic operations
    on_error: continue
    timeout: 3m

  - name: Fix Path Traversal
    type: regex
    config:
      pattern: 'new File\(.*\+.*\)'
      replacement: 'Paths.get($1).normalize().toFile()'
      file_pattern: "**/*.java"
      description: Prevent path traversal attacks
    on_error: continue
    timeout: 5m

  - name: Disable XML External Entities
    type: openrewrite
    config:
      recipe: org.openrewrite.java.security.DisableXmlExternalEntities
      description: Prevent XXE attacks by disabling external entity processing
    on_error: fail
    timeout: 3m

  - name: Update Spring Security Configuration
    type: shell
    config:
      script: |
        # Add security headers to Spring Security config
        find . -name "SecurityConfig.java" -o -name "WebSecurityConfig.java" | while read file; do
          if ! grep -q "X-Frame-Options" "$file"; then
            echo "Adding security headers to $file"
            # Add security headers configuration
          fi
        done
      description: Add security headers configuration
    conditions:
      - type: framework
        value: spring-boot
    on_error: continue
    timeout: 5m

  - name: Fix Insecure Deserialization
    type: openrewrite
    config:
      recipe: org.openrewrite.java.security.SecureDeserialization
      description: Replace Java serialization with secure alternatives
    on_error: continue
    timeout: 5m

  - name: Update Cryptography Algorithms
    type: openrewrite
    config:
      recipe: org.openrewrite.java.security.ModernizeCryptography
      options:
        replace_md5: true
        replace_sha1: true
        min_key_size: 2048
      description: Replace weak cryptographic algorithms
    on_error: fail
    timeout: 5m

  - name: Add Input Validation
    type: openrewrite
    config:
      recipe: org.openrewrite.java.security.InputValidation
      description: Add validation for user inputs
    on_error: continue
    timeout: 5m

  - name: Generate Security Report
    type: shell
    config:
      script: |
        echo "Security Patch Summary:" > security-report.md
        echo "======================" >> security-report.md
        echo "" >> security-report.md
        echo "Patches Applied:" >> security-report.md
        git diff --stat >> security-report.md
      description: Generate report of security patches applied
    on_error: continue
    timeout: 5m

execution:
  parallelism: 1  # Sequential for security patches
  max_duration: 30m
  retry_policy:
    max_attempts: 2
    backoff: 10s
    max_backoff: 60s
  sandbox:
    enabled: true
    allow_network: true  # Need to check vulnerability databases
    allow_file_write: true
    max_memory: 2GB
    max_cpu: 2
    isolation_level: high  # High isolation for security operations
    blocked_commands:
      - curl
      - wget
      - nc
      - telnet
  environment:
    SECURITY_SCAN: "true"
    CVE_CHECK_ENABLED: "true"

validation:
  file_patterns:
    - "**/*.java"
    - "**/pom.xml"
    - "**/build.gradle"
  min_file_count: 1
  max_repo_size: 2147483648  # 2GB
  language_detection:
    primary: java
    min_confidence: 0.7
    required: true
  custom_rules:
    - name: Check for web framework
      description: Determine if this is a web application
      type: file_exists
      value: "**/WebSecurityConfig.java"
      required: false
    - name: Check for database usage
      description: Check if application uses database
      type: file_content
      value: "javax.sql|java.sql|springframework.jdbc"
      required: false