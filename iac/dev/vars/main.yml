---
# Global configuration for Ploy dev environment

# Go version for building Ploy
go_version: "1.23.0"  # Latest stable Go
go_arch: "amd64"

# Docker configuration
docker_compose_version: "2.29.2"  # Latest stable Docker Compose

# Nomad/Consul versions
nomad_version: "1.10.4"  # Latest stable Nomad available
consul_version: "1.20.2"  # Compatible Consul version
# Legacy secrets integration removed; no dedicated binary required

# Traefik version
traefik_version: "3.5.0"

# Node class for gateway/edge nodes where Traefik should run
ploy_gateway_node_class: "gateway"

# Nomad client meta key/value used to place Traefik (constraint uses ${meta.<key>})
ploy_gateway_node_meta_key: "role"

# Traefik admin/dashboard port (entrypoint "admin")
traefik_admin_port: 8090

# Certificate contact emails (used by Traefik ACME); override via env if needed
ploy_platform_cert_email: "{{ lookup('env', 'PLOY_PLATFORM_CERT_EMAIL') | default('admin@ployman.app') }}"

# Node Exporter version
node_exporter_version: "1.7.0"

# Testing tools
testing_tools:
  - curl
  - jq
  - git
  - make
  - wget
  - unzip

# Environment configuration
ploy_environment: "dev"  # Enables development environment features including wildcard certificates

# Ploy specific configuration
ploy:
  storage_backend: "seaweedfs"
  dns:
    provider: "coredns"
    domain: "ploy.local"
    target_ip: "{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}"
    ttl: 300
    enable_ipv6: false

  # User apps domain configuration (must be supplied via environment/options)
  apps_domain: "{{ lookup('env', 'PLOY_APPS_DOMAIN') }}"
  apps_domain_provider: "{{ lookup('env', 'PLOY_APPS_DOMAIN_PROVIDER') }}"

  # Platform services domain configuration (must be supplied via environment/options)
  platform_domain: "{{ lookup('env', 'PLOY_PLATFORM_DOMAIN') }}"
  platform_domain_provider: "{{ lookup('env', 'PLOY_PLATFORM_DOMAIN_PROVIDER') }}"

  # API accessible at api.{platform_domain}
  api_subdomain: "api"
  nomad_control_domain: "nomad.control.ploy.local"
  registry_domain: "{{ lookup('env', 'PLOY_REGISTRY_DOMAIN') }}"
  upload_api_binary: "{{ lookup('env', 'PLOY_UPLOAD_API_BINARY') | default('true', true) | bool }}"

  # Git configuration propagated into Nomad jobs
  gitlab_url: "{{ lookup('env', 'GITLAB_URL') | default('https://gitlab.com', true) }}"
  gitlab_token: "{{ lookup('env', 'GITLAB_TOKEN') | default('', true) }}"
  git_author_name: "{{ lookup('env', 'GIT_AUTHOR_NAME') | default('Ploy Bot', true) }}"
  git_author_email: "{{ lookup('env', 'GIT_AUTHOR_EMAIL') | default('ploy-bot@dev.ployman.app', true) }}"
  git_committer_name: "{{ lookup('env', 'GIT_COMMITTER_NAME') | default(lookup('env', 'GIT_AUTHOR_NAME') | default('Ploy Bot', true), true) }}"
  git_committer_email: "{{ lookup('env', 'GIT_COMMITTER_EMAIL') | default(lookup('env', 'GIT_AUTHOR_EMAIL') | default('ploy-bot@dev.ployman.app', true), true) }}"

  # Mods job configuration overrides
  mods:
    orw_apply_image: "{{ lookup('env', 'MODS_ORW_APPLY_IMAGE') | default('registry.dev.ployman.app/openrewrite-jvm:latest', true) }}"
    planner_image: "{{ lookup('env', 'MODS_PLANNER_IMAGE') | default('registry.dev.ployman.app/langgraph-runner:latest', true) }}"
    reducer_image: "{{ lookup('env', 'MODS_REDUCER_IMAGE') | default('registry.dev.ployman.app/langgraph-runner:latest', true) }}"
    llm_exec_image: "{{ lookup('env', 'MODS_LLM_EXEC_IMAGE') | default('registry.dev.ployman.app/langgraph-runner:latest', true) }}"
    registry: "{{ lookup('env', 'MODS_REGISTRY') | default('registry.dev.ployman.app', true) }}"
    skip_deploy_lanes: "{{ lookup('env', 'MODS_SKIP_DEPLOY_LANES') | default('', true) }}"

  # Optional Nomad DC override
  nomad_dc: "{{ lookup('env', 'NOMAD_DC') | default('dc1', true) }}"

# Nomad api deployment configuration
nomad_api:
  replicas: 2
  resources:
    cpu: 500    # MHz
    memory: 512 # MB

# Build tools for different lanes
build_tools:
  cosign:
    version: "2.4.0"   # Latest stable Cosign
  syft:
    version: "1.3.0"  # Latest stable Syft
  grype:
    version: "0.84.0"  # Latest stable Grype
  opa:
    version: "0.69.0"  # Latest stable OPA

# SeaweedFS configuration
seaweedfs:
  version: "3.96"
  master_port: 9333
  volume_port: 8080
  filer_port: 8888
  master_domain: "seaweedfs-master.storage.ploy.local"
  volume_domain: "seaweedfs-volume.storage.ploy.local"
  filer_domain: "seaweedfs-filer.storage.ploy.local"
  master_endpoint: "seaweedfs-master.storage.ploy.local:9333"
  filer_endpoint: "seaweedfs-filer.storage.ploy.local:8888"
  
  # Collection configuration for different artifact types (dev environment)
  collections:
    artifacts:
      name: "artifacts"
      replication: "000"  # No replication for development environment
    metadata:
      name: "ploy-metadata"
      replication: "000"  # No replication for development environment
    debug:
      name: "ploy-debug"
      replication: "000"  # No replication for ephemeral debug artifacts

# CoreDNS configuration
coredns:
  version: "1.11.1"
  port: 1053
  ttl: 300
  cache_ttl: 120
  zone: "{{ ploy.dns.domain }}"
  service_ip: "{{ ploy.dns.target_ip }}"
  upstream:
    - "1.1.1.1"
    - "8.8.8.8"
  health_port: 8088
  ready_port: 8181
  serial: 2025091801
  soa_rname: "hostmaster.{{ ploy.dns.domain }}."
  refresh: 7200
  retry: 3600
  expire: 1209600
  minimum: 300
  ns: "ns1.{{ ploy.dns.domain }}."
  ns_host: "ns1"
  a_records:
    - name: "@"
      target: "{{ ploy.dns.target_ip }}"
    - name: "nomad.control"
      target: "{{ ploy.dns.target_ip }}"
    - name: "ploy-api"
      target: "{{ ploy.dns.target_ip }}"
    - name: "nats"
      target: "{{ ploy.dns.target_ip }}"
    - name: "seaweedfs-master.storage"
      target: "{{ ploy.dns.target_ip }}"
    - name: "seaweedfs-volume.storage"
      target: "{{ ploy.dns.target_ip }}"
    - name: "seaweedfs-filer.storage"
      target: "{{ ploy.dns.target_ip }}"
  srv_records:
    - name: "_seaweedfs._tcp.seaweedfs-filer.storage"
      priority: 10
      weight: 10
      port: "{{ seaweedfs.filer_port }}"
      target: "seaweedfs-filer.storage.{{ ploy.dns.domain }}."

# External storage configuration for api
storage_config:
  seaweedfs:
    master: "seaweedfs-master.storage.ploy.local:9333"
    filer: "seaweedfs-filer.storage.ploy.local:8888"
    collection: "artifacts"
    replication: "000"
    timeout: 30
    datacenter: ""
    rack: ""
    collections:
      artifacts: "artifacts"
      metadata: "ploy-metadata"
      debug: "ploy-debug"
  
  client:
    retry_config:
      max_retries: 3
      initial_delay: "1s"
      max_delay: "30s"
      multiplier: 2.0
    health_check_config:
      interval: "30s"
      timeout: "10s"
      failure_threshold: 3
    enable_metrics: true
    enable_health_check: true
    max_operation_time: "5m"

# SeaweedFS collection configuration for single-node setup
seaweedfs_single_node:
  # Use replication 000 for single node setups
  replication: "000"
  # Number of volumes to create per collection
  volumes_per_collection:
    artifacts: 2
    metadata: 1
    debug: 1
