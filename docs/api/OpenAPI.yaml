openapi: 3.1.0
info:
  title: Ploy Control Plane API
  version: "0.1.0"
  description: |
    REST surface exposed by the Ploy control-plane `ployd` deployment. All routes
    require mutual TLS and a bearer token with the appropriate scope.
servers:
  - url: https://{control_host}
    description: Control-plane endpoint (typically reached via SSH tunnel)
    variables:
      control_host:
        default: cluster-alpha.example.com
        description: SSH-targeted control-plane host recorded in the descriptor.
tags:
  - name: Nodes
    description: Worker onboarding, listing, and deregistration.
  - name: GitLab
    description: GitLab signer configuration.
  - name: Artifacts
    description: HTTPS artifact upload, list, inspect, delete.
  - name: Security
    description: PKI operations (CA info, CSR signing).
security:
  - bearerAuth: []
paths:
  /v1/nodes:
    $ref: './paths/nodes.yaml'
  /v1/nodes/{node_id}:
    $ref: './paths/nodes_id.yaml'
  /v1/config/gitlab:
    $ref: './paths/gitlab_config.yaml'
  /v1/pki/sign:
    $ref: './paths/pki_sign.yaml'
  # Registry removed; Docker Hub is used for images.
  # v2 artifacts aliases
  /v2/artifacts/upload:
    post:
      tags: [Artifacts]
      summary: Upload an artifact via HTTPS (v2 alias)
      parameters: []
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Artifact created
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Invalid request
        '403':
          description: Insufficient scope
  /v2/artifacts:
    get:
      tags: [Artifacts]
      summary: List artifacts (v2 alias)
      responses:
        '200':
          description: OK
  /v2/artifacts/{id}:
    get:
      tags: [Artifacts]
      summary: Inspect or download an artifact (v2 alias)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    bearerAuth:
      $ref: './components/securitySchemes/bearerAuth.yaml'
  parameters: {}
  schemas:
    PKISignRequest:
      $ref: './components/schemas/pki.yaml#/PKISignRequest'
    PKISignResponse:
      $ref: './components/schemas/pki.yaml#/PKISignResponse'
    NodeJoinRequest:
      $ref: './components/schemas/nodes.yaml#/NodeJoinRequest'
    NodeProbe:
      $ref: './components/schemas/nodes.yaml#/NodeProbe'
    NodeJoinResponse:
      $ref: './components/schemas/nodes.yaml#/NodeJoinResponse'
    NodeDescriptor:
      $ref: './components/schemas/nodes.yaml#/NodeDescriptor'
    WorkerStatus:
      $ref: './components/schemas/nodes.yaml#/WorkerStatus'
    WorkerProbeResult:
      $ref: './components/schemas/nodes.yaml#/WorkerProbeResult'
    LeafCertificate:
      $ref: './components/schemas/nodes.yaml#/LeafCertificate'
    NodeDeleteRequest:
      $ref: './components/schemas/nodes.yaml#/NodeDeleteRequest'
    NodeDrainConflict:
      $ref: './components/schemas/nodes.yaml#/NodeDrainConflict'
    RevokedRecord:
      $ref: './components/schemas/nodes.yaml#/RevokedRecord'
    GitLabConfigResponse:
      $ref: './components/schemas/gitlab.yaml#/GitLabConfigResponse'
    GitLabConfigWriteRequest:
      $ref: './components/schemas/gitlab.yaml#/GitLabConfigWriteRequest'
    GitLabConfig:
      $ref: './components/schemas/gitlab.yaml#/GitLabConfig'
    GitLabToken:
      $ref: './components/schemas/gitlab.yaml#/GitLabToken'
    GitLabBranchPolicy:
      $ref: './components/schemas/gitlab.yaml#/GitLabBranchPolicy'
    GitLabRBAC:
      $ref: './components/schemas/gitlab.yaml#/GitLabRBAC'
    # registry schemas removed
    Error:
      $ref: './components/schemas/common.yaml#/Error'
