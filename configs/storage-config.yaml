storage:
  provider: seaweedfs
  master: localhost:9333
  filer: localhost:8888
  collection: ploy-artifacts
  replication: "000"
  timeout: 30
  datacenter: ""
  rack: ""
  collections:
    artifacts: ploy-artifacts
    metadata: ploy-metadata
    debug: ploy-debug
  client:
    retry_config:
      max_retries: 3
      initial_delay: "1s"
      max_delay: "30s"
      multiplier: 2.0
    health_check_config:
      interval: "30s"
      timeout: "10s"
      failure_threshold: 3
    enable_metrics: true
    enable_health_check: true
    max_operation_time: "5m"
