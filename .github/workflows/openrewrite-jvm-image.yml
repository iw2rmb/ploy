name: OpenRewrite JVM Image

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/openrewrite-jvm/**'
      - '.github/workflows/openrewrite-jvm-image.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/openrewrite-jvm/**'
      - '.github/workflows/openrewrite-jvm-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('services/openrewrite-jvm/Dockerfile') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (push only)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'push'

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openrewrite-jvm
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Build (PR) / Build+Push (push)
        uses: docker/build-push-action@v6
        with:
          context: services/openrewrite-jvm
          file: services/openrewrite-jvm/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
