Repo:
  type: object
  properties:
    id: { type: string, format: uuid }
    url: { type: string }
    branch: { type: string, nullable: true }
    commit_sha: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
  required: [id, url, created_at]

CreateRepoRequest:
  type: object
  properties:
    url: { type: string }
    branch: { type: string, nullable: true }
    commit_sha: { type: string, nullable: true }
  required: [url]

Mod:
  type: object
  properties:
    id: { type: string, format: uuid }
    repo_id: { type: string, format: uuid }
    spec: {}
    created_by: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
  required: [id, repo_id, spec, created_at]

CreateModRequest:
  type: object
  properties:
    repo_id: { type: string, format: uuid }
    spec: {}
    created_by: { type: string, nullable: true }
  required: [repo_id, spec]

Run:
  type: object
  properties:
    id: { type: string, format: uuid }
    mod_id: { type: string, format: uuid }
    status: { type: string }
    reason: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
    node_id: { type: string, format: uuid, nullable: true }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    stats: {}
  required: [id, mod_id, status, created_at, base_ref, target_ref]

CreateRunRequest:
  type: object
  properties:
    mod_id: { type: string, format: uuid }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
  required: [mod_id, base_ref, target_ref]

CreateRunResponse:
  type: object
  properties:
    run_id: { type: string, format: uuid }
  required: [run_id]

# Ticket submission (simplified Mods facade)
TicketSubmitRequest:
  type: object
  properties:
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    spec: {}
    created_by: { type: string, nullable: true }
  required: [repo_url, base_ref, target_ref]

TicketSummary:
  type: object
  properties:
    ticket_id: { type: string, format: uuid }
    status: { type: string }
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
  required: [ticket_id, status, repo_url, base_ref, target_ref]

# Detailed status returned by GET /v1/mods/{id}
TicketStatus:
  type: object
  properties:
    ticket_id: { type: string, format: uuid }
    status: { type: string }
    reason: { type: string, nullable: true }
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
  required: [ticket_id, status, repo_url, base_ref, target_ref, created_at]

# Response returned by POST /v1/nodes/{id}/claim
NodeClaimResponse:
  type: object
  properties:
    id: { type: string, format: uuid }
    mod_id: { type: string, format: uuid }
    status: { type: string }
    node_id: { type: string, format: uuid }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    started_at: { type: string, format: date-time }
    created_at: { type: string, format: date-time }
  required: [id, mod_id, status, node_id, base_ref, target_ref, started_at, created_at]

Event:
  type: object
  properties:
    id: { type: integer, format: int64 }
    run_id: { type: string, format: uuid }
    stage_id: { type: string, format: uuid, nullable: true }
    time: { type: string, format: date-time }
    level: { type: string }
    message: { type: string }
    meta: {}
  required: [id, run_id, time, level, message]

Stage:
  type: object
  properties:
    id: { type: string, format: uuid }
    run_id: { type: string, format: uuid }
    name: { type: string }
    status: { type: string }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
    duration_ms: { type: integer, format: int64 }
    meta: {}
  required: [id, run_id, name, status, duration_ms]

RunTiming:
  type: object
  properties:
    id: { type: string, format: uuid }
    queue_ms: { type: integer, format: int64 }
    run_ms: { type: integer, format: int64 }
  required: [id, queue_ms, run_ms]

ListRunsTimingsResponse:
  type: object
  properties:
    timings:
      type: array
      items:
        $ref: '#/RunTiming'
  required: [timings]

Diff:
  type: object
  properties:
    id: { type: string, format: uuid }
    run_id: { type: string, format: uuid }
    stage_id: { type: string, format: uuid, nullable: true }
    patch:
      type: string
      description: Gzipped unified diff (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    summary: {}
    created_at: { type: string, format: date-time }
  required: [id, run_id, patch, created_at]

CreateDiffRequest:
  type: object
  properties:
    stage_id: { type: string, format: uuid, nullable: true }
    patch:
      type: string
      description: Gzipped unified diff (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    summary: {}
  required: [patch]

Log:
  type: object
  properties:
    id: { type: integer, format: int64 }
    run_id: { type: string, format: uuid }
    stage_id: { type: string, format: uuid, nullable: true }
    build_id: { type: string, format: uuid, nullable: true }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped log chunk (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    created_at: { type: string, format: date-time }
  required: [id, run_id, chunk_no, data, created_at]

CreateLogRequest:
  type: object
  properties:
    stage_id: { type: string, format: uuid, nullable: true }
    build_id: { type: string, format: uuid, nullable: true }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped log chunk (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [chunk_no, data]

# Request used by node → server log ingestion.
NodeCreateLogRequest:
  type: object
  properties:
    run_id: { type: string, format: uuid }
    stage_id: { type: string, format: uuid, nullable: true }
    build_id: { type: string, format: uuid, nullable: true }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped log chunk (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [run_id, chunk_no, data]

ArtifactBundle:
  type: object
  properties:
    id: { type: string, format: uuid }
    run_id: { type: string, format: uuid }
    stage_id: { type: string, format: uuid, nullable: true }
    build_id: { type: string, format: uuid, nullable: true }
    name: { type: string, nullable: true }
    bundle:
      type: string
      description: Gzipped tar archive (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    created_at: { type: string, format: date-time }
  required: [id, run_id, bundle, created_at]

CreateArtifactBundleRequest:
  type: object
  properties:
    stage_id: { type: string, format: uuid, nullable: true }
    build_id: { type: string, format: uuid, nullable: true }
    name: { type: string, nullable: true }
    bundle:
      type: string
      description: Gzipped tar archive (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [bundle]

# Node describes a registered worker node.
Node:
  type: object
  properties:
    id: { type: string, format: uuid }
    name: { type: string }
    ip_address: { type: string }
    version: { type: string, nullable: true }
    concurrency: { type: integer, format: int32 }
    cpu_total_millis: { type: integer, format: int32 }
    cpu_free_millis: { type: integer, format: int32 }
    mem_total_bytes: { type: integer, format: int64 }
    mem_free_bytes: { type: integer, format: int64 }
    disk_total_bytes: { type: integer, format: int64 }
    disk_free_bytes: { type: integer, format: int64 }
    cert_serial: { type: string, nullable: true }
    cert_fingerprint: { type: string, nullable: true }
    cert_not_before: { type: string, format: date-time, nullable: true }
    cert_not_after: { type: string, format: date-time, nullable: true }
    last_heartbeat: { type: string, format: date-time, nullable: true }
    drained: { type: boolean }
    created_at: { type: string, format: date-time }
  required:
    - id
    - name
    - ip_address
    - concurrency
    - cpu_total_millis
    - cpu_free_millis
    - mem_total_bytes
    - mem_free_bytes
    - disk_total_bytes
    - disk_free_bytes
    - drained
    - created_at
