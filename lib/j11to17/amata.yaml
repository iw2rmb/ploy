version: amata/v1
name: implement-roadmap
entry: main

workspace:
  root: "."
  state_dir: "/out/amata"

params:
  roadmap_file: "/tmp/roadmap.json"

defaults:
  cwd: $.workspace.root
  expr_lang: starlark
  executors:
    codex:
      model: "openai/gpt-5"
      reasoning: "medium"
      stall:
        after: 30

flows:
  main:
    steps:
      - shell: ["cat", "{{ ctx.params.roadmap_file }}"]
        response:
          from: stdout
          schema:
            type: object
            additionalProperties: false
            required: ["steps"]
            properties:
              steps:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required: ["title", "filepath", "reasoning"]
                  properties:
                    title:
                      type: string
                    filepath:
                      type: string
                    reasoning:
                      type: string
                      enum: ["low", "medium", "high"]

      - type: for_each
        items: $.prev.value.steps
        as: step
        steps:
          - codex: |
              High-level context: bring repository code and version-controlled configs to Java 17-ready state after OpenRewrite recipe bumping Java from 11 to 17.

              Implement **only** task and **only as described** in this file: `{{ ctx.step.filepath }}`.

              Mandatory rules:
              - Use `grep` instead of `rg`. Do not run equivalent grep/ripgrep variants.
              - If exact-match scan in declared edit targets returns 0, stop and return no-op result.
              - No `ls -R` or searching `.`; only declared target paths.
              - Max 5 tool calls unless a file is actually being edited.
              - Stick to the scope of the task strictly.
              - Edit only source code, build descriptors, and version-controlled config/script files.
              - Do not run builds, tests, linters, or IDE-assisted refactors.
              - Do not edit CI images, Docker base images, OS packages, or local/remote JDK installations.
              - Use `TODO(java17): ...` for unresolved decisions that need human follow-up.
            reasoning: $.step.reasoning
            response: /tmp/implement_result.schema.json

          - command: ["sleep", "60"]
