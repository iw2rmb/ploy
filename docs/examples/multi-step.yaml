# Multi-Step Transformation Workflow
# This example demonstrates a complex transformation workflow
# with multiple sequential steps and different recipe types.

version: v1alpha1
id: comprehensive-modernization
target_repo: https://gitlab.com/your-org/legacy-java-project.git
target_branch: refs/heads/modernization
base_ref: refs/heads/main
build_timeout: 20m         # Extended timeout for multiple steps

# Sequential transformation steps
steps:
  # Step 1: Clean up imports and formatting
  - type: recipe
    id: cleanup-phase
    engine: openrewrite
    recipes:
      - org.openrewrite.java.RemoveUnusedImports
      - org.openrewrite.java.OrderImports
      - org.openrewrite.java.format.AutoFormat
    timeout: 5m

  # Step 2: Update dependencies to latest versions  
  - type: recipe
    id: dependency-updates
    engine: openrewrite
    recipes:
      - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
          groupId: "org.springframework"
          artifactId: "*" 
          newVersion: "6.x"
      - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
          groupId: "junit"
          artifactId: "junit"
          newVersion: "5.x"
    timeout: 8m

  # Step 3: Migrate to Java 17
  - type: recipe
    id: java-migration
    engine: openrewrite  
    recipes:
      - org.openrewrite.java.migrate.Java11toJava17
      - org.openrewrite.java.migrate.ReplaceDeprecatedMethods
    timeout: 10m

  # Step 4: Modern Java patterns
  - type: recipe
    id: modernization
    engine: openrewrite
    recipes:
      - org.openrewrite.java.cleanup.SimplifyBooleanExpression
      - org.openrewrite.java.cleanup.UnnecessaryParentheses
      - org.openrewrite.java.migrate.util.OptionalStreamRecipe
      - org.openrewrite.staticanalysis.CommonStaticAnalysis
    timeout: 7m

# Self-healing with step-specific configuration
self_heal:
  enabled: true
  kb_learning: true
  max_retries: 3
  cooldown: 45s
  
  # Different healing strategies per step type
  step_specific:
    cleanup-phase:
      max_retries: 1       # Cleanup issues are usually simple
      strategies: ["orw-gen"]
    
    dependency-updates:
      max_retries: 4       # Dependency conflicts can be complex
      strategies: ["llm-exec", "human-step"]
    
    java-migration:
      max_retries: 3       # Migration issues need careful handling
      strategies: ["llm-exec", "orw-gen", "human-step"]
    
    modernization:
      max_retries: 2       # Modernization is optional, fail fast
      strategies: ["orw-gen", "llm-exec"]

# Model configuration optimized for multi-step workflows
llm_model: gpt-4o-mini@2024-08-06
llm_config:
  temperature: 0.2        # Slightly higher for creative problem-solving
  max_tokens: 6144       # More tokens for complex multi-file fixes
  
# Advanced KB configuration
kb_config:
  confidence_threshold: 0.8  # Higher threshold for multi-step workflows
  cross_step_learning: true # Learn patterns across different step types
  step_context: true        # Include step context in learning