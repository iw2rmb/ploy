# RunExecutionStatus defines the lifecycle state for one repository execution.
ControlPlaneBinaryHealth:
  type: object
  additionalProperties: false
  description: Build identity for the running ployd binary.
  properties:
    version:
      type: string
      description: Version stamped into the binary at build time.
    commit:
      type: string
      description: Git commit stamped into the binary at build time.
    built_at:
      type: string
      description: UTC build timestamp stamped into the binary.
  required: [version, commit, built_at]

ControlPlaneSchemaHealth:
  type: object
  additionalProperties: false
  description: Database schema version metadata known to this control-plane binary.
  properties:
    target_version:
      type: integer
      format: int64
      description: Schema version expected by the running binary.
    current_version:
      type: integer
      format: int64
      description: Highest schema version applied in the connected database.
    error:
      type: string
      description: Schema-version lookup error when readiness is degraded.
  required: [target_version]

ControlPlaneLivenessHealth:
  type: object
  additionalProperties: false
  properties:
    status:
      type: string
      enum: [ok]
    binary:
      $ref: "#/ControlPlaneBinaryHealth"
    schema:
      $ref: "#/ControlPlaneSchemaHealth"
  required: [status, binary, schema]

ControlPlaneReadinessHealth:
  type: object
  additionalProperties: false
  properties:
    status:
      type: string
      enum: [ok, degraded]
    db:
      type: string
      enum: [ok, unreachable, degraded]
      description: Database readiness state for traffic-serving endpoints.
    binary:
      $ref: "#/ControlPlaneBinaryHealth"
    schema:
      $ref: "#/ControlPlaneSchemaHealth"
  required: [status, db, binary, schema]

RunExecutionStatus:
  type: string
  description: |
    Execution status for a run.
    - Queued: The run is queued and waiting to start execution.
    - Running: Execution is in progress (claimed by a node).
    - Success: The run completed successfully.
    - Fail: The run failed.
    - Cancelled: The run was cancelled.
  enum: [Queued, Running, Success, Fail, Cancelled]

# WaveDerivedStatus represents the wave-level aggregate status computed
# from the run states in RunCounts.DerivedStatus.
WaveDerivedStatus:
  type: string
  description: |
    Wave-level status derived from aggregated run states.
    - pending: No runs have started (all queued or no runs).
    - running: At least one run is currently running.
    - completed: All runs are terminal with no failures.
    - failed: At least one run failed (and none running).
    - cancelled: The wave was stopped and runs were cancelled.
  enum: [pending, running, completed, failed, cancelled]

Run:
  type: object
  description: |
    Database-backed run row (v1 execution model).
    Note: run IDs are KSUID-backed strings (27 characters); format: uuid removed.
  properties:
    id:
      type: string
      description: Run ID (KSUID string)
    mig_id:
      type: string
      minLength: 1
      description: Mig (project) ID (NanoID string). Must be non-empty.
    spec_id:
      type: string
      minLength: 1
      description: Spec ID (NanoID string). Must be non-empty.
    created_by:
      type: string
      nullable: true
      description: User or system that created the run.
    status:
      $ref: "#/RunExecutionStatus"
    created_at:
      type: string
      format: date-time
      description: Timestamp when the run was created.
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the run started.
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the run reached a terminal state.
    stats:
      description: |
        Job/run metrics JSON object. Contains exit_code for failure context,
        gate results, and other execution statistics. Replaces the deprecated
        `reason` field for failure analysis.
      type: object
      additionalProperties: true
      nullable: true
  required: [id, mig_id, spec_id, status, created_at]

RunCounts:
  type: object
  description: |
    Aggregated run status counts for a wave. Provides a summary of how many
    runs are in each lifecycle state (queued, running, terminal). The
    derived_status field computes a single wave-level status from these
    counts for easy display in CLI/UI surfaces.
  properties:
    total:
      type: integer
      format: int32
      description: Total number of runs in the wave.
    queued:
      type: integer
      format: int32
      description: Runs waiting to start execution.
    running:
      type: integer
      format: int32
      description: Runs currently executing.
    success:
      type: integer
      format: int32
      description: Runs that completed successfully.
    fail:
      type: integer
      format: int32
      description: Runs that failed execution.
    cancelled:
      type: integer
      format: int32
      description: Runs stopped while running.
    derived_status:
      $ref: "#/WaveDerivedStatus"
      description: |
        Wave-level status computed from run states. Precedence order:
        cancelled > running > failed > completed > pending.
  required: [total]

RunExecution:
  type: object
  description: |
    Single repository execution row, backed by the `runs` table. Tracks refs,
    status, attempt count, and timing information.
    Note: repo_id is NanoID(8), run_id is KSUID (27 characters).
  properties:
    run_id:
      type: string
      description: Run ID (KSUID string).
    repo_id:
      type: string
      description: Repository ID (repos.id, NanoID string).
    repo_url:
      type: string
      description: Git repository URL (https, ssh, or file scheme).
    base_ref:
      type: string
      description: Git ref used as the base for comparisons (e.g., main, master).
    source_commit_sha:
      type: string
      description: Lowercase 40-hex source commit SHA for this run.
    status:
      $ref: "#/RunExecutionStatus"
      description: Current execution status for this run.
    attempt:
      type: integer
      format: int32
      description: |
        Retry attempt number for this run.
        Starts at 1, incremented on each restart.
    last_error:
      type: string
      nullable: true
      description: |
        Human-readable error message from the most recent failed attempt.
        Cleared when the repo is restarted.
    created_at:
      type: string
      format: date-time
      description: Timestamp when the run was created.
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution started (status transitioned to running).
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution completed (terminal status reached).
  required:
    - run_id
    - repo_id
    - repo_url
    - base_ref
    - status
    - attempt
    - created_at

RunSummary:
  type: object
  description: |
    Run summary for one repository execution, with optional aggregated wave counts.
    Note: id is now a KSUID-backed string (27 characters).
  properties:
    id:
      type: string
      minLength: 1
      description: Unique run identifier (KSUID string). Must be non-empty.
    mig_id:
      type: string
      minLength: 1
      description: Mig (project) identifier for the run. Must be non-empty.
    spec_id:
      type: string
      minLength: 1
      description: Spec identifier for the run. Must be non-empty.
    spec_name:
      type: string
      description: Named spec name when the run references a named spec.
    spec_source_domain:
      type: string
      description: Named spec source domain when available.
    spec_source_repo:
      type: string
      description: Named spec source repository path when available.
    status:
      $ref: "#/RunExecutionStatus"
    repo_id:
      type: string
      description: Repository ID (repos.id, NanoID string).
    repo_url:
      type: string
      description: Git repository URL (https, ssh, or file scheme).
    base_ref:
      type: string
      description: Git ref used as the base for comparisons.
    source_commit_sha:
      type: string
      description: Lowercase 40-hex source commit SHA for this run.
    attempt:
      type: integer
      format: int32
      description: Current attempt number for this run.
    last_error:
      type: string
      nullable: true
      description: Human-readable error message from the most recent failed attempt.
    created_by:
      type: string
      nullable: true
      description: User or system that created the run.
    created_at:
      type: string
      format: date-time
      description: Timestamp when the run was created.
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the run started.
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the run reached a terminal state.
    run_counts:
      $ref: "#/RunCounts"
      nullable: true
      description: Aggregated run status counts for the run's wave (optional).
  required:
    - id
    - mig_id
    - spec_id
    - status
    - created_at

CreateRunRequest:
  type: object
  properties:
    repo_url:
      type: string
      description: "Repository URL. Allowed schemes: https://, ssh://, file://."
    base_ref: { type: string }
    spec:
      type: object
      additionalProperties: true
      description: Migs spec JSON object.
  required: [repo_url, base_ref]

CreateRunResponse:
  type: object
  # Note: run_id is now a KSUID-backed string (27 characters).
  properties:
    run_id: { type: string, description: "Run ID (KSUID string)" }
  required: [run_id]

# Run submission (v1 single-repo)
RunSubmitRequest:
  type: object
  properties:
    repo_url:
      type: string
      description: "Repository URL. Allowed schemes: https://, ssh://, file://."
    ref:
      type: string
      description: Git ref or commit SHA used as the run source.
    commit_sha:
      type: string
      description: Optional lowercase 40-hex commit SHA. When provided, the server uses it directly as the source commit.
    spec_id:
      type: string
      description: Optional existing named spec ID. When present, the run references this specs row instead of creating an anonymous specs row.
    spec:
      type: object
      additionalProperties: true
      description: Migs spec JSON object (must be a JSON object).
    created_by: { type: string, nullable: true }
  required: [repo_url, ref, spec]

CreateSingleRepoRunResponse:
  type: object
  properties:
    wave_id: { type: string, description: "Wave ID (KSUID string)" }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    mig_id: { type: string, description: "Mig ID (NanoID string)" }
    spec_id: { type: string, description: "Spec ID (NanoID string)" }
  required: [wave_id, run_id, mig_id, spec_id]

CreateMigRequest:
  type: object
  properties:
    name: { type: string, description: "Unique mig name." }
    spec:
      type: object
      additionalProperties: true
      description: Optional initial migs spec JSON object.
    created_by: { type: string, nullable: true }
  required: [name]

CreateMigResponse:
  type: object
  properties:
    id: { type: string, description: "Mig ID (NanoID string)" }
    name: { type: string }
    spec_id: { type: string, nullable: true }
    created_by: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
  required: [id, name, created_at]

SetMigSpecRequest:
  type: object
  properties:
    name:
      type: string
      description: Optional human label for the spec.
    spec:
      type: object
      additionalProperties: true
      description: Migs spec JSON object.
    created_by: { type: string, nullable: true }
  required: [spec]

SetMigSpecResponse:
  type: object
  properties:
    id: { type: string, description: "Spec ID (NanoID string)" }
    created_at: { type: string, format: date-time }
  required: [id, created_at]

AddMigRepoRequest:
  type: object
  properties:
    repo_url:
      type: string
      description: "Repository URL. Allowed schemes: https://, ssh://, file://."
    base_ref: { type: string }
  required: [repo_url, base_ref]

MigRepo:
  type: object
  properties:
    id: { type: string, description: "Repo ID (NanoID string)" }
    mig_id: { type: string, description: "Mig ID (NanoID string)" }
    repo_url:
      type: string
      description: "Repository URL (normalized for matching)."
    base_ref: { type: string }
    created_at: { type: string, format: date-time }
  required: [id, mig_id, repo_url, base_ref, created_at]

ListMigReposResponse:
  type: object
  properties:
    repos:
      type: array
      items:
        $ref: "#/MigRepo"
  required: [repos]

BulkUpsertError:
  type: object
  properties:
    line: { type: integer, format: int32 }
    message: { type: string }
  required: [line, message]

BulkUpsertMigReposResponse:
  type: object
  properties:
    created: { type: integer, format: int32 }
    updated: { type: integer, format: int32 }
    failed: { type: integer, format: int32 }
    errors:
      type: array
      items:
        $ref: "#/BulkUpsertError"
  required: [created, updated, failed, errors]

RepoSelectorMode:
  type: string
  description: Repo selection mode for creating a mig run.
  enum: [all, failed, explicit]

MigRepoSelector:
  type: object
  properties:
    mode:
      $ref: "#/RepoSelectorMode"
    repos:
      type: array
      items:
        type: string
      description: Repo URLs for explicit selection (required when mode=explicit).
  required: [mode]

CreateMigRunRequest:
  type: object
  properties:
    repo_selector:
      $ref: "#/MigRepoSelector"
    created_by: { type: string, nullable: true }
  required: [repo_selector]

CreateMigRunResponse:
  type: object
  properties:
    wave_id: { type: string, description: "Wave ID (KSUID string)" }
    mig_id: { type: string, description: "Mig ID (NanoID string)" }
    spec_id: { type: string, description: "Spec ID (NanoID string)" }
    run_count:
      type: integer
      format: int32
      description: Number of runs created in the wave.
  required: [wave_id, mig_id, spec_id, run_count]

PullResolutionMode:
  type: string
  description: |
    Selection mode for resolving a mig run for pull.
    - last-succeeded: newest terminal Success (default)
    - last-failed: newest terminal Fail
  enum: [last-succeeded, last-failed]

RunPullResponse:
  type: object
  properties:
    run_id:
      type: string
      description: Run ID (KSUID string)
    repo_id:
      type: string
      description: Repo ID (NanoID 8-character string)
    repo_url:
      type: string
      description: Repository URL for this run.
    source_commit_sha:
      type: string
      description: Lowercase 40-hex source commit SHA for this run.
  required: [run_id, repo_id, repo_url, source_commit_sha]

MigPullRequest:
  type: object
  properties:
    repo_url:
      type: string
      description: Repository URL (normalized for matching).
    mode:
      $ref: "#/PullResolutionMode"
  required: [repo_url]

PullResolutionResponse:
  type: object
  properties:
    run_id:
      type: string
      description: Run ID (KSUID string)
    repo_id:
      type: string
      description: Repo ID (NanoID 8-character string)
  required: [run_id, repo_id]

MigListItem:
  type: object
  properties:
    id: { type: string, description: "Mig ID (NanoID string)" }
    name: { type: string }
    spec_id: { type: string, nullable: true }
    created_by: { type: string, nullable: true }
    archived: { type: boolean }
    created_at: { type: string, format: date-time }
  required: [id, name, archived, created_at]

ListMigsResponse:
  type: object
  properties:
    migs:
      type: array
      items:
        $ref: "#/MigListItem"
  required: [migs]

MigArchiveResponse:
  type: object
  properties:
    id: { type: string }
    name: { type: string }
    archived: { type: boolean }
  required: [id, name, archived]

# MigsRunSummary — Canonical Migs run status schema
#
# This is the single authoritative response type for:
# - GET /v1/runs/{run_id}/status (status) → 200 response body
# - server-side run lifecycle events published internally
#
# Wire contract guarantees:
# - No wrapper types — RunSummary is returned directly as the JSON root.
# - Field names are stable and match internal/migs/api/types.go exactly.
# - All IDs use KSUID format (27 characters, lexicographically sortable).
#
# See docs/migs-lifecycle.md § 2.1 for the complete data model reference.
MigsRunSummary:
  type: object
  description: |
    Canonical Migs run status schema. This is the single response type for run
    status queries (GET /v1/runs/{run_id}/status) and SSE `event: run` payloads. No
    wrapper types are used — the JSON shape is RunSummary directly.
  properties:
    run_id:
      type: string
      description: |
        Unique run identifier (KSUID string, 27 characters). KSUIDs are
        lexicographically sortable by creation time.
      example: "2NQPoBfVkc8dFmGAQqJnUwMu9jR"
    state:
      type: string
      description: |
        Run lifecycle state. Terminal states are `succeeded`, `failed`, and `cancelled`.
      enum: [pending, running, succeeded, failed, cancelling, cancelled]
    submitter:
      type: string
      description: Optional submitter identifier (e.g., user email or CI system).
      nullable: true
    repository:
      type: string
      description: Git repository URL (https, ssh, or file scheme).
      example: "https://github.com/org/repo.git"
    metadata:
      description: |
        Additional run metadata as string key-value pairs. Contains derived
        failure/cancellation context and diagnostics:
        - `repo_base_ref`: Base Git ref used for this run (e.g., "main").
        - `gate_summary`: Build Gate health summary from run stats.
        - `orw_error_kind`: ORW runtime failure kind from `/out/report.json` when ORW fails.
        - `orw_reason`: ORW deterministic failure reason (for example `type-attribution-unavailable`).
        - `node_id`: ID of the node that claimed/executed the run.
        - `reason`: Terminal failure/cancellation reason when available.
        - `resume_count`, `last_resumed_at`: Resume history when present.
      type: object
      additionalProperties:
        type: string
    created_at:
      type: string
      format: date-time
      description: Run creation timestamp (RFC 3339).
    updated_at:
      type: string
      format: date-time
      description: Timestamp of the latest status update (RFC 3339).
    stages:
      description: |
        Map of job execution states keyed by job ID. Each key is a KSUID string
        (`jobs.id` from the database) and each value is a StageStatus object
        describing that job's execution state, artifacts, and ordering.

        **Key semantics**: Keys are job IDs (KSUID strings), not job names.
        Use `next_id` within each StageStatus to follow successor links.

        **Typical entries**: `pre-gate`, `mig-0`, and `post-gate` jobs.
      type: object
      additionalProperties:
        $ref: "#/StageStatus"
  required: [run_id, state, repository, created_at, updated_at, stages]

# StageStatus — Job execution state within a RunSummary.stages map
#
# Each StageStatus corresponds to a row in the `jobs` table. The parent map
# key is the job ID (KSUID string); use next_id links for ordering.
StageStatus:
  type: object
  description: |
    Job execution state within a RunSummary. Each StageStatus maps to a row
    in the `jobs` table, identified by its job ID (the parent map key).
  properties:
    state:
      type: string
      description: |
        Job lifecycle state. Terminal states are `succeeded`, `failed`, and `cancelled`.
      enum: [pending, queued, running, succeeded, failed, cancelling, cancelled]
    attempts:
      type: integer
      format: int32
      description: Number of execution attempts for this job.
    max_attempts:
      type: integer
      format: int32
      description: Maximum allowed attempts before marking the job as failed.
    current_job_id:
      type: string
      nullable: true
      description: |
        Execution job ID (KSUID string). For most jobs, this equals the map key.
        May differ in retry scenarios where a new job is created for retries.
    artifacts:
      type: object
      additionalProperties:
        type: string
      description: |
        Map of artifact logical names to bundle CIDs. Example entries:
        - `"output"`: CID of the primary output bundle.
        - `"logs"`: CID of captured execution logs.
    last_error:
      type: string
      nullable: true
      description: Human-readable error message from the most recent failed attempt.
    next_id:
      type: string
      nullable: true
      description: |
        Successor job ID from `jobs.next_id` (KSUID string). `null` marks the
        current tail in the chain.
  required: [state]

# Build Gate HTTP schemas removed: gate runs as jobs in the Migs pipeline.
# Nodes claim gate work via the unified /v1/nodes/{id}/claim endpoint.
# The buildgate_jobs table and related HTTP endpoints have been removed;
# all gate execution now uses the jobs table with job_type
# in 'pre_gate'|'post_gate'.

# Response returned by POST /v1/nodes/{id}/claim
# Schema aligned with claimJobHandler response — exposes job-centric fields.
# Note: id (run_id) and job_id are now KSUID-backed strings (27 characters).
NodeClaimResponse:
  type: object
  properties:
    id:
      type: string
      description: Run ID (parent run of the claimed job, KSUID string)
    repo_id:
      type: string
      description: Repo ID (repos.id, NanoID string)
    attempt:
      type: integer
      format: int32
      description: Attempt number for this repo within the run (starts at 1).
    job_id:
      type: string
      description: Claimed job ID (KSUID string)
    job_name:
      type: string
      description: Logical job name (e.g., "pre-gate", "mig-0", "post-gate")
    job_type:
      type: string
      description: Job phase (`pre_gate`, `mig`, `post_gate`)
    job_image:
      type: string
      description: Container image for this job (may be empty for non-container jobs)
    repo_url:
      type: string
      description: "Repository URL. Allowed schemes: https://, ssh://, file://."
    status:
      type: string
      description: "Run status. Values: Started, Finished, Cancelled."
    node_id:
      { type: string, description: "Unique URL-safe node ID" }
    base_ref: { type: string }
    next_id:
      type: string
      nullable: true
      description: Successor job ID from `jobs.next_id`; `null` for chain tail jobs
    started_at: { type: string, format: date-time }
    created_at: { type: string, format: date-time }
    spec:
      description: |
        Opaque run specification JSON merged by the server at claim time.
        Includes `job_id` and server-owned execution context.
        If the persisted spec in the DB is invalid or non-object, the server returns 500.
      type: object
      additionalProperties: true
  required:
    - id
    - repo_id
    - attempt
    - job_id
    - job_name
    - repo_url
    - status
    - node_id
    - base_ref
    - next_id
    - started_at
    - created_at

Event:
  type: object
  # Note: run_id and job_id are now KSUID-backed strings (27 characters).
  properties:
    id: { type: integer, format: int64 }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id:
      { type: string, nullable: true, description: "Job ID (KSUID string)" }
    time: { type: string, format: date-time }
    level: { type: string }
    message: { type: string }
    meta: {}
  required: [id, run_id, time, level, message]

Stage:
  type: object
  # Note: id (job_id) and run_id are now KSUID-backed strings (27 characters).
  properties:
    id: { type: string, description: "Job ID (KSUID string)" }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    name: { type: string }
    status: { type: string }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
    duration_ms: { type: integer, format: int64 }
    meta: {}
  required: [id, run_id, name, status, duration_ms]

RunTiming:
  type: object
  # Note: id (run_id) is now a KSUID-backed string (27 characters).
  properties:
    id: { type: string, description: "Run ID (KSUID string)" }
    queue_ms: { type: integer, format: int64 }
    run_ms: { type: integer, format: int64 }
  required: [id, queue_ms, run_ms]

ListRunsTimingsResponse:
  type: object
  properties:
    timings:
      type: array
      items:
        $ref: "#/RunTiming"
  required: [timings]

Diff:
  type: object
  # Note: id (diffs.id is still UUID), but run_id and job_id are KSUID strings.
  properties:
    id: { type: string, format: uuid, description: "Diff ID (still UUID)" }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id:
      { type: string, nullable: true, description: "Job ID (KSUID string)" }
    patch:
      type: string
      description: Gzipped unified diff (≤10 MiB gzipped), base64-encoded.
      contentEncoding: base64
    summary: {}
    created_at: { type: string, format: date-time }
  required: [id, run_id, patch, created_at]

CreateDiffRequest:
  type: object
  # Note: job_id is now a KSUID-backed string (27 characters).
  properties:
    job_id:
      { type: string, nullable: true, description: "Job ID (KSUID string)" }
    patch:
      type: string
      description: Gzipped unified diff (≤10 MiB gzipped), base64-encoded.
      contentEncoding: base64
    summary: {}
  required: [patch]

# DiffItem represents a single diff in a list response.
# Used by GET /v1/runs/{run_id}/diffs.
DiffItem:
  type: object
  properties:
    id: { type: string, format: uuid, description: "Diff ID (UUID)" }
    job_id: { type: string, description: "Job ID (KSUID string)" }
    created_at: { type: string, format: date-time }
    gzipped_size:
      {
        type: integer,
        format: int32,
        description: "Size of gzipped patch in bytes",
      }
    summary:
      type: object
      additionalProperties: true
      description: |
        Diff summary metadata. Known fields:
        - exit_code (int): container exit code
        - files_changed (int): number of changed files
        - lines_added (int): total inserted lines in the patch
        - lines_removed (int): total deleted lines in the patch
        - job_type (string): "mig"
        - timings (object): hydration/execution/diff/total duration in ms
  required: [id, job_id, created_at, gzipped_size]

# DiffListResponse is the response for listing diffs.
# Used by GET /v1/runs/{run_id}/diffs.
DiffListResponse:
  type: object
  properties:
    diffs:
      type: array
      items:
        $ref: "#/DiffItem"
  required: [diffs]

Log:
  type: object
  # Note: run_id and job_id are now KSUID-backed strings (27 characters).
  properties:
    id: { type: integer, format: int64 }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id:
      { type: string, nullable: true, description: "Job ID (KSUID string)" }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped framed log chunk (JSON-per-line frames with stream+line; ≤10 MiB gzipped), base64-encoded.
      contentEncoding: base64
    created_at: { type: string, format: date-time }
  required: [id, run_id, chunk_no, data, created_at]

# Minimal acknowledgement returned by POST /v1/nodes/{id}/logs
# when a log chunk is stored. This mirrors the server's typed DTO
# `nodeLogCreateResponse`.
NodeCreateLogResponse:
  type: object
  properties:
    id: { type: integer, format: int64 }
    chunk_no: { type: integer, format: int32 }
  required: [id, chunk_no]

CreateLogRequest:
  type: object
  # Note: job_id is now a KSUID-backed string (27 characters).
  properties:
    job_id:
      { type: string, nullable: true, description: "Job ID (KSUID string)" }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped framed log chunk (JSON-per-line frames with stream+line; ≤10 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [chunk_no, data]

# Request used by node → server log ingestion.
NodeCreateLogRequest:
  type: object
  # Note: run_id and job_id are now KSUID-backed strings (27 characters).
  properties:
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id:
      { type: string, nullable: true, description: "Job ID (KSUID string)" }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped framed log chunk (JSON-per-line frames with stream+line; ≤10 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [run_id, chunk_no, data]

NodeDiagnostic:
  type: object
  properties:
    node_id: { type: string }
    component: { type: string, enum: [node] }
    status: { type: string }
    last_error: { type: string, nullable: true }
    version: { type: string, nullable: true }
    image_ref: { type: string, nullable: true }
    local_image_id: { type: string, nullable: true }
    remote_image_id: { type: string, nullable: true }
    details: { type: object, additionalProperties: true }
    last_checked_at: { type: string, format: date-time, nullable: true }
    last_success_at: { type: string, format: date-time, nullable: true }
    updated_at: { type: string, format: date-time }
  required: [node_id, component, status, details, updated_at]

UpsertNodeDiagnosticRequest:
  type: object
  additionalProperties: false
  properties:
    component: { type: string, enum: [node] }
    status: { type: string }
    last_error: { type: string, nullable: true }
    version: { type: string, nullable: true }
    image_ref: { type: string, nullable: true }
    local_image_id: { type: string, nullable: true }
    remote_image_id: { type: string, nullable: true }
    details: { type: object, additionalProperties: true }
    last_checked_at: { type: string, format: date-time, nullable: true }
    last_success_at: { type: string, format: date-time, nullable: true }
  required: [component, status]

NodeDaemonLog:
  type: object
  properties:
    id: { type: integer, format: int64 }
    node_id: { type: string }
    component: { type: string, enum: [node] }
    stream: { type: string, enum: [stdout, stderr, system] }
    message: { type: string }
    created_at: { type: string, format: date-time }
  required: [id, node_id, component, stream, message]

CreateNodeDaemonLogsRequest:
  type: object
  additionalProperties: false
  properties:
    component: { type: string, enum: [node] }
    stream: { type: string, enum: [stdout, stderr, system] }
    lines:
      type: array
      items: { type: string }
      minItems: 1
      maxItems: 200
  required: [component, stream, lines]

CreateNodeDaemonLogsResponse:
  type: object
  properties:
    count: { type: integer }
  required: [count]

ArtifactBundle:
  type: object
  # Note: artifact_bundles.id is still UUID, but run_id and job_id are KSUID strings.
  properties:
    id:
      {
        type: string,
        format: uuid,
        description: "Artifact bundle ID (still UUID)",
      }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id:
      { type: string, nullable: true, description: "Job ID (KSUID string)" }
    name: { type: string, nullable: true }
    bundle:
      type: string
      description: Gzipped tar archive (≤10 MiB gzipped), base64-encoded.
      contentEncoding: base64
    created_at: { type: string, format: date-time }
  required: [id, run_id, bundle, created_at]

CreateArtifactBundleRequest:
  type: object
  # Note: job_id is now a KSUID-backed string (27 characters).
  properties:
    job_id:
      { type: string, nullable: true, description: "Job ID (KSUID string)" }
    name: { type: string, nullable: true }
    bundle:
      type: string
      description: Gzipped tar archive (≤10 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [bundle]

# Node describes a registered worker node.
# Note: node IDs are unique URL-safe strings.
Node:
  type: object
  properties:
    id: { type: string, description: "Unique URL-safe node ID" }
    name: { type: string }
    ip_address: { type: string }
    version: { type: string, nullable: true }
    concurrency: { type: integer, format: int32 }
    cpu_total_millis: { type: integer, format: int32 }
    cpu_free_millis: { type: integer, format: int32 }
    mem_total_bytes: { type: integer, format: int64 }
    mem_free_bytes: { type: integer, format: int64 }
    disk_total_bytes: { type: integer, format: int64 }
    disk_free_bytes: { type: integer, format: int64 }
    cert_serial: { type: string, nullable: true }
    cert_fingerprint: { type: string, nullable: true }
    cert_not_before: { type: string, format: date-time, nullable: true }
    cert_not_after: { type: string, format: date-time, nullable: true }
    last_heartbeat: { type: string, format: date-time, nullable: true }
    drained: { type: boolean }
    created_at: { type: string, format: date-time }
  required:
    - id
    - name
    - ip_address
    - concurrency
    - cpu_total_millis
    - cpu_free_millis
    - mem_total_bytes
    - mem_free_bytes
    - disk_total_bytes
    - disk_free_bytes
    - drained
    - created_at

WorkflowGraphNode:
  type: object
  # Note: job IDs (id, parent_ids, child_ids) are now KSUID-backed strings.
  properties:
    id:
      type: string
      description: Job ID (KSUID string)
    name:
      type: string
      description: Logical job name (e.g., "pre-gate", "mig-0", "post-gate")
    type:
      type: string
      description: Job phase type derived from jobs.job_type
      enum: [pre_gate, mig, post_gate]
    next_id:
      type: string
      nullable: true
      description: Successor job ID derived from jobs.next_id
    status:
      type: string
      description: Job execution status (matches jobs.status)
      enum: [Created, Queued, Running, Success, Fail, Error, Cancelled]
    attempt:
      type: integer
      format: int32
      description: Retry attempt number (1 for current implementation)
    parent_ids:
      type: array
      description: IDs of predecessor jobs derived from next_id chain links
      items:
        type: string
        description: Job ID (KSUID string)
    child_ids:
      type: array
      description: IDs of successor jobs derived from next_id chain links
      items:
        type: string
        description: Job ID (KSUID string)
    image:
      type: string
      nullable: true
      description: Container image used for this job, when available
    started_at:
      type: string
      format: date-time
      nullable: true
    finished_at:
      type: string
      format: date-time
      nullable: true
    duration_ms:
      type: integer
      format: int64
      description: Job duration in milliseconds
    exit_code:
      type: integer
      format: int32
      nullable: true
      description: Exit code for the job, when available
  required: [id, name, type, status, attempt]

WorkflowGraph:
  type: object
  # Note: run_id and job IDs (root_ids, leaf_ids) are now KSUID-backed strings.
  properties:
    run_id:
      type: string
      description: Run identifier (KSUID string)
    nodes:
      type: object
      description: Map of job IDs to graph nodes
      additionalProperties:
        $ref: "#/WorkflowGraphNode"
    root_ids:
      type: array
      description: IDs of entry-point nodes (jobs with no parents)
      items:
        type: string
        description: Job ID (KSUID string)
    leaf_ids:
      type: array
      description: IDs of terminal nodes (jobs with no children)
      items:
        type: string
        description: Job ID (KSUID string)
    linear:
      type: boolean
      description: True when graph is a simple linear chain
  required: [run_id, nodes, root_ids, leaf_ids, linear]

# -------------------------------------------------------------------------
# Repo-centric API types — list repos and show runs for a given repo
# -------------------------------------------------------------------------

RepoSummary:
  type: object
  description: |
    Repository summary returned by GET /v1/repos. Includes the repo URL
    along with metadata from the most recent run (if any).
  properties:
    repo_id:
      type: string
      description: Repository identifier (repos.id, NanoID string)
    repo_url:
      type: string
      description: Git repository URL (https, ssh, or file scheme)
    last_run_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the most recent run started (if any)
    last_status:
      type: string
      nullable: true
      description: Status of the most recent per-run (Queued, Running, Success, Fail, Cancelled)
  required:
    - repo_id
    - repo_url

RepoRunSummary:
  type: object
  description: |
    Run summary for a specific repository, returned by GET /v1/repos/{repo_id}/runs.
    Includes the run status for that repository execution.
    Note: run_id is now a KSUID-backed string (27 characters).
  properties:
    run_id:
      type: string
      description: Unique run identifier (KSUID string)
    mig_id:
      type: string
      description: Mig (project) identifier for the run
    run_status:
      type: string
      description: Run status (Queued, Running, Success, Fail, Cancelled)
    base_ref:
      type: string
      description: Git base ref for the run
    attempt:
      type: integer
      format: int32
      description: Retry attempt number for this run
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution started
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution completed
  required:
    - run_id
    - mig_id
    - run_status
    - base_ref
    - attempt

# -------------------------------------------------------------------------
# Run-scoped job listing — GET /v1/runs/{run_id}/jobs
# -------------------------------------------------------------------------

RunJobItem:
  type: object
  description: |
    Job entry for a run within a run.
    Used by the --follow job graph display in CLI.
  properties:
    job_id:
      type: string
      description: Job identifier (KSUID string)
    name:
      type: string
      description: Job name (e.g., "mig-0", "pre-gate", "post-gate")
    job_type:
      type: string
      description: Job phase type (pre_gate, mig, post_gate)
    job_image:
      type: string
      description: Container image used for this job (may be empty)
    repo_sha_in:
      type: string
      description: Deterministic repository SHA before this job executes (lowercase 40-hex when present)
    repo_sha_out:
      type: string
      description: Deterministic repository SHA after this job executes (lowercase 40-hex when present)
    next_id:
      type: string
      nullable: true
      description: Successor job ID from `jobs.next_id`; null for chain tail jobs
    node_id:
      type: string
      nullable: true
      description: Unique URL-safe node ID that claimed/executed this job
    status:
      type: string
      description: Job status (Created, Queued, Running, Success, Fail, Error, Cancelled)
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when job execution started
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when job completed
    duration_ms:
      type: integer
      format: int64
      description: Job duration in milliseconds (0 if not finished)
    exit_code:
      type: integer
      format: int32
      nullable: true
      description: Container exit code when job has finished (omitted when not yet set)
    display_name:
      type: string
      nullable: true
      description: User-friendly step name from spec (for mig jobs)
    bug_summary:
      type: string
      nullable: true
      description: One-line build failure description captured from gate metadata (gate jobs only)
    lang:
      type: string
      nullable: true
      description: Detected programming language from gate stack detection (gate jobs only)
    version:
      type: string
      nullable: true
      description: Detected language version/release from gate stack detection (gate jobs only)
    tooling:
      type: string
      nullable: true
      description: Detected build tool from gate stack detection (gate jobs only)
  required:
    - job_id
    - name
    - job_type
    - job_image
    - next_id
    - status
    - duration_ms

ListRunJobsResponse:
  type: object
  description: |
    Response from GET /v1/runs/{run_id}/jobs.
    Lists all jobs for a specific run within a run.
  properties:
    run_id:
      type: string
      description: Run identifier (KSUID string)
    repo_id:
      type: string
      description: Repository identifier (NanoID string)
    attempt:
      type: integer
      format: int32
      description: Attempt number for this run
    jobs:
      type: array
      items:
        $ref: "#/RunJobItem"
      description: Jobs for this run (chain order represented by next_id links)
  required:
    - run_id
    - repo_id
    - attempt
    - jobs

RunSBOMPackage:
  type: object
  properties:
    package:
      type: string
    version:
      type: string
  required: [package, version]

JobSBOMUploadRequest:
  type: object
  properties:
    packages:
      type: array
      items:
        $ref: "#/RunSBOMPackage"
  required: [packages]

JobSBOMUploadResponse:
  type: object
  properties:
    job_id:
      type: string
    row_count:
      type: integer
      minimum: 0
  required: [job_id, row_count]

RunSBOMPackagesResponse:
  type: object
  properties:
    run_id:
      type: string
    view:
      type: string
      enum: [pre, post]
    packages:
      type: array
      items:
        $ref: "#/RunSBOMPackage"
  required: [run_id, view, packages]

RunSBOMDiffPackage:
  type: object
  properties:
    package:
      type: string
    version_pre:
      type: string
    version_post:
      type: string
    change:
      type: string
      enum: [added, removed, changed]
  required: [package, version_pre, version_post, change]

RunSBOMDiffResponse:
  type: object
  properties:
    run_id:
      type: string
    view:
      type: string
      const: diff
    packages:
      type: array
      items:
        $ref: "#/RunSBOMDiffPackage"
  required: [run_id, view, packages]

NamedSpecSource:
  type: object
  additionalProperties: false
  properties:
    domain:
      type: string
      minLength: 1
      description: Source host/domain, without credentials.
    repo:
      type: string
      minLength: 1
      description: Repository path under the domain, without a trailing .git.
  required: [domain, repo]

PublishNamedSpecRequest:
  type: object
  additionalProperties: false
  properties:
    name:
      type: string
      pattern: "^[0-9a-z._-]+$"
    description:
      type: string
    source:
      $ref: "#/NamedSpecSource"
    sha:
      type: string
      pattern: "^[0-9a-f]{40}$"
    source_committed_at:
      type: string
      format: date-time
    spec:
      type: object
      additionalProperties: true
      description: Prepared mig spec JSON. Must parse as apiVersion ploy.mig/v1alpha1 and have root name matching the request name.
    created_by:
      type: string
  required: [name, source, sha, source_committed_at, spec]

NamedSpecSummary:
  type: object
  additionalProperties: false
  properties:
    id:
      type: string
    name:
      type: string
    description:
      type: string
    source:
      $ref: "#/NamedSpecSource"
    sha:
      type: string
      pattern: "^[0-9a-f]{40}$"
    source_committed_at:
      type: string
      format: date-time
    created_at:
      type: string
      format: date-time
    skipped:
      type: boolean
      description: True when publish returned an existing idempotent row.
  required: [id, name, description, source, sha, source_committed_at, created_at, skipped]

NamedSpecListResponse:
  type: object
  additionalProperties: false
  properties:
    specs:
      type: array
      items:
        $ref: "#/NamedSpecSummary"
  required: [specs]

NamedSpecResolveResponse:
  allOf:
    - $ref: "#/NamedSpecSummary"
    - type: object
      additionalProperties: false
      properties:
        spec:
          type: object
          additionalProperties: true
      required: [spec]
