---
# Global configuration for Ploy dev environment

# Go version for building Ploy
go_version: "1.23.0"  # Latest stable Go
go_arch: "amd64"

# Docker configuration
docker_compose_version: "2.29.2"  # Latest stable Docker Compose

# Node.js configuration for WASM development
nodejs_version: "20"  # LTS version for stability

# Nomad/Consul versions
nomad_version: "1.10.4"  # Latest stable Nomad available
consul_version: "1.20.2"  # Compatible Consul version
vault_version: "1.18.3"  # Compatible Vault version

# Traefik version
traefik_version: "3.5.0"

# Node class for gateway/edge nodes where Traefik should run
ploy_gateway_node_class: "gateway"

# Nomad client meta key/value used to place Traefik (constraint uses ${meta.<key>})
ploy_gateway_node_meta_key: "role"

# Traefik admin/dashboard port (entrypoint "admin")
traefik_admin_port: 8090

# Certificate contact emails (used by Traefik ACME); override via env if needed
ploy_platform_cert_email: "{{ lookup('env', 'PLOY_PLATFORM_CERT_EMAIL') | default('admin@ployman.app') }}"
ploy_apps_cert_email: "{{ lookup('env', 'PLOY_APPS_CERT_EMAIL') | default('admin@ployd.app') }}"

# DNS provider credentials (prefer Vault-injected in production)
# For Namecheap provider used in dev by default; leave blank or populate via env overrides for local testing.
vault_namecheap_api_user: ""
vault_namecheap_api_key: ""
vault_namecheap_username: ""
# If your Namecheap account requires API IP whitelist, set to VPS public IP
vault_namecheap_client_ip: "{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}"
vault_namecheap_sandbox: false

# Node Exporter version
node_exporter_version: "1.7.0"

# FreeBSD VM configuration
freebsd_vm:
  name: "freebsd-dev"
  cpus: 2
  memory: 4096
  disk_size: "20G"
  network_interface: "em0"
  ip: "192.168.100.10"
  netmask: "255.255.255.0"
  gateway: "192.168.100.1"

# Testing tools
testing_tools:
  - curl
  - jq
  - git
  - make
  - wget
  - unzip

# Environment configuration
ploy_environment: "dev"  # Enables development environment features including wildcard certificates

# Ploy specific configuration
ploy:
  storage_backend: "seaweedfs"
  dns:
    provider: "namecheap"  # Use namecheap for dev environment
    domain: "ployd.app" 
    target_ip: "{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}"
    ttl: 300
    enable_ipv6: false
  
  # User apps domain configuration (iac/dev enforces dev subdomain)
  apps_domain: "dev.ployd.app"
  apps_domain_provider: "{{ lookup('env', 'PLOY_APPS_DOMAIN_PROVIDER') }}"
  
  # Platform services domain configuration
  platform_domain: "{{ lookup('env', 'PLOY_PLATFORM_DOMAIN') }}"
  platform_domain_provider: "{{ lookup('env', 'PLOY_PLATFORM_DOMAIN_PROVIDER') }}"
  
  # API accessible at api.{platform_domain}
  api_subdomain: "api"

# Nomad api deployment configuration
nomad_api:
  replicas: 2
  resources:
    cpu: 500    # MHz
    memory: 512 # MB

# Build tools for different lanes
build_tools:
  kraft: 
    version: "0.11.6"  # Latest stable KraftKit
  capstan:
    version: "1.0.0"
  cosign:
    version: "2.4.0"   # Latest stable Cosign
  syft:
    version: "1.3.0"  # Latest stable Syft
  grype:
    version: "0.84.0"  # Latest stable Grype
  opa:
    version: "0.69.0"  # Latest stable OPA

# SeaweedFS configuration
seaweedfs:
  version: "3.96"
  master_port: 9333
  volume_port: 8080
  filer_port: 8888
  
  # Use Consul service discovery for multi-node deployments
  use_consul_discovery: true
  
  # Service endpoints - master/volume via localhost (systemd), filer via consul DNS (nomad)
  master_endpoint: "localhost:9333"
  filer_endpoint: "seaweedfs-filer.service.consul:8888"
  
  # Collection configuration for different artifact types (dev environment)
  collections:
    artifacts:
      name: "artifacts"
      replication: "000"  # No replication for development environment
    metadata:
      name: "ploy-metadata"
      replication: "000"  # No replication for development environment
    debug:
      name: "ploy-debug"
      replication: "000"  # No replication for ephemeral debug artifacts

# External storage configuration for api
storage_config:
  seaweedfs:
    master: "localhost:9333"
    filer: "seaweedfs-filer.service.consul:8888"
    collection: "artifacts"
    replication: "000"
    timeout: 30
    datacenter: ""
    rack: ""
    collections:
      artifacts: "artifacts"
      metadata: "ploy-metadata"
      debug: "ploy-debug"
  
  client:
    retry_config:
      max_retries: 3
      initial_delay: "1s"
      max_delay: "30s"
      multiplier: 2.0
    health_check_config:
      interval: "30s"
      timeout: "10s"
      failure_threshold: 3
    enable_metrics: true
    enable_health_check: true
    max_operation_time: "5m"

# SeaweedFS collection configuration for single-node setup
seaweedfs_single_node:
  # Use replication 000 for single node setups
  replication: "000"
  # Number of volumes to create per collection
  volumes_per_collection:
    artifacts: 2
    metadata: 1
    debug: 1
