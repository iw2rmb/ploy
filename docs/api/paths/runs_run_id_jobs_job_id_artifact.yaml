parameters:
  - in: path
    name: run_id
    required: true
    # Run IDs are KSUID strings (27 characters, lexicographically sortable).
    schema: { type: string }
    description: Run ID (KSUID string)
  - in: path
    name: job_id
    required: true
    # Job IDs are KSUID strings (27 characters, lexicographically sortable).
    schema: { type: string }
    description: Job ID (KSUID string)
  - in: header
    name: PLOY_NODE_UUID
    required: true
    schema: { type: string }
    description: Worker node ID (NanoID 6-character string) uploading the artifact bundle
post:
  tags: [Artifacts]
  summary: Upload gzipped artifact bundle for a job (node → server)
  description: |
    Nodes upload a gzipped tar archive for a specific job of a run. The server stores
    the bundle in PostgreSQL under the `artifact_bundles` table. The decoded bundle
    bytes are limited to ≤ 10 MiB. The request body allows up to 16 MiB to accommodate
    base64 overhead.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [bundle]
          properties:
            name:
              type: string
              nullable: true
              description: Optional logical name for the artifact bundle
            bundle:
              type: string
              description: Gzipped tar archive (≤10 MiB gzipped), base64-encoded.
              contentEncoding: base64
        examples:
          minimal_artifact:
            summary: Minimal artifact bundle upload
            description: |
              Basic artifact upload with gzipped tar archive (base64-encoded).
              The bundle field contains the compressed tar limited to 10 MiB.
            value:
              bundle: "H4sIAAAAAAAA/+3OMQ0AAAjAMPybhWt/Qi8FU0sNAAAAAAAAAAAAAAAAALpbAAAA//8DAOkOgRgAKAAA"
          named_artifact:
            summary: Named artifact bundle
            description: |
              Example including optional name for artifact tracking. Name can be
              used to identify the artifact type (e.g., "dist", "coverage").
            value:
              name: "dist"
              bundle: "H4sIAAAAAAAA/+3OMQ0AAAjAMPybhWt/Qi8FU0sNAAAAAAAAAAAAAAAAALpbAAAA//8DAOkOgRgAKAAA"
          size_limit:
            summary: Maximum size boundary
            description: |
              The decoded gzipped bundle is capped at 10 MiB (10485760 bytes).
              The JSON body limit is 16 MiB to accommodate base64 encoding overhead (~33%).
              Server returns 413 if decoded bundle exceeds 10 MiB or body exceeds 16 MiB.
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            type: object
            properties:
              artifact_bundle_id:
                type: string
                format: uuid
                description: Identifier of the stored artifact bundle
    '400':
      description: Bad Request (missing or empty IDs, missing fields, or job/run mismatch)
    '404':
      description: Run or Job not found
    '413':
      description: Payload Too Large (decoded bundle > 10 MiB or body over limit)
    '500':
      description: Internal server error
