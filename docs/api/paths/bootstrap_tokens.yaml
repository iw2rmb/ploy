post:
  tags: [Security]
  summary: Create bootstrap token
  description: |
    Creates a short-lived bootstrap token for node provisioning.
    Requires `control-plane` or `cli-admin` role.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            node_id:
              type: string
              description: Node ID (NanoID string).
            expires_in_minutes:
              type: integer
              description: Optional expiration in minutes (default 15).
          required: [node_id]
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              token: { type: string }
              node_id: { type: string }
              expires_at: { type: string, format: date-time }
            required: [token, node_id, expires_at]
    '400':
      description: Bad request
    '401':
      description: Unauthorized
    '403':
      description: Forbidden (requires control-plane or cli-admin role)
    '500':
      description: Server error
