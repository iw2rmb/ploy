get:
  tags: [Config]
  summary: List global environment variables
  description: |
    Returns all global environment variable entries known to the control plane.
    Each item includes the key, scope, and secret flag. For entries marked as
    secret, the value field is omitted from the response to avoid leaking
    sensitive data.
    Requires mTLS with cli-admin role.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                key:
                  type: string
                  description: Environment variable key.
                value:
                  type: string
                  description: >
                    Environment variable value. Present only for non-secret entries;
                    omitted for secrets.
                scope:
                  type: string
                  description: >
                    Scope that controls which jobs see this variable.
                    One of: all, mods, heal, gate.
                  enum: [all, mods, heal, gate]
                secret:
                  type: boolean
                  description: >
                    Whether this variable should be treated as secret. Secret entries
                    are redacted in list responses.
              required:
                - key
                - scope
                - secret
    '401':
      description: Unauthorized (missing or invalid mTLS client certificate)
    '403':
      description: Forbidden (requires cli-admin role)
    '500':
      description: Server error

