spec_version: '0.6'
name: minimal-go
unikraft:
  version: stable
targets:
  - architecture: x86_64
    platform: qemu
libraries:
  - name: uklibc
  - name: lwip
    version: stable
    kconfig:
      - "CONFIG_LWIP_APP_HTTPD=y"
application:
  sources: ./
  kconfig:
    - "CONFIG_LIBUKLIBPARAM=y"
options:
  http_port: 8080
