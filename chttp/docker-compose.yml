# Docker Compose configuration for CHTTP services development
version: '3.8'

services:
  pylint-chttp:
    build:
      context: .
      dockerfile: Dockerfile.pylint
    image: ploy/pylint-chttp:latest
    container_name: pylint-chttp-dev
    ports:
      - "8080:8080"
    environment:
      - CHTTP_CONFIG_PATH=/etc/chttp/config.yaml
      - CHTTP_SERVICE_NAME=pylint-chttp
      - CHTTP_LOG_LEVEL=debug
      - CHTTP_AUTH_DISABLED=true  # Development only
    volumes:
      # Mount config for development
      - ./configs/pylint-chttp-config.yaml:/etc/chttp/config.yaml:ro
      # Mount temp directory for analysis
      - /tmp/chttp-pylint:/tmp:rw
      # Mount source for development
      - .:/workspace:ro
    networks:
      - chttp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Security settings
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=1G,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

  # CHTTP Client for testing
  chttp-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: ploy/chttp-client:latest
    container_name: chttp-client-dev
    depends_on:
      - pylint-chttp
    environment:
      - CHTTP_SERVER_URL=http://pylint-chttp:8080
      - CHTTP_CLIENT_ID=dev-client
    volumes:
      # Mount test data
      - ./testdata:/testdata:ro
      # Mount client keys for authentication testing
      - ./keys:/keys:ro
    networks:
      - chttp-network
    profiles:
      - testing

  # Test data generator for development
  test-generator:
    image: python:3.11-alpine
    container_name: chttp-test-generator
    working_dir: /workspace
    volumes:
      - .:/workspace:rw
      - ./testdata:/testdata:rw
    networks:
      - chttp-network
    profiles:
      - testing
    command: |
      sh -c '
        echo "Generating test Python files with Pylint issues..."
        mkdir -p /testdata/python-samples
        cat > /testdata/python-samples/test_issues.py << EOF
      import os  # unused import
      import sys
      import json  # unused import
      
      def hello_world():
          # missing docstring
          print("Hello, World!")
          x = 42  # unused variable
          return "success"
      
      class TestClass:
          # missing docstring
          def __init__(self):
              self.name = "test"
              
          def process_data(self,data):  # missing space after comma
              return data.upper()
      
      if __name__ == "__main__":
          hello_world()
      EOF
        echo "Test files generated in /testdata/python-samples/"
        ls -la /testdata/python-samples/
      '

networks:
  chttp-network:
    driver: bridge
    name: chttp-dev-network

volumes:
  chttp-temp:
    driver: local