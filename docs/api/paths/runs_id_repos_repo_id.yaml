delete:
  tags: [Control]
  summary: Remove or cancel a repo within a batch run
  description: |
    Cancel a repository within a batch run. For repos in `Queued` or `Running`
    state, the handler transitions the repo status to `Cancelled` and cancels
    any `Created`/`Queued`/`Running` jobs for the current attempt. Terminal repos
    are left unchanged and the operation is idempotent.
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
      # Run IDs are KSUID strings (27 characters, lexicographically sortable).
      description: Run ID (KSUID string)
    - in: path
      name: repo_id
      required: true
      schema:
        type: string
      # Repo IDs are NanoID strings (8 characters, URL-safe alphabet).
      description: Repo ID (NanoID 8-character string)
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/RunRepo'
    '400':
      description: Bad request (missing or empty run id or repo id)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Run or repo not found, or repo does not belong to the run
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
