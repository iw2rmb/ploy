GitLabConfigResponse:
  type: object
  required: [config, revision]
  properties:
    config:
      $ref: '#/components/schemas/GitLabConfig'
    revision:
      type: integer
      format: int64
GitLabConfigWriteRequest:
  type: object
  required: [revision, config]
  properties:
    revision:
      type: integer
      format: int64
      minimum: 0
      description: Expected etcd revision for optimistic locking (0 when creating).
    config:
      $ref: '#/components/schemas/GitLabConfig'
GitLabConfig:
  type: object
  required: [api_base_url, allowed_projects, default_token, rbac]
  properties:
    api_base_url:
      type: string
      format: uri
    allowed_projects:
      type: array
      minItems: 1
      items:
        type: string
    default_token:
      $ref: '#/components/schemas/GitLabToken'
    deploy_tokens:
      type: array
      items:
        $ref: '#/components/schemas/GitLabToken'
    branch_policies:
      type: array
      items:
        $ref: '#/components/schemas/GitLabBranchPolicy'
    rbac:
      $ref: '#/components/schemas/GitLabRBAC'
GitLabToken:
  type: object
  required: [name, value, scopes]
  properties:
    name:
      type: string
    value:
      type: string
    scopes:
      type: array
      minItems: 1
      items:
        type: string
    expires_at:
      type: string
      format: date-time
      nullable: true
GitLabBranchPolicy:
  type: object
  required: [pattern]
  properties:
    pattern:
      type: string
    protected:
      type: boolean
    require_approvals:
      type: integer
      format: int32
GitLabRBAC:
  type: object
  required: [readers, updaters]
  properties:
    readers:
      type: array
      items:
        type: string
    updaters:
      type: array
      items:
        type: string
