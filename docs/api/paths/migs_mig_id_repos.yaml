get:
  tags: [Control]
  summary: List mig repos
  description: |
    List repos in a mig project's managed repo set.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/ListMigReposResponse'
    '400':
      description: Bad request (invalid mig id)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'

post:
  tags: [Control]
  summary: Add mig repo
  description: |
    Add a repo to a mig project's managed repo set.

    Refuses updates for archived migs.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/AddMigRepoRequest'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/MigRepo'
    '400':
      description: Bad request — missing or invalid fields in the request body.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '409':
      description: Conflict — mig is archived, or repo already exists for the mig.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
