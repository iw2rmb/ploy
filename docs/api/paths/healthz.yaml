get:
  tags: [Control]
  summary: Liveness probe
  description: |
    Reports that the control-plane HTTP process is alive. This endpoint does not
    check downstream dependencies.
  security: []
  responses:
    '200':
      description: Process is alive
      content:
        application/json:
          schema:
            $ref: "../components/schemas/controlplane.yaml#/ControlPlaneLivenessHealth"
