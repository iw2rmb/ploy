get:
  tags: [Control]
  summary: List jobs (TUI)
  description: |
    Return a paginated list of jobs with migration context for the TUI jobs-list screen.
    Each entry includes `job_id`, `name`, `status`, `duration_ms`, `job_image`,
    `node_id`, `mig_name`, `run_id`, and `repo_id`.

    Results are ordered newest-to-oldest by job ID (KSUID).
    An optional `run_id` filter scopes results to a single run (used for run-detail job totals).
    The `total` field reflects the total count for the applied filter, enabling pagination.
  parameters:
    - in: query
      name: limit
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
      description: Maximum number of jobs to return (default 50, max 100).
    - in: query
      name: offset
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
      description: Number of jobs to skip from the start of the result set.
    - in: query
      name: run_id
      required: false
      schema:
        type: string
      description: Optional run ID (KSUID) to filter jobs to a single run.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              jobs:
                type: array
                items:
                  type: object
                  properties:
                    job_id:
                      type: string
                      description: Job ID (KSUID string)
                    name:
                      type: string
                      description: Job name
                    status:
                      type: string
                      description: Job lifecycle status (`Created|Queued|Running|Success|Fail|Error|Cancelled`).
                    duration_ms:
                      type: integer
                      format: int64
                      description: Job duration in milliseconds (0 for non-terminal jobs without measured duration).
                    job_image:
                      type: string
                      description: Runtime container image for the job (empty when unavailable).
                    node_id:
                      type: string
                      nullable: true
                      description: Assigned worker node ID (null when unassigned).
                    mig_name:
                      type: string
                      description: Migration name associated with this job
                    run_id:
                      type: string
                      description: Run ID (KSUID string)
                    repo_id:
                      type: string
                      description: Repo ID (NanoID 8-character string)
                  required: [job_id, name, status, duration_ms, job_image, mig_name, run_id, repo_id]
              total:
                type: integer
                format: int64
                description: Total number of jobs matching the filter (for pagination).
            required: [jobs, total]
    '400':
      description: Bad request (invalid pagination or filter parameters)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
