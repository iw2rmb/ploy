# RunRepoStatus defines the per-repo execution state within a batch run.
# Tracks the lifecycle of individual repositories as they progress through
# the batch processing pipeline (pending → running → terminal).
RunRepoStatus:
  type: string
  description: |
    Per-repo execution status within a batch run.
    - pending: Repo is queued and waiting to start execution.
    - running: Repo execution is in progress (claimed by a node).
    - succeeded: Repo completed successfully with exit code 0.
    - failed: Repo execution failed (non-zero exit or error).
    - skipped: Repo was removed from batch before execution started.
    - cancelled: Repo was stopped while running (explicit user action).
  enum: [pending, running, succeeded, failed, skipped, cancelled]

# RunBatchDerivedStatus represents the batch-level aggregate status computed
# from the per-repo states in RunRepoCounts.DerivedStatus.
RunBatchDerivedStatus:
  type: string
  description: |
    Batch-level status derived from aggregated per-repo states.
    - pending: No repos have started (all pending or no repos).
    - running: At least one repo is currently running.
    - completed: All repos finished successfully (succeeded/skipped).
    - failed: At least one repo failed (and none running).
    - cancelled: Batch was stopped and repos were cancelled.
  enum: [pending, running, completed, failed, cancelled]

Repo:
  type: object
  # Note: This schema is used for API modeling; there is no dedicated `repos` table
  # in the database. The `id` field is an opaque string identifier assigned by the
  # caller or derived from the repo URL; no specific format (UUID, KSUID) is enforced.
  properties:
    id:
      type: string
      description: |
        Opaque repository identifier. No specific format enforced; treat as
        an opaque string (e.g., URL-derived hash or caller-assigned key).
    url: { type: string }
    branch: { type: string, nullable: true }
    commit_sha: { type: string, nullable: true }
    created_at: { type: string, format: date-time }
  required: [id, url, created_at]

CreateRepoRequest:
  type: object
  properties:
    url: { type: string }
    branch: { type: string, nullable: true }
    commit_sha: { type: string, nullable: true }
  required: [url]

Run:
  type: object
  # Note: The `reason` field was removed to prevent schema drift from the DB model.
  # Failure context is derived from `stats.exit_code` and `metadata`. The `stats`
  # field contains job/run metrics including exit codes; use it for failure analysis.
  # Note: run IDs are now KSUID-backed strings (27 characters); format: uuid removed.
  properties:
    id: { type: string, description: "Run ID (KSUID string)" }
    repo_url: { type: string }
    spec: {}
    created_by: { type: string, nullable: true }
    status: { type: string }
    created_at: { type: string, format: date-time }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
    node_id: { type: string, nullable: true, description: "Node ID (NanoID 6-character string)" }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    stats:
      description: |
        Job/run metrics JSON object. Contains exit_code for failure context,
        gate results, and other execution statistics. Replaces the deprecated
        `reason` field for failure analysis.
      type: object
      additionalProperties: true
      nullable: true
  required: [id, repo_url, status, created_at, base_ref, target_ref]

RunRepoCounts:
  type: object
  description: |
    Aggregated per-repo status counts for a batch run. Provides a summary of
    how many repos are in each lifecycle state (pending, running, terminal).
    The derived_status field computes a single batch-level status from these
    counts for easy display in CLI/UI surfaces.
  properties:
    total:
      type: integer
      format: int32
      description: Total number of repos in the batch.
    pending:
      type: integer
      format: int32
      description: Repos waiting to start execution.
    running:
      type: integer
      format: int32
      description: Repos currently executing.
    succeeded:
      type: integer
      format: int32
      description: Repos that completed successfully.
    failed:
      type: integer
      format: int32
      description: Repos that failed execution.
    skipped:
      type: integer
      format: int32
      description: Repos removed before execution started.
    cancelled:
      type: integer
      format: int32
      description: Repos stopped while running.
    derived_status:
      $ref: '#/RunBatchDerivedStatus'
      description: |
        Batch-level status computed from per-repo states. Precedence order:
        cancelled > running > failed > completed > pending.
  required: [total]

RunRepo:
  type: object
  description: |
    Repo entry within a batch run, backed by the `run_repos` table.
    Represents a single repository's execution state within the batch,
    tracking refs, status, attempt count, and timing information.
    Note: id is NanoID(8), run_id is KSUID (27 characters).
  properties:
    id:
      type: string
      description: |
        Unique repo entry ID within the batch (NanoID 8-character string).
        Generated via types.NewRunRepoID() using a URL-safe alphabet.
    run_id:
      type: string
      description: Parent batch run ID (KSUID string).
    repo_url:
      type: string
      description: Git repository URL (https, ssh, or file scheme).
    base_ref:
      type: string
      description: Git ref used as the base for comparisons (e.g., main, master).
    target_ref:
      type: string
      description: Git ref representing the target branch for the run.
    status:
      $ref: '#/RunRepoStatus'
      description: Current execution status for this repo.
    attempt:
      type: integer
      format: int32
      description: |
        Retry attempt number for this repo within the batch.
        Starts at 1, incremented on each restart.
    last_error:
      type: string
      nullable: true
      description: |
        Human-readable error message from the most recent failed attempt.
        Cleared when the repo is restarted.
    created_at:
      type: string
      format: date-time
      description: Timestamp when the repo entry was created.
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution started (status transitioned to running).
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution completed (terminal status reached).
  required:
    - id
    - run_id
    - repo_url
    - base_ref
    - target_ref
    - status
    - attempt
    - created_at

RunBatchSummary:
  type: object
  description: |
    Batch run summary with optional aggregated repo status counts.
    Returned by list and inspect endpoints for batch runs. The repo_counts
    field provides aggregate status when multiple repos are attached to
    the batch (via POST /v1/runs/{id}/repos).
    Note: id is now a KSUID-backed string (27 characters).
  properties:
    id:
      type: string
      description: Unique batch run identifier (KSUID string).
    name:
      type: string
      nullable: true
      description: Optional human-readable name for the batch.
    repo_url:
      type: string
      description: |
        Primary Git repository URL for the batch. When repos are added
        individually, this serves as the default/template URL.
    status:
      type: string
      description: |
        Batch run status. Values: queued, running, succeeded, failed, canceled.
        For multi-repo batches, use repo_counts.derived_status for aggregate state.
    base_ref:
      type: string
      description: Default base Git ref for repos in the batch (e.g., main).
    target_ref:
      type: string
      description: Default target Git ref for repos in the batch.
    created_by:
      type: string
      nullable: true
      description: User or system that created the batch run.
    created_at:
      type: string
      format: date-time
      description: Timestamp when the batch was created.
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the first repo started execution.
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when all repos reached terminal state.
    repo_counts:
      allOf:
        - $ref: '#/RunRepoCounts'
      nullable: true
      description: |
        Aggregated per-repo status counts. Present when repos have been
        added to the batch. Use derived_status for a single batch-level
        status value.
  required:
    - id
    - repo_url
    - status
    - base_ref
    - target_ref
    - created_at

CreateRunRequest:
  type: object
  properties:
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    spec: {}
  required: [repo_url, base_ref, target_ref]

CreateRunResponse:
  type: object
  # Note: run_id is now a KSUID-backed string (27 characters).
  properties:
    run_id: { type: string, description: "Run ID (KSUID string)" }
  required: [run_id]

# Run submission (simplified Mods facade)
RunSubmitRequest:
  type: object
  properties:
    repo_url: { type: string }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    spec: {}
    created_by: { type: string, nullable: true }
  required: [repo_url, base_ref, target_ref]

# RunSummary — Canonical Mods run status schema
#
# This is the single authoritative response type for:
# - POST /v1/mods (submit) → 201 response body
# - GET /v1/mods/{id} (status) → 200 response body
# - SSE `event: run` payloads on /v1/runs/{id}/events
#
# Wire contract guarantees:
# - No wrapper types — RunSummary is returned directly as the JSON root.
# - Field names are stable and match internal/mods/api/types.go exactly.
# - All IDs use KSUID format (27 characters, lexicographically sortable).
#
# See docs/mods-lifecycle.md § 2.1 for the complete data model reference.
RunSummary:
  type: object
  description: |
    Canonical Mods run status schema. This is the single response type for run
    submission (POST /v1/mods), status queries (GET /v1/mods/{id}), and SSE
    `event: run` payloads. No wrapper types are used — the JSON shape is
    RunSummary directly.
  properties:
    run_id:
      type: string
      description: |
        Unique run identifier (KSUID string, 27 characters). KSUIDs are
        lexicographically sortable by creation time.
      example: "2NQPoBfVkc8dFmGAQqJnUwMu9jR"
    state:
      type: string
      description: |
        Run lifecycle state. Terminal states are `succeeded`, `failed`, and `cancelled`.
      enum: [pending, running, succeeded, failed, cancelling, cancelled]
    submitter:
      type: string
      description: Optional submitter identifier (e.g., user email or CI system).
      nullable: true
    repository:
      type: string
      description: Git repository URL (https, ssh, or file scheme).
      example: "https://github.com/org/repo.git"
    metadata:
      description: |
        Additional run metadata as string key-value pairs. Contains derived
        failure/cancellation context and diagnostics:
        - `repo_base_ref`: Base Git ref used for this run (e.g., "main").
        - `repo_target_ref`: Target Git ref for the run (e.g., "feature-branch").
        - `mr_url`: Merge request URL when available (GitLab/GitHub).
        - `gate_summary`: Build Gate health summary from run stats.
        - `node_id`: ID of the node that claimed/executed the run.
        - `reason`: Terminal failure/cancellation reason when available.
        - `resume_count`, `last_resumed_at`: Resume history when present.
      type: object
      additionalProperties:
        type: string
    created_at:
      type: string
      format: date-time
      description: Run creation timestamp (RFC 3339).
    updated_at:
      type: string
      format: date-time
      description: Timestamp of the latest status update (RFC 3339).
    stages:
      description: |
        Map of job execution states keyed by job ID. Each key is a KSUID string
        (`jobs.id` from the database) and each value is a StageStatus object
        describing that job's execution state, artifacts, and ordering.

        **Key semantics**: Keys are job IDs (KSUID strings), not job names or
        step indices. Use `step_index` within each StageStatus for ordering
        jobs in multi-step runs.

        **Typical entries**: `pre-gate`, `mod-0`, `post-gate` jobs, plus any
        dynamically inserted `heal-*` and `re-gate` jobs for healing flows.
      type: object
      additionalProperties:
        $ref: '#/StageStatus'
  required: [run_id, state, repository, created_at, updated_at, stages]

# StageStatus — Job execution state within a RunSummary.stages map
#
# Each StageStatus corresponds to a row in the `jobs` table. The parent map
# key is the job ID (KSUID string); use step_index for ordering jobs.
StageStatus:
  type: object
  description: |
    Job execution state within a RunSummary. Each StageStatus maps to a row
    in the `jobs` table, identified by its job ID (the parent map key).
  properties:
    state:
      type: string
      description: |
        Job lifecycle state. Terminal states are `succeeded`, `failed`, and `cancelled`.
      enum: [pending, queued, running, succeeded, failed, cancelling, cancelled]
    attempts:
      type: integer
      format: int32
      description: Number of execution attempts for this job.
    max_attempts:
      type: integer
      format: int32
      description: Maximum allowed attempts before marking the job as failed.
    current_job_id:
      type: string
      nullable: true
      description: |
        Execution job ID (KSUID string). For most jobs, this equals the map key.
        May differ in retry scenarios where a new job is created for retries.
    artifacts:
      type: object
      additionalProperties:
        type: string
      description: |
        Map of artifact logical names to bundle CIDs. Example entries:
        - `"output"`: CID of the primary output bundle.
        - `"logs"`: CID of captured execution logs.
    last_error:
      type: string
      nullable: true
      description: Human-readable error message from the most recent failed attempt.
    step_index:
      type: integer
      format: int32
      description: |
        Float index from `jobs.step_index`, exposed as integer for API consumers.
        Used to order jobs in multi-step runs:
        - Pre-gate: 1000
        - First mod: 2000
        - Post-gate: 3000
        - Healing jobs: midpoints (e.g., 1500, 1750)
  required: [state]

# Build Gate HTTP schemas removed: gate runs as jobs in the Mods pipeline.
# Nodes claim gate work via the unified /v1/nodes/{id}/claim endpoint.
# The buildgate_jobs table and related HTTP endpoints have been removed;
# all gate execution now uses the jobs table with mod_type='pre_gate'|'re_gate'|'post_gate'.

# Response returned by POST /v1/nodes/{id}/claim
# Schema aligned with claimJobHandler response — exposes job-centric fields.
# Note: id (run_id) and job_id are now KSUID-backed strings (27 characters).
NodeClaimResponse:
  type: object
  properties:
    id:
      type: string
      description: Run ID (parent run of the claimed job, KSUID string)
    job_id:
      type: string
      description: Claimed job ID (KSUID string)
    job_name:
      type: string
      description: Logical job name (e.g., "pre-gate", "mod-0", "post-gate")
    mod_type:
      type: string
      description: Job phase (`pre_gate`, `mod`, `post_gate`, `heal`, `re_gate`)
    mod_image:
      type: string
      description: Container image for this job (may be empty for non-container jobs)
    repo_url: { type: string }
    status: { type: string }
    node_id: { type: string, description: "Node ID (NanoID 6-character string)" }
    base_ref: { type: string }
    target_ref: { type: string }
    commit_sha: { type: string, nullable: true }
    step_index:
      type: number
      format: double
      description: Float index used for job ordering; always present for claimed jobs
    started_at: { type: string, format: date-time }
    created_at: { type: string, format: date-time }
    spec:
      description: |
        Opaque run specification JSON merged by the server at claim time.
        Includes `job_id` and any server defaults (e.g., `gitlab_pat`, `gitlab_domain`,
        `mr_on_success`, `mr_on_fail`).
      type: object
      additionalProperties: true
  required:
    - id
    - job_id
    - job_name
    - repo_url
    - status
    - node_id
    - base_ref
    - target_ref
    - step_index
    - started_at
    - created_at

Event:
  type: object
  # Note: run_id and job_id are now KSUID-backed strings (27 characters).
  properties:
    id: { type: integer, format: int64 }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    time: { type: string, format: date-time }
    level: { type: string }
    message: { type: string }
    meta: {}
  required: [id, run_id, time, level, message]

Stage:
  type: object
  # Note: id (job_id) and run_id are now KSUID-backed strings (27 characters).
  properties:
    id: { type: string, description: "Job ID (KSUID string)" }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    name: { type: string }
    status: { type: string }
    started_at: { type: string, format: date-time, nullable: true }
    finished_at: { type: string, format: date-time, nullable: true }
    duration_ms: { type: integer, format: int64 }
    meta: {}
  required: [id, run_id, name, status, duration_ms]

RunTiming:
  type: object
  # Note: id (run_id) is now a KSUID-backed string (27 characters).
  properties:
    id: { type: string, description: "Run ID (KSUID string)" }
    queue_ms: { type: integer, format: int64 }
    run_ms: { type: integer, format: int64 }
  required: [id, queue_ms, run_ms]

ListRunsTimingsResponse:
  type: object
  properties:
    timings:
      type: array
      items:
        $ref: '#/RunTiming'
  required: [timings]

Diff:
  type: object
  # Note: id (diffs.id is still UUID), but run_id and job_id are KSUID strings.
  properties:
    id: { type: string, format: uuid, description: "Diff ID (still UUID)" }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    patch:
      type: string
      description: Gzipped unified diff (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    summary: {}
    created_at: { type: string, format: date-time }
  required: [id, run_id, patch, created_at]

CreateDiffRequest:
  type: object
  # Note: job_id is now a KSUID-backed string (27 characters).
  properties:
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    patch:
      type: string
      description: Gzipped unified diff (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    summary: {}
  required: [patch]

Log:
  type: object
  # Note: run_id and job_id are now KSUID-backed strings (27 characters).
  properties:
    id: { type: integer, format: int64 }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped log chunk (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    created_at: { type: string, format: date-time }
  required: [id, run_id, chunk_no, data, created_at]

# Minimal acknowledgement returned by POST /v1/nodes/{id}/logs
# when a log chunk is stored. This mirrors the server's typed DTO
# `nodeLogCreateResponse`.
NodeCreateLogResponse:
  type: object
  properties:
    id: { type: integer, format: int64 }
    chunk_no: { type: integer, format: int32 }
  required: [id, chunk_no]

CreateLogRequest:
  type: object
  # Note: job_id is now a KSUID-backed string (27 characters).
  properties:
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped log chunk (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [chunk_no, data]

# Request used by node → server log ingestion.
NodeCreateLogRequest:
  type: object
  # Note: run_id and job_id are now KSUID-backed strings (27 characters).
  properties:
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    chunk_no: { type: integer, format: int32 }
    data:
      type: string
      description: Gzipped log chunk (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [run_id, chunk_no, data]

ArtifactBundle:
  type: object
  # Note: artifact_bundles.id is still UUID, but run_id and job_id are KSUID strings.
  properties:
    id: { type: string, format: uuid, description: "Artifact bundle ID (still UUID)" }
    run_id: { type: string, description: "Run ID (KSUID string)" }
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    name: { type: string, nullable: true }
    bundle:
      type: string
      description: Gzipped tar archive (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
    created_at: { type: string, format: date-time }
  required: [id, run_id, bundle, created_at]

CreateArtifactBundleRequest:
  type: object
  # Note: job_id is now a KSUID-backed string (27 characters).
  properties:
    job_id: { type: string, nullable: true, description: "Job ID (KSUID string)" }
    name: { type: string, nullable: true }
    bundle:
      type: string
      description: Gzipped tar archive (≤1 MiB gzipped), base64-encoded.
      contentEncoding: base64
  required: [bundle]

# Node describes a registered worker node.
# Note: node IDs are now NanoID(6) strings (6 characters from URL-safe alphabet).
Node:
  type: object
  properties:
    id: { type: string, description: "Node ID (NanoID 6-character string)" }
    name: { type: string }
    ip_address: { type: string }
    version: { type: string, nullable: true }
    concurrency: { type: integer, format: int32 }
    cpu_total_millis: { type: integer, format: int32 }
    cpu_free_millis: { type: integer, format: int32 }
    mem_total_bytes: { type: integer, format: int64 }
    mem_free_bytes: { type: integer, format: int64 }
    disk_total_bytes: { type: integer, format: int64 }
    disk_free_bytes: { type: integer, format: int64 }
    cert_serial: { type: string, nullable: true }
    cert_fingerprint: { type: string, nullable: true }
    cert_not_before: { type: string, format: date-time, nullable: true }
    cert_not_after: { type: string, format: date-time, nullable: true }
    last_heartbeat: { type: string, format: date-time, nullable: true }
    drained: { type: boolean }
    created_at: { type: string, format: date-time }
  required:
    - id
    - name
    - ip_address
    - concurrency
    - cpu_total_millis
    - cpu_free_millis
    - mem_total_bytes
    - mem_free_bytes
    - disk_total_bytes
    - disk_free_bytes
    - drained
    - created_at

WorkflowGraphNode:
  type: object
  # Note: job IDs (id, parent_ids, child_ids) are now KSUID-backed strings.
  properties:
    id:
      type: string
      description: Job ID (KSUID string)
    name:
      type: string
      description: Logical job name (e.g., "pre-gate", "mod-0", "post-gate")
    type:
      type: string
      description: Job phase type derived from jobs.mod_type
      enum: [pre_gate, mod, heal, re_gate, post_gate]
    step_index:
      type: number
      format: double
      description: Float index used for job ordering (matches jobs.step_index)
    status:
      type: string
      description: Job execution status (matches jobs.status)
      enum: [created, pending, running, succeeded, failed, skipped, canceled]
    attempt:
      type: integer
      format: int32
      description: Retry attempt number (1 for current implementation)
    parent_ids:
      type: array
      description: IDs of predecessor jobs derived from step_index ordering
      items:
        type: string
        description: Job ID (KSUID string)
    child_ids:
      type: array
      description: IDs of successor jobs derived from step_index ordering
      items:
        type: string
        description: Job ID (KSUID string)
    image:
      type: string
      nullable: true
      description: Container image used for this job, when available
    started_at:
      type: string
      format: date-time
      nullable: true
    finished_at:
      type: string
      format: date-time
      nullable: true
    duration_ms:
      type: integer
      format: int64
      description: Job duration in milliseconds
    exit_code:
      type: integer
      format: int32
      nullable: true
      description: Exit code for the job, when available
  required: [id, name, type, step_index, status, attempt]

WorkflowGraph:
  type: object
  # Note: run_id and job IDs (root_ids, leaf_ids) are now KSUID-backed strings.
  properties:
    run_id:
      type: string
      description: Run identifier (KSUID string)
    nodes:
      type: object
      description: Map of job IDs to graph nodes
      additionalProperties:
        $ref: '#/WorkflowGraphNode'
    root_ids:
      type: array
      description: IDs of entry-point nodes (jobs with no parents)
      items:
        type: string
        description: Job ID (KSUID string)
    leaf_ids:
      type: array
      description: IDs of terminal nodes (jobs with no children)
      items:
        type: string
        description: Job ID (KSUID string)
    linear:
      type: boolean
      description: True when graph is a simple linear chain
  required: [run_id, nodes, root_ids, leaf_ids, linear]

# -------------------------------------------------------------------------
# Repo-centric API types — list repos and show runs for a given repo
# -------------------------------------------------------------------------

RepoSummary:
  type: object
  description: |
    Repository summary returned by GET /v1/repos. Includes the repo URL
    along with metadata from the most recent run (if any).
  properties:
    repo_url:
      type: string
      description: Git repository URL (https, ssh, or file scheme)
    last_run_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when the most recent run started (if any)
    last_status:
      type: string
      nullable: true
      description: Status of the most recent run (pending, running, succeeded, etc.)
  required:
    - repo_url

RepoRunSummary:
  type: object
  description: |
    Run summary for a specific repository, returned by GET /v1/repos/{repo_id}/runs.
    Includes both the parent run status and per-repo status within the batch.
    Note: run_id is now a KSUID-backed string (27 characters).
  properties:
    run_id:
      type: string
      description: Unique run identifier (KSUID string)
    name:
      type: string
      nullable: true
      description: Optional batch run name
    run_status:
      type: string
      description: Parent run status (queued, running, succeeded, failed, canceled)
    repo_status:
      type: string
      description: Per-repo status within the batch (pending, running, succeeded, etc.)
    base_ref:
      type: string
      description: Git base ref for the run
    target_ref:
      type: string
      description: Git target ref for the run
    attempt:
      type: integer
      format: int32
      description: Retry attempt number for this repo in the batch
    started_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution started
    finished_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp when execution completed
    execution_run_id:
      type: string
      nullable: true
      description: |
        Child execution run ID (KSUID string) for this repo within the batch.
        Links to the Mods run created to process this specific repo. Used by
        `ploy mod run pull` to fetch diffs and status for the repo execution.
        Null when execution has not started or no child run was created.
  required:
    - run_id
    - run_status
    - repo_status
    - base_ref
    - target_ref
    - attempt
