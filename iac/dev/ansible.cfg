[defaults]
inventory = inventory/hosts.yml
host_key_checking = False
stdout_callback = ansible.builtin.default
callback_result_format = yaml
gather_facts = True
timeout = 300
remote_user = root

[inventory]
enable_plugins = yaml

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 -o ConnectTimeout=300
pipelining = True
retries = 3