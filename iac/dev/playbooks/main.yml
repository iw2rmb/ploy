---
# Ploy Development Environment Setup Playbook
# 
# This playbook sets up a complete development environment including:
# - Development tools (Go, Node.js, Java, Python)
# - Build tools (KraftKit, Cosign, Syft, Grype)
# - Container runtime (Docker)
# - Object storage (SeaweedFS)
# - Proper PATH configuration to avoid conflicts
# - GitHub credentials setup for the ploy user
#
# Key improvements:
# - Fixed PATH configuration to prevent multiple conflicting declarations
# - Cosign installation with verification
# - Cleanup of conflicting environment variables
#
- name: Setup Ploy Development Environment
  hosts: linux_hosts
  become: true
  vars_files:
    - ../vars/main.yml
  
  tasks:
    - name: Assert required dev domain variables are set
      assert:
        that:
          - ploy is defined
          - ploy.apps_domain is defined
          - ploy.apps_domain | length > 0
          - ploy.platform_domain is defined
          - ploy.platform_domain | length > 0
          - ploy.apps_domain_provider is defined
          - ploy.apps_domain_provider | length > 0
          - ploy.platform_domain_provider is defined
          - ploy.platform_domain_provider | length > 0
        fail_msg: "Required variables missing: set PLOY_APPS_DOMAIN, PLOY_PLATFORM_DOMAIN, PLOY_APPS_DOMAIN_PROVIDER, PLOY_PLATFORM_DOMAIN_PROVIDER in environment or inventory."
        success_msg: "Required dev domain variables are set."

    - name: Create ploy user first
      user:
        name: ploy
        shell: /bin/bash
        create_home: true
        home: /home/ploy
        groups: sudo
        append: true

    # CRITICAL: Create all Ploy directories early to prevent service startup failures
    - name: Create comprehensive Ploy directory structure
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "/opt/ploy", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/artifacts", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/metadata", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/debug", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/logs", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/cache", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/temp", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/traefik-data", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/opt/ploy/traefik-data/certificates", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/home/ploy/ploy", owner: "ploy", group: "ploy", mode: "0755" }
        - { path: "/home/ploy/ploy/configs", owner: "ploy", group: "ploy", mode: "0755" }

    - name: Update system packages
      block:
        - name: Check if apt is locked
          shell: lsof /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock 2>/dev/null | wc -l
          register: apt_locked
          changed_when: false

        - name: Wait for apt locks to be released
          wait_for:
            path: /var/lib/dpkg/lock-frontend
            state: absent
            timeout: 300
          when: apt_locked.stdout|int > 0

        - name: Update package cache
          apt:
            update_cache: true
            cache_valid_time: 3600
          retries: 3
          delay: 10

        - name: Upgrade system packages
          apt:
            upgrade: dist
            force_apt_get: true
          async: 1200  # 20 minutes max
          poll: 30     # Check every 30 seconds
          retries: 2
          delay: 30
      rescue:
        - name: Handle package update failure
          debug:
            msg: "Package update failed but continuing with deployment. Check system later."
      when: ansible_os_family == "Debian"

    - name: Install basic development tools
      apt:
        name: "{{ testing_tools }}"
        state: present
      when: ansible_os_family == "Debian"
      
    - name: Install essential Ubuntu 24 dependencies
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - snapd
          - htop
          - net-tools
          - unzip
          - jq
          - ripgrep
          - fd-find
          - bat
          - tree
          - ncdu
          - tmux
          - screen
          - python3-docker  # Required for Ansible Docker module
          - python3-requests  # Required for URI module
        state: present

    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
        state: present

    - name: Add ploy user to docker group
      user:
        name: ploy
        groups: docker
        append: true

    - name: Enhanced Docker service management
      block:
        - name: Check Docker service status
          command: systemctl is-active docker
          register: docker_service_status
          ignore_errors: true
          changed_when: false

        - name: Check Docker service health if running
          command: docker info
          register: docker_info_check
          ignore_errors: true
          changed_when: false
          when: docker_service_status.stdout == "active"

        - name: Start and enable Docker service
          systemd:
            name: docker
            state: started
            enabled: true
            daemon_reload: true
          when: docker_service_status.stdout != "active"
          register: docker_start_result
          retries: 3
          delay: 5
          until: docker_start_result is succeeded

        - name: Wait for Docker socket to be available
          wait_for:
            path: /var/run/docker.sock
            state: present
            timeout: 30
          when: docker_service_status.stdout != "active" or docker_info_check is failed

        - name: Verify Docker is responding
          command: docker version
          register: docker_version_check
          retries: 3
          delay: 5
          until: docker_version_check.rc == 0
          changed_when: false

    - name: Setup Docker Registry for local image management
      block:
        - name: Create registry directory
          file:
            path: /var/lib/docker-registry
            state: directory
            mode: '0755'
            owner: root
            group: root
        
        - name: Pull Docker Registry image
          docker_image:
            name: registry:2
            source: pull
          retries: 3
          delay: 10

        - name: Run Docker Registry container
          docker_container:
            name: registry
            image: registry:2
            state: started
            restart_policy: always
            ports:
              - "5000:5000"
            volumes:
              - /var/lib/docker-registry:/var/lib/registry
            env:
              REGISTRY_STORAGE_DELETE_ENABLED: "true"
            healthcheck:
              test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://registry.dev.ployman.app/v2/"]
              interval: 30s
              timeout: 10s
              retries: 3
          register: registry_container_result
          retries: 3
          delay: 5
          until: registry_container_result is succeeded

        - name: Wait for Docker Registry to be ready
          uri:
            url: http://registry.dev.ployman.app/v2/
            method: GET
            status_code: 200
          register: registry_health_check
          retries: 10
          delay: 5
          until: registry_health_check.status == 200

    - name: Prepare OSv base image directory
      file:
        path: /opt/ploy/osv/base
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'

    - name: Download OSv base image if URL provided
      when: lookup('env', 'PLOY_OSV_BASE_URL') | length > 0
      get_url:
        url: "{{ lookup('env', 'PLOY_OSV_BASE_URL') }}"
        dest: /opt/ploy/osv/base/java8.qemu
        mode: '0644'
        owner: ploy
        group: ploy
      register: osv_base_dl
      retries: 3
      delay: 5
      until: osv_base_dl is succeeded

    - name: Mirror Kaniko executor image into internal registry (Dev)
      block:
        - name: Pull Kaniko executor image
          docker_image:
            name: gcr.io/kaniko-project/executor:debug
            source: pull
          retries: 3
          delay: 10

        - name: Tag Kaniko image for internal registry
          command: >-
            docker tag gcr.io/kaniko-project/executor:debug
            registry.dev.ployman.app/kaniko-executor:debug
          changed_when: true

        - name: Push Kaniko image to internal registry
          command: docker push registry.dev.ployman.app/kaniko-executor:debug
          register: push_result
          retries: 3
          delay: 10
          until: push_result.rc == 0
    
    - name: Install Docker Compose
      block:
        - name: Check if Docker Compose is already installed
          stat:
            path: /usr/local/bin/docker-compose
          register: docker_compose_binary

        - name: Get current Docker Compose version (if installed)
          command: /usr/local/bin/docker-compose version --short
          register: current_docker_compose_version
          changed_when: false
          ignore_errors: true
          when: docker_compose_binary.stat.exists

        - name: Download Docker Compose
          get_url:
            url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
            dest: /usr/local/bin/docker-compose
            mode: '0755'
          when: not docker_compose_binary.stat.exists or docker_compose_version not in (current_docker_compose_version.stdout | default(''))

    - name: Setup Docker daemon configuration with optional Kontain runtime
      block:
        - name: Check if KVM is available
          stat:
            path: /dev/kvm
          register: kvm_device

        - name: Install Kontain using official script (if KVM available)
          shell: |
            curl -s https://raw.githubusercontent.com/kontainapp/km/current/km-releases/kontain-install.sh | bash
          when: kvm_device.stat.exists
          args:
            creates: /opt/kontain/bin/krun

        - name: Set KVM availability fact for template
          set_fact:
            kvm_available: "{{ kvm_device.stat.exists }}"

        - name: Configure Docker daemon using standardized template
          template:
            src: ../../common/templates/docker-daemon.json.j2
            dest: /etc/docker/daemon.json
            backup: true
            owner: root
            group: root
            mode: '0644'
          register: docker_config_result

        - name: Validate Docker daemon configuration
          command: dockerd --validate --config-file=/etc/docker/daemon.json
          register: docker_config_validation
          failed_when: docker_config_validation.rc != 0
          changed_when: false

        - name: Restart Docker if configuration changed
          systemd:
            name: docker
            state: restarted
            daemon_reload: true
          when: docker_config_result.changed
          register: docker_restart_result
          retries: 3
          delay: 5
          until: docker_restart_result is succeeded

        - name: Verify Docker restart was successful
          command: docker info
          retries: 5
          delay: 3
          register: docker_info_verify
          changed_when: false
          when: docker_config_result.changed

    - name: Install Docker Buildx
      block:
        - name: Create Docker CLI plugins directory
          file:
            path: /usr/local/lib/docker/cli-plugins
            state: directory
            mode: '0755'

        - name: Check if Docker Buildx is already installed
          stat:
            path: /usr/local/lib/docker/cli-plugins/docker-buildx
          register: buildx_binary

        - name: Get current Docker Buildx version (if installed)
          command: /usr/local/lib/docker/cli-plugins/docker-buildx version
          register: current_buildx_version
          changed_when: false
          ignore_errors: true
          when: buildx_binary.stat.exists

        - name: Download Docker Buildx plugin
          get_url:
            url: "https://github.com/docker/buildx/releases/download/v0.17.1/buildx-v0.17.1.linux-amd64"
            dest: /usr/local/lib/docker/cli-plugins/docker-buildx
            mode: '0755'
          when: not buildx_binary.stat.exists or "0.17.1" not in (current_buildx_version.stdout | default(''))

        - name: Create Docker config directory for ploy user
          file:
            path: /home/ploy/.docker
            state: directory
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Configure Docker to use buildx plugin
          copy:
            content: |
              {
                "cliPluginsExtraDirs": ["/usr/local/lib/docker/cli-plugins"]
              }
            dest: /home/ploy/.docker/config.json
            owner: ploy
            group: ploy
            mode: '0644'

    - name: Install Go
      block:
        - name: Check if Go is already installed
          stat:
            path: /usr/local/go/bin/go
          register: go_binary

        - name: Get current Go version (if installed)
          command: /usr/local/go/bin/go version
          register: current_go_version
          changed_when: false
          ignore_errors: true
          when: go_binary.stat.exists

        - name: Download Go
          get_url:
            url: "https://golang.org/dl/go{{ go_version }}.linux-{{ go_arch }}.tar.gz"
            dest: /tmp/go.tar.gz
          when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

        - name: Remove existing Go installation
          file:
            path: /usr/local/go
            state: absent
          when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

        - name: Extract Go
          unarchive:
            src: /tmp/go.tar.gz
            dest: /usr/local
            remote_src: true
          when: not go_binary.stat.exists or go_version not in (current_go_version.stdout | default(''))

        - name: Configure system PATH with Go
          lineinfile:
            path: /etc/environment
            regexp: '^PATH='
            line: 'PATH="/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin"'
            create: true

        - name: Create Go workspace
          file:
            path: /root/go
            state: directory

    - name: Install QEMU for OSv runtime support
      apt:
        name:
          - qemu-system-x86
          - qemu-utils
          - qemu-system-common
          - libvirt-daemon-system
          - libvirt-clients
        state: present
        update_cache: yes

    - name: Install Python3 and pip
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present

    - name: Configure NVD API for vulnerability data
      block:
        - name: Create NVD API configuration directory
          file:
            path: /etc/ploy/nvd
            state: directory
            mode: '0755'
            owner: ploy
            group: ploy

        - name: Create NVD API configuration file
          copy:
            content: |
              # NVD API Configuration for ARF Phase 4
              # API documentation: https://nvd.nist.gov/developers/vulnerabilities
              api_endpoint: "https://services.nvd.nist.gov/rest/json/cves/2.0"
              rate_limit: 5  # requests per second for public API
              timeout: 30  # seconds
              cache_duration: 3600  # 1 hour in seconds
              # To use enhanced rate limits, add your API key:
              # api_key: "your-nvd-api-key-here"
            dest: /etc/ploy/nvd/config.yaml
            owner: ploy
            group: ploy
            mode: '0644'

    - name: Install human workflow and notification dependencies
      pip:
        name:
          - jinja2>=3.1.0
          - pyyaml>=6.0
          - markdown>=3.4.0
          - email-validator>=2.0.0
          - python-dateutil>=2.8.0
          - croniter>=1.4.0
          - pytz>=2023.3
          - celery>=5.3.0
          - kombu>=5.3.0
        state: present
        executable: pip3
        extra_args: --break-system-packages
      ignore_errors: true

    - name: Install production monitoring dependencies
      apt:
        name:
          - htop
          - iotop
          - netstat-nat
          - tcpdump
          - strace
          - lsof
          - sysstat
          - procps
        state: present

    - name: Configure performance monitoring tools
      block:
        - name: Enable sysstat data collection
          replace:
            path: /etc/default/sysstat
            regexp: '^ENABLED="false"'
            replace: 'ENABLED="true"'

        - name: Start sysstat service
          systemd:
            name: sysstat
            state: started
            enabled: true

    - name: Create ARF Phase 4 configuration directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: ploy
        group: ploy
      loop:
        - /etc/ploy/security
        - /etc/ploy/workflows
        - /etc/ploy/monitoring
        - /var/log/ploy/security
        - /var/log/ploy/workflows
        - /var/cache/ploy/vulnerability-db

    - name: Install build tools
      block:
        - name: Install make and build-essential
          apt:
            name:
              - build-essential
              - cmake
              - pkg-config
            state: present

        - name: Check if KraftKit is already installed
          stat:
            path: /usr/local/bin/kraft
          register: kraft_binary

        - name: Get current KraftKit version (if installed)
          command: /usr/local/bin/kraft version
          register: current_kraft_version
          changed_when: false
          ignore_errors: true
          when: kraft_binary.stat.exists

        - name: Remove old KraftKit version
          file:
            path: /usr/local/bin/kraft
            state: absent
          when: kraft_binary.stat.exists and build_tools.kraft.version not in (current_kraft_version.stdout | default(''))

        - name: Download KraftKit
          get_url:
            url: "https://github.com/unikraft/kraftkit/releases/download/v{{ build_tools.kraft.version }}/kraft_{{ build_tools.kraft.version }}_linux_amd64.tar.gz"
            dest: /tmp/kraft.tar.gz
          when: not kraft_binary.stat.exists or build_tools.kraft.version not in (current_kraft_version.stdout | default(''))

        - name: Extract KraftKit
          unarchive:
            src: /tmp/kraft.tar.gz
            dest: /usr/local/bin
            remote_src: true
          when: not kraft_binary.stat.exists or build_tools.kraft.version not in (current_kraft_version.stdout | default(''))

        - name: Make KraftKit executable
          file:
            path: /usr/local/bin/kraft
            mode: '0755'
          when: not kraft_binary.stat.exists or build_tools.kraft.version not in (current_kraft_version.stdout | default(''))

        - name: Verify KraftKit installation
          command: /usr/local/bin/kraft version
          register: kraft_version
          changed_when: false
          when: not kraft_binary.stat.exists or build_tools.kraft.version not in (current_kraft_version.stdout | default(''))

        - name: Display KraftKit status
          debug:
            msg: "KraftKit is available on the host (installed or up-to-date)."
          when: kraft_version is defined or kraft_binary.stat.exists

        - name: Check if Capstan is already installed
          stat:
            path: /usr/local/bin/capstan
          register: capstan_binary

        - name: Get current Capstan version (if installed)
          command: /usr/local/bin/capstan version
          register: current_capstan_version
          changed_when: false
          ignore_errors: true
          when: capstan_binary.stat.exists

        - name: Download Capstan for OSv builds
          get_url:
            url: "https://github.com/cloudius-systems/capstan/releases/download/v{{ build_tools.capstan.version }}/capstan"
            dest: /usr/local/bin/capstan
            mode: '0755'
          when: not capstan_binary.stat.exists or build_tools.capstan.version not in (current_capstan_version.stdout | default(''))

        - name: Verify Capstan installation
          command: /usr/local/bin/capstan --version
          register: capstan_version
          changed_when: false
          ignore_errors: true

        - name: Display Capstan version
          debug:
            msg: "Capstan installed successfully: {{ capstan_version.stdout if capstan_version.rc == 0 else 'Version check not available' }}"

        - name: Setup OSv base image for Capstan
          block:
            # /opt/ploy directory already created in comprehensive structure above

            - name: Create capstan repository structure for ploy user
              file:
                path: /opt/ploy/.capstan/repository/cloudius/osv/mike
                state: directory
                owner: ploy
                group: ploy
                mode: '0755'
              become: true

            - name: Download OSv loader image
              get_url:
                url: "https://github.com/cloudius-systems/osv/releases/download/v0.57.0/osv-loader.qemu.x86_64"
                dest: /tmp/osv-loader.qemu
                mode: '0644'
                force: no  # Don't re-download if already exists
              become: true

            - name: Compress OSv loader image
              archive:
                path: /tmp/osv-loader.qemu
                dest: /opt/ploy/.capstan/repository/cloudius/osv/mike/osv-loader.qemu.gz
                format: gz
                remove: true
                owner: ploy
                group: ploy
                mode: '0644'
              become: true

            - name: Create index.yaml for OSv base image
              copy:
                content: |
                  format_version: "1"
                  version: "v0.57.0"
                  created: "2025-08-25T06:00:00Z"
                  description: "OSv base image for capstan"
                  platform: "x86_64"
                dest: /opt/ploy/.capstan/repository/cloudius/osv/index.yaml
                owner: ploy
                group: ploy
                mode: '0644'
              become: true

        - name: Setup Capstan Java packages
          block:
            - name: Create capstan packages directory
              file:
                path: /opt/ploy/.capstan/packages
                state: directory
                owner: ploy
                group: ploy
                mode: '0755'
              become: true

            - name: Download osv.bootstrap package from GitHub
              shell: |
                sudo -u ploy capstan package pull osv.bootstrap
              ignore_errors: true
              become: true

            - name: Check if openjdk8-zulu-full package exists
              stat:
                path: /opt/ploy/.capstan/packages/openjdk8-zulu-full.mpm
              register: openjdk8_full_exists
              become: true

            - name: Download openjdk8-zulu-full package from S3
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/packages/openjdk8-zulu-full.mpm"
                dest: /opt/ploy/.capstan/packages/openjdk8-zulu-full.mpm
                owner: ploy
                group: ploy
                mode: '0644'
              when: not openjdk8_full_exists.stat.exists
              become: true

            - name: Download openjdk8-zulu-full package YAML from S3
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/packages/openjdk8-zulu-full.yaml"
                dest: /opt/ploy/.capstan/packages/openjdk8-zulu-full.yaml
                owner: ploy
                group: ploy
                mode: '0644'
                force: no  # Don't re-download if already exists
              become: true

            - name: Check if openjdk8-zulu-compact1 package exists
              stat:
                path: /opt/ploy/.capstan/packages/openjdk8-zulu-compact1.mpm
              register: openjdk8_compact_exists
              become: true

            - name: Download openjdk8-zulu-compact1 package from S3
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/packages/openjdk8-zulu-compact1.mpm"
                dest: /opt/ploy/.capstan/packages/openjdk8-zulu-compact1.mpm
                owner: ploy
                group: ploy
                mode: '0644'
              when: not openjdk8_compact_exists.stat.exists
              become: true

            - name: Download openjdk8-zulu-compact1 package YAML from S3
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/packages/openjdk8-zulu-compact1.yaml"
                dest: /opt/ploy/.capstan/packages/openjdk8-zulu-compact1.yaml
                owner: ploy
                group: ploy
                mode: '0644'
              become: true

            - name: Ensure mike directory structure exists
              file:
                path: /opt/ploy/.capstan/repository/mike/osv-loader
                state: directory
                owner: ploy
                group: ploy
                mode: '0755'
              become: true

            - name: Download osv-loader from S3 to mike directory
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/mike/osv-loader/osv-loader.qemu.gz"
                dest: /opt/ploy/.capstan/repository/mike/osv-loader/osv-loader.qemu.gz
                owner: ploy
                group: ploy
                mode: '0644'
              become: true

            - name: Download osv-loader index from S3
              get_url:
                url: "https://mikelangelo-capstan.s3.amazonaws.com/mike/osv-loader/index.yaml"
                dest: /opt/ploy/.capstan/repository/mike/osv-loader/index.yaml
                owner: ploy
                group: ploy
                mode: '0644'
              become: true

        - name: Check if Cosign is already installed
          stat:
            path: /usr/local/bin/cosign
          register: cosign_binary

        - name: Get current Cosign version (if installed)
          command: /usr/local/bin/cosign version
          register: current_cosign_version
          changed_when: false
          ignore_errors: true
          when: cosign_binary.stat.exists

        - name: Download Cosign
          get_url:
            url: "https://github.com/sigstore/cosign/releases/download/v{{ build_tools.cosign.version }}/cosign-linux-amd64"
            dest: /usr/local/bin/cosign
            mode: '0755'
          when: not cosign_binary.stat.exists or build_tools.cosign.version not in (current_cosign_version.stdout | default(''))

        - name: Verify Cosign installation
          command: /usr/local/bin/cosign version
          register: cosign_version
          changed_when: false

        - name: Display Cosign version
          debug:
            msg: "Cosign installed successfully: {{ cosign_version.stdout_lines[0] if cosign_version.stdout_lines else 'Version info not available' }}"

        - name: Check if Syft is already installed
          stat:
            path: /usr/local/bin/syft
          register: syft_binary

        - name: Get current Syft version (if installed)
          command: /usr/local/bin/syft version
          register: current_syft_version
          changed_when: false
          ignore_errors: true
          when: syft_binary.stat.exists

        - name: Download Syft
          get_url:
            url: "https://github.com/anchore/syft/releases/download/v{{ build_tools.syft.version }}/syft_{{ build_tools.syft.version }}_linux_amd64.tar.gz"
            dest: /tmp/syft.tar.gz
          when: not syft_binary.stat.exists or build_tools.syft.version not in (current_syft_version.stdout | default(''))

        - name: Extract Syft
          unarchive:
            src: /tmp/syft.tar.gz
            dest: /usr/local/bin
            remote_src: true
          when: not syft_binary.stat.exists or build_tools.syft.version not in (current_syft_version.stdout | default(''))

        - name: Verify Syft installation
          command: /usr/local/bin/syft version
          register: syft_version
          changed_when: false

        - name: Display Syft version
          debug:
            msg: "Syft installed successfully: {{ syft_version.stdout_lines[1] if syft_version.stdout_lines|length > 1 else 'Version info not available' }}"

        - name: Check if Grype is already installed
          stat:
            path: /usr/local/bin/grype
          register: grype_binary

        - name: Get current Grype version (if installed)
          command: /usr/local/bin/grype version
          register: current_grype_version
          changed_when: false
          ignore_errors: true
          when: grype_binary.stat.exists

        - name: Download Grype
          get_url:
            url: "https://github.com/anchore/grype/releases/download/v{{ build_tools.grype.version }}/grype_{{ build_tools.grype.version }}_linux_amd64.tar.gz"
            dest: /tmp/grype.tar.gz
          when: not grype_binary.stat.exists or build_tools.grype.version not in (current_grype_version.stdout | default(''))

        - name: Extract Grype
          unarchive:
            src: /tmp/grype.tar.gz
            dest: /usr/local/bin
            remote_src: true
          when: not grype_binary.stat.exists or build_tools.grype.version not in (current_grype_version.stdout | default(''))

        - name: Verify Grype installation
          command: /usr/local/bin/grype version
          register: grype_version
          changed_when: false

        - name: Display Grype version
          debug:
            msg: "Grype installed successfully: {{ grype_version.stdout_lines[0] if grype_version.stdout_lines else 'Version info not available' }}"

        - name: Check if OPA is already installed
          stat:
            path: /usr/local/bin/opa
          register: opa_binary

        - name: Get current OPA version (if installed)
          command: /usr/local/bin/opa version
          register: current_opa_version
          changed_when: false
          ignore_errors: true
          when: opa_binary.stat.exists

        - name: Download OPA
          get_url:
            url: "https://github.com/open-policy-agent/opa/releases/download/v{{ build_tools.opa.version }}/opa_linux_amd64"
            dest: /usr/local/bin/opa
            mode: '0755'
          when: not opa_binary.stat.exists or build_tools.opa.version not in (current_opa_version.stdout | default(''))

        - name: Verify OPA installation
          command: /usr/local/bin/opa version
          register: opa_version
          changed_when: false

        - name: Display OPA version
          debug:
            msg: "OPA installed successfully: {{ opa_version.stdout_lines[0] if opa_version.stdout_lines else 'Version info not available' }}"

    - name: Install WASM development tools
      block:
        - name: Install Rust toolchain
          become_user: ploy
          block:
            - name: Check if rustup is installed
              stat:
                path: /home/ploy/.cargo/bin/rustup
              register: rustup_binary

            - name: Download rustup installer
              get_url:
                url: https://sh.rustup.rs
                dest: /tmp/rustup-init.sh
                mode: '0755'
              when: not rustup_binary.stat.exists

            - name: Install rustup
              command: /tmp/rustup-init.sh -y --default-toolchain stable
              when: not rustup_binary.stat.exists

            - name: Add wasm32-wasi target (legacy name)
              command: /home/ploy/.cargo/bin/rustup target add wasm32-wasi
              when: not rustup_binary.stat.exists
              ignore_errors: true

            - name: Add wasm32-wasip1 target (new WASI name)
              command: /home/ploy/.cargo/bin/rustup target add wasm32-wasip1
              when: not rustup_binary.stat.exists

            - name: Add wasm32-unknown-unknown target (browser WASM)
              command: /home/ploy/.cargo/bin/rustup target add wasm32-unknown-unknown
              when: not rustup_binary.stat.exists

            - name: Install WASM-related Rust tools
              command: /home/ploy/.cargo/bin/cargo install {{ item }}
              when: not rustup_binary.stat.exists
              loop:
                - wasm-bindgen-cli  # For JavaScript bindings
                - wasm-pack         # For building Rust WASM packages

        - name: Install Node.js and AssemblyScript
          block:
            - name: Install Node.js using NodeSource repository
              shell: |
                curl -fsSL https://deb.nodesource.com/setup_{{ nodejs_version }}.x | sudo -E bash -
                apt-get install -y nodejs
              args:
                creates: /usr/bin/node

            - name: Install AssemblyScript globally (latest stable)
              npm:
                name: assemblyscript
                global: true
                state: latest

            - name: Install additional WASM tools
              npm:
                name: "{{ item }}"
                global: true
                state: latest
              loop:
                - wasm-pack   # For Rust WASM builds
                - wasmtime    # WASM runtime for testing

        - name: Install Emscripten toolchain
          become_user: ploy
          block:
            - name: Clone Emscripten SDK
              git:
                repo: https://github.com/emscripten-core/emsdk.git
                dest: /home/ploy/emsdk
                version: main
              register: emsdk_clone

            - name: Install latest stable Emscripten
              shell: |
                cd /home/ploy/emsdk
                ./emsdk install latest
                ./emsdk activate latest
                echo 'source "/home/ploy/emsdk/emsdk_env.sh"' >> /home/ploy/.bashrc
              when: emsdk_clone.changed or not ansible_check_mode

            - name: Add Emscripten to user PATH
              lineinfile:
                path: /home/ploy/.bashrc
                line: 'source /home/ploy/emsdk/emsdk_env.sh'
                create: true
                owner: ploy
                group: ploy

        - name: Update ploy user environment for WASM development
          lineinfile:
            path: /home/ploy/.bashrc
            line: '{{ item }}'
            create: true
            owner: ploy
            group: ploy
          loop:
            - '# WASM Development Environment'
            - 'export PATH="$HOME/.cargo/bin:$PATH"'
            - 'export RUSTUP_HOME="$HOME/.rustup"'
            - 'export CARGO_HOME="$HOME/.cargo"'

    # MinIO has been replaced with SeaweedFS for better scalability and performance

    - name: Clean up conflicting environment variables from /etc/environment
      lineinfile:
        path: /etc/environment
        regexp: '^GITHUB_PLOY_DEV_(USERNAME|PAT)='
        state: absent

    - name: Clean up conflicting PATH entries from user profile
      lineinfile:
        path: /home/ploy/.profile
        regexp: '^export PATH="/usr/bin:/bin:\$PATH"'
        state: absent
        owner: ploy
        group: ploy

    - name: Validate GitHub credentials are available locally
      fail:
        msg: |
          GitHub credentials not set in local environment.
          Please set the following environment variables before running Ansible:
          export GITHUB_PLOY_DEV_USERNAME="your-github-username"
          export GITHUB_PLOY_DEV_PAT="your-github-personal-access-token"
          
          Then run the playbook again:
          cd iac/dev && ansible-playbook site.yml -e target_host=$TARGET_HOST
      when: lookup('env', 'GITHUB_PLOY_DEV_USERNAME') == '' or lookup('env', 'GITHUB_PLOY_DEV_PAT') == ''

    - name: Set GitHub environment variables for ploy user
      blockinfile:
        path: /home/ploy/.bashrc
        create: true
        owner: ploy
        group: ploy
        mode: '0644'
        block: |
          # GitHub environment variables for Ploy development
          export GITHUB_PLOY_DEV_USERNAME="{{ lookup('env', 'GITHUB_PLOY_DEV_USERNAME') }}"
          export GITHUB_PLOY_DEV_PAT="{{ lookup('env', 'GITHUB_PLOY_DEV_PAT') }}"
          
          # DNS provider environment variables
          {% if lookup('env', 'CLOUDFLARE_API_TOKEN') %}
          export CLOUDFLARE_API_TOKEN="{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"
          export CLOUDFLARE_ZONE_ID="{{ lookup('env', 'CLOUDFLARE_ZONE_ID') }}"
          {% endif %}
          {% if lookup('env', 'NAMECHEAP_SANDBOX_API_KEY') %}
          # Development environment uses sandbox API key
          export NAMECHEAP_API_KEY="{{ lookup('env', 'NAMECHEAP_SANDBOX_API_KEY') }}"
          export NAMECHEAP_API_USER="{{ lookup('env', 'NAMECHEAP_API_USER') | default('iw2rmb') }}"
          export NAMECHEAP_USERNAME="{{ lookup('env', 'NAMECHEAP_USERNAME') | default('iw2rmb') }}"
          export NAMECHEAP_CLIENT_IP="{{ lookup('env', 'NAMECHEAP_CLIENT_IP') | default(hostvars[groups['all'][0]]['ansible_default_ipv4']['address']) }}"
          export NAMECHEAP_SANDBOX="{{ lookup('env', 'NAMECHEAP_SANDBOX') | default('true') }}"
          {% endif %}
          
          # DNS configuration environment variables
          export PLOY_DNS_PROVIDER="{{ lookup('env', 'PLOY_DNS_PROVIDER') | default('namecheap') }}"
          
          # Platform domain configuration
          export PLOY_PLATFORM_DOMAIN="{{ ploy.platform_domain }}"
          export PLOY_DNS_DOMAIN="{{ lookup('env', 'PLOY_DNS_DOMAIN') }}"
          export PLOY_DNS_TARGET_IP="{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}"
          
          # Global deployment target host
          export TARGET_HOST="{{ hostvars[groups['all'][0]]['ansible_default_ipv4']['address'] }}"
          
          # Platform wildcard certificate configuration
          export PLOY_APPS_DOMAIN="{{ ploy.apps_domain }}"
          export PLOY_APPS_DOMAIN_PROVIDER="{{ ploy.apps_domain_provider }}"
          
          # Development environment wildcard certificate (*.dev.ployd.app)
          # This is for DEV environment ONLY
          {% if ploy_environment is defined and ploy_environment == 'dev' %}
          export PLOY_DEV_SUBDOMAIN="dev"
          export PLOY_DEV_APPS_DOMAIN="{{ ploy.apps_domain }}"
          export PLOY_WILDCARD_DOMAIN="*.{{ ploy.apps_domain }}"
          export PLOY_CONTROLLER_DOMAIN="api.{{ ploy.apps_domain }}"
          {% endif %}
        marker: "# {mark} ANSIBLE MANAGED BLOCK - Environment vars"


    - name: Configure Git credentials for GitHub access
      block:
        - name: Create Git credential store file with GitHub token
          copy:
            content: "https://{{ lookup('env', 'GITHUB_PLOY_DEV_USERNAME') }}:{{ lookup('env', 'GITHUB_PLOY_DEV_PAT') }}@github.com"
            dest: /home/ploy/.git-credentials
            owner: ploy
            group: ploy
            mode: '0600'
            
        - name: Configure Git to use credential store
          blockinfile:
            path: /home/ploy/.gitconfig
            create: true
            owner: ploy
            group: ploy
            mode: '0644'
            block: |
              [credential]
                  helper = store
              [user]
                  name = "{{ lookup('env', 'GITHUB_PLOY_DEV_USERNAME') }}"
                  email = "{{ lookup('env', 'GITHUB_PLOY_DEV_USERNAME') }}@users.noreply.github.com"
            marker: "# {mark} ANSIBLE MANAGED BLOCK - Git credentials"
            
        - name: Test Git authentication
          shell: |
            # Export credentials for this session
            export GITHUB_PLOY_DEV_USERNAME="{{ lookup('env', 'GITHUB_PLOY_DEV_USERNAME') }}"
            export GITHUB_PLOY_DEV_PAT="{{ lookup('env', 'GITHUB_PLOY_DEV_PAT') }}"
            
            # Test Git authentication by fetching repository info
            git ls-remote https://github.com/iw2rmb/ploy.git HEAD > /dev/null 2>&1
          register: git_auth_test
          become_user: ploy
          failed_when: git_auth_test.rc != 0
          
        - name: Display Git authentication status
          debug:
            msg: "Git authentication test: {{ 'PASSED' if git_auth_test.rc == 0 else 'FAILED' }}"

    - name: Clone Ploy repository
      git:
        repo: https://github.com/iw2rmb/ploy.git
        dest: /home/ploy/ploy
        force: true
      become_user: ploy
      become: true

    # Clean up Ollama if it was previously installed
    - name: Remove Ollama and cleanup models
      block:
        - name: Check if Ollama service exists
          stat:
            path: /etc/systemd/system/ollama.service
          register: ollama_service_file

        - name: Stop and disable Ollama service if running
          systemd:
            name: ollama
            state: stopped
            enabled: false
          when: ollama_service_file.stat.exists
          ignore_errors: true

        - name: Remove Ollama binary
          file:
            path: /usr/local/bin/ollama
            state: absent
          ignore_errors: true

        - name: Remove Ollama models directory for ploy user
          file:
            path: /home/ploy/.ollama
            state: absent
          ignore_errors: true

        - name: Remove root Ollama models directory
          file:
            path: /root/.ollama
            state: absent
          ignore_errors: true

        - name: Remove Ollama models directory in /usr/share
          file:
            path: /usr/share/ollama
            state: absent
          ignore_errors: true

        - name: Remove Ollama systemd service file
          file:
            path: /etc/systemd/system/ollama.service
            state: absent
          when: ollama_service_file.stat.exists

        - name: Reload systemd daemon after removing Ollama service
          systemd:
            daemon_reload: yes
          when: ollama_service_file.stat.exists

        - name: Display Ollama cleanup status
          debug:
            msg: |
              Ollama cleanup completed:
              - Service stopped and disabled
              - Binary removed from /usr/local/bin
              - Model directories cleaned up
              - Systemd service file removed
              System now configured for external LLM APIs via model registry

    - name: Create external storage configuration directory
      file:
        path: /etc/ploy/storage
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'

    - name: Create external storage configuration file
      copy:
        content: |
          # External Storage Configuration for Ploy Controller
          # SeaweedFS-based distributed storage
          
          storage:
            provider: seaweedfs
            # New centralized config Service expects an endpoint; keep master/filer for
            # backward compatibility and legacy helpers during transition.
            endpoint: "{{ storage_config.seaweedfs.master }}"
            
            # SeaweedFS Configuration
            master: "{{ storage_config.seaweedfs.master }}"
            filer: "{{ storage_config.seaweedfs.filer }}"
            collection: "{{ storage_config.seaweedfs.collection | default('artifacts') }}"
            replication: "{{ seaweedfs_single_node.replication | default(storage_config.seaweedfs.replication | default('001')) }}"
            timeout: {{ storage_config.seaweedfs.timeout | default(30) }}
            datacenter: "{{ storage_config.seaweedfs.datacenter | default('') }}"
            rack: "{{ storage_config.seaweedfs.rack | default('') }}"
            collections:
              artifacts: "{{ storage_config.seaweedfs.collections.artifacts | default('artifacts') }}"
              metadata: "{{ storage_config.seaweedfs.collections.metadata | default('ploy-metadata') }}"
              debug: "{{ storage_config.seaweedfs.collections.debug | default('ploy-debug') }}"
            
            # Client Configuration
            client:
              retry_config:
                max_retries: {{ storage_config.client.retry_config.max_retries | default(3) }}
                initial_delay: "{{ storage_config.client.retry_config.initial_delay | default('1s') }}"
                max_delay: "{{ storage_config.client.retry_config.max_delay | default('30s') }}"
                multiplier: {{ storage_config.client.retry_config.multiplier | default(2.0) }}
              health_check_config:
                interval: "{{ storage_config.client.health_check_config.interval | default('30s') }}"
                timeout: "{{ storage_config.client.health_check_config.timeout | default('10s') }}"
                failure_threshold: {{ storage_config.client.health_check_config.failure_threshold | default(3) }}
              enable_metrics: {{ storage_config.client.enable_metrics | default(true) }}
              enable_health_check: {{ storage_config.client.enable_health_check | default(true) }}
              max_operation_time: "{{ storage_config.client.max_operation_time | default('5m') }}"
        dest: /etc/ploy/storage/config.yaml
        owner: ploy
        group: ploy
        mode: '0644'

    - name: Create DNS configuration directory
      file:
        path: /etc/ploy/dns
        state: directory
        owner: ploy
        group: ploy
        mode: '0755'

    - name: Create DNS configuration file
      copy:
        content: |
          {
            "provider": "{{ ploy.dns.provider }}",
            "domain": "{{ ploy.dns.domain }}",
            "target_ip": "{{ ploy.dns.target_ip }}",
            "ttl": {{ ploy.dns.ttl }},
            "enable_ipv6": {{ ploy.dns.enable_ipv6 }},
            "cloudflare": {
              "api_token": "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}",
              "zone_id": "{{ lookup('env', 'CLOUDFLARE_ZONE_ID') }}"
            },
            "namecheap": {
              "api_user": "{{ lookup('env', 'NAMECHEAP_API_USER') }}",
              "api_key": "{{ lookup('env', 'NAMECHEAP_API_KEY') }}",
              "username": "{{ lookup('env', 'NAMECHEAP_USERNAME') }}",
              "client_ip": "{{ lookup('env', 'NAMECHEAP_CLIENT_IP') }}",
              "sandbox": {{ lookup('env', 'NAMECHEAP_SANDBOX') | default('false') | bool }}
            }
          }
        dest: /etc/ploy/dns/config.json
        owner: ploy
        group: ploy
        mode: '0600'
      when: ploy.dns is defined

    - name: Set up firewall
      ufw:
        rule: allow
        port: "{{ item }}"
      loop:
        - "22"
        # API port removed - only accessible via domain routing
        - "4646"  # Nomad
        - "8500"  # Consul
        - "80"    # HTTP (Traefik)
        - "443"   # HTTPS (Traefik)
        - "8080"  # Traefik dashboard

    # SSL Certificate Provisioning Infrastructure
    - name: Install SSL certificate management tools
      block:
        - name: Install certbot for Let's Encrypt ACME client
          apt:
            name:
              - certbot
              - python3-certbot-dns-cloudflare
            state: present

        # Example of parallel downloads optimization for multiple independent tools
    # This demonstrates how to download multiple tools in parallel to speed up the playbook
    - name: Parallel download optimization for independent tools
      block:
        - name: Start parallel downloads for build tools
          get_url:
            url: "{{ item.url }}"
            dest: "{{ item.dest }}"
            mode: "{{ item.mode | default('0755') }}"
            force: no  # Don't re-download if already exists
          async: 600  # 10 minute timeout
          poll: 0  # Don't wait for completion
          loop:
            - { url: "https://github.com/go-acme/lego/releases/download/v4.14.2/lego_v4.14.2_linux_amd64.tar.gz", dest: "/tmp/lego.tar.gz" }
            # Add more parallel downloads here as needed
          register: parallel_downloads
          when: item.url is defined

        - name: Check on parallel downloads
          async_status:
            jid: "{{ item.ansible_job_id }}"
          register: job_result
          until: job_result.finished
          retries: 60
          delay: 10
          loop: "{{ parallel_downloads.results }}"
          when: parallel_downloads is defined and item.ansible_job_id is defined

    - name: Install lego ACME client (alternative to certbot with better DNS provider support)
      block:
        - name: Check if lego is already installed
          stat:
            path: /usr/local/bin/lego
          register: lego_binary

        - name: Download lego ACME client
          get_url:
            url: "https://github.com/go-acme/lego/releases/download/v{{ lego_version | default('4.14.2') }}/lego_v{{ lego_version | default('4.14.2') }}_linux_amd64.tar.gz"
            dest: /tmp/lego.tar.gz
          when: not lego_binary.stat.exists

        - name: Extract lego ACME client
          unarchive:
            src: /tmp/lego.tar.gz
            dest: /usr/local/bin
            remote_src: true

        - name: Make lego executable
          file:
            path: /usr/local/bin/lego
            mode: '0755'

        - name: Create SSL certificates directory (for legacy compatibility)
          file:
            path: /etc/ploy/certs
            state: directory
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Create Traefik data directory for ACME certificates
          file:
            path: /opt/ploy/traefik-data
            state: directory
            owner: root
            group: root
            mode: '0755'

        - name: Initialize ACME certificate files (with proper permissions)
          file:
            path: "{{ item }}"
            state: touch
            owner: root
            group: root
            mode: '0600'
          loop:
            - /opt/ploy/traefik-data/acme.json
            - /opt/ploy/traefik-data/platform-acme.json
            - /opt/ploy/traefik-data/apps-acme.json

        - name: Create SSL certificate scripts directory
          file:
            path: /home/ploy/ploy/scripts/ssl
            state: directory
            owner: ploy
            group: ploy
            mode: '0755'

    - name: Setup platform certificate renewal automation
      block:
        - name: Create DNS validation script
          template:
            src: ../../common/templates/validate-dns-records.sh.j2
            dest: /home/ploy/ploy/scripts/ssl/validate-dns-records.sh
            owner: ploy
            group: ploy
            mode: '0755'

        - name: Remove platform certificate renewal cron job (now handled by Traefik)
          cron:
            name: "Platform Wildcard Certificate Renewal"
            state: absent

    # Manual certificate env and provisioning steps removed; Traefik handles ACME

    # Platform wildcard certificate health check (after api deployment)
    - name: Wait for api health endpoint to be available
      uri:
        url: "https://api.{{ ploy.platform_domain }}/health"
        validate_certs: no
        method: GET
        status_code: 200
      environment:
        PLOY_PLATFORM_DOMAIN: "dev.ployman.app"
      register: health_check
      retries: 30
      delay: 5
      until: health_check.status == 200
      when: ploy.apps_domain is defined and ploy.apps_domain != ""

    - name: Check platform wildcard certificate health
      uri:
        url: "https://api.{{ ploy.platform_domain }}/health/platform-certificates"
        validate_certs: no
        method: GET
        status_code: [200, 503]  # 503 is acceptable during initial provisioning
      environment:
        PLOY_PLATFORM_DOMAIN: "dev.ployman.app"
      register: cert_health_check
      retries: 60  # More retries for certificate provisioning
      delay: 15
      until: cert_health_check.status == 200
      when: ploy.apps_domain is defined and ploy.apps_domain != ""
      ignore_errors: true  # Don't fail playbook if certificate provisioning has issues

    - name: Display platform certificate health status
      debug:
        msg: |
          Platform Certificate Health Status: {{ cert_health_check.json.status if cert_health_check.json is defined else 'unavailable' }}
          Domain: {{ cert_health_check.json.platform_domain if cert_health_check.json is defined and cert_health_check.json.platform_domain is defined else ploy.apps_domain }}
          Wildcard: {{ cert_health_check.json.wildcard_domain if cert_health_check.json is defined and cert_health_check.json.wildcard_domain is defined else 'not provisioned' }}
          {% if cert_health_check.json is defined and cert_health_check.json.expires_at is defined %}
          Expires: {{ cert_health_check.json.expires_at }}
          Days until expiry: {{ cert_health_check.json.days_until_expiry }}
          {% endif %}
      when: 
        - ploy.apps_domain is defined and ploy.apps_domain != ""
        - cert_health_check is defined

  handlers:
    - name: restart docker
      block:
        - name: Stop Docker service gracefully
          systemd:
            name: docker
            state: stopped
          ignore_errors: true

        - name: Clean up Docker temporary files
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /var/lib/docker/tmp
            - /var/run/docker
          ignore_errors: true

        - name: Start Docker service with daemon reload
          systemd:
            name: docker
            state: started
            daemon_reload: true
          register: docker_restart_result
          retries: 3
          delay: 5
          until: docker_restart_result is succeeded

        - name: Verify Docker restart was successful
          command: docker info
          retries: 5
          delay: 3
          until: docker_info_verify.rc == 0
          register: docker_info_verify
          changed_when: false
