# Existing CA hash at target section that differs from expected migration hash causes rejection.
description: ca conflict rejects migration
env:
  PLOY_CA_CERTS:
    - value: "-----BEGIN CERT-----\nnew-cert\n-----END CERT-----"
      target: steps
      secret: true
existing_ca:
  heal:
    - "differenthash123"
existing_home: {}
expect:
  rewritten: 0
  rejected: 1
  skipped: 0
  entries:
    - env_key: PLOY_CA_CERTS
      target: steps
      action: reject
      target_field: ca
      sections: [heal, mig]
