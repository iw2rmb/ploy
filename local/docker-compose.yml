services:
  db:
    build:
      context: ..
      dockerfile: docker/db/Dockerfile
    image: ploy-db:local
    platform: linux/amd64
    environment:
      - POSTGRES_DB=ploy
      - POSTGRES_USER=ploy
      - POSTGRES_PASSWORD=ploy
    ports:
      - "${PLOY_DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ploy -d ploy"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build:
      context: ..
      dockerfile: docker/server/Dockerfile
    image: ploy-server:local
    platform: linux/amd64
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    environment:
      - PLOY_POSTGRES_DSN=postgres://ploy:ploy@db:5432/ploy?sslmode=disable
      - PLOY_AUTH_SECRET=${PLOY_AUTH_SECRET:-changeme-insecure-local-secret}
      - PLOY_CLUSTER_ID=local
      - PLOY_OBJECTSTORE_ENDPOINT=http://minio:9000
      - PLOY_OBJECTSTORE_BUCKET=ploy
      - PLOY_OBJECTSTORE_ACCESS_KEY=ploy
      - PLOY_OBJECTSTORE_SECRET_KEY=ploy-unsafe-local
      - PLOY_OBJECTSTORE_SECURE=false
    volumes:
      - ./server/ployd.yaml:/etc/ploy/ployd.yaml:ro
    command: ["/usr/local/bin/ployd", "--config", "/etc/ploy/ployd.yaml"]
    ports:
      - "8080:8080"
      - "9100:9100"
    healthcheck:
      # Use /health endpoint (plain HTTP with bearer token auth)
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  node:
    build:
      context: ..
      dockerfile: docker/node/Dockerfile
    image: ploy-node:local
    platform: linux/amd64
    user: "0:0"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - PLOY_DOCKER_NETWORK=local_default
      - PLOYD_CACHE_HOME=/private/tmp
      - TMPDIR=/private/tmp
    volumes:
      - ./node/ployd-node.yaml:/etc/ploy/ployd-node.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /private/tmp:/private/tmp
    command:
      ["/usr/local/bin/ployd-node", "--config", "/etc/ploy/ployd-node.yaml"]

  gradle-build-cache:
    image: gradle/build-cache-node:21.2
    platform: linux/amd64
    volumes:
      - gradle-build-cache-data:/data
      - ./gradle-build-cache/config.yaml:/seed/config.yaml:ro
      - ./gradle-build-cache/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "5071:5071"

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":8999"]
    environment:
      - MINIO_ROOT_USER=ploy
      - MINIO_ROOT_PASSWORD=ploy-unsafe-local
    ports:
      - "9000:9000"
      - "8999:8999"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 ploy ploy-unsafe-local
        mc ls local/ploy >/dev/null 2>&1 || mc mb -p local/ploy
        mc ilm ls local/ploy >/dev/null 2>&1 || mc ilm add --expire-days 30 local/ploy
        exit 0

volumes:
  gradle-build-cache-data:
  minio-data:
