# ARF Phase 3 - LLM Integration Configuration
# This file configures the Large Language Model integration for dynamic recipe generation

llm_integration:
  # Provider selection: openai, anthropic, azure
  provider: "openai"
  
  # Model configuration
  model: "gpt-4"
  
  # API key should be stored in environment variable ARF_LLM_API_KEY
  # or in a secure secret management system
  api_key_secret: "${ARF_LLM_API_KEY}"
  
  # Generation parameters
  generation:
    temperature: 0.1        # Low temperature for deterministic outputs
    max_tokens: 2048       # Maximum response length
    timeout: "30s"         # API call timeout
    retry_attempts: 3      # Number of retries on failure
    retry_delay: "2s"      # Delay between retries
  
  # Prompting configuration
  prompting:
    context_window: 8192           # Maximum context size
    include_surrounding_code: true # Include code context
    include_build_logs: true       # Include compilation errors
    include_test_results: true     # Include test failures
    include_similar_patterns: true # Include learned patterns
    max_examples: 3               # Number of examples to include
  
  # Validation settings
  validation:
    syntax_check: true         # Validate generated recipe syntax
    sandbox_test: true         # Test in sandbox before applying
    confidence_threshold: 0.7  # Minimum confidence for auto-apply
    require_compilation: true  # Ensure code compiles after transformation
  
  # Cost management
  cost_management:
    max_monthly_tokens: 1000000  # Monthly token limit
    alert_threshold: 0.8         # Alert at 80% usage
    fallback_on_limit: true      # Use static recipes when limit reached
  
  # Caching configuration
  cache:
    enabled: true
    ttl: "24h"               # Cache duration
    max_entries: 1000        # Maximum cached recipes
    
  # Model-specific configurations
  models:
    gpt-4:
      endpoint: "https://api.openai.com/v1/chat/completions"
      max_tokens: 8192
      cost_per_1k_tokens: 0.03
    
    gpt-3.5-turbo:
      endpoint: "https://api.openai.com/v1/chat/completions"
      max_tokens: 4096
      cost_per_1k_tokens: 0.002
    
    claude-2:
      endpoint: "https://api.anthropic.com/v1/messages"
      max_tokens: 100000
      cost_per_1k_tokens: 0.008