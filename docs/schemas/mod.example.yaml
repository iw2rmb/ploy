# apiVersion and kind are informational; the current control plane forwards this
# spec as an opaque JSON object. Keep keys stable and snake_case to align with
# existing CLI/agent options.
apiVersion: ploy.mod/v1alpha1
kind: ModRunSpec

################################################################################
# SINGLE-STEP MOD (default, backward-compatible)
################################################################################
# Main mod container to run against the hydrated repository at /workspace.
# This is the traditional single-mod format. For multi-step workflows, use the
# mods[] array instead (see MULTI-STEP section below).
mod:
  # Required: image that performs the transformation (e.g., OpenRewrite)
  image: docker.io/your-dh-user/mods-openrewrite:latest
  # Optional: override command; when omitted, image CMD/ENTRYPOINT is used
  # command: ["/bin/sh", "-lc", "mods-orw --apply --dir /workspace --out /out"]
  # Environment variables passed into the mod container
  #   - use `env` for literal values
  #   - use `env_from_file` to inline the content of a file (CLI reads and embeds)
  env:
    RECIPE_GROUP: org.openrewrite.recipe
    RECIPE_ARTIFACT: rewrite-migrate-java
    RECIPE_VERSION: "3.20.0"
    RECIPE_CLASSNAME: org.openrewrite.java.migrate.UpgradeToJava17
    MAVEN_PLUGIN_VERSION: "6.18.0"
  env_from_file:
    # Example: read Codex auth JSON from local file; CLI expands ~ and inlines the content
    # CODEX_AUTH_JSON: ~/.codex/auth.json
  # Retain container for debugging (disabled by default)
  retain_container: false

################################################################################
# MULTI-STEP MODS (optional, for sequential transformations)
################################################################################
# When you need multiple transformation steps executed sequentially, use mods[]
# instead of the single mod section above. Each step runs with the same global
# build gate and healing policy. The diff from each step is captured before the
# next step begins, enabling per-step rehydration and multi-node execution.
#
# Rules:
# - Mods execute in array order (steps are sequential within one run).
# - All mods share the same repository, base_ref, target_ref, and global gate policy.
# - Each mod step produces a diff artifact before the next step starts.
# - If any step fails its gate check, the global healing policy applies.
#
# Example (disabled by default; remove comments to activate):
# mods:
#   - image: docker.io/your-dh-user/mods-migrate-java8:latest
#     env:
#       MIGRATION_TARGET: java8
#   - image: docker.io/your-dh-user/mods-migrate-java11:latest
#     env:
#       MIGRATION_TARGET: java11
#   - image: docker.io/your-dh-user/mods-migrate-java17:latest
#     env:
#       MIGRATION_TARGET: java17
#       RECIPE_VERSION: "3.20.0"

################################################################################
# GLOBAL BUILD GATE AND HEALING POLICY
################################################################################
# Build Gate settings apply to all mods (both single-mod and multi-step runs).
# The node agent reuses the same Java gate for Maven/Gradle (maven: -e; gradle:
# --stacktrace). Profile "auto" detects pom.xml/gradle files.
#
# Gate execution occurs after each mod transformation. For multi-step runs, the
# gate validates the accumulated changes from all prior steps.
build_gate:
  enabled: true
  profile: auto # auto | java | java-maven | java-gradle

# Healing sequence executed when the Build Gate fails (applies globally to all mods).
# Each item is a container step that can modify /workspace and emit artifacts to
# /out. After running all steps, the gate is re-run; on pass, the next mod proceeds.
#
# For multi-step runs, the healing policy is shared across all mod steps. When a
# step's gate fails, healing runs once per the retry count, then the gate is
# re-evaluated before proceeding to the next step.
#
# Healing mods use the repo+diff Build Gate API model:
# 1. Generate a unified diff of healing changes: `git diff > /out/heal.patch`
# 2. Call buildgate-validate with --diff-patch to verify via the HTTP API:
#    `buildgate-validate --repo-url "$PLOY_REPO_URL" --ref "$PLOY_BUILDGATE_REF" \
#                        --profile auto --diff-patch /out/heal.patch`
# 3. The Build Gate applies the diff on top of repo_url+ref and runs the build.
#
# Environment variables injected by the node agent for healing mods:
# - PLOY_REPO_URL: Git repository URL (same as the Mods run)
# - PLOY_BUILDGATE_REF: Git ref for Build Gate baseline (base_ref or commit_sha)
# - PLOY_HOST_WORKSPACE: Host path to workspace (for direct host verification)
# - PLOY_SERVER_URL: ploy server URL for Build Gate HTTP API
build_gate_healing:
  retries: 1
  mods:
    - image: docker.io/your-dh-user/mods-codex:latest
      # Codex prompt can be provided via env (CODEX_PROMPT) or a prompt file.
      # Default prompt location: /in/prompt.txt (node mounts it R/O when provided in spec).
      # The container must have Docker socket access (-v /var/run/docker.sock)
      # for build verification.
      command: >-
        mod-codex --input /workspace --out /out --prompt-file /in/prompt.txt
      env:
        CODEX_PROMPT: |-
          Rules:
          - After making any change, generate a unified diff and verify the build.
          - Generate diff: cd /workspace && git diff > /out/heal.patch
          - Run: buildgate-validate --repo-url "$PLOY_REPO_URL" --ref "$PLOY_BUILDGATE_REF" --profile auto --diff-patch /out/heal.patch
          - If it fails, iterate and try again until it passes.
          - Only finalize once the gate passes; then print "BUILD PASSED".

          Task:
          Fix the compilation error described in /in/build-gate.log.
      env_from_file:
        # Inline Codex auth as env from file content (resolved by CLI)
        # CODEX_AUTH_JSON: ~/.codex/auth.json
      retain_container: false

# Optional GitLab integration (control plane/node redact PAT in logs).
gitlab_domain: gitlab.com          # optional; defaults to gitlab.com when gitlab_pat is provided
# gitlab_pat: "<TOKEN>"           # optional; can be provided via env_from_file in CLI; avoid committing to VCS
mr_on_success: true
mr_on_fail: true

################################################################################
# NOTES
################################################################################
# - This YAML is submitted via: `ploy mod run --spec mod.yaml` along with
#   repository flags (e.g., --repo-url, --repo-base-ref, --repo-target-ref).
#
# - The agent honors: mod.image, mod.command, mod.env, mod.retain_container,
#   mods[] (for multi-step runs), gitlab_domain, gitlab_pat, mr_on_success,
#   mr_on_fail, build_gate.* (profile), and build_gate_healing.* (retries, mods).
#
# - Single-mod vs multi-step:
#   * Single-mod: Use the `mod` section for one transformation.
#   * Multi-step: Use the `mods[]` array for sequential transformations.
#   * Both formats share the same global build_gate and build_gate_healing policy.
#
# - Multi-step semantics:
#   * Mods execute in array order (sequential steps within one run).
#   * All mods share the same repository and global gate/heal policy.
#   * Each mod step produces a diff artifact captured before the next step.
#   * Diffs enable rehydration: any step can be re-executed on any node by
#     applying the ordered chain of diffs from prior steps onto the base snapshot.
#
# - The node agent consumes build_gate_healing to run the heal → re-gate loop
#   after the first gate fail (applies to both single-mod and multi-step runs).
