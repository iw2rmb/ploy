parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    # Run IDs are KSUID strings (27 characters, lexicographically sortable).
    description: Run ID (KSUID string)
post:
  tags: [Control]
  summary: Cancel a Mods run
  description: |
    Control-plane cancel request for a Mods run identified by its `id`.
    Transitions the run and any in-flight or pending stages to `canceled` status.
    The request is idempotent: if the run is already in a terminal state, returns
    `200 OK`; otherwise, transitions to `canceled` and returns `202 Accepted`.
    An optional `reason` may be provided in the request body to explain the cancellation.
  requestBody:
    required: false
    content:
      application/json:
        schema:
          type: object
          properties:
            reason:
              type: string
              nullable: true
              description: Optional human-readable cancellation reason
  responses:
    '202':
      description: Accepted; run and stages transitioned to canceled
    '200':
      description: OK; run was already in a terminal state (idempotent)
    '400':
      description: Bad request (missing or empty run id)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '404':
      description: Run not found
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/common.yaml#/Error'
