get:
  tags: [Control]
  summary: List runs
  parameters:
    - in: query
      name: view
      schema:
        type: string
        enum: [timing]
      required: false
      description: |
        Alternate view for this collection. When set to `timing`,
        the endpoint serves run timing data from the `runs_timing` view.
        - If no `id` is provided, the response contains a `timings` array
          (see ListRunsTimingsResponse) honoring `limit`/`offset`.
        - If an `id` is provided (via `/v1/runs/{id}` path or `?id=` query),
          the response is a single timing object equivalent to
          `GET /v1/runs/{id}/timing` (compatibility alias).
    - in: query
      name: mod_id
      schema: { type: string, format: uuid }
      required: false
    - in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 200 }
      required: false
    - in: query
      name: offset
      schema: { type: integer, minimum: 0 }
      required: false
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            oneOf:
              - type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: '../components/schemas/controlplane.yaml#/Run'
                required: [runs]
              - $ref: '../components/schemas/controlplane.yaml#/ListRunsTimingsResponse'
post:
  tags: [Control]
  summary: Create run
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/controlplane.yaml#/CreateRunRequest'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/controlplane.yaml#/CreateRunResponse'
