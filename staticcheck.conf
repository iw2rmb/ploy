checks = [
  "all",
  "-ST1005",  # error strings should not be capitalized
  "-ST1000",  # package comment
  "-ST1003",  # naming initialisms
  "-ST1020",  # exported func comment form
  "-ST1021",  # exported type comment form
  "-U1000",   # unused code (temporarily ignored for large repo)
  "-SA1012",  # nil context (legacy code paths)
  "-SA1019",  # deprecated APIs (migration in progress)
  "-SA4006",  # value never used (tests)
  "-SA9003",  # empty branch
  "-S1009",   # omit nil map check
  "-S1039",   # unnecessary Sprintf
  "-SA6005"   # strings.EqualFold suggestion
]

# Optionally ignore specific packages (examples/tests or generated code)
ignore = [
  { pattern = "^api/", checks = ["U1000", "ST1005", "SA1012", "SA1019", "SA4006", "S1009", "S1039", "SA6005", "SA4017", "S1019", "S1000", "S1011", "S1005"] },
  { pattern = "^internal/", checks = ["U1000", "ST1005", "SA1012", "SA1019", "SA4006", "S1009", "S1039", "SA6005", "SA9003", "ST1003", "ST1000", "ST1020", "ST1021", "S1011", "S1005", "SA4017", "S1000", "S1019"] },
  { pattern = "^tests/", checks = ["U1000", "SA4006", "S1011", "SA4017", "S1019", "S1000"] }
]
