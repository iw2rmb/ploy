get:
  tags: [Config]
  summary: Get global environment variable
  operationId: getGlobalEnv
  description: |
    Returns a single global environment variable entry identified by its key.
    The response includes the value even for secret entries; callers must use
    `cli-admin` role.

    Use this endpoint to retrieve the full value of a secret variable that is
    redacted in the list response.

    **Ambiguity handling:** When the key exists for multiple targets, the
    `target` query parameter is required. If omitted, the endpoint returns
    409 Conflict with a list of available targets.
  parameters:
    - in: path
      name: key
      required: true
      schema:
        type: string
      description: Environment variable key (e.g., OPENAI_API_KEY, CUSTOM_VAR). Reserved keys managed by typed config fields (ca, home) are rejected on all targets.
      example: OPENAI_API_KEY
    - in: query
      name: target
      required: false
      schema:
        $ref: "../components/schemas/config.yaml#/GlobalEnvTarget"
      description: |
        Target selector for disambiguation. Required when the key exists for
        multiple targets; optional when only one target exists.
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/config.yaml#/GlobalEnvVar"
          example:
            key: "OPENAI_API_KEY"
            value: "sk-..."
            target: "steps"
            secret: true
    "400":
      description: Bad request (key path parameter is required or invalid target)
    "401":
      description: Unauthorized
    "403":
      description: Forbidden (requires cli-admin role)
    "404":
      description: Global environment variable not found
    "409":
      description: |
        Ambiguous key — exists for multiple targets. Specify `?target=` to
        disambiguate.
    "500":
      description: Server error

put:
  tags: [Config]
  summary: Upsert global environment variable
  operationId: upsertGlobalEnv
  description: |
    Creates or updates a global environment variable entry. The value is stored
    persistently in the config_env table and cached in memory via the config
    holder. If the key+target pair already exists, the entry is updated.

    The same key can be stored with different targets, creating separate entries
    that are injected into different components.

    **Common use cases:**
    - `OPENAI_API_KEY` with target `steps` — API key for LLM-integrated migs.
    - Custom variables for user-defined mig parameters.

    **Reserved keys:** Keys managed by typed config fields (`ca`, `home`) are
    rejected by this endpoint on all targets. Use the typed config commands
    (`ploy config ca`, `ploy config home`) instead.

    Requires `cli-admin` role.
  parameters:
    - in: path
      name: key
      required: true
      schema:
        type: string
      description: Environment variable key.
      example: OPENAI_API_KEY
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/config.yaml#/GlobalEnvPutRequest"
        examples:
          api_key:
            summary: Set an API key
            value:
              value: "sk-..."
              target: "steps"
              secret: true
          ca_bundle:
            summary: Set a CA certificate bundle for gates
            value:
              value: "-----BEGIN CERTIFICATE-----\nMIIC..."
              target: "gates"
              secret: true
          non_secret:
            summary: Set a non-secret variable
            value:
              value: "myvalue"
              target: "steps"
              secret: false
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../components/schemas/config.yaml#/GlobalEnvVar"
    "400":
      description: Bad request (invalid JSON or invalid target)
    "401":
      description: Unauthorized
    "403":
      description: Forbidden (requires cli-admin role)
    "500":
      description: Server error

delete:
  tags: [Config]
  summary: Delete global environment variable
  operationId: deleteGlobalEnv
  description: |
    Deletes a global environment variable entry from the persistent store and
    from the in-memory config holder. This is an idempotent operation; deleting
    a non-existent key does not return an error.

    **Ambiguity handling:** When the key exists for multiple targets, the
    `target` query parameter is required. If only one target exists, the target
    is inferred automatically. If the key does not exist, returns 204 immediately.

    Requires `cli-admin` role.
  parameters:
    - in: path
      name: key
      required: true
      schema:
        type: string
      description: Environment variable key.
      example: OLD_VAR
    - in: query
      name: target
      required: false
      schema:
        $ref: "../components/schemas/config.yaml#/GlobalEnvTarget"
      description: |
        Target selector for disambiguation. Required when the key exists for
        multiple targets; optional when only one target exists or the key does
        not exist.
  responses:
    "204":
      description: Deleted (or already absent)
    "400":
      description: Bad request (key path parameter is required or invalid target)
    "401":
      description: Unauthorized
    "403":
      description: Forbidden (requires cli-admin role)
    "409":
      description: |
        Ambiguous key — exists for multiple targets. Specify `?target=` to
        disambiguate.
    "500":
      description: Server error
